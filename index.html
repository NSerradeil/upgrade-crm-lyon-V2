// Extrait la partie date (YYYY-MM-DD) d'un datetime ISO ou date simple — conversion UTC→Europe/Paris
function extractDate(dt) {
  if(!dt) return '';
  const s=String(dt);
  if(s.length<=10) return s; // date simple, pas de timezone à convertir
  const d=new Date(dt);
  if(isNaN(d)) return s.slice(0,10);
  return d.toLocaleDateString('sv-SE',{timeZone:TZ}); // YYYY-MM-DD en heure Paris
}
// Extrait l'heure (HH:MM) d'un datetime ISO — conversion UTC→Europe/Paris ; retourne '' si date simple ou minuit
function extractTime(dt) {
  if(!dt) return '';
  const s=String(dt);
  if(s.length<=10) return ''; // date simple, pas d'heure
  const d=new Date(dt);
  if(isNaN(d)) return '';
  const t=d.toLocaleTimeString('fr-FR',{timeZone:TZ,hour:'2-digit',minute:'2-digit',hour12:false});
  return t==='00:00'?'':t; // minuit = pas d'heure explicite
}
// Formate une date UTC en DD/MM/YYYY heure Paris (pour historique)
function fmtDateParis(dt) {
  if(!dt) return '—';
  const s=String(dt);
  if(s.length<=10){ const [y,mo,dd]=(s||'').split('-'); return dd&&mo&&y?`${dd}/${mo}/${y}`:'—'; }
  const p=new Date(dt);
  if(isNaN(p)) return s.slice(0,10);
  return p.toLocaleDateString('fr-FR',{timeZone:TZ,day:'2-digit',month:'2-digit',year:'numeric'});
}
// Combine date YYYY-MM-DD + time HH:MM → ISO string ; si pas de time, renvoie la date seule
function combineDT(date, time) {
  if(!date) return null;
  if(!time) return date;
  const dt=new Date(`${date}T${time}:00`);
  if(isNaN(dt)) return date;
  const off=-dt.getTimezoneOffset();
  const sign=off>=0?'+':'-';
  const hh=String(Math.floor(Math.abs(off)/60)).padStart(2,'0');
  const mm=String(Math.abs(off)%60).padStart(2,'0');
  return `${date}T${time}:00${sign}${hh}:${mm}`;
}
// Affiche une date/datetime de manière lisible, avec heure si != defaultTime
function fmtDT(dt, defaultTime) {
  if(!dt) return '—';
  const d=extractDate(dt);
  const t=extractTime(dt);
  const [y,m,dd]=(d||'').split('-');
  const dateFmt=dd&&m&&y?`${dd}/${m}/${y}`:(d||'—');
  if(!t || t===defaultTime) return dateFmt;
  return `${dateFmt} · ${t}`;
}

// ── Jours ouvrés (lun-ven hors fériés FR) ───────────────────────────────────
const FERIES_FR = (() => {
  const s = new Set();
  // Dates fixes 2025-2027
  [2025,2026,2027].forEach(y => {
    [`${y}-01-01`,`${y}-05-01`,`${y}-05-08`,`${y}-07-14`,`${y}-08-15`,`${y}-11-01`,`${y}-11-11`,`${y}-12-25`].forEach(d=>s.add(d));
    // Pâques (algo Meeus) → lundi de Pâques + Ascension + lundi Pentecôte
    const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
    const easter=new Date(y,month-1,day);
    const addDays=(dt,n)=>{const r=new Date(dt);r.setDate(r.getDate()+n);return r.toISOString().slice(0,10);};
    s.add(addDays(easter,1)); s.add(addDays(easter,39)); s.add(addDays(easter,50));
  });
  return s;
})();
function joursOuvres(debut, fin) {
  if(!debut||!fin) return 0;
  let count=0, d=new Date(debut);
  const end=new Date(fin);
  while(d<=end){ const dow=d.getDay(); const iso=d.toISOString().slice(0,10); if(dow!==0&&dow!==6&&!FERIES_FR.has(iso))count++; d.setDate(d.getDate()+1); }
  return count;
}

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg,type='success'){window.dispatchEvent(new CustomEvent('crm-toast',{detail:{msg,type}}));}
function ToastContainer(){
  const [items,setItems]=useState([]);
  useEffect(()=>{
    const h=e=>{const{msg,type}=e.detail;const id=Date.now();setItems(t=>[...t,{id,msg,type}]);setTimeout(()=>setItems(t=>t.filter(x=>x.id!==id)),3000);};

function daysSince(d) {
  if (!d) return 999;
  return Math.max(0, Math.floor((new Date() - new Date(d)) / 86400000));

function fmtCurrency(n) {
  if (n >= 1000000) return `${(n/1000000).toFixed(2)}M€`;
  if (n >= 1000)    return `${(n/1000).toFixed(1)}k€`;
  return `${Math.round(n)}€`;

function ChartHeader({ title, kpi, kpiLabel, color, children }) {

function AbsBars({ data, max, getColor, getTopLabel, getTopLabel2, getFins, gap=4, curMonth }) {
  const barH = v => Math.max((v/max)*CH.H, v>0?6:2);
  const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  return (
    <div style={{position:'relative',height:CH.TOTAL,marginTop:8}}>
      <div style={{position:'absolute',left:0,right:0,top:0,bottom:0,display:'flex',gap,zIndex:3}}>
        {data.map((v,i) => {
          const bh = barH(v);
          const color = getColor(v,i);
          const topLbl = getTopLabel?getTopLabel(v,i):null;
          const topLb2 = getTopLabel2?getTopLabel2(v,i):null;
          const fins = getFins?getFins(i):null;
          return (
            <div key={i} style={{flex:1,position:'relative',minWidth:0}}>
              <div style={{position:'absolute',left:0,right:0,bottom:CH.BOT,height:bh,background:color,transition:'height 300ms'}}/>
              {topLbl&&<div style={{position:'absolute',left:0,right:0,bottom:CH.BOT+bh+2,textAlign:'center',fontSize:10,fontWeight:700,color:topLbl.color,whiteSpace:'nowrap',lineHeight:1.2}}>{topLbl.text}</div>}
              {topLb2&&<div style={{position:'absolute',left:0,right:0,bottom:CH.BOT+bh+14,textAlign:'center',fontSize:9,color:'#aaa',whiteSpace:'nowrap'}}>{topLb2}</div>}

              <div style={{position:'absolute',left:0,right:0,bottom:3,textAlign:'center',fontSize:10,fontWeight:600,color:i===curMonth?'#1C1F35':'#ccc'}}>{MOIS[i]}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  return <>
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6,flexWrap:'wrap'}}>
      <span style={{fontSize:13,fontWeight:700,color:'#1C1F35',fontFamily:'Outfit,sans-serif'}}>Taux intercontrat mensuel 2026</span>
      <span style={{fontSize:11,background:'#1C1F35',color:'#FFE500',padding:'2px 10px',fontWeight:800,borderRadius:0}}>Annuel YTD : {tauxAnn.toFixed(1)}%</span>
      <span style={{fontSize:11,background:status.bg,color:status.color,padding:'2px 10px',fontWeight:700,borderRadius:0}}>{status.label}</span>
    </div>
    <div style={{position:'relative',height:CH.TOTAL,marginTop:8}}>
      {[{v:5,color:'#00C218',label:'objectif 5%'},{v:8,color:'#FF3D2E',label:'malus 8%'}].map(({v,color,label}) => (
        <div key={v} style={{position:'absolute',left:0,right:0,bottom:lineBot(v),borderTop:`2px dashed ${color}`,zIndex:2}}>
          <span style={{position:'absolute',right:0,top:-14,fontSize:9,fontWeight:800,color,background:'#fff',padding:'0 4px'}}>{label}</span>
        </div>
      ))}
      <div style={{position:'absolute',left:0,right:0,top:0,bottom:0,display:'flex',gap:4,zIndex:3}}>
        {tauxM.map((v,i) => {
          const bh = barH(v);
          const future = i>curMonth;
          const c = future?'#E4E4E6':col(v);
          return (
            <div key={i} style={{flex:1,position:'relative',minWidth:0}}>
              <div style={{position:'absolute',left:0,right:0,bottom:CH.BOT,height:bh,background:c,opacity:future?0.35:1,transition:'height 300ms'}}/>
              {v>0&&<div style={{position:'absolute',left:0,right:0,bottom:CH.BOT+bh+2,textAlign:'center',fontSize:10,fontWeight:700,color:future?'#ddd':col(v),whiteSpace:'nowrap'}}>{v.toFixed(1)}%</div>}
              <div style={{position:'absolute',left:0,right:0,bottom:3,textAlign:'center',fontSize:10,fontWeight:600,color:i===curMonth?'#1C1F35':'#ccc'}}>{MOIS[i]}</div>
            </div>
          );
        })}
      </div>
    </div>
    <div style={{display:'flex',gap:8,marginTop:14,flexWrap:'wrap'}}>
      {[['T1',0,3],['T2',3,6],['T3',6,9],['T4',9,12]].map(([t,from,to]) => {
        const vals = tauxM.slice(from,to).filter(v=>v>0);
        const avg = vals.length>0?vals.reduce((a,b)=>a+b,0)/vals.length:null;
        const isCur = from<=curMonth&&curMonth<to;
        const bg = avg===null?'#f3f4f6':avg>=8?'#fee2e2':avg>=5?'#fef9c3':'#dcfce7';
        const clr = avg===null?'#999':avg>=8?'#991b1b':avg>=5?'#92400e':'#166534';
        return <div key={t} style={{fontSize:11,background:isCur?'#1C1F35':bg,color:isCur?'#FFE500':clr,padding:'4px 12px',fontWeight:700,borderRadius:0,border:isCur?'2px solid #1C1F35':'2px solid transparent'}}>{t} — {avg!==null?avg.toFixed(1)+'%':'n/a'}</div>;
      })}
    </div>
  </>;
}

function ChartMissions({ flow, curMonth }) {
  const max = Math.max(...flow.map(f=>f.actifs), 1);
  const barH = v => Math.max((v/max)*CH.H, v>0?6:2);
  const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  return <>
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4,flexWrap:'wrap'}}>
      <span style={{fontSize:13,fontWeight:700,color:'#1C1F35',fontFamily:'Outfit,sans-serif'}}>Activité missions 2026</span>
      <span style={{fontSize:11,background:'#00C21815',color:'#00C218',padding:'2px 8px',fontWeight:700}}>+Démarrage</span>
      <span style={{fontSize:11,background:'#FF3D2E15',color:'#FF3D2E',padding:'2px 8px',fontWeight:700}}>-Fin</span>
      <span style={{fontSize:11,background:'#4A7FE515',color:'#4A7FE5',padding:'2px 8px',fontWeight:700}}>Actifs</span>
    </div>
    <div style={{position:'relative',height:CH.TOTAL,marginTop:8}}>
      <div style={{position:'absolute',left:0,right:0,top:0,bottom:0,display:'flex',gap:4,zIndex:3}}>
        {flow.map((f,i) => {
          const bh = barH(f.actifs);
          const future = i>curMonth;
          return (
            <div key={i} style={{flex:1,position:'relative',minWidth:0}}>
              <div style={{position:'absolute',left:0,right:0,bottom:CH.BOT,height:bh,background:future?'#E4E4E6':'#4A7FE5',opacity:future?0.35:1,transition:'height 300ms'}}/>
              {f.nouvelles>0&&<div style={{position:'absolute',left:'50%',transform:'translateX(-50%)',bottom:CH.BOT+bh+2,fontSize:9,fontWeight:800,color:'#00C218',background:'#00C21815',padding:'0 3px',whiteSpace:'nowrap',zIndex:4}}>+{f.nouvelles}</div>}
              {f.actifs>0&&<div style={{position:'absolute',left:0,right:0,bottom:CH.BOT+bh+(f.nouvelles>0?14:2),textAlign:'center',fontSize:9,fontWeight:700,color:future?'#ccc':'#4A7FE5'}}>{f.actifs}</div>}
              {f.fins>0&&<div style={{position:'absolute',left:'50%',transform:'translateX(-50%)',bottom:CH.BOT-1,fontSize:9,fontWeight:800,color:'#FF3D2E',background:'#FF3D2E15',padding:'0 3px',whiteSpace:'nowrap',zIndex:4}}>-{f.fins}</div>}
              <div style={{position:'absolute',left:0,right:0,bottom:3,textAlign:'center',fontSize:10,fontWeight:600,color:i===curMonth?'#1C1F35':'#ccc'}}>{MOIS[i]}</div>
            </div>
          );
        })}
      </div>
    </div>
  </>;
}

// ── Modal générique ───────────────────────────────────────────────────────────
function Modal({ title, onClose, children, footer }) {
  return (
    <div className="fixed inset-0 bg-midnight/80 z-[60] flex items-center justify-center px-4" onClick={onClose}>
      <div className="bg-white border-2 border-midnight p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5 pb-3 border-b-2 border-midnight">
          <h2 className="font-bold text-midnight uppercase tracking-wide text-sm">{title}</h2>
          <button onClick={onClose} className="text-slate hover:text-midnight text-2xl leading-none">×</button>
        </div>
        <div className="space-y-3">{children}</div>
        {footer && <div className="flex gap-3 mt-5 justify-end">{footer}</div>}
      </div>
    </div>
  );
}
// ── SidePanel réutilisable ────────────────────────────────────────────────────
function SidePanel({ title, badge, onClose, actions, children }) {
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[onClose]);
  return (
    <div className="fixed inset-0 bg-midnight/80 z-50 flex justify-end" onClick={onClose}>
      <div className="w-full max-w-lg bg-white h-full overflow-y-auto border-l-2 border-midnight" style={{animation:'slideInRight 250ms ease-out'}} onClick={e=>e.stopPropagation()}>
        <div className="sticky top-0 bg-white px-6 py-4 flex items-start justify-between gap-3 z-10 border-b-4 border-black">
          <div className="flex-1 min-w-0">
            <div className="font-bold text-lg text-midnight">{title}</div>
            {badge&&<div className="mt-1">{badge}</div>}
          </div>
          <button onClick={onClose} className="text-neutral-400 hover:text-midnight text-2xl leading-none mt-1">×</button>
        </div>
        {actions&&<div className="px-6 pt-4 flex gap-2 flex-wrap">{actions}</div>}
        <div className="p-6 space-y-6">{children}</div>
      </div>
    </div>
  );
}
function Field({ label, children }) {
  return <div><label className="block text-[11px] font-bold text-midnight mb-1.5 uppercase tracking-[0.12em]">{label}</label>{children}</div>;
}
const inputCls = "w-full px-3 py-2.5 border-2 border-neutral-200 text-sm focus:outline-none focus:border-midnight font-[Outfit] transition-colors";
const dateInputCls = "flex-1 px-3 py-2.5 border-2 border-neutral-200 text-sm focus:outline-none focus:border-midnight transition-colors";
const timeInputCls = "w-24 px-2 py-2.5 border-2 border-neutral-200 text-xs focus:outline-none focus:border-midnight transition-colors";
function DateTimeInput({ date, time, onDateChange, onTimeChange, min }) {
  return (
    <div className="flex">
      <input type="date" value={date||''} min={min} onChange={onDateChange}
        className={dateInputCls} style={{borderRight:date?'none':undefined}}/>
      {date && <input type="time" value={time||''} onChange={onTimeChange}
        className={timeInputCls}/>}
    </div>
  );
}
function ModalFooter({ onClose, onSave, saving, disabled, label='Enregistrer' }) {
  return <>
    <button onClick={onClose} className="px-4 py-2 text-sm text-slate hover:text-carbon">Annuler</button>
    <button onClick={onSave} disabled={saving||disabled}
      className="px-4 py-2 bg-midnight text-white text-sm font-medium hover:bg-carbon disabled:opacity-50 btn-brutal">
      {saving?'...':label}
    </button>
  </>;
}
// Renvoie les options allProfiles + éventuellement la valeur courante si absente (protection données legacy)
function respOptions(allProfiles, current) {
  const list = allProfiles&&allProfiles.length>0 ? allProfiles : [];
  const extra = current && !list.some(p=>p.nom===current) ? [{nom:current}] : [];
  return [...extra, ...list];
}

  const [saving,setSaving]=useState(false); const [err,setErr]=useState('');
  const s = k => e => setF(v=>({...v,[k]:e.target.value}));
  const save = async () => {
    setSaving(true);
    const upd={ telephone:f.telephone||null, email:f.email||null, commentaires:f.commentaires||null, statut:f.statut, ville:f.ville||null, role:f.role||null, groupe:f.groupe||null, responsable:f.responsable||contact.responsable, linkedin:f.linkedin||null, updated_at:new Date().toISOString() };
    if(['Candidat','Consultant CDI','Freelance','Prestataire'].includes(f.statut)) upd.ats=f.ats||null;
    const { error } = await sb.from('contacts').update(upd).eq('id',contact.id);
    if (error) { setErr(error.message); setSaving(false); }
    else {
      const changes = [];
      if (f.statut !== (contact.statut||'Prospect')) changes.push(`statut → ${f.statut}`);
      if ((f.groupe||'') !== (contact.groupe||'')) changes.push(`société → ${f.groupe||'(vide)'}`);

      if (f.responsable !== (contact.responsable||'')) changes.push(`responsable → ${f.responsable}`);
      const details = changes.length ? `Fiche modifiée : ${changes.join(', ')}` : 'Fiche contact modifiée';
      await sb.from('historique_actions').insert({ id_prospect:contact.id, date:getToday(), type_action:'Note interne', details, responsable:profile?.nom||contact.responsable });
      toast('Contact modifié');onSaved();
    }
  };
  return (
    <Modal title={<><Icon d={ICONS.edit} size={14}/> Modifier — {contact.prenom} {contact.nom}</>} onClose={onClose}

      ))}

      <Field label="LinkedIn"><input type="url" value={f.linkedin} onChange={s('linkedin')} className={inputCls} placeholder="https://linkedin.com/in/..."/></Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Statut"><select value={f.statut} onChange={s('statut')} className={inputCls}>{STATUTS_CONTACT.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>

const TACHE_TYPES_CANDIDAT  = ['Appel','Entretien','Envoi CV','Suivi','Relance','Autre'];
const TACHE_TYPES_PROSPECT  = ['Appel','RDV','Email','Proposition commerciale','Relance','Autre'];
const TACHE_TYPES_LIBRE     = ['Appel','RDV','Email','Entretien','Relance','Autre'];
function tacheTypesFor(contact) {
  if (!contact) return TACHE_TYPES_LIBRE;

  return TACHE_TYPES_PROSPECT;
}

function CompteSearchField({ contacts, value, onChange, placeholder }) {
  const [query,setQuery] = useState('');

  const comptes = useMemo(()=>[...new Set(contacts.map(c=>c.groupe).filter(Boolean))].sort(),[contacts]);

function AddTacheModal({ contacts, besoins, missions, profile, allProfiles, onClose, onSaved, defaultContactId, defaultMissionId, defaultBesoinId }) {
  const isAdmin = profile.role==='admin';
  const [f,setF] = useState({ type:'', titre:'', due_date:'', due_time:DEFAULT_TASK_TIME, contact_id:defaultContactId?String(defaultContactId):'', notes:'', responsable:profile.nom, mission_id:defaultMissionId||'', besoin_id:defaultBesoinId||'' });
  const [saving,setSaving]=useState(false);
  const myContacts = useMemo(()=>contacts.filter(c=>isAdmin||c.responsable===profile.nom).sort((a,b)=>(a.nom||'').localeCompare(b.nom||'')),[contacts,profile,isAdmin]);
  const contactMap = useMemo(()=>Object.fromEntries(myContacts.map(c=>[String(c.id),c])),[myContacts]);
  const selContact = f.contact_id ? contactMap[f.contact_id] : null;
  const types = useMemo(()=>tacheTypesFor(selContact),[selContact]);

  const selectType = (t) => {
    const contactPart = selContact ? ` — ${[selContact.prenom,selContact.nom].filter(Boolean).join(' ')}` : '';
    setF(v=>({...v, type:t, titre: t + contactPart}));
  };
  const handleContactChange = (cid) => {
    setF(v => {
      const c = cid ? contactMap[cid] : null;
      const newTitre = v.type ? v.type + (c ? ` — ${[c.prenom,c.nom].filter(Boolean).join(' ')}` : '') : v.titre;
      return {...v, contact_id:cid, titre:newTitre};
    });
  };

  const save = async () => {
    if (!f.titre.trim()) return; setSaving(true);
    const { error } = await sb.from('taches').insert({ id:`tw_${Date.now()}`, titre:f.titre.trim(), statut:f.due_date?'en_cours':'a_faire', due_date:combineDT(f.due_date,f.due_time)||null, contact_id:f.contact_id?parseInt(f.contact_id):null, mission_id:f.mission_id||null, besoin_id:f.besoin_id||null, notes:f.notes||null, responsable:f.responsable });
    if (!error) {toast('Tâche créée');onSaved();} else setSaving(false);
  };

  return (
    <Modal title={<><Icon d={ICONS.check} size={14}/> Nouvelle tâche</>} onClose={onClose}
      footer={<ModalFooter onClose={onClose} onSave={save} saving={saving} disabled={!f.titre.trim()} label="+ Créer"/>}>
      <Field label="Contact lié">
        <ContactPicker contacts={myContacts} value={f.contact_id} onChange={handleContactChange}/>
      </Field>
      <Field label="Type">
        <div className="flex gap-1.5 flex-wrap mt-1">
          {types.map(t=>(
            <button key={t} type="button" onClick={()=>selectType(t)}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors whitespace-nowrap
                ${f.type===t
                  ? t==='Entretien' ? 'bg-iris-100 text-white border-purple-600'
                                    : 'bg-midnight text-white'
                  : 'bg-white text-slate border-neutral-200 hover:border-neutral-400 hover:text-carbon'}`}>
              {t==='Entretien'?<><Icon d={ICONS.calendar} size={12}/> Entretien</>:t}
            </button>
          ))}
        </div>
      </Field>
      <Field label="Titre *"><input type="text" value={f.titre} onChange={e=>setF(v=>({...v,titre:e.target.value}))} placeholder="Sélectionne un type ou saisis directement" className={inputCls}/></Field>
      <Field label="Échéance">
        <DateTimeInput date={f.due_date} time={f.due_time} min={TODAY}
          onDateChange={e=>setF(v=>({...v,due_date:e.target.value}))}
          onTimeChange={e=>setF(v=>({...v,due_time:e.target.value}))}/>
      </Field>
      <Field label="Mission liée">
        {defaultMissionId
          ? <MissionPicker missions={missions||[]} value={f.mission_id} onChange={()=>{}}/>
          : <MissionPicker missions={missions||[]} value={f.mission_id} onChange={mid=>setF(v=>({...v,mission_id:mid}))}/>
        }
      </Field>
      <Field label="Besoin lié">
        {defaultBesoinId
          ? <BesoinPicker besoins={besoins||[]} value={f.besoin_id} onChange={()=>{}} contactId={f.contact_id}/>

function AddContactModal({ profile, allProfiles, onClose, onSaved }) {
  const [f,setF] = useState({ prenom:'', nom:'', groupe:'', ville:'', role:'', telephone:'', email:'', linkedin:'', ats:'', statut:'Prospect', responsable:profile.nom, commentaires:'' });
  const [saving,setSaving]=useState(false); const [err,setErr]=useState('');
  const s = k => e => setF(v=>({...v,[k]:e.target.value}));
  const sNorm = (k,fn) => e => setF(v=>({...v,[k]:fn(e.target.value)}));
  const save = async () => {
    if (!f.nom.trim()) { setErr('Le nom est obligatoire.'); return; }
    setSaving(true);
    const ins={ prenom:f.prenom||null, nom:f.nom.trim(), groupe:f.groupe||null, ville:f.ville||null, role:f.role||null, telephone:f.telephone||null, email:f.email||null, linkedin:f.linkedin||null, statut:f.statut, responsable:f.responsable, commentaires:f.commentaires||null, nb_relance:0, updated_at:new Date().toISOString(), agence:profile.agence||'Lyon' };
    if(['Candidat','Consultant CDI','Freelance','Prestataire'].includes(f.statut)) ins.ats=f.ats||null;
    const { data:inserted, error } = await sb.from('contacts').insert(ins).select('id').single();
    if (error) { setErr(error.message); setSaving(false); }
    else {

  };
  return (
    <Modal title={<><Icon d={ICONS.person} size={14}/> Nouveau contact</>} onClose={onClose}
      footer={<ModalFooter onClose={onClose} onSave={save} saving={saving} label="+ Créer"/>}>

        <Field label="Prénom"><input type="text" value={f.prenom} autoFocus onChange={sNorm('prenom',normPrenom)} className={inputCls} placeholder="ex: Jean-Pierre"/></Field>
        <Field label="Nom *"><input type="text" value={f.nom} onChange={sNorm('nom',normNom)} className={inputCls} placeholder="ex: DUPONT"/></Field>
      </div>
      {[['Groupe / Société','groupe','text'],['Rôle / Poste','role','text']].map(([l,k,t])=>(
        <Field key={k} label={l}><input type={t} value={f[k]} onChange={s(k)} className={inputCls}/></Field>
      ))}
      <Field label="Ville"><input type="text" value={f.ville} onChange={sNorm('ville',normVille)} className={inputCls}/></Field>
      <Field label="Téléphone"><input type="tel" value={f.telephone} onChange={s('telephone')} className={inputCls}/></Field>
      <Field label="Email"><input type="email" value={f.email} onChange={sNorm('email',normEmail)} className={inputCls}/></Field>
      <Field label="LinkedIn"><input type="url" value={f.linkedin} onChange={s('linkedin')} className={inputCls} placeholder="https://linkedin.com/in/..."/></Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Statut"><select value={f.statut} onChange={s('statut')} className={inputCls}>{STATUTS_CONTACT.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
        <Field label="Responsable">
          <select value={f.responsable} onChange={s('responsable')} className={inputCls}>
            {respOptions(allProfiles,f.responsable).map(p=><option key={p.nom} value={p.nom}>{p.nom}</option>)}
          </select>
        </Field>
      </div>
      {['Candidat','Consultant CDI','Freelance','Prestataire'].includes(f.statut)&&<Field label="ATS (lien candidat)"><input type="url" value={f.ats} onChange={s('ats')} className={inputCls} placeholder="Lien Recruitee"/></Field>}
      <Field label="Commentaires"><textarea rows={2} value={f.commentaires} onChange={s('commentaires')} className={inputCls+' resize-none'}/></Field>
      {err && <div className="text-xs text-coral-100 bg-coral-20 rounded px-3 py-2">{err}</div>}

  );
}

        {contact.telephone&&<div><span className="text-[11px] text-slate uppercase tracking-wide">Tel</span><br/><a href={`tel:${contact.telephone}`} className="text-jade-100 font-mono font-medium">{contact.telephone}</a></div>}
        {contact.linkedin&&<div><span className="text-[11px] text-slate uppercase tracking-wide">LinkedIn</span><br/><a href={contact.linkedin} target="_blank" className="text-azure-100 hover:underline text-xs">→ Profil LinkedIn</a></div>}
        {contact.ats&&<div><span className="text-[11px] text-slate uppercase tracking-wide">ATS</span><br/><a href={contact.ats} target="_blank" className="text-iris-100 hover:underline text-xs">→ Fiche ATS</a></div>}

function AddHistMissionModal({ mission, profile, onClose, onSaved }) {
  const [f,setF] = useState({ date:getToday(), type_action:'Appel consultant', details:'', responsable:profile.nom });
  const [saving,setSaving]=useState(false);
  const save = async () => {
    setSaving(true);
    const { error } = await sb.from('historique_missions').insert({
      mission_id: mission.id, date:f.date, type_action:f.type_action,
      details:f.details||null, responsable:f.responsable,
    });
    if (!error) {
      // Auto-update date_dernier_suivi si type = Suivi de mission
      if(f.type_action==='Suivi de mission'&&f.date){
        await sb.from('missions').update({date_dernier_suivi_mission:f.date}).eq('id',mission.id).lt('date_dernier_suivi_mission',f.date).then(()=>{});
        // Aussi updater si null
        await sb.from('missions').update({date_dernier_suivi_mission:f.date}).eq('id',mission.id).is('date_dernier_suivi_mission',null);
        // Contact client (referent)
        if(mission.contact_referent_id){
          await sb.from('contacts').update({date_dernier_suivi_client:f.date}).eq('id',mission.contact_referent_id).lt('date_dernier_suivi_client',f.date).then(()=>{});
          await sb.from('contacts').update({date_dernier_suivi_client:f.date}).eq('id',mission.contact_referent_id).is('date_dernier_suivi_client',null);
        }
      }
      onSaved();
    } else setSaving(false);
  };
  return (
    <Modal title={<><Icon d={ICONS.add} size={14}/> Action — {mission.consultant}</>} onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-slate hover:text-carbon">Annuler</button><button onClick={save} disabled={saving} className="px-4 py-2 bg-jade-100 text-white text-sm font-medium hover:opacity-80 disabled:opacity-50">{saving?'Enregistrement...':'+ Ajouter'}</button></>}>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Date"><input type="date" value={f.date} max={TODAY} onChange={e=>setF(v=>({...v,date:e.target.value}))} className={inputCls}/></Field>
        <Field label="Type"><select value={f.type_action} onChange={e=>setF(v=>({...v,type_action:e.target.value}))} className={inputCls}>{TYPES_HIST_MISS.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
      </div>
      <Field label="Détails"><textarea rows={3} value={f.details} onChange={e=>setF(v=>({...v,details:e.target.value}))} placeholder="Notes sur l'échange..." className={inputCls+' resize-none'}/></Field>
    </Modal>
  );
}

const MISSION_STATUTS=['En cours','New','Intercontrat','Terminée'];
const MISSION_CONTRATS=['CDI','Freelance','Prestataire','CDD','Alternance'];

function MissionFormModal({ mission, profile, allProfiles, contacts, besoins, onClose, onSaved, prefillBesoinId }) {
  const isEdit=!!mission&&!!mission.id;
  const isAdmin=profile.role==='admin';
  const init=mission||{consultant:'',client:'',projet:'',tjm:'',cjm:'',statut:'En cours',type_contrat:'CDI',responsable:profile.nom,agence:profile.agence||'Lyon',num_commande:'',date_debut_mission:'',date_fin_mission:'',referent:'',contact_consultant_id:null,contact_referent_id:null,date_demarrage_initiale:'',date_dernier_suivi_mission:''};
  const [f,setF]=useState({...init, besoin_id:prefillBesoinId||init.besoin_id||'', date_debut_mission:extractDate(init.date_debut_mission), date_fin_mission:extractDate(init.date_fin_mission), debut_time:extractTime(init.date_debut_mission)||DEFAULT_MISSION_START_TIME, fin_time:extractTime(init.date_fin_mission)||DEFAULT_MISSION_END_TIME});
  const availableBesoins=useMemo(()=>(besoins||[]).filter(b=>b.statut&&b.statut!=='Besoin Perdu'),[besoins]);
  const [jours,setJours]=useState(()=>{
    const j={};MOIS_KEYS.forEach(k=>{j[k]=mission?mission[`jours_${k}`]||'':'';});return j;
  });
  const [saving,setSaving]=useState(false);
  const s=key=>e=>setF(v=>({...v,[key]:e.target.value}));

  const save=async()=>{
    if(!f.contact_consultant_id){toast('Merci de sélectionner un consultant dans la liste.','error');return;}
    setSaving(true);
    const row={consultant:f.consultant.trim(),client:f.client||null,projet:f.projet||null,
      tjm:parseFloat(f.tjm)||0,cjm:parseFloat(f.cjm)||0,statut:f.statut,type_contrat:f.type_contrat||null,
      responsable:f.responsable,agence:f.agence||profile.agence||'Lyon',
      num_commande:f.num_commande||null,date_debut_mission:combineDT(f.date_debut_mission,f.debut_time)||null,date_fin_mission:combineDT(f.date_fin_mission,f.fin_time)||null,
      referent:f.referent||null,date_demarrage_initiale:f.date_demarrage_initiale||null,date_dernier_suivi_mission:f.date_dernier_suivi_mission||null};
    if(f.contact_consultant_id) row.contact_consultant_id=f.contact_consultant_id;
    if(f.contact_referent_id) row.contact_referent_id=f.contact_referent_id;
    if(f.besoin_id) row.besoin_id=f.besoin_id;
    MOIS_KEYS.forEach(k=>{row[`jours_${k}`]=parseFloat(jours[k])||0;});
    if(isEdit){
      const {error}=await sb.from('missions').update(row).eq('id',mission.id);
      if(error){toast('Erreur : '+error.message,'error');setSaving(false);return;}
    } else {
      const {error}=await sb.from('missions').insert(row);
      if(error){toast('Erreur : '+error.message,'error');setSaving(false);return;}
    }
    // Auto-passage en Client du référent lié
    if(f.contact_referent_id){
      const ref=(contacts||[]).find(c=>c.id===f.contact_referent_id);
      if(ref&&ref.statut!=='Client'){
        await sb.from('contacts').update({statut:'Client',updated_at:new Date().toISOString()}).eq('id',ref.id);
      }
    }
    toast(isEdit?'Mission modifiée':'Mission créée');onSaved();
  };
  return (
    <Modal title={isEdit?<><Icon d={ICONS.edit} size={14}/> Modifier — {mission.consultant}</>:<><Icon d={ICONS.add} size={14}/> Nouvelle mission</>} onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-slate hover:text-carbon">Annuler</button><button onClick={save} disabled={saving||!f.contact_consultant_id} className="px-4 py-2 bg-midnight text-white text-sm font-medium hover:bg-carbon disabled:opacity-50 btn-brutal">{saving?'Enregistrement...':(isEdit?'Enregistrer':'Créer')}</button></>}>
      <div className="space-y-3">
        <div className="grid grid-cols-2 gap-3">
          <Field label="Consultant *"><ContactSearchField contacts={contacts||[]} value={f.contact_consultant_id} onChange={(id,name)=>setF(v=>({...v,contact_consultant_id:id,consultant:name||v.consultant}))} statuts={['Consultant CDI','Freelance','Prestataire']} placeholder="Rechercher consultant CDI/freelance/prestataire..."/></Field>
          <Field label="Client"><CompteSearchField contacts={contacts||[]} value={f.client||''} onChange={client=>setF(v=>({...v,client}))}/></Field>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Projet"><input value={f.projet||''} onChange={s('projet')} className={inputCls} placeholder="Intitulé du projet"/></Field>
          <Field label="Référent client"><ContactSearchField contacts={contacts||[]} value={f.contact_referent_id} onChange={(id,name)=>setF(v=>({...v,contact_referent_id:id,referent:name||v.referent}))} statuts={['Client','Prospect','Decision Maker']} placeholder="Rechercher contact client..."/></Field>
        </div>
        {!prefillBesoinId&&<Field label="Besoin lié">
          <select value={f.besoin_id||''} onChange={e=>{
            const bid=e.target.value;
            if(!bid){setF(v=>({...v,besoin_id:''}));return;}
            const b=availableBesoins.find(x=>String(x.id)===bid);
            if(!b){setF(v=>({...v,besoin_id:bid}));return;}
            const consultantC=b.consultant_id?contacts.find(c=>c.id===b.consultant_id):null;
            const contactRef=b.contact_id?contacts.find(c=>c.id===b.contact_id):null;
            const patch={besoin_id:bid,projet:b.titre||'',client:b.compte||'',tjm:b.tjm_vente||'',cjm:b.cjm_achat||'',date_debut_mission:b.date_demarrage||'',date_fin_mission:b.date_fin||''};
            if(consultantC){patch.contact_consultant_id=consultantC.id;patch.consultant=consultantC.prenom+' '+consultantC.nom;}
            if(contactRef){patch.contact_referent_id=contactRef.id;patch.referent=contactRef.prenom+' '+contactRef.nom;}
            setF(v=>({...v,...patch}));
          }} className={inputCls}>
            <option value="">— Aucun —</option>
            {availableBesoins.map(b=><option key={b.id} value={b.id}>{b.titre}{b.compte?' · '+b.compte:''}</option>)}
          </select>
        </Field>}
        <div className="grid grid-cols-3 gap-3">
          <Field label="Démarrage initial"><input type="date" value={f.date_demarrage_initiale||''} onChange={s('date_demarrage_initiale')} className={inputCls}/></Field>
          <Field label="Dernier suivi"><input type="date" value={f.date_dernier_suivi_mission||''} onChange={s('date_dernier_suivi_mission')} className={inputCls}/></Field>
          <Field label="N° commande"><input value={f.num_commande||''} onChange={s('num_commande')} className={inputCls} placeholder="5090-4210617888"/></Field>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Début mission">
            <DateTimeInput date={f.date_debut_mission} time={f.debut_time}
              onDateChange={s('date_debut_mission')}
              onTimeChange={e=>setF(v=>({...v,debut_time:e.target.value}))}/>
          </Field>
          <Field label="Fin mission">
            <DateTimeInput date={f.date_fin_mission} time={f.fin_time}
              onDateChange={s('date_fin_mission')}
              onTimeChange={e=>setF(v=>({...v,fin_time:e.target.value}))}/>
          </Field>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="TJM vente (€)"><input type="number" value={f.tjm} onChange={s('tjm')} className={inputCls}/></Field>
          <Field label="CJM achat (€)"><input type="number" value={f.cjm} onChange={s('cjm')} className={inputCls}/></Field>
        </div>
        <div className="grid grid-cols-3 gap-3">
          <Field label="Statut"><select value={f.statut} onChange={s('statut')} className={inputCls}>{MISSION_STATUTS.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
          <Field label="Contrat"><select value={f.type_contrat||''} onChange={s('type_contrat')} className={inputCls}><option value="">—</option>{MISSION_CONTRATS.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
          {isAdmin?<Field label="Responsable"><select value={f.responsable} onChange={e=>{const nom=e.target.value;const p=allProfiles.find(x=>x.nom===nom);setF(v=>({...v,responsable:nom,agence:p?p.agence:v.agence}));}} className={inputCls}>{respOptions(allProfiles,f.responsable).map(p=><option key={p.nom} value={p.nom}>{p.nom}</option>)}</select></Field>
            :<Field label="Responsable"><span className="text-sm text-carbon">{f.responsable}</span></Field>}
        </div>
        {isAdmin&&<Field label="Agence"><select value={f.agence} onChange={s('agence')} className={inputCls}>{[...new Set(allProfiles.map(p=>p.agence).filter(Boolean))].sort().map(a=><option key={a} value={a}>{a}</option>)}</select></Field>}
        <div>
          <div className="text-xs text-neutral-300 font-semibold mb-2 uppercase tracking-wide">Jours par mois</div>
          <div className="grid grid-cols-6 gap-1">
            {MOIS_KEYS.map((k,i)=>(
              <div key={k} className="text-center">
                <div className="text-xs text-neutral-300 mb-0.5">{MOIS_LABELS[i]}</div>
                <input type="number" step="0.5" min="0" value={jours[k]} onChange={e=>setJours(v=>({...v,[k]:e.target.value}))} className="w-full text-center text-sm border rounded-lg px-1 py-1 focus:outline-none focus:ring-1 focus:ring-blue-300"/>
              </div>
            ))}
          </div>
        </div>
      </div>
    </Modal>
  );
}

function DeleteMissionModal({ mission, onClose, onDeleted }) {
  const [loading,setLoading]=useState(false);
  const del=async()=>{
    setLoading(true);
    await sb.from('historique_missions').delete().eq('mission_id',mission.id);
    await sb.from('missions').delete().eq('id',mission.id);
    toast('Mission supprimée');onDeleted();
  };
  return (
    <Modal title="Supprimer la mission" onClose={onClose}>
      <div className="space-y-4">
        <p className="text-carbon">Supprimer définitivement la mission de <span className="font-semibold">"{mission.consultant}"</span>{mission.client?` chez ${mission.client}`:''} ?</p>
        <p className="text-xs text-neutral-300">L'historique des actions liées sera également supprimé.</p>
        <div className="flex gap-2 justify-end">
          <button onClick={onClose} className="px-4 py-2 rounded-lg border text-sm text-slate hover:bg-neutral-50">Annuler</button>
          <button onClick={del} disabled={loading} className="px-4 py-2 rounded-lg bg-coral-100 text-white text-sm font-medium hover:bg-red-700 disabled:opacity-50">{loading?'Suppression...':'Supprimer'}</button>
        </div>
      </div>
    </Modal>
  );
}

// ── Panel : Détail mission ────────────────────────────────────────────────────
function MissionDetail({ mission, histMissions, contacts, taches, missions, besoins, profile, allProfiles, onClose, onRefresh, onNavToContact, onNavToBesoin, onNavToTache }) {
  const [showAdd,setShowAdd] = useState(false);
  const [modal,setModal]=useState(null);
  const [viewContact,setViewContact]=useState(null);
  const [tick,setTick]=useState(0);
  const isAdmin=profile.role==='admin';
  const canEdit = isAdmin || mission.responsable===profile.nom;
  const hist = (histMissions||[]).filter(h=>h.mission_id===mission.id)
    .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  // Matcher consultant et référent aux contacts
  const allContacts=contacts||[];
  const matchContact=(name)=>{
    if(!name) return null;
    const n=name.trim().toUpperCase().replace(/\s+/g,' ');
    return allContacts.find(c=>{
      const full=`${(c.prenom||'')} ${(c.nom||'')}`.trim().toUpperCase().replace(/\s+/g,' ');
      return full===n || c.nom?.toUpperCase()===n;
    })||null;
  };
  const consultantContact=mission.contact_consultant_id?allContacts.find(c=>c.id===mission.contact_consultant_id):matchContact(mission.consultant);
  const referentContact=mission.contact_referent_id?allContacts.find(c=>c.id===mission.contact_referent_id):matchContact(mission.referent);

  const joursTotal = MOIS_KEYS.reduce((s,k)=>s+(parseFloat(mission[`jours_${k}`])||0),0);
  const caTotal    = joursTotal*(parseFloat(mission.tjm)||0);
  const margeTotal = joursTotal*((parseFloat(mission.tjm)||0)-(parseFloat(mission.cjm)||0));
  const tauxMarge  = caTotal>0?(margeTotal/caTotal*100):0;

  const saved = () => { setShowAdd(false); setModal(null); onRefresh(); };

  const missionTaches = (taches||[]).filter(t=>t.mission_id===mission.id&&t.statut!=='fait'&&t.statut!=='annule');
  const actions = canEdit ? (<div className="flex gap-2 flex-wrap">
    <button onClick={()=>setModal('edit')} className="px-3 py-1.5 text-xs bg-midnight text-white font-medium btn-brutal"><Icon d={ICONS.edit} size={14}/> Modifier</button>
    <button onClick={()=>setShowAdd(true)} className="px-3 py-1.5 text-xs bg-midnight text-white font-medium btn-brutal"><Icon d={ICONS.add} size={14}/> Action</button>
    <button onClick={()=>setModal('tache')} className="px-3 py-1.5 text-xs border-2 border-neutral-200 text-carbon font-medium hover:border-midnight"><Icon d={ICONS.check} size={14}/> Tâche</button>
    <button onClick={()=>setModal('confirmDel')} className="px-3 py-1.5 text-xs border-2 border-coral-100 text-coral-100 font-medium hover:bg-coral-100 hover:text-white transition-colors"><Icon d={ICONS.delete} size={14}/></button>
  </div>) : null;

  return (
    <SidePanel title={consultantContact?<span className="cursor-pointer text-azure-100 hover:underline" onClick={()=>{if(onNavToContact){onClose();onNavToContact(consultantContact.id);}else setViewContact(consultantContact);}}>{mission.consultant}</span>:mission.consultant} badge={<div className="flex gap-2 flex-wrap"><MissionStatutBadge statut={mission.statut}/>{mission.agence&&<span className="text-xs bg-azure-20 text-azure-100 px-2 py-0.5 rounded-full font-medium">{mission.agence}</span>}{mission.type_contrat&&<span className="text-xs bg-neutral-100 text-slate px-2 py-0.5 rounded-full">{mission.type_contrat}</span>}</div>} onClose={onClose} actions={actions}>
      <div className="space-y-6">
        <div className="text-sm text-slate">{mission.client}{mission.projet?` · ${mission.projet.substring(0,60)}`:''}</div>

        {/* KPI mini */}
        <div className="grid grid-cols-3 gap-3">
          <div className="bg-neutral-50 p-3 text-center">
            <div className="text-[11px] text-slate uppercase tracking-wide mb-0.5">Jours YTD</div>
            <div className="text-xl font-bold text-carbon">{joursTotal%1===0?joursTotal.toFixed(0):joursTotal.toFixed(1)}</div>
          </div>
          <div className="bg-neutral-50 p-3 text-center">
            <div className="text-[11px] text-slate uppercase tracking-wide mb-0.5">CA YTD</div>
            <div className="text-xl font-bold text-jade-100">{fmtCurrency(caTotal)}</div>
          </div>
          <div className="bg-neutral-50 p-3 text-center">
            <div className="text-[11px] text-slate uppercase tracking-wide mb-0.5">Taux marge</div>
            <div className={`text-xl font-bold ${tauxMarge>=30?'text-jade-100':tauxMarge>=20?'text-coral-50':'text-coral-100'}`}>{tauxMarge.toFixed(1)}%</div>
          </div>
        </div>

        {/* Infos mission */}
        <div className="grid grid-cols-2 gap-3 text-sm">
          <div><span className="text-[11px] text-slate uppercase tracking-wide">Consultant</span><br/>{consultantContact?<span className="text-midnight font-medium underline decoration-2 decoration-lemon-100 underline-offset-2 hover:decoration-lemon-100 hover:bg-lemon-20 cursor-pointer transition-colors" onClick={()=>{if(onNavToContact){onClose();onNavToContact(consultantContact.id);}else setViewContact(consultantContact);}}>{mission.consultant} ↗</span>:<span className="text-carbon font-medium">{mission.consultant||'—'}</span>}</div>
          <div><span className="text-[11px] text-slate uppercase tracking-wide">Client</span><br/><span className="text-carbon font-medium">{mission.client||'—'}</span></div>
          <div><span className="text-[11px] text-slate uppercase tracking-wide">TJM vente</span><br/><span className="font-mono font-semibold text-carbon">{mission.tjm>0?`${mission.tjm}€`:'—'}</span></div>
          <div><span className="text-[11px] text-slate uppercase tracking-wide">TJM achat</span><br/><span className="font-mono text-carbon font-medium">{mission.cjm>0?`${mission.cjm}€`:'—'}</span></div>
          <div><span className="text-[11px] text-slate uppercase tracking-wide">Responsable</span><br/><span className="text-carbon font-medium">{mission.responsable||'—'}</span></div>
          <div><span className="text-[11px] text-slate uppercase tracking-wide">Référent client</span><br/>{mission.referent?(referentContact?<span className="text-midnight font-medium underline decoration-2 decoration-lemon-100 underline-offset-2 hover:decoration-lemon-100 hover:bg-lemon-20 cursor-pointer transition-colors" onClick={()=>{if(onNavToContact){onClose();onNavToContact(referentContact.id);}else setViewContact(referentContact);}}>{mission.referent}</span>:<span className="text-carbon font-medium">{mission.referent}</span>):<span className="text-neutral-200">—</span>}</div>
          <div><span className="text-[11px] text-slate uppercase tracking-wide">Marge</span><br/><span className="text-iris-100 font-medium">{fmtCurrency(margeTotal)} ({tauxMarge.toFixed(1)}%)</span></div>
          {mission.num_commande&&<div><span className="text-[11px] text-slate uppercase tracking-wide">N° commande</span><br/><span className="text-carbon font-mono text-xs">{mission.num_commande}</span></div>}
          {(mission.date_debut_mission||mission.date_fin_mission)&&<div><span className="text-[11px] text-slate uppercase tracking-wide">Période mission</span><br/><span className="text-carbon font-medium">{fmtDT(mission.date_debut_mission,DEFAULT_MISSION_START_TIME)||'?'} → {fmtDT(mission.date_fin_mission,DEFAULT_MISSION_END_TIME)||'?'}</span></div>}
          {mission.date_demarrage_initiale&&<div><span className="text-[11px] text-slate uppercase tracking-wide">Démarrage initial</span><br/><span className="text-carbon font-medium">{new Date(mission.date_demarrage_initiale).toLocaleDateString('fr-FR')}</span></div>}
          {(()=>{const ds=mission.date_dernier_suivi_mission;const j=daysSince(ds);const dot=ds?(j<30?'🟢':j<=60?'🟡':'🔴'):'🔴';return <div><span className="text-[11px] text-slate uppercase tracking-wide">Dernier suivi mission</span><br/><span className="text-carbon font-medium">{ds?`${new Date(ds).toLocaleDateString('fr-FR')} — ${dot} ${j}j`:`${dot} Non renseigné`}</span></div>;})()}
        </div>
        {mission.besoin_id&&(()=>{const b=(besoins||[]).find(x=>String(x.id)===String(mission.besoin_id));return b?<div><div className="text-[11px] font-bold text-slate uppercase tracking-[0.1em] mb-2">Besoin lié</div><button onClick={()=>{if(onNavToBesoin){onClose();onNavToBesoin(b.id);}}} className="px-2.5 py-1 bg-lemon-20 text-midnight text-xs font-semibold hover:bg-lemon-100 cursor-pointer transition-colors"><Icon d={ICONS.target} size={12}/> {b.titre||b.poste||'Besoin'}{b.compte?' · '+b.compte:''}</button></div>:null;})()}

        {/* Jours par mois — éditable */}
        {canEdit
          ? <EditableJoursGrid mission={mission} onUpdate={()=>setTick(t=>t+1)}/>
          : <div>
              <div className="text-[11px] font-bold text-slate uppercase tracking-[0.1em] mb-2">Jours facturés 2026</div>
              <div className="grid grid-cols-6 gap-1">
                {MOIS_KEYS.map((k,i)=>{
                  const j=parseFloat(mission[`jours_${k}`])||0;
                  const rec=mission[`statut_${k}`];
                  const color=rec==='Réceptionné'?'text-jade-100 bg-jade-20':rec==='Livré'?'text-azure-100 bg-azure-20':j>0?'text-carbon bg-neutral-50':'text-neutral-200 bg-neutral-50';
                  return (
                    <div key={k} className={`rounded-lg p-2 text-center ${color}`} title={rec||''}>
                      <div className="text-xs text-neutral-300">{MOIS_LABELS[i]}</div>
                      <div className="text-sm font-bold">{j>0?(j%1===0?j.toFixed(0):j.toFixed(1)):'—'}</div>
                    </div>
                  );
                })}
              </div>
            </div>
        }

        {/* Tâches actives liées */}
        {missionTaches.length>0&&(
          <div>
            <div className="text-[11px] font-bold text-slate uppercase tracking-[0.1em] mb-2">Tâches actives ({missionTaches.length})</div>
            <div className="space-y-2">{missionTaches.map(t=>(
              <div key={t.id} onClick={()=>{if(onNavToTache){onClose();onNavToTache(t.id);}}} className={`flex items-start gap-2 bg-lemon-20 p-3 ${onNavToTache?'cursor-pointer hover:bg-lemon-100 transition-colors':''}`}>
                <span className="text-midnight mt-0.5">◆</span>
                <div><div className="text-sm font-medium text-midnight">{t.titre}</div>{t.due_date&&<div className="text-xs text-slate">Échéance : {fmtDT(t.due_date,DEFAULT_TASK_TIME)}</div>}</div>
              </div>
            ))}</div>
          </div>
        )}

        {/* Historique */}
        <div>
          <div className="text-[11px] font-bold text-slate uppercase tracking-[0.1em] mb-2">
            Historique ({hist.length} action{hist.length>1?'s':''})
          </div>
          {hist.length===0
            ? <div className="text-sm text-neutral-300 italic">Aucune action enregistrée.</div>
            : <div className="space-y-2">
                {hist.map((h,i)=>(
                  <div key={i} className="text-sm border-l-2 border-neutral-100 pl-3">
                    <div className="flex items-baseline gap-2 flex-wrap">
                      <span className="text-[11px] text-neutral-300 tabular-nums whitespace-nowrap">{h.date||'—'}</span>
                      <span className="font-medium text-carbon">{h.type_action}</span>
                      {h.responsable&&<span className="text-xs text-neutral-300">({h.responsable})</span>}
                    </div>
                    {h.details&&<div className="text-slate text-xs mt-0.5">{h.details}</div>}
                  </div>
                ))}
              </div>
          }
        </div>
      </div>
      {showAdd&&<AddHistMissionModal mission={mission} profile={profile} onClose={()=>setShowAdd(false)} onSaved={saved}/>}
      {modal==='edit'&&<MissionFormModal mission={mission} profile={profile} allProfiles={allProfiles} contacts={contacts} besoins={besoins} onClose={()=>setModal(null)} onSaved={saved}/>}
      {modal==='tache'&&<AddTacheModal contacts={contacts} besoins={besoins||[]} missions={missions||[]} profile={profile} allProfiles={allProfiles} onClose={()=>setModal(null)} onSaved={saved} defaultMissionId={mission.id}/>}
      {modal==='confirmDel'&&<DeleteMissionModal mission={mission} onClose={()=>setModal(null)} onDeleted={()=>{onClose();onRefresh();}}/>}
      {viewContact&&<ContactDetail contact={viewContact} historique={[]} taches={[]} profile={profile} allProfiles={allProfiles} onClose={()=>setViewContact(null)} onRefresh={()=>{setViewContact(null);onRefresh();}}/>}
    </SidePanel>
  );
}

// ── Onglet Prospects ──────────────────────────────────────────────────────────
function TabProspects({ contacts, contactMap, historique, taches, missions, besoins, profile, allProfiles, commerciauxParAgence, onRefresh, navContactId, navContactKey, onNavToBesoin, onNavToMission, onNavToTache, prefs }) {
  const prefResp=prefs?.filter_responsable==='moi'?profile.nom:(prefs?.filter_responsable||'');
  const [search,setSearch]=useState(''); const [filterStatut,setFilterStatut]=useState('');
  const [filterPeriode,setFilterPeriode]=useState(''); const [filterResp,setFilterResp]=useState(prefResp);
  const [filterAgence,setFilterAgence]=useState('');
  const [sortCol,setSortCol]=useState('date_dernier'); const [sortDir,setSortDir]=useState('desc');
  const [selected,setSelected]=useState(null); const [showAdd,setShowAdd]=useState(false);
  useEffect(()=>{ if(navContactId){ const c=contacts.find(x=>x.id===navContactId||String(x.id)===String(navContactId)); if(c) setSelected(c); } },[navContactKey]);
  const isAdmin=profile.role==='admin';
  const statuts=useMemo(()=>[...new Set(contacts.map(c=>c.statut).filter(Boolean))].sort(),[contacts]);
  const agences=useMemo(()=>[...new Set(allProfiles.map(p=>p.agence).filter(Boolean))].sort(),[allProfiles]);
  const responsablesVisibles=useMemo(()=>{
    if(!filterAgence) return [...new Set(allProfiles.map(p=>p.nom).filter(Boolean))].sort();
    return commerciauxParAgence[filterAgence]||[];
  },[filterAgence,allProfiles,commerciauxParAgence]);

  const toggleSort = col => {
    if(sortCol===col) setSortDir(d=>d==='asc'?'desc':'asc');
    else { setSortCol(col); setSortDir(col==='date_dernier'?'desc':'asc'); }
  };
  const SortIcon = ({col}) => {
    if(sortCol!==col) return <span className="ml-1 text-neutral-200">↕</span>;
    return <span className="ml-1 text-azure-100">{sortDir==='asc'?'↑':'↓'}</span>;
  };

  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    const rows=contacts
      .map(c=>({...c,jours:daysSince(c.date_dernier)}))
      .filter(c=>{
        if(filterStatut&&c.statut!==filterStatut) return false;
        if(filterAgence&&c.agence!==filterAgence) return false;
        if(filterResp&&c.responsable!==filterResp) return false;
        if(filterPeriode==='7j'&&c.jours>7) return false;
        if(filterPeriode==='30j'&&c.jours>30) return false;
        if(q&&![c.prenom,c.nom,c.groupe,c.ville,c.role,c.besoins].some(v=>(v||'').toLowerCase().includes(q))) return false;
        return true;
      });
    rows.sort((a,b)=>{
      let va,vb;
      if(sortCol==='nom')               { va=(a.nom||'').toLowerCase();   vb=(b.nom||'').toLowerCase(); }
      else if(sortCol==='groupe')       { va=(a.groupe||'').toLowerCase(); vb=(b.groupe||'').toLowerCase(); }
      else if(sortCol==='ville')        { va=(a.ville||'').toLowerCase();  vb=(b.ville||'').toLowerCase(); }
      else if(sortCol==='statut')       { va=(a.statut||'').toLowerCase(); vb=(b.statut||'').toLowerCase(); }
      else if(sortCol==='responsable')  { va=(a.responsable||'').toLowerCase(); vb=(b.responsable||'').toLowerCase(); }
      else if(sortCol==='date_dernier') { va=a.date_dernier||'0000-00-00'; vb=b.date_dernier||'0000-00-00'; }
      else                              { va=a.date_dernier||'0000-00-00'; vb=b.date_dernier||'0000-00-00'; }
      if(va<vb) return sortDir==='asc'?-1:1;
      if(va>vb) return sortDir==='asc'?1:-1;
      return 0;
    });
    return rows;
  },[contacts,search,filterStatut,filterPeriode,filterResp,filterAgence,sortCol,sortDir]);

  const hasFilter=search||filterStatut||filterPeriode||filterResp||filterAgence;
  const resetAll=()=>{setSearch('');setFilterStatut('');setFilterPeriode('');setFilterResp('');setFilterAgence('');};
  const thCls="px-4 py-3 text-left font-medium cursor-pointer select-none hover:text-azure-100 whitespace-nowrap";
  return (
    <div className="tab-content">
      <div className="flex items-center justify-between mb-3">
        <div/>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-midnight text-white text-sm font-medium hover:bg-carbon btn-brutal">+ Nouveau contact</button>
      </div>
      <div className="flex gap-2 sm:gap-3 mb-4 flex-wrap">
        <input type="text" placeholder="Rechercher..." value={search} onChange={e=>setSearch(e.target.value)} className="flex-1 min-w-[140px] sm:min-w-64 px-3 sm:px-4 py-2 border rounded-lg text-sm focus:outline-none focus:border-midnight"/>
        <select value={filterStatut} onChange={e=>setFilterStatut(e.target.value)} className="px-2 sm:px-3 py-2 border rounded-lg text-sm focus:outline-none">
          <option value="">Tous statuts</option>{statuts.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select value={filterPeriode} onChange={e=>setFilterPeriode(e.target.value)} className="px-2 sm:px-3 py-2 border rounded-lg text-sm focus:outline-none hidden sm:block">
          <option value="">Toute période</option>
          <option value="7j">Contactés 7 derniers jours</option>
          <option value="30j">Contactés 30 derniers jours</option>
        </select>
        {agences.length>1&&(
          <select value={filterAgence} onChange={e=>{setFilterAgence(e.target.value);setFilterResp('');}} className="px-2 sm:px-3 py-2 border rounded-lg text-sm focus:outline-none">
            <option value="">Toutes agences</option>{agences.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        )}
        <select value={filterResp} onChange={e=>setFilterResp(e.target.value)} className="px-2 sm:px-3 py-2 border rounded-lg text-sm focus:outline-none hidden sm:block">
          <option value="">Tous{filterAgence?` (${filterAgence})`:''}</option>
          {responsablesVisibles.map(r=><option key={r} value={r}>{r}{r===profile.nom?' (moi)':''}</option>)}
        </select>
        {hasFilter&&<button onClick={resetAll} className="px-2 sm:px-3 py-2 text-sm text-slate hover:text-carbon">✕</button>}
      </div>
      <div className="text-xs text-neutral-300 mb-2">{filtered.length} contact{filtered.length>1?'s':''}</div>
      {/* Vue cartes mobile */}
      <div className="md:hidden space-y-2">
        {filtered.map(c=>(
          <div key={c.id} onClick={()=>setSelected(c)} data-detail tabIndex="0" className="bg-white border-2 border-neutral-200 hover:border-midnight p-3 cursor-pointer active:bg-azure-20 focus:outline-none focus:border-midnight transition-colors">
            <div className="flex items-start justify-between gap-2">
              <div className="min-w-0">
                <div className="font-bold text-midnight text-sm">{c.prenom} {c.nom}</div>
                {c.groupe&&<div className="text-xs font-medium text-slate mt-0.5">{c.groupe}</div>}
                {c.role&&<div className="text-xs text-neutral-300">{c.role}</div>}
              </div>
              <StatutBadge statut={c.statut}/>
            </div>
            <div className="flex items-center gap-3 mt-2 text-xs text-neutral-300">
              {c.ville&&<span>{c.ville}</span>}
              {c.jours<999&&<span className={c.jours>90?'text-coral-100 font-medium':''}>Dernier contact : {c.jours}j</span>}
            </div>
          </div>
        ))}
      </div>
      {/* Vue tableau desktop */}
      <div className="hidden md:block bg-white border-2 border-neutral-200 overflow-hidden">
        <table className="w-full text-sm">

// ── Modal : Compléter une tâche ───────────────────────────────────────────────
function CompleteTaskModal({ task, contact, profile, onClose, onSaved }) {
  const [note,setNote]=useState('');
  const [createRelance,setCreateRelance]=useState(false);
  const [preset,setPreset]=useState('');
  const [customDate,setCustomDate]=useState('');
  const [relanceNote,setRelanceNote]=useState('');
  const [relanceTime,setRelanceTime]=useState(DEFAULT_TASK_TIME);
  const [saving,setSaving]=useState(false);

  const addDays=n=>{ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
  const relanceDate = preset==='1j'?addDays(1) : preset==='3j'?addDays(3) : preset==='7j'?addDays(7) : customDate;

  const PRESETS=[
    {key:'1j', label:'Demain',    date:()=>addDays(1)},
    {key:'3j', label:'3 jours',   date:()=>addDays(3)},
    {key:'7j', label:'1 semaine', date:()=>addDays(7)},
    {key:'custom', label:'Choisir date'},
  ];

  const save=async()=>{
    if(createRelance&&!relanceDate) return;
    setSaving(true);
    await sb.from('taches').update({statut:'fait',date_completion:getToday()}).eq('id',task.id);
    if(task.contact_id){
      const details=note?`✅ ${task.titre} — ${note}`:`✅ ${task.titre}`;
      await sb.from('historique_actions').insert({id_prospect:task.contact_id,date:getToday(),type_action:'Tâche accomplie',details,responsable:profile.nom,tache_id:task.id,besoin_id:task.besoin_id||null});
    }
    if(task.mission_id){
      const details=note?`✅ ${task.titre} — ${note}`:`✅ ${task.titre}`;
      await sb.from('historique_missions').insert({mission_id:task.mission_id,date:getToday(),type_action:'Tâche accomplie',details,responsable:profile.nom});
    }
    if(createRelance&&relanceDate){
      await sb.from('taches').insert({
        id:`tw_${Date.now()}`,
        titre:`Relance — ${task.titre}`,
        statut:'a_faire',
        due_date:combineDT(relanceDate,relanceTime),
        contact_id:task.contact_id||null,
        mission_id:task.mission_id||null,
        besoin_id:task.besoin_id||null,
        notes:relanceNote||null,
        responsable:task.responsable||profile.nom,
      });
    }
    toast('Tâche terminée');onSaved();
  };

  return (
    <Modal title={<><Icon d={ICONS.check} size={14}/> Terminer — {task.titre}</>} onClose={onClose}
      footer={<>
        <button onClick={onClose} className="px-4 py-2 text-sm text-slate hover:text-carbon">Annuler</button>
        <button onClick={save} disabled={saving||(createRelance&&!relanceDate)}
          className="px-4 py-2 bg-jade-100 text-white text-sm font-medium hover:opacity-80 disabled:opacity-50">
          {saving?'Enregistrement...':'✓ Marquer comme fait'}
        </button>
      </>}>
      {contact&&<div className="text-xs text-neutral-300 bg-neutral-50 rounded-lg px-3 py-2"><Icon d={ICONS.person} size={12}/> {contact.prenom} {contact.nom} · {contact.groupe}</div>}
      <Field label="Note de complétion (optionnel)">
        <textarea rows={2} value={note} onChange={e=>setNote(e.target.value)}
          placeholder="Ce qui a été fait, résultat de l'échange..."
          className={inputCls+' resize-none'} autoFocus/>
      </Field>
      <div className="border-t pt-3">
        <label className="flex items-center gap-2 cursor-pointer select-none">
          <input type="checkbox" checked={createRelance} onChange={e=>setCreateRelance(e.target.checked)} className="w-4 h-4 accent-blue-600"/>
          <span className="text-sm font-medium text-carbon">Créer une tâche de relance</span>
        </label>
      </div>
      {createRelance&&(
        <div className="space-y-3 bg-azure-20 p-4 border border-blue-100">
          <div>
            <div className="text-xs font-medium text-slate mb-2">Échéance</div>
            <div className="flex gap-2 flex-wrap">
              {PRESETS.map(p=>(
                <button key={p.key} onClick={()=>setPreset(p.key)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors whitespace-nowrap
                    ${preset===p.key?'bg-midnight text-white':'bg-white text-slate border-neutral-200 hover:border-neutral-400'}`}>
                  {p.label}{p.date&&<span className="ml-1 opacity-60">({p.date()})</span>}
                </button>
              ))}
            </div>
            {preset==='custom'&&(
              <div className="mt-2">
                <DateTimeInput date={customDate} time={relanceTime} min={addDays(1)}
                  onDateChange={e=>setCustomDate(e.target.value)}
                  onTimeChange={e=>setRelanceTime(e.target.value)}/>
              </div>
            )}
          </div>
          <Field label="Note pour la relance (optionnel)">
            <textarea rows={2} value={relanceNote} onChange={e=>setRelanceNote(e.target.value)}
              placeholder="Contexte pour la prochaine relance..."
              className={inputCls+' resize-none'}/>
          </Field>
        </div>
      )}
    </Modal>
  );
}

// ── Modal : Édition tâche ─────────────────────────────────────────────────────
function EditTacheModal({ task, contacts, besoins, missions, profile, allProfiles, onClose, onSaved }) {
  const [f,setF]=useState({ titre:task.titre||'', due_date:extractDate(task.due_date), due_time:extractTime(task.due_date)||DEFAULT_TASK_TIME, statut:task.statut||'a_faire', notes:task.notes||'', responsable:task.responsable||profile.nom, contact_id:task.contact_id?String(task.contact_id):'', mission_id:task.mission_id||'', besoin_id:task.besoin_id||'' });

    </Modal>
  );

// ── Calendrier tâches ─────────────────────────────────────────────────────────
const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const JOURS_COURT=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
function CalendarTaches({ taches, contactMap, profile, isAdmin, onComplete }) {
  const todayD=new Date(TODAY);
  const [calYear,setCalYear]=useState(todayD.getFullYear());
  const [calMonth,setCalMonth]=useState(todayD.getMonth());
  const prevMonth=()=>{ if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1); };
  const nextMonth=()=>{ if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1); };
  const tasksByDate=useMemo(()=>{
    const map={};
    taches.forEach(t=>{ const d=extractDate(t.due_date); if(d){ if(!map[d])map[d]=[]; map[d].push(t); } });
    return map;
  },[taches]);
  const firstDow=(new Date(calYear,calMonth,1).getDay()+6)%7; // 0=Lun
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const slots=[];
  for(let i=0;i<firstDow;i++)slots.push(null);
  for(let d=1;d<=daysInMonth;d++)slots.push(d);
  while(slots.length%7!==0)slots.push(null);
  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <button onClick={prevMonth} className="p-2 hover:bg-neutral-100 rounded-lg text-slate font-medium">← Préc.</button>
        <div className="flex items-center gap-3">
          <h2 className="text-base font-semibold text-carbon">{MOIS[calMonth]} {calYear}</h2>
          <button onClick={()=>{setCalYear(todayD.getFullYear());setCalMonth(todayD.getMonth());}} className="text-xs px-2 py-1 bg-azure-20 text-azure-100 rounded-lg hover:bg-azure-20 font-medium">Aujourd'hui</button>
        </div>
        <button onClick={nextMonth} className="p-2 hover:bg-neutral-100 rounded-lg text-slate font-medium">Suiv. →</button>
      </div>
      <div className="grid grid-cols-7 gap-px bg-neutral-200 overflow-hidden border border-neutral-200">
        {JOURS_COURT.map(j=>(
          <div key={j} className="bg-neutral-50 text-center text-xs font-semibold text-slate py-2">{j}</div>
        ))}
        {slots.map((day,i)=>{
          if(!day) return <div key={i} className="bg-neutral-50 min-h-28"/>;
          const mm=String(calMonth+1).padStart(2,'0'), dd=String(day).padStart(2,'0');
          const dateStr=`${calYear}-${mm}-${dd}`;
          const dayTasks=tasksByDate[dateStr]||[];
          const isToday=dateStr===TODAY;
          const isPast=dateStr<TODAY;
          const hasOver=isPast&&dayTasks.length>0;
          return (
            <div key={i} className={`min-h-28 p-1.5 ${isToday?'bg-azure-20':'bg-white'} ${hasOver?'bg-coral-20':''}`} style={isToday?{outline:'2px solid #4A7FE5',outlineOffset:'-2px'}:{}}>
              <div className={`text-xs font-medium mb-1 w-6 h-6 flex items-center justify-center rounded-full ${isToday?'bg-midnight text-white':'text-slate'}`}>{day}</div>
              <div className="space-y-0.5">
                {dayTasks.slice(0,3).map(t=>{
                  const canEdit=isAdmin||t.responsable===profile.nom;
                  const isEntretien=(t.titre||'').toLowerCase().startsWith('entretien');
                  const cls=t.overdue?'bg-coral-20 text-coral-100 hover:bg-red-200':isEntretien?'bg-iris-20 text-iris-100 hover:bg-iris-20':'bg-azure-20 text-azure-100 hover:bg-azure-20';
                  return (
                    <div key={t.id} title={`${t.titre}${t.notes?' — '+t.notes:''}`}
                      onClick={()=>canEdit&&onComplete(t)}
                      className={`text-xs px-1.5 py-0.5 rounded truncate ${cls} ${canEdit?'cursor-pointer':''}`}>
                      {t.titre}
                    </div>
                  );
                })}
                {dayTasks.length>3&&<div className="text-xs text-neutral-300 pl-1">+{dayTasks.length-3}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Modal : Ajouter action depuis tâche ──────────────────────────────────────
function AddActionFromTaskModal({ task, contact, profile, onClose, onSaved }) {
  const types = contact ? typesForContact(contact) : TYPES_ACTION;
  const [f,setF] = useState({ date:getToday(), type_action:'Note interne', details:'', responsable:profile.nom });
  const [saving,setSaving]=useState(false);
  const save = async () => {
    setSaving(true);
    const ins = { date:f.date, type_action:f.type_action, details:f.details||null, responsable:f.responsable, tache_id:task.id };
    if(task.contact_id) ins.id_prospect = task.contact_id;
    if(task.besoin_id) ins.besoin_id = task.besoin_id;
    const { error } = await sb.from('historique_actions').insert(ins);
    if (!error) { toast('Action enregistrée'); onSaved(); } else setSaving(false);
  };
  return (
    <Modal title={<><Icon d={ICONS.add} size={14}/> Action — {task.titre}</>} onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-slate hover:text-carbon">Annuler</button><button onClick={save} disabled={saving} className="px-4 py-2 bg-jade-100 text-white text-sm font-medium hover:opacity-80 disabled:opacity-50">{saving?'Enregistrement...':'+ Ajouter'}</button></>}>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Date"><input type="date" value={f.date} max={TODAY} onChange={e=>setF(v=>({...v,date:e.target.value}))} className={inputCls}/></Field>
        <Field label="Type">
          <select value={f.type_action} onChange={e=>setF(v=>({...v,type_action:e.target.value}))} className={inputCls}>
            {types.map(x=><option key={x} value={x}>{x}</option>)}

        </Field>
      </div>
      <Field label="Détails"><textarea rows={3} value={f.details} onChange={e=>setF(v=>({...v,details:e.target.value}))} placeholder="Notes sur l'échange..." className={inputCls+' resize-none'}/></Field>
    </Modal>
  );
}

}

function TacheCard({ t, contact, besoinLabel, missionLabel, canEdit, onDetail, onComplete, onDelete, onEdit }) {
  return (
    <div onClick={()=>onDetail(t)} data-detail tabIndex="0"
      className={`border-2 p-3 cursor-pointer hover:border-midnight focus:outline-none focus:border-midnight transition-colors flex flex-col gap-2 ${t.overdue?'bg-coral-100 border-coral-100':'bg-white border-neutral-200'}`}>
      {/* Titre + actions */}
      <div className="flex items-start justify-between gap-2">
        <div className={`font-medium text-sm leading-snug flex-1 ${t.overdue?'text-white':'text-midnight'}`}>{t.titre}</div>
        {canEdit&&(
          <div className="flex gap-1 shrink-0" onClick={e=>e.stopPropagation()}>
            <button onClick={()=>onComplete(t)} title="Marquer fait"
              className={`w-7 h-7 flex items-center justify-center ${t.overdue?'bg-white/20 hover:bg-white/40 text-white':'bg-jade-20 hover:bg-jade-20 text-jade-100'} text-base font-bold leading-none`}>✓</button>
            <button onClick={()=>onDelete(t)} title="Supprimer"
              className={`w-7 h-7 flex items-center justify-center ${t.overdue?'bg-white/20 hover:bg-white/40 text-white':'bg-neutral-100 hover:bg-neutral-200 text-coral-100'} text-base font-bold leading-none`}>✕</button>
          </div>
        )}
      </div>
      {/* Contact / Besoin / Mission */}
      {contact&&<div className={`text-xs truncate ${t.overdue?'text-white':'text-neutral-300'}`}><Icon d={ICONS.person} size={12}/> {contact.prenom} {contact.nom}{contact.groupe?` · ${contact.groupe}`:''}</div>}
      {!contact&&besoinLabel&&<div className="text-xs text-azure-100 truncate"><Icon d={ICONS.target} size={12}/> {besoinLabel}</div>}
      {missionLabel&&<div className="text-xs text-iris-100 truncate"><Icon d={ICONS.work} size={12}/> {missionLabel}</div>}
      {/* Notes excerpt */}
      {t.notes&&<div className={`text-xs italic line-clamp-2 ${t.overdue?'text-white/90':'text-slate'}`}>{t.notes}</div>}
      {/* Footer : date + responsable */}
      <div className="flex items-center justify-between mt-auto pt-1">
        {t.due_date
          ? <span className={`text-xs font-medium ${t.overdue?'text-white font-bold':t._date===TODAY?'text-coral-50':'text-neutral-300'}`}>{fmtDT(t.due_date,DEFAULT_TASK_TIME)}</span>
          : <span/>}
        <span className={`text-xs truncate ml-2 ${t.overdue?'text-white':'text-neutral-300'}`}>{t.responsable}</span>
      </div>
    </div>
  );
}

function TacheSection({ label, taches, contactMap, besoinMap, missionMap, profile, isAdmin, onDetail, onComplete, onDelete, onEdit }) {
  if(!taches.length) return null;
  return (
    <div className="space-y-2">
      <div className="flex items-center gap-2">
        <span className="text-sm font-semibold text-carbon">{label}</span>
        <span className="text-xs bg-neutral-100 text-slate px-2 py-0.5 rounded-full font-medium">{taches.length}</span>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        {taches.map(t=>{
          const contact = t.contact_id ? contactMap[t.contact_id] : null;
          const besoinLabel = t.besoin_id ? besoinMap[t.besoin_id] : null;
          const m = t.mission_id ? (missionMap||{})[t.mission_id] : null;
          const missionLabel = m ? `${m.consultant}${m.client?' · '+m.client:''}` : null;
          const canEdit = isAdmin || t.responsable===profile.nom;
          return <TacheCard key={t.id} t={t} contact={contact} besoinLabel={besoinLabel} missionLabel={missionLabel} canEdit={canEdit}
            onDetail={onDetail} onComplete={onComplete} onDelete={onDelete} onEdit={onEdit}/>;
        })}
      </div>
    </div>
  );
}
