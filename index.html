function TabTaches({ taches, contacts, contactMap, besoins, missions, historique, profile, allProfiles, onRefresh, navKey, navEcheance, navTacheId, navTacheKey, onNavToContact, onNavToBesoin, onNavToMission, prefs }) {
  const tPrefResp=prefs?.filter_responsable==='moi'?profile.nom:(prefs?.filter_responsable||profile.nom);
  const [search,setSearch]=useState(''); const [showAdd,setShowAdd]=useState(false);
  const [filterResp,setFilterResp]=useState(tPrefResp);
  const [filterEcheance,setFilterEcheance]=useState('');
  const [viewMode,setViewMode]=useState(prefs?.taches_view||'list');
  const [detailTask,setDetailTask]=useState(null);
  useEffect(()=>{ if(navEcheance) setFilterEcheance(navEcheance); },[navKey]);
  useEffect(()=>{ if(navTacheId){ const t=taches.find(x=>String(x.id)===String(navTacheId)); if(t) setDetailTask({...t,_date:extractDate(t.due_date),overdue:!!(t.due_date&&extractDate(t.due_date)<TODAY)}); } },[navTacheKey]);
  const [completingModal,setCompletingModal]=useState(null);
  const [editingTask,setEditingTask]=useState(null);
  const [deletingTask,setDeletingTask]=useState(null);
  const besoinMap=useMemo(()=>{
    const m={};
    (besoins||[]).forEach(b=>{ if(b.titre) m[b.id]=b.titre; });
    return m;
  },[besoins]);
  const missionMap=useMemo(()=>Object.fromEntries((missions||[]).map(m=>[String(m.id),m])),[missions]);
  const besoinObjMap=useMemo(()=>Object.fromEntries((besoins||[]).map(b=>[String(b.id),b])),[besoins]);
  const isAdmin=profile.role==='admin';
  const responsables=useMemo(()=>[...new Set(taches.map(t=>t.responsable).filter(Boolean))].sort(),[taches]);
  const endOfWeek=useMemo(()=>{
    const d=new Date(TODAY); const dow=d.getDay(); const diff=dow===0?0:7-dow;
    d.setDate(d.getDate()+diff); return d.toISOString().slice(0,10);
  },[]);
  // Badge counts : filtrés par responsable uniquement (toujours visibles)
  const allActives=useMemo(()=>taches
    .filter(t=>t.statut!=='fait'&&t.statut!=='annule')
    .map(t=>({...t,_date:extractDate(t.due_date),overdue:!!(t.due_date&&extractDate(t.due_date)<TODAY)}))
    .filter(t=>!filterResp||t.responsable===filterResp)
  ,[taches,filterResp]);
  const overdue=useMemo(()=>allActives.filter(t=>t.overdue).length,[allActives]);
  const today_t=useMemo(()=>allActives.filter(t=>!t.overdue&&t._date===TODAY).length,[allActives]);
  const thisWeek_t=useMemo(()=>allActives.filter(t=>t._date&&t._date>=TODAY&&t._date<=endOfWeek).length,[allActives,endOfWeek]);

  // Liste affichée : filtrée par écheance + recherche
  const actives=useMemo(()=>allActives.filter(t=>{
    if(filterEcheance==='retard'&&!t.overdue) return false;
    if(filterEcheance==='today'&&t._date!==TODAY) return false;
    if(filterEcheance==='semaine'&&!(t._date&&t._date>=TODAY&&t._date<=endOfWeek)) return false;
    if(search&&!(t.titre||'').toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }),[allActives,search,filterEcheance,endOfWeek]);

  // Sections
  const enRetard  = actives.filter(t=>t.overdue);
  const aujourdhui= actives.filter(t=>!t.overdue&&t._date===TODAY);
  const aVenir    = actives.filter(t=>t._date&&!t.overdue&&t._date!==TODAY);
  const enCours   = actives.filter(t=>!t.due_date&&t.statut==='en_cours');
  const aFaire    = actives.filter(t=>!t.due_date&&t.statut!=='en_cours');
  // Pour les commerciaux : filterResp est toujours leur nom, non réinitialisable à vide
  const hasFilter=search||(isAdmin&&filterResp)||filterEcheance;
  const resetAll=()=>{setSearch('');setFilterResp(isAdmin?'':profile.nom);setFilterEcheance('');};

  const openDetail=(t)=>setDetailTask(t);
  const handleComplete=(t)=>{ setDetailTask(null); setCompletingModal(t); };
  const handleDelete=(t)=>{ setDetailTask(null); setDeletingTask(t); };
  const handleEdit=(t)=>{ setDetailTask(null); setEditingTask(t); };

  const sectionProps={contactMap,besoinMap,missionMap,profile,isAdmin,onDetail:openDetail,onComplete:handleComplete,onDelete:handleDelete,onEdit:handleEdit};

  return (
    <div className="tab-content">
      <div className="flex items-center justify-between mb-3">
        <div/>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-midnight text-white text-sm font-medium hover:bg-carbon btn-brutal">+ Nouvelle tâche</button>
      </div>
      <div className="flex gap-3 mb-4 flex-wrap">
        <input type="text" placeholder="Rechercher une tâche..." value={search} onChange={e=>setSearch(e.target.value)} className="flex-1 min-w-48 px-4 py-2 border rounded-lg text-sm focus:outline-none focus:border-midnight"/>
        {isAdmin&&responsables.length>1&&(
          <select value={filterResp} onChange={e=>setFilterResp(e.target.value)} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
            <option value="">Tous les responsables</option>{responsables.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        )}
        {hasFilter&&<button onClick={resetAll} className="px-3 py-2 text-sm text-slate hover:text-carbon">✕ Reset</button>}
        <div className="text-sm text-slate self-center flex items-center gap-2 flex-wrap">
          <span>{actives.length} tâche{actives.length>1?'s':''}</span>
          {overdue>0&&<button onClick={()=>setFilterEcheance(filterEcheance==='retard'?'':'retard')} className={`text-xs px-2 py-0.5 rounded-full font-medium ${filterEcheance==='retard'?'bg-coral-100 text-white':'bg-red-100 text-coral-100 hover:bg-red-200'}`}><Icon d={ICONS.warning} size={14}/> {overdue} en retard</button>}
          {today_t>0&&<button onClick={()=>setFilterEcheance(filterEcheance==='today'?'':'today')} className={`text-xs px-2 py-0.5 rounded-full font-medium ${filterEcheance==='today'?'bg-lemon-100 text-white':'bg-lemon-20 text-coral-50 hover:bg-lemon-50'}`}><Icon d={ICONS.location} size={14}/> {today_t} aujourd'hui</button>}
          {thisWeek_t>0&&<button onClick={()=>setFilterEcheance(filterEcheance==='semaine'?'':'semaine')} className={`text-xs px-2 py-0.5 rounded-full font-medium ${filterEcheance==='semaine'?'bg-midnight text-white':'bg-azure-20 text-azure-100 hover:bg-azure-20'}`}><Icon d={ICONS.calendar} size={14}/> {thisWeek_t} cette semaine</button>}
        </div>
        <div className="flex border rounded-lg overflow-hidden text-sm">
          <button onClick={()=>setViewMode('list')} className={`px-3 py-2 font-medium ${viewMode==='list'?'bg-midnight text-white':'bg-white text-slate hover:bg-neutral-50'}`}><Icon d={ICONS.list} size={14}/> Liste</button>
          <button onClick={()=>setViewMode('calendar')} className={`px-3 py-2 font-medium border-l ${viewMode==='calendar'?'bg-midnight text-white':'bg-white text-slate hover:bg-neutral-50'}`}><Icon d={ICONS.calendar} size={14}/> Calendrier</button>
        </div>
      </div>
      {viewMode==='list'?(
        <div className="space-y-6">
          <TacheSection label="En retard"    taches={enRetard}   {...sectionProps}/>
          <TacheSection label="Aujourd'hui" taches={aujourdhui} {...sectionProps}/>
          <TacheSection label="À venir"     taches={aVenir}    {...sectionProps}/>
          <TacheSection label="En cours"    taches={enCours}   {...sectionProps}/>
          <TacheSection label="À faire"     taches={aFaire}    {...sectionProps}/>
          {actives.length===0&&<div className="text-center py-16"><div className="font-bold text-midnight text-lg mb-1">Aucune tâche</div><div className="text-sm text-neutral-300">Les tâches actives apparaîtront ici.</div></div>}
        </div>
      ):(
        <CalendarTaches taches={actives} contactMap={contactMap} profile={profile} isAdmin={isAdmin} onComplete={setCompletingModal}/>
      )}
      {showAdd&&<AddTacheModal contacts={contacts} besoins={besoins} missions={missions} profile={profile} allProfiles={allProfiles} onClose={()=>setShowAdd(false)} onSaved={()=>{setShowAdd(false);onRefresh();}}/>}
      {detailTask&&(()=>{const t=detailTask;const contact=t.contact_id?contactMap[t.contact_id]:null;const besoinLabel=t.besoin_id?besoinMap[t.besoin_id]:null;const mission=t.mission_id?missionMap[t.mission_id]:null;const besoin=t.besoin_id?besoinObjMap[t.besoin_id]:null;const canEdit=isAdmin||t.responsable===profile.nom;return<TacheDetailPanel task={t} contact={contact} besoinLabel={besoinLabel} mission={mission} besoin={besoin} historique={historique} profile={profile} canEdit={canEdit} onClose={()=>setDetailTask(null)} onEdit={()=>handleEdit(t)} onComplete={()=>handleComplete(t)} onDelete={()=>handleDelete(t)} onAddAction={()=>{setDetailTask(null);onRefresh();}} onViewContact={c=>{setDetailTask(null);onNavToContact&&onNavToContact(c.id);}} onViewMission={m=>{setDetailTask(null);onNavToMission&&onNavToMission(m.id);}} onViewBesoin={b=>{setDetailTask(null);onNavToBesoin&&onNavToBesoin(b.id);}}/>;})()}
      {completingModal&&<CompleteTaskModal task={completingModal} contact={contactMap[completingModal.contact_id]||null} profile={profile} onClose={()=>setCompletingModal(null)} onSaved={()=>{setCompletingModal(null);onRefresh();}}/>}
      {editingTask&&<EditTacheModal task={editingTask} contacts={contacts} besoins={besoins} missions={missions} profile={profile} allProfiles={allProfiles} onClose={()=>setEditingTask(null)} onSaved={()=>{setEditingTask(null);onRefresh();}}/>}
      {deletingTask&&<DeleteTacheModal task={deletingTask} onClose={()=>setDeletingTask(null)} onDeleted={()=>{setDeletingTask(null);onRefresh();}}/>}
    </div>
  );
}
