            <button onClick={()=>{setTab('taches');fetchAll();}} className="sm:hidden text-sm font-bold text-gray-800 cursor-pointer">CRM</button>
            <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium hidden sm:inline">⚡ Live</span>
            {isAdmin&&<span className="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-medium hidden sm:inline">Admin</span>}
          </div>
          <div className="flex items-center gap-1 sm:gap-3 flex-shrink-0">
            {tachesRetard.length>0&&<button onClick={()=>navToTaches('retard')} className="text-xs bg-red-100 hover:bg-red-200 text-red-700 px-2 py-1 rounded-full font-medium hidden sm:block">⚠️ {tachesRetard.length} tâche{tachesRetard.length>1?'s':''} en retard</button>}
            <div className="text-xs text-gray-400 hidden sm:block">{lastRefresh&&`Actualisé ${lastRefresh}`}</div>
            <button onClick={fetchAll} disabled={loading} className="text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 px-2 sm:px-3 py-1.5 rounded-lg font-medium disabled:opacity-50" title="Raccourci : R">{loading?'⟳':'⟳'}<span className="hidden sm:inline"> Refresh</span></button>
            {/* Avatar dropdown */}
            <div className="relative">
              <button onClick={()=>setShowMenu(!showMenu)} className={`flex items-center gap-1.5 px-2 sm:px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors ${showMenu?'bg-blue-50 border-blue-300 text-blue-700':'bg-gray-100 border-transparent text-gray-600 hover:bg-gray-200'}`}>
                <span className="w-6 h-6 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs font-bold">{(profile.nom||'?')[0]}</span>
                <span className="hidden sm:inline">{profile.nom}</span>
                <span className="text-gray-400">▾</span>
              </button>
              {showMenu&&<>
                <div className="fixed inset-0 z-50" onClick={()=>setShowMenu(false)}/>
                <div className="avatar-menu z-50">
                  <div className="px-4 py-3 border-b border-gray-100">
                    <div className="text-sm font-semibold text-gray-900">{profile.nom}</div>
                    <div className="text-xs text-gray-400">{profile.agence} · {profile.role}</div>
                  </div>
                  {isAdmin&&<div className="border-b border-gray-100 py-1">
                    <div className="px-4 py-1.5 text-xs text-gray-400 font-medium uppercase tracking-wide">Voir comme</div>
                    {viewAs&&<button onClick={()=>{setViewAs(null);setShowMenu(false);}}><span>🔙</span> Retour à ma vue</button>}
                    {allProfiles.filter(p=>p.nom!==profile.nom).map(p=>(
                      <button key={p.id} onClick={()=>{setViewAs(p);setShowMenu(false);}}><span>👁️</span> {p.nom} <span className="text-gray-400 ml-auto">{p.agence}</span></button>
                    ))}
                  </div>}
                  <button onClick={()=>{setShowPwd(true);setShowMenu(false);}}><span>🔑</span> Changer mot de passe</button>
                  <button onClick={()=>{setShowShortcuts(!showShortcuts);setShowMenu(false);}}><span>⌨️</span> Raccourcis clavier</button>
                  <button onClick={()=>{logout();setShowMenu(false);}} className="text-red-600 hover:bg-red-50"><span>⏻</span> Déconnexion</button>
                </div>
              </>}
            </div>
            {showPwd&&<ChangePasswordModal onClose={()=>setShowPwd(false)}/>}
          </div>
        </div>
        <div ref={tabsRef} className="max-w-7xl mx-auto px-2 sm:px-4 flex gap-1 pb-0 mobile-tabs">
          {TABS.map((t,i)=>(
            <button key={t.id} data-active={tab===t.id?'true':undefined} onClick={()=>setTab(t.id)} className={`px-4 py-2.5 text-sm font-medium border-b-2 transition-colors whitespace-nowrap ${tab===t.id?'border-blue-600 text-blue-700':'border-transparent text-gray-500 hover:text-gray-700'}`}>
              {t.label}<span className="hidden sm:inline text-xs text-gray-300 ml-1">{i+1}</span>
            </button>
          ))}
        </div>
      </div>
      {viewAs&&(
        <div className="bg-orange-500 text-white text-center text-xs py-2 font-medium flex items-center justify-center gap-3">
          <span>👁️ Vue simulée : <strong>{viewAs.nom}</strong> · {viewAs.agence} · {viewAs.role} — les données sont filtrées comme il/elle les verrait</span>
          <button onClick={()=>setViewAs(null)} className="bg-white text-orange-600 px-3 py-0.5 rounded-full font-semibold hover:bg-orange-50">Quitter</button>
        </div>
      )}
      <div className="max-w-7xl mx-auto px-2 sm:px-4 py-4 sm:py-6">
        {tab==='prospects'&&<TabProspects contacts={vContacts} historique={vHistorique} taches={vTaches} missions={vMissions} besoins={vBesoins} profile={activeProfile} allProfiles={allProfiles} onRefresh={fetchAll}/>}
        {tab==='taches'   &&<TabTaches   taches={vTaches} contacts={vContacts} besoins={vBesoins} missions={vMissions} historique={vHistorique} profile={activeProfile} allProfiles={allProfiles} onRefresh={fetchAll} navKey={tachesNavKey} navEcheance={tachesNavEcheance}/>}
        {tab==='besoins'  &&<TabBesoins  contacts={vContacts} besoins={vBesoins} besoinCandidats={besoinCandidats} historique={vHistorique} taches={vTaches} missions={vMissions} profile={activeProfile} allProfiles={allProfiles} onRefresh={fetchAll}/>}
        {tab==='pipe'     &&<TabPipe    besoins={vBesoins} contacts={vContacts} besoinCandidats={besoinCandidats} historique={vHistorique} taches={vTaches} missions={vMissions} profile={activeProfile} allProfiles={allProfiles} onRefresh={fetchAll}/>}
        {tab==='historique'&&<TabHistorique historique={vHistorique} contacts={vContacts} taches={vTaches} profile={activeProfile} allProfiles={allProfiles} onRefresh={fetchAll}/>}
        {tab==='tdb'      &&<TabTDB      missions={vMissions} histMissions={vHistMiss} contacts={vContacts} taches={vTaches} besoins={vBesoins} profile={activeProfile} allProfiles={allProfiles} onRefresh={fetchAll}/>}
      </div>
      {/* Shortcuts modal */}
      {showShortcuts&&(
        <Modal title="⌨️ Raccourcis clavier" onClose={()=>setShowShortcuts(false)}>
          <div className="space-y-2 text-sm">
            {[['1–6','Changer d\'onglet'],['Entrée','Ouvrir le panneau / modal (au survol)'],['Échap','Fermer le panneau / modal'],['R','Rafraîchir les données']].map(([k,d])=>(
              <div key={k} className="flex items-center gap-3">
                <kbd className="px-2 py-1 bg-gray-100 border rounded text-xs font-mono font-semibold text-gray-700 min-w-[40px] text-center">{k}</kbd>
                <span className="text-gray-600">{d}</span>
              </div>
            ))}
          </div>
        </Modal>
      )}
      <ToastContainer/>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
