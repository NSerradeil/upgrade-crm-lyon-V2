// ── Cellule éditable jours + statut livraison ────────────────────────────────
const LIVRAISON_STATUTS=[
  {value:null,label:'Réalisé',color:'text-slate',dot:'bg-neutral-300',bg:''},
  {value:'Livré',label:'Livré',color:'text-azure-100',dot:'bg-azure-200',bg:'bg-azure-20'},
  {value:'Réceptionné',label:'Réceptionné',color:'text-jade-100',dot:'bg-jade-200',bg:'bg-jade-20'},
];

function EditableJoursCell({ mission, moisKey, moisIdx, curMonthIdx, isDebut, isFin, finSoon, onUpdate }) {
  const [editing,setEditing]=useState(false);
  const [editVal,setEditVal]=useState('');
  const [saving,setSaving]=useState(false);
  const [showStatut,setShowStatut]=useState(false);
  const inputRef=useRef(null);
  const dropRef=useRef(null);

  const j=parseFloat(mission[`jours_${moisKey}`])||0;
  const rec=mission[`statut_${moisKey}`]||null;
  const statutObj=LIVRAISON_STATUTS.find(s=>s.value===rec)||LIVRAISON_STATUTS[0];

  // Close dropdown on outside click
  useEffect(()=>{
    if(!showStatut) return;
    const h=e=>{if(dropRef.current&&!dropRef.current.contains(e.target))setShowStatut(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[showStatut]);

  const startEdit=(e)=>{
    e.stopPropagation();
    setEditVal(j>0?(j%1===0?j.toFixed(0):j.toFixed(1)):'');
    setEditing(true);
    setTimeout(()=>inputRef.current?.select(),0);
  };

  const saveJours=async()=>{
    const newVal=parseFloat(editVal);
    if(isNaN(newVal)||newVal<0){setEditing(false);return;}
    const rounded=Math.round(newVal*10)/10;
    if(rounded===j){setEditing(false);return;}
    setEditing(false);setSaving(true);
    try{
      const patch={[`jours_${moisKey}`]:rounded};
      const{error}=await sb.from('missions').update(patch).eq('id',mission.id);
      if(error) throw error;
      mission[`jours_${moisKey}`]=rounded; // optimistic
      onUpdate();
    }catch(e){toast('Erreur sauvegarde : '+e.message,'error');}
    finally{setSaving(false);}
  };

  const changeStatut=async(newStatut)=>{
    setShowStatut(false);
    if(newStatut===rec) return;
    // Warning si passage direct à Réceptionné sans Livré
    if(newStatut==='Réceptionné'&&rec!=='Livré'){
      if(!confirm('Ce mois n\'a pas encore de BL émis (Livré). Continuer quand même ?')) return;
    }
    setSaving(true);
    const oldStatut=rec;
    mission[`statut_${moisKey}`]=newStatut; // optimistic
    onUpdate();
    try{
      const patch={[`statut_${moisKey}`]:newStatut};
      const{error}=await sb.from('missions').update(patch).eq('id',mission.id);
      if(error) throw error;
      toast(`${MOIS_LABELS[moisIdx]} → ${newStatut||'Réalisé'}`);
    }catch(e){
      mission[`statut_${moisKey}`]=oldStatut; // rollback
      onUpdate();
      toast('Erreur : '+e.message,'error');
    }finally{setSaving(false);}
  };

  const onKeyDown=(e)=>{
    if(e.key==='Enter'){e.preventDefault();saveJours();}
    if(e.key==='Escape'){e.preventDefault();setEditing(false);}
    if(e.key==='Tab'){saveJours();}
  };

  // Colors
  const cellCls=j>0?(rec==='Réceptionné'?'text-jade-100 font-semibold':rec==='Livré'?'text-azure-100':'text-slate'):'text-neutral-200';
  let cellBg=moisIdx===curMonthIdx?'bg-azure-20':'';
  let cellStyle={};
  if(isDebut&&isFin) cellStyle={background:'linear-gradient(90deg, rgba(34,197,94,0.15) 50%, rgba(239,68,68,'+(finSoon?'0.30':'0.15')+') 50%)'};
  else if(isDebut) cellStyle={background:'rgba(34,197,94,0.15)'};
  else if(isFin) cellStyle={background:'rgba(239,68,68,'+(finSoon?'0.30':'0.15')+')'};
  if(isDebut||isFin) cellBg='';

  return (
    <td className={`relative text-right text-xs font-mono ${cellBg} ${saving?'opacity-50':''}`} style={{...cellStyle,padding:'4px 6px',minWidth:'48px'}}
      title={rec||(isDebut?'Début mission':'')+(isFin?' Fin mission':'')}>
      <div className="flex items-center justify-end gap-0.5">
        {/* Pastille statut — cliquable */}
        {j>0&&(
          <div className="relative" ref={dropRef}>
            <button onClick={e=>{e.stopPropagation();setShowStatut(!showStatut);}}
              className={`w-2 h-2 rounded-full ${statutObj.dot} hover:ring-2 hover:ring-offset-1 hover:ring-gray-300 transition-all shrink-0`}
              title={`Statut : ${statutObj.label} — Cliquer pour changer`}/>
            {showStatut&&(
              <div className="absolute top-4 right-0 z-50 bg-white border-2 border-neutral-200 py-1 w-36" style={{fontSize:'12px'}}>
                {LIVRAISON_STATUTS.map(s=>(
                  <button key={s.label} onClick={e=>{e.stopPropagation();changeStatut(s.value);}}
                    className={`w-full text-left px-3 py-1.5 flex items-center gap-2 hover:bg-neutral-50 ${s.value===rec?'font-semibold bg-neutral-50':''}`}>
                    <span className={`w-2.5 h-2.5 rounded-full ${s.dot}`}/>
                    <span className={s.color}>{s.label}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
        )}
        {/* Jours — clic pour éditer */}
        {editing?(
          <input ref={inputRef} type="number" step="0.5" min="0"
            value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={saveJours} onKeyDown={onKeyDown}
            onClick={e=>e.stopPropagation()}
            className="w-10 text-right text-xs font-mono border border-blue-300 rounded px-0.5 py-0 focus:outline-none focus:ring-1 focus:ring-blue-400 bg-white"
            style={{fontSize:'12px'}} inputMode="decimal"/>
        ):(
          <span onClick={startEdit}
            className={`${cellCls} cursor-text hover:bg-lemon-20 hover:rounded px-0.5 transition-colors`}
            title="Cliquer pour modifier">
            {j>0?(j%1===0?j.toFixed(0):j.toFixed(1)):'—'}
          </span>
        )}
      </div>
    </td>
  );
}

// ── Onglet TDB Missions ───────────────────────────────────────────────────────
function TabTDB({ missions, histMissions, contacts, taches, besoins, profile, allProfiles, commerciauxParAgence, onRefresh, navMissionId, navMissionKey, onNavToContact, onNavToBesoin, onNavToTache, prefs }) {
  const [selected,setSelected] = useState(null); const [showAdd,setShowAdd]=useState(false);
  useEffect(()=>{ if(navMissionId){ const m=missions.find(x=>String(x.id)===String(navMissionId)); if(m) setSelected(m); } },[navMissionKey]);
  const [search,setSearch] = useState(''); const [filterStatut,setFilterStatut] = useState(prefs?.missions_filter_statut||'');
  const [filterAgence,setFilterAgence] = useState(prefs?.missions_filter_agence||(profile.role==='admin'?'':profile.agence));
  const [filterResp,setFilterResp] = useState('');
  const [tick,setTick] = useState(0); // force re-render on optimistic update
  const forceUpdate=useCallback(()=>setTick(t=>t+1),[]);
  const [activeChart, setActiveChart] = useState(prefs?.tdb_default_chart||'ca');
  const isAdmin = profile.role==='admin';
  const curMonthIdx = new Date().getMonth();

  const agences=useMemo(()=>[...new Set(allProfiles.map(p=>p.agence).filter(Boolean))].sort(),[allProfiles]);
  const responsablesVisibles=useMemo(()=>{
    if(isAdmin&&!filterAgence) return [...new Set(allProfiles.map(p=>p.nom).filter(Boolean))].sort();
    const ag=filterAgence||profile.agence;
    return commerciauxParAgence[ag]||[];
  },[isAdmin,filterAgence,profile.agence,allProfiles,commerciauxParAgence]);

  const missionsFiltrees=useMemo(()=>{
    const q=search.toLowerCase();
    return missions.filter(m=>{
      if(filterStatut&&m.statut!==filterStatut) return false;
      if(filterAgence&&m.agence!==filterAgence) return false;
      if(filterResp&&m.responsable!==filterResp) return false;
      if(q&&![(m.consultant||''),(m.client||'')].some(v=>v.toLowerCase().includes(q))) return false;
      return true;
    });
  },[missions,search,filterStatut,filterAgence,filterResp]);
  const hasFilter=search||filterStatut||filterResp||(isAdmin?filterAgence!=='':filterAgence!==profile.agence);
  const resetAll=()=>{setSearch('');setFilterStatut('');setFilterResp('');setFilterAgence(isAdmin?'':profile.agence);};

  const enMission    = missionsFiltrees.filter(m=>m.statut==='En cours'||m.statut==='New');
  const intercontrat = missionsFiltrees.filter(m=>m.statut==='Intercontrat');
  const caYTD = missionsFiltrees.reduce((sum,m)=>{ const tjm=parseFloat(m.tjm)||0; return sum+MOIS_KEYS.reduce((s,k)=>s+(parseFloat(m[`jours_${k}`])||0)*tjm,0); },0);
  const margeYTD = missionsFiltrees.reduce((sum,m)=>{ const mg=(parseFloat(m.tjm)||0)-(parseFloat(m.cjm)||0); return sum+MOIS_KEYS.reduce((s,k)=>s+(parseFloat(m[`jours_${k}`])||0)*mg,0); },0);
  const tauxMarge = caYTD>0?(margeYTD/caYTD*100):0;

  const caMensuel = MOIS_KEYS.map(k=>missionsFiltrees.reduce((sum,m)=>(parseFloat(m[`jours_${k}`])||0)*(parseFloat(m.tjm)||0)+sum,0));
  const maxCA = Math.max(...caMensuel,1);

  const currentYear = new Date().getFullYear();

  // Marge mensuelle
  const margeMensuel = MOIS_KEYS.map(k => missionsFiltrees.reduce((s,m) => s+(parseFloat(m[`jours_${k}`])||0)*((parseFloat(m.tjm)||0)-(parseFloat(m.cjm)||0)),0));

  // Intercontrat mensuel
  const JOURS_OUV = 18.16;
  const missionsAll = missions || [];
  const cdiMissions = missionsAll.filter(m => m.type_contrat==='CDI'||m.statut==='Intercontrat');
  const nbCdiParMois = MOIS_KEYS.map((k,i) => cdiMissions.filter(m => {
    const debut = m.date_debut_mission ? new Date(m.date_debut_mission).getMonth() : 0;
    const fin = m.date_fin_mission ? new Date(m.date_fin_mission).getMonth() : 11;
    return i >= debut && i <= fin;
  }).length);
  const joursInterParMois = MOIS_KEYS.map(k => intercontrat.reduce((s,m) => s+(parseFloat(m[`jours_${k}`])||0),0));
  const tauxInterM = MOIS_KEYS.map((_,i) => nbCdiParMois[i]>0?(joursInterParMois[i]/(nbCdiParMois[i]*JOURS_OUV))*100:0);
  const joursInterYTD = joursInterParMois.slice(0,curMonthIdx+1).reduce((a,b)=>a+b,0);
  const avgCdi = nbCdiParMois.slice(0,curMonthIdx+1).reduce((a,b)=>a+b,0)/(curMonthIdx+1);
  const tauxInterAnn = avgCdi>0?(joursInterYTD/(avgCdi*JOURS_OUV*(curMonthIdx+1)))*100:0;

  // Mission flow
  const missionFlow = MOIS_KEYS.map((_,i) => ({
    actifs: missionsFiltrees.filter(m => (parseFloat(m[`jours_${MOIS_KEYS[i]}`])||0)>0 && m.statut!=='Intercontrat').length,
    nouvelles: missionsFiltrees.filter(m => {
      if(!m.date_debut_mission) return false;
      const dd = new Date(m.date_debut_mission);
      return dd.getFullYear()===currentYear && dd.getMonth()===i;
    }).length,
    fins: missionsFiltrees.filter(m => {
      if(!m.date_fin_mission) return false;
      const df = new Date(m.date_fin_mission);
      return df.getFullYear()===currentYear && df.getMonth()===i;
    }).length,
  }));

  const KPI_CARDS = [
    {id:'missions',color:'#00C218',value:enMission.length,label:'EN MISSION',sub:`${enMission.length} consultant${enMission.length>1?'s':''} actifs`},
    {id:'inter',color:intercontrat.length>0?'#FFE500':'#ccc',value:intercontrat.length,label:'INTERCONTRAT',
      sub:intercontrat.length>0?intercontrat.map(m=>(m.consultant||'').split(' ')[0]).join(', '):'Aucun',
      badge:tauxInterAnn>=8?'MALUS':tauxInterAnn>=5?'Attention':null,
      badgeColor:tauxInterAnn>=8?'#FF3D2E':'#92400e'},
    {id:'ca',color:'#4A7FE5',value:fmtK(caYTD),label:'CA YTD',sub:'toutes missions'},
    {id:'marge',color:'#FF66FF',value:fmtK(margeYTD),label:'MARGE YTD',sub:`${tauxMarge.toFixed(1)}% taux de marge`},
  ];

  const ORDRE_STATUT={'En cours':0,'New':1,'Intercontrat':2,'Terminée':3};
  const missionsTri=[...missionsFiltrees].sort((a,b)=>{const d=(ORDRE_STATUT[a.statut]??9)-(ORDRE_STATUT[b.statut]??9);return d!==0?d:(a.consultant||'').localeCompare(b.consultant||'');});

  if(missions.length===0) return (
    <div className="flex flex-col items-center justify-center py-20">
      <div className="font-bold text-midnight text-lg mb-2">Aucune mission chargée</div>
      <div className="text-sm text-neutral-300 text-center max-w-sm">Lance <code className="bg-neutral-100 px-1.5 py-0.5 text-xs font-mono">python3 supabase/populate_supabase.py</code> pour importer les missions.</div>
    </div>
  );

  return (
    <div className="space-y-6 tab-content">
      {/* Header + Nouveau */}
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2">
          <span className="inline-block w-3 h-3 rounded-sm" style={{background:'#FF3D2E'}}/>
          <span className="text-sm font-bold text-carbon uppercase tracking-wide">Tableau de bord</span>
        </div>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-midnight text-white text-sm font-medium hover:bg-carbon btn-brutal">+ Nouvelle mission</button>
      </div>
      {/* KPI cards — clickable */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
        {KPI_CARDS.map(c=>{
          const active = activeChart===c.id;
          return (
            <div key={c.id} onClick={()=>setActiveChart(c.id)} style={{cursor:'pointer',background:active?'#1C1F35':'#fff',borderTop:`2px solid ${active?'#1C1F35':'#E4E4E6'}`,borderRight:`2px solid ${active?'#1C1F35':'#E4E4E6'}`,borderBottom:`2px solid ${active?'#1C1F35':'#E4E4E6'}`,borderLeft:`5px solid ${c.color}`,padding:'14px 16px',borderRadius:0,transition:'all 120ms ease',boxShadow:active?`4px 4px 0 ${c.color}`:'none',transform:active?'translate(-2px,-2px)':'none'}}>
              <div style={{fontSize:28,fontWeight:900,color:active?'#fff':'#1C1F35',fontFamily:'Outfit,sans-serif',lineHeight:1}}>{c.value}</div>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.05em',color:active?c.color:'#999',marginTop:4}}>{c.label}</div>
              <div style={{fontSize:11,color:active?'#ffffff66':'#bbb',marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.sub}</div>
              {c.badge&&<div style={{fontSize:10,fontWeight:800,color:c.badgeColor,marginTop:4,textTransform:'uppercase'}}>{c.badge}</div>}
            </div>
          );
        })}
      </div>

      {/* Chart area — switches based on activeChart */}
      <div style={{background:'#fff',borderTop:'2px solid #1C1F35',borderRight:'2px solid #1C1F35',borderBottom:'2px solid #1C1F35',borderLeft:`5px solid ${KPI_CARDS.find(c=>c.id===activeChart)?.color||'#E4E4E6'}`,padding:'20px 24px 24px',borderRadius:0}}>
        {activeChart==='ca'&&<ChartCA caMensuel={caMensuel} caYTD={caYTD} curMonth={curMonthIdx}/>}
        {activeChart==='marge'&&<ChartMarge margeMensuel={margeMensuel} margeYTD={margeYTD} caMensuel={caMensuel} tauxMarge={tauxMarge} curMonth={curMonthIdx}/>}
        {activeChart==='inter'&&<ChartInter tauxM={tauxInterM} tauxAnn={tauxInterAnn} curMonth={curMonthIdx}/>}
        {activeChart==='missions'&&<ChartMissions flow={missionFlow} curMonth={curMonthIdx}/>}
      </div>
      <div style={{marginTop:8,fontSize:11,color:'#bbb',textAlign:'right',fontFamily:'Outfit,sans-serif'}}>Cliquer sur une dalle pour changer la vue</div>

      {/* Table missions — cliquer sur une ligne ouvre le détail */}
      <div className="bg-white border border-neutral-200 rounded-lg overflow-hidden shadow-sm">
        <div className="px-4 py-3 border-b border-neutral-50 flex items-center gap-3 flex-wrap">
          <span className="text-sm font-semibold text-carbon mr-auto flex items-center gap-2"><span className="inline-block w-2.5 h-2.5 rounded-sm" style={{background:'#823DE8'}}/>Missions — {missionsTri.length}/{missions.length} consultant{missions.length>1?'s':''}</span>
          <input type="text" placeholder="Consultant, client..." value={search} onChange={e=>setSearch(e.target.value)} className="px-3 py-1.5 border rounded-lg text-sm focus:outline-none focus:border-midnight w-44"/>
          <select value={filterStatut} onChange={e=>setFilterStatut(e.target.value)} className="px-3 py-1.5 border rounded-lg text-sm focus:outline-none">
            <option value="">Tous statuts</option>
            <option value="En cours">En cours</option>
            <option value="New">New</option>
            <option value="Intercontrat">Intercontrat</option>
            <option value="Terminée">Terminée</option>
          </select>
          {isAdmin&&agences.length>1&&(
            <select value={filterAgence} onChange={e=>{setFilterAgence(e.target.value);setFilterResp(e.target.value?'':profile.nom);}} className="px-3 py-1.5 border rounded-lg text-sm focus:outline-none">
              <option value="">Toutes agences</option>{agences.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          )}
          {!isAdmin&&(
            <span className="px-3 py-1.5 bg-neutral-50 border rounded-lg text-sm text-slate">{profile.agence}</span>
          )}
          <select value={filterResp} onChange={e=>setFilterResp(e.target.value)} className="px-3 py-1.5 border rounded-lg text-sm focus:outline-none">
            <option value="">Tous{!isAdmin?` (${profile.agence})`:filterAgence?` (${filterAgence})`:''}</option>
            {responsablesVisibles.map(r=><option key={r} value={r}>{r}{r===profile.nom?' (moi)':''}</option>)}
          </select>
          {hasFilter&&<button onClick={resetAll} className="px-3 py-1.5 text-sm text-slate hover:text-carbon">✕ Reset</button>}
        </div>
        {/* Vue cartes mobile */}
        <div className="md:hidden space-y-2 mb-4">
          {missionsTri.map(m=>{
            const joursT=MOIS_KEYS.reduce((s,k)=>s+(parseFloat(m[`jours_${k}`])||0),0);
            const caT=joursT*(parseFloat(m.tjm)||0);
            const margeT=joursT*((parseFloat(m.tjm)||0)-(parseFloat(m.cjm)||0));
            return (
              <div key={m.id} onClick={()=>setSelected(m)} data-detail tabIndex="0" className="bg-white border-2 border-neutral-200 hover:border-midnight p-3 cursor-pointer active:bg-azure-20 focus:outline-none focus:border-midnight transition-colors">
                <div className="flex items-start justify-between gap-2">
                  <div className="min-w-0">
                    <div className="font-bold text-midnight text-sm">{m.consultant}</div>
                    <div className="text-xs font-medium text-slate mt-0.5">{m.client||'—'}{m.projet?` · ${m.projet}`:''}</div>
                  </div>
                  <MissionStatutBadge statut={m.statut}/>
                </div>
                <div className="flex items-center gap-3 mt-2 text-xs text-neutral-300">
                  {m.tjm>0&&<span className="font-medium text-slate">{m.tjm}€/j</span>}
                  {joursT>0&&<span>{joursT}j</span>}
                  {caT>0&&<span className="text-jade-100 font-medium">{fmtCurrency(caT)}</span>}
                  {margeT!==0&&<span className={margeT>=0?'text-iris-100':'text-coral-100'}>Marge {((caT>0?margeT/caT*100:0)).toFixed(0)}%</span>}
                </div>
              </div>
            );
          })}
          {missionsTri.length===0&&<div className="text-center py-8"><div className="font-bold text-midnight mb-1">Aucune mission</div><div className="text-sm text-neutral-300">Modifiez vos filtres pour voir plus de résultats.</div></div>}
        </div>
        {/* Vue tableau desktop */}
        <div className="hidden md:block overflow-x-auto" style={{margin:'0 -8px',padding:'0 8px'}}>
          <table className="w-full text-sm" style={{minWidth:'1000px'}}>
            <thead>
              <tr className="bg-neutral-50 text-[11px] font-bold uppercase tracking-[0.05em] text-slate">
                <th className="px-2 py-2 text-left">Consultant</th>
                <th className="px-2 py-2 text-left">Client</th>
                <th className="px-2 py-2 text-left hidden lg:table-cell">Projet</th>
                <th className="px-1 py-2 text-right">TJM</th>
                <th className="px-1 py-2 text-left">Statut</th>
                {MOIS_LABELS.map((m,i)=>(
                  <th key={i} className={`px-1 py-2 text-right whitespace-nowrap ${i===curMonthIdx?'text-azure-100 bg-azure-20':''}`} style={{fontSize:'10px'}}>{m}</th>
                ))}
                <th className="px-2 py-2 text-right">CA</th>
              </tr>
            </thead>
            <tbody>
              {missionsTri.map((m,idx)=>{
                const joursTotal=MOIS_KEYS.reduce((s,k)=>s+(parseFloat(m[`jours_${k}`])||0),0);
                const caTotal=joursTotal*(parseFloat(m.tjm)||0);
                const mHist=(histMissions||[]).filter(h=>h.mission_id===m.id);
                const histCount=mHist.length;
                // Feature 1: mois début/fin commande
                const debutM=m.date_debut_mission?new Date(m.date_debut_mission).getMonth():-1;
                const finM=m.date_fin_mission?new Date(m.date_fin_mission).getMonth():-1;
                const finDate=m.date_fin_mission?new Date(m.date_fin_mission):null;
                const finSoon=finDate&&((finDate-new Date())/(1000*60*60*24))<=30&&((finDate-new Date())/(1000*60*60*24))>=-31;
                // Feature 2: badge suivi
                const dernierSuivi=mHist.filter(h=>h.type_action&&h.type_action.toLowerCase().includes('suivi')).sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];
                const dernierSuiviDate=dernierSuivi?new Date(dernierSuivi.date):null;
                const missionStart=m.date_debut_mission?new Date(m.date_debut_mission):null;
                const now=new Date();
                const daysSinceSuivi=dernierSuiviDate?Math.floor((now-dernierSuiviDate)/(1000*60*60*24)):null;
                const daysSinceStart=missionStart?Math.floor((now-missionStart)/(1000*60*60*24)):null;
                const enMission=m.statut==='En cours'||m.statut==='New';
                let suiviBadge=null;
                if(enMission){
                  if(daysSinceSuivi!==null&&daysSinceSuivi>90) suiviBadge={icon:<span className="w-2 h-2 bg-coral-100 rounded-full inline-block"/>,label:'Suivi critique',color:'text-coral-100',tip:`Suivi critique\nDernier suivi : ${dernierSuivi.date}`};
                  else if(daysSinceSuivi!==null&&daysSinceSuivi>30) suiviBadge={icon:<Icon d={ICONS.warning} size={12}/>,label:'Suivi à programmer',color:'text-coral-100',tip:`Suivi à programmer\nDernier suivi : ${dernierSuivi.date}`};
                  else if(daysSinceSuivi===null&&daysSinceStart!==null&&daysSinceStart>30) suiviBadge={icon:<Icon d={ICONS.warning} size={12}/>,label:'Suivi à prévoir',color:'text-neutral-300',tip:`Suivi à prévoir\nAucun suivi enregistré\nMission démarrée le : ${m.date_debut_mission||'?'}`};
                }
                return (
                  <tr key={m.id||idx} onClick={()=>setSelected(m)} data-detail tabIndex="0"
                    className={`border-t border-neutral-50 hover:bg-azure-20 focus:bg-azure-20 focus:outline-none cursor-pointer transition-colors ${m.statut==='Intercontrat'?'opacity-70':''}`}>
                    <td className="px-2 py-2">
                      <div className="font-medium text-midnight whitespace-nowrap flex items-center gap-1.5 text-xs">
                        {m.consultant}
                        {suiviBadge&&<span title={suiviBadge.tip} className={`cursor-help ${suiviBadge.color}`} style={{fontSize:'11px'}}>{suiviBadge.icon}</span>}
                      </div>
                      <div className="flex items-center gap-1 mt-0.5">
                        {m.type_contrat&&<span className="text-[10px] text-neutral-300">{m.type_contrat}</span>}
                        {histCount>0&&<span className="text-[10px] bg-jade-20 text-jade-100 px-1 py-0 rounded-full font-medium">{histCount} action{histCount>1?'s':''}</span>}
                      </div>
                    </td>
                    <td className="px-2 py-2 text-slate whitespace-nowrap text-xs">{m.client||'—'}</td>
                    <td className="px-2 py-2 text-slate hidden lg:table-cell text-[11px] max-w-[120px] truncate">
                      <span title={m.projet||''}>{m.projet?(m.projet.length>30?m.projet.substring(0,30)+'…':m.projet):'—'}</span>
                    </td>
                    <td className="px-1 py-2 text-right font-mono text-[11px] text-carbon whitespace-nowrap">{m.tjm>0?`${m.tjm}€`:'—'}</td>
                    <td className="px-1 py-2 whitespace-nowrap"><MissionStatutBadge statut={m.statut}/></td>
                    {MOIS_KEYS.map((k,i)=>(
                      <EditableJoursCell key={k} mission={m} moisKey={k} moisIdx={i} curMonthIdx={curMonthIdx}
                        isDebut={debutM===i} isFin={finM===i} finSoon={finSoon} onUpdate={forceUpdate}/>
                    ))}
                    <td className="px-2 py-2 text-right font-semibold text-carbon whitespace-nowrap text-xs">{caTotal>0?fmtCurrency(caTotal):'—'}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr className="border-t-2 border-neutral-200 bg-neutral-50 text-xs font-semibold text-carbon">
                <td className="px-3 py-2.5 uppercase tracking-wide" colSpan={2}>TOTAL</td>
                <td className="hidden lg:table-cell"></td><td></td><td></td>
                {MOIS_KEYS.map((k,i)=>{
                  const totJ=missionsFiltrees.reduce((s,m)=>s+(parseFloat(m[`jours_${k}`])||0),0);
                  const totCA=missionsFiltrees.reduce((s,m)=>s+(parseFloat(m[`jours_${k}`])||0)*(parseFloat(m.tjm)||0),0);
                  return <td key={k} className={`px-2 py-2.5 text-right font-mono ${i===curMonthIdx?'bg-azure-20':''}`}>{totJ>0?<><div>{totJ%1===0?totJ.toFixed(0):totJ.toFixed(1)}j</div><div className="text-jade-100">{fmtCurrency(totCA)}</div></>:<span className="text-neutral-200">—</span>}</td>;
                })}
                <td className="px-3 py-2.5 text-right"><div className="text-jade-100">{fmtCurrency(caYTD)}</div><div className="text-iris-100 text-xs font-normal">Marge {tauxMarge.toFixed(1)}%</div></td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div className="hidden md:flex px-4 py-2 border-t border-neutral-50 gap-4 text-xs text-neutral-300 flex-wrap">
          <span>Cliquer sur les jours pour modifier · Pastille pour le statut livraison</span>
          <span className="ml-auto"><span className="inline-block w-2 h-2 rounded-full bg-neutral-300 mr-1 align-middle"/>Réalisé</span>
          <span><span className="inline-block w-2 h-2 rounded-full bg-azure-200 mr-1 align-middle"/>Livré</span>
          <span><span className="inline-block w-2 h-2 rounded-full bg-jade-200 mr-1 align-middle"/>Réceptionné</span>
          <span><span className="inline-block w-3 h-3 rounded mr-1 align-middle" style={{background:'rgba(34,197,94,0.3)'}}></span>Début</span>
          <span><span className="inline-block w-3 h-3 rounded mr-1 align-middle" style={{background:'rgba(239,68,68,0.3)'}}></span>Fin</span>
        </div>
      </div>

      {selected&&<MissionDetail mission={selected} histMissions={histMissions} contacts={contacts||[]} taches={taches||[]} missions={missions||[]} besoins={besoins||[]} profile={profile} allProfiles={allProfiles} onClose={()=>setSelected(null)} onRefresh={()=>{setSelected(null);onRefresh();}} onNavToContact={onNavToContact} onNavToBesoin={onNavToBesoin} onNavToTache={onNavToTache}/>}
      {showAdd&&<MissionFormModal profile={profile} allProfiles={allProfiles} contacts={contacts||[]} besoins={besoins||[]} onClose={()=>setShowAdd(false)} onSaved={()=>{setShowAdd(false);onRefresh();}}/>}
    </div>
  );
}

// ── Modal : Changer mot de passe ──────────────────────────────────────────────
function ChangePasswordModal({ onClose }) {
  const [pwd,setPwd]=useState(''); const [pwd2,setPwd2]=useState('');
  const [saving,setSaving]=useState(false); const [err,setErr]=useState(''); const [ok,setOk]=useState(false);
  const save = async () => {
    if (pwd.length < 6)          { setErr('Le mot de passe doit faire au moins 6 caractères.'); return; }
    if (pwd !== pwd2)             { setErr('Les mots de passe ne correspondent pas.'); return; }
    setSaving(true); setErr('');
    const { error } = await sb.auth.updateUser({ password: pwd });
    if (error) { setErr(error.message); setSaving(false); }
    else       { setOk(true); }
  };
  return (
    <Modal title={<><Icon d={ICONS.key} size={14}/> Changer mon mot de passe</>} onClose={onClose}
      footer={ok ? <button onClick={onClose} className="px-4 py-2 bg-jade-100 text-white text-sm font-medium hover:opacity-80">Fermer</button>
                 : <><button onClick={onClose} className="px-4 py-2 text-sm text-slate hover:text-carbon">Annuler</button><button onClick={save} disabled={saving||!pwd||!pwd2} className="px-4 py-2 bg-midnight text-white text-sm font-medium hover:bg-carbon disabled:opacity-50 btn-brutal">{saving?'Enregistrement...':'Enregistrer'}</button></>}>
      {ok
        ? <div className="text-center py-4"><div className="text-3xl mb-2"><Icon d={ICONS.check} size={32}/></div><div className="text-sm text-jade-100 font-medium">Mot de passe mis à jour avec succès !</div></div>
        : <>
            <Field label="Nouveau mot de passe"><input type="password" autoFocus value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Min. 6 caractères" className={inputCls}/></Field>
            <Field label="Confirmer le mot de passe"><input type="password" value={pwd2} onChange={e=>setPwd2(e.target.value)} placeholder="Répéter le mot de passe" className={inputCls}/></Field>
            {err && <div className="text-xs text-coral-100 bg-coral-20 rounded px-3 py-2">{err}</div>}
          </>
      }
    </Modal>
  );
}

// ── TabSettings — Page Paramètres ──────────────────────────────────────────────
function TabSettings({ user, profile, taches, subTab, onSubTabChange, prefs, onSavePrefs }) {
  const SUB_TABS=[{id:'profil',label:'Profil & Sécurité'},{id:'calendrier',label:'Calendrier ICS'},{id:'preferences',label:'Préférences'}];
  // Password change (inline)
  const [pwd,setPwd]=useState(''); const [pwd2,setPwd2]=useState('');
  const [pwdSaving,setPwdSaving]=useState(false); const [pwdErr,setPwdErr]=useState(''); const [pwdOk,setPwdOk]=useState(false);
  const savePwd = async () => {
    if(pwd.length<6){setPwdErr('Le mot de passe doit faire au moins 6 caractères.');return;}
    if(pwd!==pwd2){setPwdErr('Les mots de passe ne correspondent pas.');return;}
    setPwdSaving(true);setPwdErr('');
    const {error}=await sb.auth.updateUser({password:pwd});
    if(error){setPwdErr(error.message);setPwdSaving(false);}
    else{setPwdOk(true);setPwd('');setPwd2('');setPwdSaving(false);}
  };
  // Calendar sync
  const [calToken,setCalToken]=useState(null); const [calLoading,setCalLoading]=useState(true);
  const [calCopied,setCalCopied]=useState(false); const [calInstrTab,setCalInstrTab]=useState('outlook');
  const calUrl=calToken?`${SUPABASE_URL}/functions/v1/calendar-ics?token=${calToken.token}`:'';
  const tachesWithDate=useMemo(()=>(taches||[]).filter(t=>t.due_date&&t.statut!=='fait'&&t.statut!=='annule'),[taches]);
  const fetchToken=useCallback(async()=>{
    setCalLoading(true);
    const {data}=await sb.from('user_calendar_tokens').select('*').eq('user_id',user.id).eq('is_active',true).maybeSingle();
    setCalToken(data||null);setCalLoading(false);
  },[user.id]);
  useEffect(()=>{fetchToken();},[fetchToken]);
  const activateCal=async()=>{
    const {data,error}=await sb.from('user_calendar_tokens').insert({user_id:user.id}).select().single();
    if(!error)setCalToken(data);
  };
  const deactivateCal=async()=>{
    if(!calToken)return;
    await sb.from('user_calendar_tokens').update({is_active:false}).eq('id',calToken.id);
    setCalToken(null);
  };
  const revokeCal=async()=>{
    if(!calToken)return;
    if(!confirm('Révoquer le token actuel ? L\'ancienne URL ne fonctionnera plus.'))return;
    await sb.from('user_calendar_tokens').delete().eq('id',calToken.id);
    const {data}=await sb.from('user_calendar_tokens').insert({user_id:user.id}).select().single();
    setCalToken(data||null);
  };
  const copyUrl=()=>{navigator.clipboard.writeText(calUrl);setCalCopied(true);setTimeout(()=>setCalCopied(false),2000);};

  return (
    <div className="tab-content max-w-2xl mx-auto">
      <div className="flex items-center gap-4 mb-6">
        <h1 className="text-xl font-bold text-midnight">Paramètres</h1>
      </div>
      <div className="flex gap-1 mb-6 border-b">
        {SUB_TABS.map(t=>(
          <button key={t.id} onClick={()=>onSubTabChange(t.id)} className={`px-4 py-2.5 text-sm font-medium border-b-2 transition-colors ${subTab===t.id?'border-midnight text-azure-100':'border-transparent text-slate hover:text-carbon'}`}>
            {t.label}{t.id==='calendrier'&&!calLoading&&!calToken&&<span className="ml-2 text-[10px] bg-azure-20 text-azure-100 px-1.5 py-0.5 rounded-full font-semibold">NEW</span>}
          </button>
        ))}
      </div>

      {subTab==='profil'&&(
        <div className="space-y-6">
          <div className="bg-white border-2 border-neutral-200 p-6">
            <h3 className="font-semibold text-midnight mb-4">Informations du compte</h3>
            <div className="grid grid-cols-2 gap-4">

  const origPrefs=()=>({default_tab:prefs.default_tab||'taches',taches_view:prefs.taches_view||'list',besoins_view:prefs.besoins_view||'list',pipe_ventilation:prefs.pipe_ventilation||'agence',tdb_default_chart:prefs.tdb_default_chart||'ca',filter_responsable:prefs.filter_responsable===undefined?'moi':prefs.filter_responsable,besoins_filter_agence:prefs.besoins_filter_agence||'',missions_filter_agence:prefs.missions_filter_agence||'',missions_filter_statut:prefs.missions_filter_statut||''});
  const hasChanges=JSON.stringify(buildPrefs())!==JSON.stringify(origPrefs());

  const segGroup={display:'inline-flex',background:'#f1f5f9',borderRadius:10,padding:3,gap:2,border:'1px solid #e2e8f0'};
  const segBtn=(active)=>({padding:'6px 14px',borderRadius:8,fontSize:13,fontWeight:active?600:400,color:active?'#1d4ed8':'#64748b',background:active?'white':'transparent',boxShadow:active?'0 1px 3px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04)':'none',border:'none',cursor:'pointer',transition:'all .15s'});
  const cardCls="bg-white border-2 border-neutral-100 p-5 sm:p-6";

            <span className="text-sm text-carbon font-medium">Missions — KPI</span>
            <div style={segGroup}>
              <button onClick={()=>setTdbChart('ca')} style={segBtn(tdbChart==='ca')}>CA</button>

      {/* Card 3 — Filtres par défaut */}
      <div className={cardCls}>

            <Icon d={ICONS.search} size={18}/>

            <h3 className="font-bold text-midnight text-sm">Filtres par défaut</h3>

            <label className="block text-sm font-medium text-carbon mb-1.5">Responsable — Tâches & Contacts</label>
            <select value={filtResp} onChange={e=>setFiltResp(e.target.value)} style={selectStyle}>

function App() {
  const [user,setUser]=useState(undefined); const [profile,setProfile]=useState(null);
  const [prefs,setPrefs]=useState({});
  const [data,setData]=useState(null); const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null); const [tab,setTab]=useState(()=>localStorage.getItem('crm_tab')||'taches');
  useEffect(()=>{if(tab!=='settings')localStorage.setItem('crm_tab',tab);},[tab]);
  useEffect(()=>{if(prefs.default_tab&&!localStorage.getItem('crm_tab'))setTab(prefs.default_tab);},[prefs.default_tab]);
  const [lastRefresh,setLastRefresh]=useState(null);
  const [viewAs,setViewAs]=useState(null); const [allProfiles,setAllProfiles]=useState([]);
  const [tachesNavKey,setTachesNavKey]=useState(0); const [tachesNavEcheance,setTachesNavEcheance]=useState('');
  const navToTaches = echeance => { setTab('taches'); setTachesNavEcheance(echeance); setTachesNavKey(k=>k+1); };
  // Cross-tab navigation
  const [navContactId,setNavContactId]=useState(null); const [navContactKey,setNavContactKey]=useState(0);
  const [navBesoinId,setNavBesoinId]=useState(null); const [navBesoinKey,setNavBesoinKey]=useState(0);
  const [navMissionId,setNavMissionId]=useState(null); const [navMissionKey,setNavMissionKey]=useState(0);
  const [navTacheId,setNavTacheId]=useState(null); const [navTacheKey,setNavTacheKey]=useState(0);
  const navToContact = id => { setTab('prospects'); setNavContactId(id); setNavContactKey(k=>k+1); };
  const navToBesoin = id => { setTab('besoins'); setNavBesoinId(id); setNavBesoinKey(k=>k+1); };
  const navToMission = id => { setTab('tdb'); setNavMissionId(id); setNavMissionKey(k=>k+1); };
  const navToTache = id => { setTab('taches'); setNavTacheId(id); setNavTacheKey(k=>k+1); };

  useEffect(()=>{
    sb.auth.getUser().then(({data:{user}})=>setUser(user||null));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
      if(!session){setProfile(null);setData(null);}
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const fetchAll = useCallback(async ()=>{
    setLoading(true); setError(null);
    try {
      const [
        {data:contacts,  error:e1},{data:historique,error:e2},
        {data:taches,    error:e3},{data:besoins,   error:e4},
        {data:missions,  error:e5},{data:histMiss,  error:e6},
        {data:besoinCandidats,error:e7},
      ] = await Promise.all([
        sb.from('contacts').select('*').order('id'),
        sb.from('historique_actions').select('*').order('date',{ascending:false}).limit(2000),
        sb.from('taches').select('*').order('due_date',{ascending:true,nullsFirst:false}),
        sb.from('besoins').select('*').order('created_at',{ascending:false}),
        sb.from('missions').select('*').order('consultant'),
        sb.from('historique_missions').select('*').order('date',{ascending:false}),
        sb.from('besoin_candidats').select('*').order('created_at',{ascending:true}),
      ]);
      const err=e1||e2||e3||e4;
      if(err) throw new Error(err.message);
      // e5/e6/e7 peuvent échouer si tables pas encore créées — on ignore silencieusement
      const mList=missions||[];
      // Auto-status missions : New→En cours si démarrée, En cours→Terminée si date fin dépassée
      const today=new Date().toISOString().slice(0,10);
      const autoUpdates=mList.filter(m=>{
        if(m.statut==='New'&&m.date_debut_mission&&m.date_debut_mission.slice(0,10)<=today) return true;
        if(m.statut==='En cours'&&m.date_fin_mission&&m.date_fin_mission.slice(0,10)<today) return true;
        return false;
      });
      if(autoUpdates.length>0){
        await Promise.all(autoUpdates.map(m=>{
          const newStatut=m.statut==='New'?'En cours':'Terminée';
          m.statut=newStatut;
          return sb.from('missions').update({statut:newStatut}).eq('id',m.id);
        }));
      }
      // Auto-passage en Client des référents liés à une mission active
      if(contacts&&mList.length>0){
        const contactMap=Object.fromEntries(contacts.map(c=>[c.id,c]));
        const toClient=mList.filter(m=>m.contact_referent_id&&(m.statut==='En cours'||m.statut==='New')).map(m=>contactMap[m.contact_referent_id]).filter(c=>c&&c.statut!=='Client');
        const uniqueIds=[...new Set(toClient.map(c=>c.id))];
        if(uniqueIds.length>0){
          await Promise.all(uniqueIds.map(id=>{
            const c=contactMap[id]; if(c) c.statut='Client';
            return sb.from('contacts').update({statut:'Client',updated_at:new Date().toISOString()}).eq('id',id);
          }));
        }
      }
      setData({contacts,historique,taches,besoins,missions:mList,histMissions:histMiss||[],besoinCandidats:besoinCandidats||[]});
      setLastRefresh(new Date().toLocaleTimeString('fr-FR'));
    } catch(err){ setError(err.message); } finally{ setLoading(false); }
  },[]);

  useEffect(()=>{
    if(!user) return;
    sb.from('profiles').select('*').eq('id',user.id).single().then(({data:p})=>{setProfile(p);setPrefs(p?.preferences||{});});

  },[tab]);
  // Keyboard shortcuts
  useEffect(()=>{
    const h=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'||e.target.isContentEditable)return;
      if(e.key==='1'){e.preventDefault();setTab('taches');}
      if(e.key==='2'){e.preventDefault();setTab('prospects');}
      if(e.key==='3'){e.preventDefault();setTab('besoins');}
      if(e.key==='4'){e.preventDefault();setTab('pipe');}
      if(e.key==='5'){e.preventDefault();setTab('tdb');}
      if(e.key==='6'){e.preventDefault();setTab('historique');}
      if(e.key==='r'&&!e.metaKey&&!e.ctrlKey){e.preventDefault();fetchAll();}
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[fetchAll]);
  // Enter on hover → open detail
  useEffect(()=>{
    const h=e=>{
      if(e.key!=='Enter'||e.defaultPrevented) return;
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'||e.target.tagName==='BUTTON'||e.target.isContentEditable) return;
      const el=document.querySelector('[data-detail]:hover')||document.activeElement?.closest?.('[data-detail]');
      if(el){e.preventDefault();el.click();}
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);

  if(user===undefined) return <Loader label="Vérification de la session..."/>;
  if(!user) return <LoginScreen/>;
  if(!data||!profile) return <Loader label="Chargement depuis Supabase..."/>;
  if(error) return <div className="flex items-center justify-center min-h-screen"><div className="bg-coral-20 border border-coral-20 p-6 max-w-md text-center"><div className="text-3xl mb-3">❌</div><div className="font-semibold text-coral-100">Erreur Supabase</div><div className="text-sm text-coral-100 mt-2 font-mono">{error}</div><button onClick={fetchAll} className="mt-4 px-4 py-2 bg-coral-100 text-white rounded-lg text-sm">Réessayer</button></div></div>;

  const commerciauxParAgence={};
  allProfiles.forEach(p=>{if(p.agence&&p.nom){if(!commerciauxParAgence[p.agence])commerciauxParAgence[p.agence]=[];commerciauxParAgence[p.agence].push(p.nom);}});

  const activeIsAdmin = activeProfile.role==='admin';

  const vContacts   = contacts; // tous voient tous les contacts
  const vHistorique = activeIsAdmin ? historique : historique.filter(h=>h.responsable===activeProfile.nom);
  const vTaches     = activeIsAdmin ? taches     : taches.filter(t=>t.responsable===activeProfile.nom);
  const vMissions   = activeIsAdmin ? missions   : missions.filter(m=>m.responsable===activeProfile.nom);
  const vBesoins    = activeIsAdmin ? besoins    : besoins.filter(b=>contactAgenceMap[String(b.contact_id)]===activeProfile.agence||b.agence===activeProfile.agence);
  const vHistMiss   = histMissions; // filtré par missions déjà

  const tachesActives=vTaches.filter(t=>t.statut!=='fait'&&t.statut!=='annule');

  const TABS=[

    {id:'prospects',  label:<><Icon d={ICONS.person} size={14}/> Contacts ({vContacts.length})</>},
    {id:'besoins',    label:<><Icon d={ICONS.target} size={14}/> Besoins ({vBesoins.length})</>},
    {id:'pipe',       label:<><Icon d={ICONS.chart} size={14}/> Pipe ({besoinsPipeActifs.length})</>},
    {id:'tdb',        label:<><Icon d={ICONS.work} size={14}/> Missions ({vMissions.length})</>},
    {id:'historique', label:<><Icon d={ICONS.history} size={14}/> Historique ({vHistorique.length})</>},
  ];

                  </div>}
                  <div className="py-1">
                    <button onClick={()=>{logout();setShowMenu(false);}} className="text-coral-100 hover:bg-coral-20"><Icon d={ICONS.logout} size={14}/> Déconnexion</button>
                  </div>
                </div>
              </>}
            </div>
          </div>
        </div>
        <div ref={tabsRef} role="tablist" aria-label="Navigation CRM" className="max-w-7xl mx-auto px-2 sm:px-4 flex gap-1 pb-0 mobile-tabs">
          {TABS.map((t,i)=>{
            const c=TAB_COLORS[t.id]||'#fff';
            const active=tab===t.id;
            return <button key={t.id} role="tab" aria-selected={active} data-active={active?'true':undefined} onClick={()=>setTab(t.id)} style={active?{background:c,color:c==='#FFEA2F'||c==='#FF78FD'?'#000':'#fff'}:{}} className={`px-4 py-2.5 text-sm font-medium transition-colors whitespace-nowrap ${active?'':'text-slate hover:text-carbon'}`}>
              {t.label}<span className="hidden sm:inline text-xs opacity-40 ml-1">{i+1}</span>
            </button>;
          })}
        </div>
      </div>
      {viewAs&&(
        <div className="bg-lemon-100 text-midnight text-center text-xs py-2 font-semibold flex items-center justify-center gap-3 uppercase tracking-wide">
          <span><Icon d={ICONS.eye} size={14}/> Vue simulée : <strong>{viewAs.nom}</strong> · {viewAs.agence} · {viewAs.role}</span>
          <button onClick={()=>setViewAs(null)} className="bg-midnight text-white px-3 py-1 font-semibold hover:opacity-80 text-[10px] uppercase">Quitter</button>
        </div>
      )}
      <div id="main-content" role="main" className="max-w-7xl mx-auto px-2 sm:px-4 py-4 sm:py-6">
        {tab==='prospects'&&<TabProspects contacts={vContacts} contactMap={contactMap} historique={vHistorique} taches={vTaches} missions={vMissions} besoins={vBesoins} profile={activeProfile} allProfiles={allProfiles} commerciauxParAgence={commerciauxParAgence} onRefresh={fetchAll} navContactId={navContactId} navContactKey={navContactKey} onNavToBesoin={navToBesoin} onNavToMission={navToMission} onNavToTache={navToTache} prefs={prefs}/>}
        {tab==='taches'   &&<TabTaches   taches={vTaches} contacts={vContacts} contactMap={contactMap} besoins={vBesoins} missions={vMissions} historique={vHistorique} profile={activeProfile} allProfiles={allProfiles} onRefresh={fetchAll} navKey={tachesNavKey} navEcheance={tachesNavEcheance} navTacheId={navTacheId} navTacheKey={navTacheKey} onNavToContact={navToContact} onNavToBesoin={navToBesoin} onNavToMission={navToMission} prefs={prefs}/>}
        {tab==='besoins'  &&<TabBesoins  contacts={vContacts} contactMap={contactMap} besoins={vBesoins} besoinCandidats={besoinCandidats} historique={vHistorique} taches={vTaches} missions={vMissions} profile={activeProfile} allProfiles={allProfiles} commerciauxParAgence={commerciauxParAgence} onRefresh={fetchAll} navBesoinId={navBesoinId} navBesoinKey={navBesoinKey} onNavToContact={navToContact} onNavToMission={navToMission} onNavToTache={navToTache} prefs={prefs}/>}
        {tab==='pipe'     &&<TabPipe    besoins={vBesoins} contacts={vContacts} contactMap={contactMap} besoinCandidats={besoinCandidats} historique={vHistorique} taches={vTaches} missions={vMissions} profile={activeProfile} allProfiles={allProfiles} onRefresh={fetchAll} prefs={prefs}/>}
        {tab==='historique'&&<TabHistorique historique={vHistorique} contacts={vContacts} contactMap={contactMap} taches={vTaches} besoins={vBesoins} profile={activeProfile} allProfiles={allProfiles} onRefresh={fetchAll} onNavToContact={navToContact} onNavToBesoin={navToBesoin} onNavToTache={navToTache}/>}
        {tab==='tdb'      &&<TabTDB      missions={vMissions} histMissions={vHistMiss} contacts={vContacts} taches={vTaches} besoins={vBesoins} profile={activeProfile} allProfiles={allProfiles} commerciauxParAgence={commerciauxParAgence} onRefresh={fetchAll} navMissionId={navMissionId} navMissionKey={navMissionKey} onNavToContact={navToContact} onNavToBesoin={navToBesoin} onNavToTache={navToTache} prefs={prefs}/>}
        {tab==='settings' &&<TabSettings user={user} profile={profile} taches={vTaches} subTab={settingsSubTab} onSubTabChange={setSettingsSubTab} prefs={prefs} onSavePrefs={savePrefs}/>}
      </div>
      {/* Shortcuts modal */}
      {showShortcuts&&(
        <Modal title={<><Icon d={ICONS.keyboard} size={14}/> Raccourcis clavier</>} onClose={()=>setShowShortcuts(false)}>
          <div className="space-y-2 text-sm">
            {[['1–6','Changer d\'onglet'],['Entrée','Ouvrir le panneau / modal (au survol)'],['Échap','Fermer le panneau / modal'],['R','Rafraîchir les données']].map(([k,d])=>(
              <div key={k} className="flex items-center gap-3">
                <kbd className="px-2 py-1 bg-neutral-100 border rounded text-xs font-mono font-semibold text-carbon min-w-[40px] text-center">{k}</kbd>
                <span className="text-slate">{d}</span>
              </div>
            ))}
          </div>
        </Modal>
      )}
      <ToastContainer/>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
