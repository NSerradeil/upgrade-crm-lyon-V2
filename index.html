<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Lyon — Live ⚡</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const SUPABASE_URL = "https://ehfseahxoivfhmpiyoqa.supabase.co";
const SUPABASE_KEY = "sb_publishable_BaNIdlZ09xavRRhG0G-ScQ_mW4hVueJ";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const TODAY = new Date().toISOString().slice(0, 10);

const STATUTS_CONTACT  = ['Prospect','Candidat','Client','Consultant CDI','CDI','Freelance','Prestataire','À définir'];
const TYPES_ACTION     = ['Tel','Mail envoyé','Mail reçu','RDV','LinkedIn','Note interne','Autre'];
const TYPES_HIST_MISS  = ['Appel consultant','Mail','RDV consultant','CR mensuel reçu','CRA validé','Suivi client','Suivi Upgrade','Note interne','Autre'];
const MOIS_LABELS      = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const MOIS_KEYS        = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];

function daysSince(d) {
  if (!d) return 999;
  return Math.floor((new Date() - new Date(d)) / 86400000);
}
function fmtCurrency(n) {
  if (n >= 1000000) return `${(n/1000000).toFixed(2)}M€`;
  if (n >= 1000)    return `${(n/1000).toFixed(1)}k€`;
  return `${Math.round(n)}€`;
}

const STATUT_STYLE = {
  'Consultant CDI': { bg:'#dde4f5', color:'#1a237e' },
  'CDI':            { bg:'#dde4f5', color:'#1a237e' },
  'Freelance':      { bg:'#f3e8ff', color:'#6b21a8' },
  'Client':         { bg:'#dcfce7', color:'#166534' },
  'Candidat':       { bg:'#cffafe', color:'#0e7490' },
  'Prestataire':    { bg:'#ccfbf1', color:'#115e59' },
  'Prospect':       { bg:'#f3f4f6', color:'#4b5563' },
  'À définir':      { bg:'#fef9c3', color:'#92400e' },
};
function StatutBadge({ statut }) {
  const st = STATUT_STYLE[statut] || STATUT_STYLE['Prospect'];
  return <span style={{ backgroundColor:st.bg, color:st.color, padding:'2px 8px', borderRadius:9999, fontSize:11, fontWeight:600, whiteSpace:'nowrap' }}>{statut||'Prospect'}</span>;
}
function BesoinBadge({ statut }) {
  const c = ({ 'Besoin Gagné':{bg:'#dcfce7',color:'#166534'}, 'Profil proposé':{bg:'#e0f2fe',color:'#0369a1'}, 'Entretien programmé':{bg:'#fef9c3',color:'#92400e'}, 'Entretien passé':{bg:'#fef3c7',color:'#b45309'}, 'Besoin ouvert':{bg:'#f0fdf4',color:'#15803d'}, 'Opportunité':{bg:'#ede9fe',color:'#5b21b6'}, 'Besoin Perdu':{bg:'#fee2e2',color:'#991b1b'}, 'Push opportuniste':{bg:'#f3f4f6',color:'#6b7280'} })[statut] || {bg:'#f3f4f6',color:'#6b7280'};
  return <span style={{ backgroundColor:c.bg, color:c.color, padding:'2px 8px', borderRadius:9999, fontSize:11, fontWeight:600 }}>{statut}</span>;
}
function MissionStatutBadge({ statut }) {
  const s = ({ 'En cours':{bg:'#dcfce7',color:'#166534'}, 'Intercontrat':{bg:'#fef3c7',color:'#92400e'}, 'Terminée':{bg:'#f3f4f6',color:'#6b7280'}, 'New':{bg:'#e0f2fe',color:'#0369a1'} })[statut] || {bg:'#f3f4f6',color:'#6b7280'};
  return <span style={{ backgroundColor:s.bg, color:s.color, padding:'2px 7px', borderRadius:9999, fontSize:11, fontWeight:600, whiteSpace:'nowrap' }}>{statut}</span>;
}
function Loader({ label }) {
  return <div className="flex flex-col items-center justify-center min-h-screen gap-4"><div className="spin text-4xl">⚡</div><div className="text-gray-500 text-sm">{label}</div></div>;
}

// ── Login ─────────────────────────────────────────────────────────────────────
function LoginScreen() {
  const [email,setEmail]=useState(''); const [pwd,setPwd]=useState('');
  const [loading,setLoading]=useState(false); const [err,setErr]=useState('');
  const submit = async (e) => {
    e.preventDefault(); setLoading(true); setErr('');
    const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if (error) { setErr('Email ou mot de passe incorrect.'); setLoading(false); }
  };
  return (
    <div className="min-h-screen bg-gray-50 flex items-center justify-center px-4">
      <div className="bg-white rounded-2xl shadow-xl border border-gray-100 p-8 w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="text-3xl mb-2">📊</div>
          <h1 className="text-xl font-bold text-gray-900">CRM Lyon</h1>
          <p className="text-sm text-gray-400 mt-1">Connectez-vous pour accéder au CRM</p>
        </div>
        <form onSubmit={submit} className="space-y-4">
          <div>
            <label className="block text-xs font-medium text-gray-500 mb-1">Email</label>
            <input type="email" required autoFocus value={email} onChange={e=>setEmail(e.target.value)}
              className="w-full px-4 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" placeholder="votre@email.com" />
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-500 mb-1">Mot de passe</label>
            <input type="password" required value={pwd} onChange={e=>setPwd(e.target.value)}
              className="w-full px-4 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" placeholder="••••••••" />
          </div>
          {err && <div className="text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2">{err}</div>}
          <button type="submit" disabled={loading}
            className="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium disabled:opacity-50">
            {loading ? 'Connexion...' : 'Se connecter'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── Modal générique ───────────────────────────────────────────────────────────
function Modal({ title, onClose, children, footer }) {
  return (
    <div className="fixed inset-0 bg-black/40 z-[60] flex items-center justify-center px-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="font-bold text-gray-900">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-2xl leading-none">×</button>
        </div>
        <div className="space-y-3">{children}</div>
        {footer && <div className="flex gap-3 mt-5 justify-end">{footer}</div>}
      </div>
    </div>
  );
}
function Field({ label, children }) {
  return <div><label className="block text-xs font-medium text-gray-500 mb-1">{label}</label>{children}</div>;
}
const inputCls = "w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300";

// ── Modals Contacts ───────────────────────────────────────────────────────────
function ContactEditModal({ contact, profile, onClose, onSaved }) {
  const [f,setF] = useState({ telephone:contact.telephone||'', email:contact.email||'', commentaires:contact.commentaires||'', date_relance:contact.date_relance||'', statut:contact.statut||'Prospect', ville:contact.ville||'', role:contact.role||'', groupe:contact.groupe||'' });
  const [saving,setSaving]=useState(false); const [err,setErr]=useState('');
  const s = k => e => setF(v=>({...v,[k]:e.target.value}));
  const save = async () => {
    setSaving(true);
    const { error } = await sb.from('contacts').update({ telephone:f.telephone||null, email:f.email||null, commentaires:f.commentaires||null, date_relance:f.date_relance||null, statut:f.statut, ville:f.ville||null, role:f.role||null, groupe:f.groupe||null, updated_at:new Date().toISOString() }).eq('id',contact.id);
    if (error) { setErr(error.message); setSaving(false); }
    else {
      const changes = [];
      if (f.statut !== (contact.statut||'Prospect')) changes.push(`statut → ${f.statut}`);
      if ((f.groupe||'') !== (contact.groupe||'')) changes.push(`société → ${f.groupe||'(vide)'}`);
      if ((f.ville||'') !== (contact.ville||'')) changes.push(`ville → ${f.ville||'(vide)'}`);
      const details = changes.length ? `Fiche modifiée : ${changes.join(', ')}` : 'Fiche contact modifiée';
      await sb.from('historique_actions').insert({ id_prospect:contact.id, date:TODAY, type_action:'Note interne', details, responsable:profile?.nom||contact.responsable });
      onSaved();
    }
  };
  return (
    <Modal title={`✏️ Modifier — ${contact.prenom} ${contact.nom}`} onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Annuler</button><button onClick={save} disabled={saving} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">{saving?'Enregistrement...':'Enregistrer'}</button></>}>
      {[['Groupe / Société','groupe','text'],['Rôle / Poste','role','text'],['Ville','ville','text'],['Téléphone','telephone','tel'],['Email','email','email']].map(([l,k,t])=>(
        <Field key={k} label={l}><input type={t} value={f[k]} onChange={s(k)} className={inputCls}/></Field>
      ))}
      <div className="grid grid-cols-2 gap-3">
        <Field label="Statut"><select value={f.statut} onChange={s('statut')} className={inputCls}>{STATUTS_CONTACT.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
        <Field label="Date de relance"><input type="date" value={f.date_relance} onChange={s('date_relance')} className={inputCls}/></Field>
      </div>
      <Field label="Commentaires"><textarea rows={3} value={f.commentaires} onChange={s('commentaires')} className={inputCls+' resize-none'}/></Field>
      {err && <div className="text-xs text-red-600 bg-red-50 rounded px-3 py-2">{err}</div>}
    </Modal>
  );
}
function AddHistoriqueModal({ contact, profile, onClose, onSaved }) {
  const [f,setF] = useState({ date:TODAY, type_action:'Tel', details:'', responsable:profile.nom });
  const [saving,setSaving]=useState(false);
  const save = async () => {
    setSaving(true);
    const { error } = await sb.from('historique_actions').insert({ id_prospect:contact.id, date:f.date, type_action:f.type_action, details:f.details||null, responsable:f.responsable });
    if (!error) onSaved(); else setSaving(false);
  };
  return (
    <Modal title={`➕ Action — ${contact.prenom} ${contact.nom}`} onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Annuler</button><button onClick={save} disabled={saving} className="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 disabled:opacity-50">{saving?'Enregistrement...':'+ Ajouter'}</button></>}>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Date"><input type="date" value={f.date} onChange={e=>setF(v=>({...v,date:e.target.value}))} className={inputCls}/></Field>
        <Field label="Type"><select value={f.type_action} onChange={e=>setF(v=>({...v,type_action:e.target.value}))} className={inputCls}>{TYPES_ACTION.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
      </div>
      <Field label="Détails"><textarea rows={3} value={f.details} onChange={e=>setF(v=>({...v,details:e.target.value}))} placeholder="Notes sur l'échange..." className={inputCls+' resize-none'}/></Field>
    </Modal>
  );
}
function AddTacheModal({ contacts, profile, onClose, onSaved, defaultContactId }) {
  const [f,setF] = useState({ titre:'', due_date:'', contact_id:defaultContactId?String(defaultContactId):'', notes:'', responsable:profile.nom });
  const [saving,setSaving]=useState(false);
  const myContacts = useMemo(()=>contacts.filter(c=>profile.role==='admin'||c.responsable===profile.nom).sort((a,b)=>(a.nom||'').localeCompare(b.nom||'')),[contacts,profile]);
  const save = async () => {
    if (!f.titre.trim()) return; setSaving(true);
    const { error } = await sb.from('taches').insert({ id:`tw_${Date.now()}`, titre:f.titre.trim(), statut:'a_faire', due_date:f.due_date||null, contact_id:f.contact_id?parseInt(f.contact_id):null, notes:f.notes||null, responsable:f.responsable });
    if (!error) onSaved(); else setSaving(false);
  };
  return (
    <Modal title="✅ Nouvelle tâche" onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Annuler</button><button onClick={save} disabled={saving||!f.titre.trim()} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">{saving?'Enregistrement...':'+ Créer'}</button></>}>
      <Field label="Titre *"><input type="text" value={f.titre} autoFocus onChange={e=>setF(v=>({...v,titre:e.target.value}))} placeholder="Ex: Relance tel Dupont" className={inputCls}/></Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Échéance"><input type="date" value={f.due_date} onChange={e=>setF(v=>({...v,due_date:e.target.value}))} className={inputCls}/></Field>
        <Field label="Contact lié">
          <select value={f.contact_id} onChange={e=>setF(v=>({...v,contact_id:e.target.value}))} className={inputCls}>
            <option value="">Aucun</option>
            {myContacts.map(c=><option key={c.id} value={c.id}>{c.prenom} {c.nom} — {c.groupe}</option>)}
          </select>
        </Field>
      </div>
      <Field label="Notes"><textarea rows={2} value={f.notes} onChange={e=>setF(v=>({...v,notes:e.target.value}))} className={inputCls+' resize-none'}/></Field>
    </Modal>
  );
}
function AddContactModal({ profile, onClose, onSaved }) {
  const [f,setF] = useState({ prenom:'', nom:'', groupe:'', ville:'', role:'', telephone:'', email:'', statut:'Prospect', responsable:profile.nom, commentaires:'' });
  const [saving,setSaving]=useState(false); const [err,setErr]=useState('');
  const s = k => e => setF(v=>({...v,[k]:e.target.value}));
  const save = async () => {
    if (!f.nom.trim()) { setErr('Le nom est obligatoire.'); return; }
    setSaving(true);
    const { data:maxRow } = await sb.from('contacts').select('id').order('id',{ascending:false}).limit(1);
    const nextId = (maxRow?.[0]?.id||0)+1;
    const { error } = await sb.from('contacts').insert({ id:nextId, prenom:f.prenom||null, nom:f.nom.trim(), groupe:f.groupe||null, ville:f.ville||null, role:f.role||null, telephone:f.telephone||null, email:f.email||null, statut:f.statut, responsable:f.responsable, commentaires:f.commentaires||null, nb_relance:0, updated_at:new Date().toISOString(), agence:profile.agence||'Lyon' });
    if (error) { setErr(error.message); setSaving(false); }
    else {
      await sb.from('historique_actions').insert({ id_prospect:nextId, date:TODAY, type_action:'Note interne', details:`Contact créé (statut : ${f.statut})`, responsable:f.responsable });
      onSaved();
    }
  };
  return (
    <Modal title="👤 Nouveau contact" onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Annuler</button><button onClick={save} disabled={saving} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">{saving?'Enregistrement...':'+ Créer'}</button></>}>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Prénom"><input type="text" value={f.prenom} autoFocus onChange={s('prenom')} className={inputCls}/></Field>
        <Field label="Nom *"><input type="text" value={f.nom} onChange={s('nom')} className={inputCls}/></Field>
      </div>
      {[['Groupe / Société','groupe','text'],['Rôle / Poste','role','text'],['Ville','ville','text'],['Téléphone','telephone','tel'],['Email','email','email']].map(([l,k,t])=>(
        <Field key={k} label={l}><input type={t} value={f[k]} onChange={s(k)} className={inputCls}/></Field>
      ))}
      <div className="grid grid-cols-2 gap-3">
        <Field label="Statut"><select value={f.statut} onChange={s('statut')} className={inputCls}>{STATUTS_CONTACT.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
        <Field label="Responsable"><input type="text" value={f.responsable} onChange={s('responsable')} className={inputCls}/></Field>
      </div>
      <Field label="Commentaires"><textarea rows={2} value={f.commentaires} onChange={s('commentaires')} className={inputCls+' resize-none'}/></Field>
      {err && <div className="text-xs text-red-600 bg-red-50 rounded px-3 py-2">{err}</div>}
    </Modal>
  );
}

// ── Panel : Détail contact ────────────────────────────────────────────────────
function ContactDetail({ contact, historique, taches, profile, onClose, onRefresh }) {
  const [modal,setModal] = useState(null);
  const [deleting,setDeleting] = useState(false);
  const isOwner = profile.role==='admin' || contact.responsable===profile.nom;
  const hist = historique.filter(h=>h.id_prospect===contact.id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const tachesContact = taches.filter(t=>t.contact_id===contact.id&&t.statut!=='fait'&&t.statut!=='annule');
  const saved = () => { setModal(null); onRefresh(); };
  const handleDelete = async () => {
    setDeleting(true);
    await sb.from('historique_actions').insert({ id_prospect:contact.id, date:TODAY, type_action:'Note interne', details:`Contact supprimé par ${profile.nom}`, responsable:profile.nom });
    await sb.from('contacts').delete().eq('id',contact.id);
    onRefresh(); onClose();
  };
  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex justify-end" onClick={onClose}>
      <div className="w-full max-w-lg bg-white h-full overflow-y-auto shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="sticky top-0 bg-white border-b px-6 py-4 flex items-start justify-between">
          <div>
            <div className="font-bold text-lg">{contact.prenom} {contact.nom}</div>
            <div className="text-sm text-gray-500">{contact.groupe} · {contact.role}</div>
            <div className="mt-1"><StatutBadge statut={contact.statut}/></div>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-2xl leading-none mt-1">×</button>
        </div>
        <div className="p-6 space-y-6">
          {isOwner && (
            <div className="flex gap-2 flex-wrap">
              <button onClick={()=>setModal('edit')} className="px-3 py-1.5 text-xs bg-blue-50 text-blue-700 rounded-lg font-medium hover:bg-blue-100">✏️ Modifier</button>
              <button onClick={()=>setModal('hist')} className="px-3 py-1.5 text-xs bg-green-50 text-green-700 rounded-lg font-medium hover:bg-green-100">➕ Ajouter action</button>
              <button onClick={()=>setModal('tache')} className="px-3 py-1.5 text-xs bg-orange-50 text-orange-700 rounded-lg font-medium hover:bg-orange-100">✅ Ajouter tâche</button>
              {modal!=='confirmDel'
                ? <button onClick={()=>setModal('confirmDel')} className="px-3 py-1.5 text-xs bg-red-50 text-red-700 rounded-lg font-medium hover:bg-red-100">🗑️ Supprimer</button>
                : <div className="flex gap-2 items-center">
                    <span className="text-xs text-red-700 font-medium">Confirmer la suppression ?</span>
                    <button onClick={handleDelete} disabled={deleting} className="px-3 py-1.5 text-xs bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 disabled:opacity-50">{deleting?'...':'Oui'}</button>
                    <button onClick={()=>setModal(null)} className="px-3 py-1.5 text-xs text-gray-500 hover:text-gray-700">Annuler</button>
                  </div>
              }
            </div>
          )}
          <div className="grid grid-cols-2 gap-3 text-sm">
            <div><span className="text-gray-400">Ville</span><br/>{contact.ville||'—'}</div>
            <div><span className="text-gray-400">Responsable</span><br/>{contact.responsable||'—'}</div>
            {contact.email&&<div className="col-span-2"><span className="text-gray-400">Email</span><br/><a href={`mailto:${contact.email}`} className="text-blue-600 hover:underline">{contact.email}</a></div>}
            {contact.telephone&&<div><span className="text-gray-400">Tel</span><br/><a href={`tel:${contact.telephone}`} className="text-green-600 font-mono">{contact.telephone}</a></div>}
            {contact.linkedin&&<div><span className="text-gray-400">LinkedIn</span><br/><a href={contact.linkedin} target="_blank" className="text-blue-500 hover:underline text-xs">→ Profil</a></div>}
            {contact.date_relance&&<div className="col-span-2"><span className="text-gray-400">Relance</span><br/><span className={contact.date_relance<TODAY?'text-red-600 font-semibold':'text-gray-700'}>{contact.date_relance}</span></div>}
          </div>
          {contact.commentaires&&<div><div className="text-xs text-gray-400 font-semibold mb-1 uppercase tracking-wide">Commentaires</div><div className="text-sm text-gray-600 bg-gray-50 rounded-lg p-3 whitespace-pre-wrap">{contact.commentaires}</div></div>}
          {tachesContact.length>0&&(
            <div>
              <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Tâches actives</div>
              <div className="space-y-2">{tachesContact.map(t=>(
                <div key={t.id} className="flex items-start gap-2 bg-blue-50 rounded-lg p-3">
                  <span className="text-blue-400 mt-0.5">◆</span>
                  <div><div className="text-sm font-medium text-blue-900">{t.titre}</div>{t.due_date&&<div className="text-xs text-blue-600">Échéance : {t.due_date}</div>}</div>
                </div>
              ))}</div>
            </div>
          )}
          <div>
            <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Historique ({hist.length} actions)</div>
            {hist.length===0
              ? <div className="text-sm text-gray-400 italic">Aucune action enregistrée</div>
              : <div className="space-y-2">{hist.map((h,i)=>(
                  <div key={i} className="flex gap-3 text-sm border-l-2 border-gray-100 pl-3">

// ── Modal : Ajouter action mission ────────────────────────────────────────────
function AddHistMissionModal({ mission, profile, onClose, onSaved }) {
  const [f,setF] = useState({ date:TODAY, type_action:'Appel consultant', details:'', responsable:profile.nom });
  const [saving,setSaving]=useState(false);
  const save = async () => {
    setSaving(true);
    const { error } = await sb.from('historique_missions').insert({
      mission_id: mission.id, date:f.date, type_action:f.type_action,
      details:f.details||null, responsable:f.responsable,
    });
    if (!error) onSaved(); else setSaving(false);
  };
  return (
    <Modal title={`➕ Action — ${mission.consultant}`} onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Annuler</button><button onClick={save} disabled={saving} className="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 disabled:opacity-50">{saving?'Enregistrement...':'+ Ajouter'}</button></>}>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Date"><input type="date" value={f.date} onChange={e=>setF(v=>({...v,date:e.target.value}))} className={inputCls}/></Field>
        <Field label="Type"><select value={f.type_action} onChange={e=>setF(v=>({...v,type_action:e.target.value}))} className={inputCls}>{TYPES_HIST_MISS.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
      </div>
      <Field label="Détails"><textarea rows={3} value={f.details} onChange={e=>setF(v=>({...v,details:e.target.value}))} placeholder="Notes sur l'échange..." className={inputCls+' resize-none'}/></Field>
    </Modal>
  );
}

// ── Onglet Tâches ─────────────────────────────────────────────────────────────
function TabTaches({ taches, contacts, profile, onRefresh }) {
  const [search,setSearch]=useState(''); const [showAdd,setShowAdd]=useState(false);
  const [completing,setCompleting]=useState(null);
  const contactMap=useMemo(()=>Object.fromEntries(contacts.map(c=>[c.id,c])),[contacts]);
  const isAdmin=profile.role==='admin';
  const actives=useMemo(()=>taches.filter(t=>t.statut!=='fait'&&t.statut!=='annule').filter(t=>!search||(t.titre||'').toLowerCase().includes(search.toLowerCase())).map(t=>({...t,overdue:t.due_date&&t.due_date<TODAY})).sort((a,b)=>{if(a.overdue&&!b.overdue)return -1;if(!a.overdue&&b.overdue)return 1;return(a.due_date||'9999').localeCompare(b.due_date||'9999');}),[taches,search]);
  const overdue=actives.filter(t=>t.overdue).length;
  const today_t=actives.filter(t=>t.due_date===TODAY).length;
  const ST={a_faire:{bg:'#eff6ff',color:'#1d4ed8',label:'À faire'},en_cours:{bg:'#fef9c3',color:'#92400e',label:'En cours'},'en cours':{bg:'#fef9c3',color:'#92400e',label:'En cours'}};
  const complete=async(t)=>{setCompleting(t.id);await sb.from('taches').update({statut:'fait',date_completion:TODAY}).eq('id',t.id);setCompleting(null);onRefresh();};
  return (
    <div>
      <div className="flex gap-3 mb-4 flex-wrap">
        <input type="text" placeholder="Rechercher une tâche..." value={search} onChange={e=>setSearch(e.target.value)} className="flex-1 min-w-48 px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
        <div className="text-sm text-gray-500 self-center">{actives.length} tâche{actives.length>1?'s':''}{overdue>0&&<span className="ml-2 text-red-600 font-medium">⚠️ {overdue} en retard</span>}{today_t>0&&<span className="ml-2 text-orange-600 font-medium">📍 {today_t} aujourd'hui</span>}</div>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">+ Nouvelle tâche</button>
      </div>
      <div className="space-y-2">{actives.map(t=>{
        const contact=t.contact_id?contactMap[t.contact_id]:null;
        const st=ST[t.statut]||{bg:'#f9fafb',color:'#6b7280',label:t.statut};
        const canEdit=isAdmin||t.responsable===profile.nom;
        return (
          <div key={t.id} className={`rounded-xl border p-4 ${t.overdue?'bg-red-50 border-red-200':'bg-white border-gray-100'}`}>
            <div className="flex items-start gap-3">
              <div className="flex-1">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-medium text-gray-900">{t.titre}</span>
                  <span style={{backgroundColor:st.bg,color:st.color,padding:'1px 7px',borderRadius:9999,fontSize:11,fontWeight:600}}>{st.label}</span>
                  {t.overdue&&<span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-medium">En retard</span>}
                  {t.due_date===TODAY&&!t.overdue&&<span className="text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full font-medium">Aujourd'hui</span>}
                </div>
                {contact&&<div className="text-xs text-gray-400 mt-1">👤 {contact.prenom} {contact.nom} · {contact.groupe}</div>}
                {t.notes&&<div className="text-xs text-gray-500 mt-1 italic">{t.notes}</div>}
              </div>
              <div className="flex flex-col items-end gap-1 shrink-0">
                <div className="text-xs text-gray-400">{t.responsable}</div>
                {t.due_date&&<div className={`text-xs font-medium ${t.overdue?'text-red-600':'text-gray-500'}`}>{t.due_date}</div>}
                {canEdit&&<button onClick={()=>complete(t)} disabled={completing===t.id} className="mt-1 text-xs bg-green-100 hover:bg-green-200 text-green-700 px-2.5 py-1 rounded-lg font-medium disabled:opacity-50">{completing===t.id?'...':'✓ Fait'}</button>}
              </div>
            </div>
          </div>
        );
      })}</div>
      {showAdd&&<AddTacheModal contacts={contacts} profile={profile} onClose={()=>setShowAdd(false)} onSaved={()=>{setShowAdd(false);onRefresh();}}/>}
    </div>
  );
}

// ── Onglet Pipeline ───────────────────────────────────────────────────────────
function TabBesoins({ contacts, besoins, historique, taches }) {
  const contactMap=useMemo(()=>Object.fromEntries(contacts.map(c=>[c.id,c])),[contacts]);
  const histMap=useMemo(()=>{const m={};historique.forEach(h=>{if(!h.id_prospect)return;if(!m[h.id_prospect]||(h.date||'')>(m[h.id_prospect].date||''))m[h.id_prospect]=h;});return m;},[historique]);
  const SKIP=new Set(['-','non','nan','none','']);
  const pipeline=useMemo(()=>{
    const rows=[];
    besoins.forEach(({contact_id,data})=>{
      const cid=parseInt(contact_id);const contact=contactMap[cid];if(!contact)return;
      const derniere=histMap[cid];
      const tachesActives=taches.filter(t=>t.contact_id===cid&&t.statut!=='fait'&&t.statut!=='annule');
      const base={contact,derniere,tachesActives};
      if(data.besoins_multiples){data.besoins_multiples.forEach(b=>rows.push({...base,besoin:b}));}
      else if(!SKIP.has((data.label||'').trim().toLowerCase())){rows.push({...base,besoin:data});}
    });
    return rows;
  },[besoins,contactMap,histMap,taches]);
  const ORDRE=['Besoin Gagné','Entretien passé','Entretien programmé','Profil proposé','Besoin ouvert','Opportunité','Push opportuniste','Besoin Perdu'];
  const sorted=[...pipeline].sort((a,b)=>ORDRE.indexOf(a.besoin.statut)-ORDRE.indexOf(b.besoin.statut));
  return (
    <div>
      <div className="text-xs text-gray-400 mb-3">{sorted.length} besoin{sorted.length>1?'s':''} en pipeline</div>
      <div className="space-y-3">{sorted.map(({contact,besoin,derniere,tachesActives},i)=>(
        <div key={i} className="bg-white rounded-xl border border-gray-100 p-4">
          <div className="flex items-start gap-4">
            <div className="flex-1">
              <div className="flex items-center gap-2 flex-wrap mb-1">
                <span className="font-semibold text-gray-900">{contact.prenom} {contact.nom}</span>
                <span className="text-gray-400 text-sm">{contact.groupe}</span>
                <BesoinBadge statut={besoin.statut}/>
              </div>
              <div className="text-sm text-blue-700 font-medium mb-2">{besoin.label||contact.besoins||'—'}</div>
              <div className="flex flex-wrap gap-3 text-xs text-gray-500">
                {besoin.candidat&&<span className="bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full">👤 {besoin.candidat}</span>}
                {besoin.candidat_ko&&<span className="bg-red-50 text-red-600 px-2 py-0.5 rounded-full">✗ {besoin.candidat_ko} — {besoin.cause_ko||'KO'}</span>}
                {derniere&&<span>Dernière action : {derniere.date?.slice(0,10)} · {derniere.type_action}</span>}
              </div>
              {tachesActives.length>0&&<div className="mt-2 flex flex-wrap gap-1">{tachesActives.map(t=><span key={t.id} className="text-xs bg-yellow-50 text-yellow-700 border border-yellow-200 px-2 py-0.5 rounded-full">⏰ {t.titre} {t.due_date?`(${t.due_date})`:''}</span>)}</div>}
              {besoin.notes&&<div className="mt-2 text-xs text-gray-400 italic border-l-2 border-gray-100 pl-2">{besoin.notes}</div>}
            </div>
            {besoin.trello&&<a href={besoin.trello} target="_blank" className="shrink-0 text-xs bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700 font-medium">Trello →</a>}
          </div>
        </div>
      ))}</div>
    </div>
  );
}

// ── Onglet Historique ─────────────────────────────────────────────────────────
function TabHistorique({ historique, contacts, taches, profile, onRefresh }) {
  const [search,setSearch]=useState(''); const [filterResp,setFilterResp]=useState('');
  const [selected,setSelected]=useState(null);
  const isAdmin=profile.role==='admin';
  const contactMap=useMemo(()=>Object.fromEntries(contacts.map(c=>[c.id,c])),[contacts]);
  const responsables=useMemo(()=>[...new Set(historique.map(h=>h.responsable).filter(Boolean))].sort(),[historique]);

  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    return historique.filter(h=>{
      if(filterResp&&h.responsable!==filterResp)return false;
      if(!q)return true;
      const c=h.id_prospect?contactMap[h.id_prospect]:null;
      const nom=c?`${c.prenom||''} ${c.nom||''} ${c.groupe||''}`:'';
      return[h.type_action,h.details,h.responsable,h.date,nom].some(v=>(v||'').toLowerCase().includes(q));
    });
  },[historique,search,filterResp,contactMap]);

  const TYPE_COLORS={
    'Tel':          {bg:'#dbeafe',color:'#1d4ed8'},
    'Mail envoyé':  {bg:'#dcfce7',color:'#166534'},
    'Mail reçu':    {bg:'#dcfce7',color:'#15803d'},
    'RDV':          {bg:'#fef3c7',color:'#92400e'},
    'LinkedIn':     {bg:'#ede9fe',color:'#5b21b6'},
    'Note interne': {bg:'#f3f4f6',color:'#4b5563'},
    'Autre':        {bg:'#f3f4f6',color:'#4b5563'},
  };

  return (
    <div>
      <div className="flex gap-3 mb-4 flex-wrap">
        <input type="text" placeholder="Rechercher (nom, société, type, détails, date...)"
          value={search} onChange={e=>setSearch(e.target.value)}
          className="flex-1 min-w-64 px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
        {isAdmin&&responsables.length>1&&(
          <select value={filterResp} onChange={e=>setFilterResp(e.target.value)} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
            <option value="">Tous les commerciaux</option>
            {responsables.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        )}
        {(search||filterResp)&&<button onClick={()=>{setSearch('');setFilterResp('');}} className="px-3 py-2 text-sm text-gray-500 hover:text-gray-700">✕ Reset</button>}
      </div>
      <div className="text-xs text-gray-400 mb-3">{filtered.length} action{filtered.length>1?'s':''}</div>

      <div className="bg-white rounded-xl border border-gray-100 overflow-hidden divide-y divide-gray-50">
        {filtered.length===0&&<div className="px-4 py-10 text-center text-sm text-gray-400 italic">Aucune action trouvée</div>}
        {filtered.map((h,i)=>{
          const contact=h.id_prospect?contactMap[h.id_prospect]:null;
          const s=TYPE_COLORS[h.type_action]||TYPE_COLORS['Autre'];
          return (
            <div key={i} className="px-4 py-3 hover:bg-gray-50 transition-colors">
              <div className="flex gap-3 items-start">
                <div className="shrink-0 w-20 text-xs text-gray-400 pt-1 tabular-nums">{h.date?.slice(0,10)||'—'}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-0.5">
                    <span style={{backgroundColor:s.bg,color:s.color,padding:'2px 8px',borderRadius:9999,fontSize:11,fontWeight:600,whiteSpace:'nowrap'}}>{h.type_action}</span>
                    {contact&&(
                      <button onClick={()=>setSelected(contact)} className="text-sm font-semibold text-blue-700 hover:underline">
                        {contact.prenom} {contact.nom}
                        {contact.groupe&&<span className="ml-1 text-xs font-normal text-gray-400">· {contact.groupe}</span>}
                      </button>
                    )}
                  </div>
                  {h.details&&<div className="text-sm text-gray-600 line-clamp-2" title={h.details}>{h.details}</div>}
                </div>
                {h.responsable&&<span className="shrink-0 text-xs bg-gray-800 text-white px-2 py-0.5 rounded-full font-medium whitespace-nowrap">{h.responsable}</span>}
              </div>
            </div>
          );
        })}
      </div>
      {selected&&<ContactDetail contact={selected} historique={historique} taches={taches} profile={profile} onClose={()=>setSelected(null)} onRefresh={()=>{setSelected(null);onRefresh();}}/>}
    </div>
  );
}

// ── Onglet TDB Missions ───────────────────────────────────────────────────────
function TabTDB({ missions, histMissions, profile, onRefresh }) {
  const [selected,setSelected] = useState(null);
  const isAdmin = profile.role==='admin';
  const curMonthIdx = new Date().getMonth();

  const enMission    = missions.filter(m=>m.statut==='En cours'||m.statut==='New');
  const intercontrat = missions.filter(m=>m.statut==='Intercontrat');
  const caYTD = missions.reduce((sum,m)=>{ const tjm=parseFloat(m.tjm)||0; return sum+MOIS_KEYS.reduce((s,k)=>s+(parseFloat(m[`jours_${k}`])||0)*tjm,0); },0);
  const margeYTD = missions.reduce((sum,m)=>{ const mg=(parseFloat(m.tjm)||0)-(parseFloat(m.cjm)||0); return sum+MOIS_KEYS.reduce((s,k)=>s+(parseFloat(m[`jours_${k}`])||0)*mg,0); },0);
  const tauxMarge = caYTD>0?(margeYTD/caYTD*100):0;

  const caMensuel = MOIS_KEYS.map(k=>missions.reduce((sum,m)=>(parseFloat(m[`jours_${k}`])||0)*(parseFloat(m.tjm)||0)+sum,0));
  const maxCA = Math.max(...caMensuel,1);

  const ORDRE_STATUT={'En cours':0,'New':1,'Intercontrat':2,'Terminée':3};
  const missionsTri=[...missions].sort((a,b)=>{const d=(ORDRE_STATUT[a.statut]??9)-(ORDRE_STATUT[b.statut]??9);return d!==0?d:(a.consultant||'').localeCompare(b.consultant||'');});

  if(missions.length===0) return (
    <div className="flex flex-col items-center justify-center py-20 text-gray-400">
      <div className="text-5xl mb-4">📊</div>
      <div className="font-medium text-gray-600 mb-2">Aucune mission chargée</div>
      <div className="text-sm text-center max-w-sm">Lance <code className="bg-gray-100 px-1.5 py-0.5 rounded text-xs font-mono">python3 supabase/populate_supabase.py</code> pour importer les missions.</div>
    </div>
  );

  return (
    <div className="space-y-6">
      {/* KPI cards */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div className="bg-white rounded-xl border border-gray-100 p-4">
          <div className="text-xs text-gray-400 font-medium mb-1 uppercase tracking-wide">En mission</div>
          <div className="text-3xl font-bold text-blue-700">{enMission.length}</div>
          <div className="text-xs text-gray-500 mt-1">consultant{enMission.length>1?'s':''} actif{enMission.length>1?'s':''}</div>
        </div>
        <div className={`bg-white rounded-xl border p-4 ${intercontrat.length>0?'border-orange-200 bg-orange-50':'border-gray-100'}`}>
          <div className="text-xs text-gray-400 font-medium mb-1 uppercase tracking-wide">Intercontrat</div>
          <div className={`text-3xl font-bold ${intercontrat.length>0?'text-orange-600':'text-gray-300'}`}>{intercontrat.length}</div>
          <div className="text-xs text-gray-500 mt-1 truncate">{intercontrat.length>0?intercontrat.map(m=>m.consultant.split(/\s+/)[0]).join(', '):'Aucun'}</div>
        </div>
        <div className="bg-white rounded-xl border border-gray-100 p-4">
          <div className="text-xs text-gray-400 font-medium mb-1 uppercase tracking-wide">CA YTD</div>
          <div className="text-2xl font-bold text-green-700">{fmtCurrency(caYTD)}</div>
          <div className="text-xs text-gray-500 mt-1">missions visibles</div>
        </div>
        <div className="bg-white rounded-xl border border-gray-100 p-4">
          <div className="text-xs text-gray-400 font-medium mb-1 uppercase tracking-wide">Marge YTD</div>
          <div className="text-2xl font-bold text-purple-700">{fmtCurrency(margeYTD)}</div>
          <div className="text-xs text-gray-500 mt-1">{tauxMarge.toFixed(1)}% taux de marge</div>
        </div>
      </div>

      {/* CA mensuel */}
      <div className="bg-white rounded-xl border border-gray-100 p-5">
        <div className="text-sm font-semibold text-gray-700 mb-1">CA mensuel 2026</div>
        <div className="text-xs text-gray-400 mb-4">{isAdmin?'Total Lyon':'Mes missions'} · YTD : {fmtCurrency(caYTD)}</div>
        <div className="flex items-end gap-1.5 h-28">
          {caMensuel.map((ca,i)=>{
            const pct=maxCA>0?Math.max((ca/maxCA)*100,ca>0?4:0):0;
            return (
              <div key={i} className="flex-1 flex flex-col items-center gap-0.5">
                {ca>0&&<div className="text-gray-500 font-medium leading-tight mb-0.5" style={{fontSize:'10px'}}>{fmtCurrency(ca)}</div>}
                <div className={`w-full rounded-t-md ${i===curMonthIdx?'bg-blue-600':i<curMonthIdx?'bg-blue-400':'bg-gray-200'}`} style={{height:`${pct}%`,minHeight:ca>0?'4px':'2px'}}/>
                <div className={`font-medium mt-0.5 ${i===curMonthIdx?'text-blue-700':'text-gray-400'}`} style={{fontSize:'10px'}}>{MOIS_LABELS[i]}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Table missions — cliquer sur une ligne ouvre le détail */}
      <div className="bg-white rounded-xl border border-gray-100 overflow-hidden">
        <div className="px-4 py-3 border-b border-gray-50 flex items-center justify-between">
          <span className="text-sm font-semibold text-gray-700">Missions — {missions.length} consultant{missions.length>1?'s':''}</span>
          {!isAdmin&&<span className="text-xs text-gray-400 bg-gray-50 px-2 py-1 rounded-full">Vos missions uniquement</span>}
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-gray-50 text-gray-500 text-xs uppercase">
                <th className="px-3 py-2 text-left font-medium">Consultant</th>
                <th className="px-3 py-2 text-left font-medium">Client</th>
                <th className="px-3 py-2 text-left font-medium hidden lg:table-cell">Projet</th>
                <th className="px-3 py-2 text-right font-medium">TJM</th>
                <th className="px-3 py-2 text-left font-medium">Statut</th>
                {MOIS_LABELS.map((m,i)=>(
                  <th key={i} className={`px-2 py-2 text-right font-medium whitespace-nowrap ${i===curMonthIdx?'text-blue-700 bg-blue-50':''}`} style={{fontSize:'11px'}}>{m}</th>
                ))}
                <th className="px-3 py-2 text-right font-medium">CA Total</th>
              </tr>
            </thead>
            <tbody>
              {missionsTri.map((m,idx)=>{
                const joursTotal=MOIS_KEYS.reduce((s,k)=>s+(parseFloat(m[`jours_${k}`])||0),0);
                const caTotal=joursTotal*(parseFloat(m.tjm)||0);
                const histCount=(histMissions||[]).filter(h=>h.mission_id===m.id).length;
                return (
                  <tr key={m.id||idx} onClick={()=>setSelected(m)}
                    className={`border-t border-gray-50 hover:bg-blue-50 cursor-pointer transition-colors ${m.statut==='Intercontrat'?'opacity-70':''}`}>
                    <td className="px-3 py-2.5">
                      <div className="font-medium text-gray-900 whitespace-nowrap">{m.consultant}</div>
                      <div className="flex items-center gap-1 mt-0.5">
                        {m.type_contrat&&<span className="text-xs text-gray-400">{m.type_contrat}</span>}
                        {histCount>0&&<span className="text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded-full font-medium">{histCount} action{histCount>1?'s':''}</span>}
                      </div>
                    </td>
                    <td className="px-3 py-2.5 text-gray-600 whitespace-nowrap">{m.client||'—'}</td>
                    <td className="px-3 py-2.5 text-gray-500 hidden lg:table-cell text-xs max-w-xs">
                      <span title={m.projet||''}>{m.projet?(m.projet.length>45?m.projet.substring(0,45)+'…':m.projet):'—'}</span>
                    </td>
                    <td className="px-3 py-2.5 text-right font-mono text-xs text-gray-700 whitespace-nowrap">{m.tjm>0?`${m.tjm}€`:'—'}</td>
                    <td className="px-3 py-2.5 whitespace-nowrap"><MissionStatutBadge statut={m.statut}/></td>
                    {MOIS_KEYS.map((k,i)=>{
                      const j=parseFloat(m[`jours_${k}`])||0;
                      const rec=m[`statut_${k}`];
                      const cellCls=j>0?(rec==='Réceptionné'?'text-green-600 font-semibold':rec==='Livré'?'text-blue-600':'text-gray-600'):'text-gray-300';
                      return <td key={k} className={`px-2 py-2.5 text-right text-xs font-mono ${cellCls} ${i===curMonthIdx?'bg-blue-50':''}`} title={rec||''}>{j>0?(j%1===0?j.toFixed(0):j.toFixed(1)):'—'}</td>;
                    })}
                    <td className="px-3 py-2.5 text-right font-semibold text-gray-700 whitespace-nowrap">{caTotal>0?fmtCurrency(caTotal):'—'}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr className="border-t-2 border-gray-200 bg-gray-50 text-xs font-semibold text-gray-700">
                <td className="px-3 py-2.5 uppercase tracking-wide" colSpan={2}>TOTAL</td>
                <td className="hidden lg:table-cell"></td><td></td><td></td>
                {MOIS_KEYS.map((k,i)=>{
                  const totJ=missions.reduce((s,m)=>s+(parseFloat(m[`jours_${k}`])||0),0);
                  const totCA=missions.reduce((s,m)=>s+(parseFloat(m[`jours_${k}`])||0)*(parseFloat(m.tjm)||0),0);
                  return <td key={k} className={`px-2 py-2.5 text-right font-mono ${i===curMonthIdx?'bg-blue-100':''}`}>{totJ>0?<><div>{totJ%1===0?totJ.toFixed(0):totJ.toFixed(1)}j</div><div className="text-green-700">{fmtCurrency(totCA)}</div></>:<span className="text-gray-300">—</span>}</td>;
                })}
                <td className="px-3 py-2.5 text-right text-green-700">{fmtCurrency(caYTD)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div className="px-4 py-2 border-t border-gray-50 flex gap-4 text-xs text-gray-400">
          <span>Cliquer sur une ligne pour voir le détail et l'historique</span>
          <span className="ml-auto"><span className="text-blue-600 font-bold mr-1">●</span>Livré</span>
          <span><span className="text-green-600 font-bold mr-1">●</span>Réceptionné</span>
        </div>
      </div>

      {selected&&<MissionDetail mission={selected} histMissions={histMissions} profile={profile} onClose={()=>setSelected(null)} onRefresh={()=>{setSelected(null);onRefresh();}}/>}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
// ── Modal : Changer mot de passe ──────────────────────────────────────────────
function ChangePasswordModal({ onClose }) {
  const [pwd,setPwd]=useState(''); const [pwd2,setPwd2]=useState('');
  const [saving,setSaving]=useState(false); const [err,setErr]=useState(''); const [ok,setOk]=useState(false);
  const save = async () => {
    if (pwd.length < 6)          { setErr('Le mot de passe doit faire au moins 6 caractères.'); return; }
    if (pwd !== pwd2)             { setErr('Les mots de passe ne correspondent pas.'); return; }
    setSaving(true); setErr('');
    const { error } = await sb.auth.updateUser({ password: pwd });
    if (error) { setErr(error.message); setSaving(false); }
    else       { setOk(true); }
  };
  return (
    <Modal title="🔑 Changer mon mot de passe" onClose={onClose}
      footer={ok ? <button onClick={onClose} className="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium">Fermer</button>
                 : <><button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Annuler</button><button onClick={save} disabled={saving||!pwd||!pwd2} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">{saving?'Enregistrement...':'Enregistrer'}</button></>}>
      {ok
        ? <div className="text-center py-4"><div className="text-3xl mb-2">✅</div><div className="text-sm text-green-700 font-medium">Mot de passe mis à jour avec succès !</div></div>
        : <>
            <Field label="Nouveau mot de passe"><input type="password" autoFocus value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Min. 6 caractères" className={inputCls}/></Field>
            <Field label="Confirmer le mot de passe"><input type="password" value={pwd2} onChange={e=>setPwd2(e.target.value)} placeholder="Répéter le mot de passe" className={inputCls}/></Field>
            {err && <div className="text-xs text-red-600 bg-red-50 rounded px-3 py-2">{err}</div>}
          </>
      }
    </Modal>
  );
}

function App() {
  const [user,setUser]=useState(undefined); const [profile,setProfile]=useState(null);
  const [data,setData]=useState(null); const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null); const [tab,setTab]=useState('prospects');
  const [lastRefresh,setLastRefresh]=useState(null);

  useEffect(()=>{
    sb.auth.getUser().then(({data:{user}})=>setUser(user||null));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
      if(!session){setProfile(null);setData(null);}
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const fetchAll = useCallback(async ()=>{
    setLoading(true); setError(null);
    try {
      const [
        {data:contacts,  error:e1},{data:historique,error:e2},
        {data:taches,    error:e3},{data:besoins,   error:e4},
        {data:missions,  error:e5},{data:histMiss,  error:e6},
      ] = await Promise.all([
        sb.from('contacts').select('*').order('id'),
        sb.from('historique_actions').select('*').order('date',{ascending:false}).limit(2000),
        sb.from('taches').select('*').order('due_date',{ascending:true,nullsFirst:false}),
        sb.from('besoins_statuts').select('*'),
        sb.from('missions').select('*').order('consultant'),
        sb.from('historique_missions').select('*').order('date',{ascending:false}),
      ]);
      const err=e1||e2||e3||e4;
      if(err) throw new Error(err.message);
      // e5/e6 peuvent échouer si tables pas encore créées — on ignore silencieusement
      setData({contacts,historique,taches,besoins,missions:missions||[],histMissions:histMiss||[]});
      setLastRefresh(new Date().toLocaleTimeString('fr-FR'));
    } catch(err){ setError(err.message); } finally{ setLoading(false); }
  },[]);

  useEffect(()=>{
    if(!user) return;
    sb.from('profiles').select('*').eq('id',user.id).single().then(({data:p})=>setProfile(p));
    fetchAll();
  },[user]);

  const [showPwd,setShowPwd]=useState(false);
  const logout = async ()=>await sb.auth.signOut();

  if(user===undefined) return <Loader label="Vérification de la session..."/>;
  if(!user) return <LoginScreen/>;
  if(!data||!profile) return <Loader label="Chargement depuis Supabase..."/>;
  if(error) return <div className="flex items-center justify-center min-h-screen"><div className="bg-red-50 border border-red-200 rounded-xl p-6 max-w-md text-center"><div className="text-3xl mb-3">❌</div><div className="font-semibold text-red-800">Erreur Supabase</div><div className="text-sm text-red-600 mt-2 font-mono">{error}</div><button onClick={fetchAll} className="mt-4 px-4 py-2 bg-red-600 text-white rounded-lg text-sm">Réessayer</button></div></div>;

  const {contacts,historique,taches,besoins,missions,histMissions}=data;
  const isAdmin=profile.role==='admin';
  const tachesActives=taches.filter(t=>t.statut!=='fait'&&t.statut!=='annule');
  const tachesRetard=tachesActives.filter(t=>t.due_date&&t.due_date<TODAY);
  const relancesRetard=contacts.filter(c=>c.date_relance&&c.date_relance<TODAY);
  const TABS=[
    {id:'prospects',  label:`📋 Contacts (${contacts.length})`},
    {id:'taches',     label:`✅ Tâches (${tachesActives.length})${tachesRetard.length>0?' 🔴':''}`},
    {id:'besoins',    label:`💼 Pipeline (${besoins.length})`},
    {id:'tdb',        label:`📊 TDB (${missions.length})`},
    {id:'historique', label:`📖 Historique (${historique.length})`},
  ];

  return (
    <div className="min-h-screen bg-gray-50">
      <div className="bg-white border-b sticky top-0 z-40 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <span className="text-xl font-bold text-gray-800">CRM Lyon</span>
            <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">⚡ Live</span>
            {isAdmin&&<span className="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-medium">Admin</span>}
          </div>
          <div className="flex items-center gap-3">
            {relancesRetard.length>0&&<span className="text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full font-medium hidden sm:block">⚠️ {relancesRetard.length} relance{relancesRetard.length>1?'s':''} en retard</span>}
            <div className="text-xs text-gray-400 hidden sm:block">{lastRefresh&&`Actualisé ${lastRefresh}`}</div>
            <button onClick={fetchAll} disabled={loading} className="text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg font-medium disabled:opacity-50">{loading?'⟳ ...':'⟳ Refresh'}</button>
            <div className="flex items-center gap-2 border-l pl-3">
              <span className="text-xs text-gray-500 font-medium">{profile.nom}</span>
              <button onClick={()=>setShowPwd(true)} title="Changer mon mot de passe" className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1.5 rounded-lg font-medium">🔑</button>
              <button onClick={logout} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-lg font-medium">Déconnexion</button>
            </div>
            {showPwd&&<ChangePasswordModal onClose={()=>setShowPwd(false)}/>}
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-4 flex gap-1 pb-0">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} className={`px-4 py-2.5 text-sm font-medium border-b-2 transition-colors ${tab===t.id?'border-blue-600 text-blue-700':'border-transparent text-gray-500 hover:text-gray-700'}`}>{t.label}</button>
          ))}
        </div>
      </div>
      <div className="max-w-7xl mx-auto px-4 py-6">
        {tab==='prospects'&&<TabProspects contacts={contacts} historique={historique} taches={taches} profile={profile} onRefresh={fetchAll}/>}
        {tab==='taches'   &&<TabTaches   taches={taches} contacts={contacts} profile={profile} onRefresh={fetchAll}/>}
        {tab==='besoins'  &&<TabBesoins  contacts={contacts} besoins={besoins} historique={historique} taches={taches}/>}
        {tab==='historique'&&<TabHistorique historique={historique} contacts={contacts} taches={taches} profile={profile} onRefresh={fetchAll}/>}
        {tab==='tdb'      &&<TabTDB      missions={missions} histMissions={histMissions} profile={profile} onRefresh={fetchAll}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
