// Budget : 3 modes de saisie
function BudgetInput({ budget, tjm, jours, dateDebut, dateFin, onChange }) {
  const [mode,setMode]=useState(dateDebut&&dateFin?'dates':tjm?'tjm':'direct');
  const calcJours=useMemo(()=>joursOuvres(dateDebut,dateFin),[dateDebut,dateFin]);
  useEffect(()=>{
    if(mode==='tjm'&&tjm&&jours) onChange({budget:tjm*jours,budget_tjm:tjm,budget_jours:jours,budget_date_debut:null,budget_date_fin:null});
    if(mode==='dates'&&tjm&&dateDebut&&dateFin){ const j=joursOuvres(dateDebut,dateFin); onChange({budget:tjm*j,budget_tjm:tjm,budget_jours:j,budget_date_debut:dateDebut,budget_date_fin:dateFin}); }
  },[mode,tjm,jours,dateDebut,dateFin]);
  return (
    <div className="space-y-2">
      <div className="flex gap-1 text-xs">
        {[{k:'direct',l:'Montant'},{k:'tjm',l:'TJM × Jours'},{k:'dates',l:'TJM × Dates'}].map(m=>(
          <button key={m.k} type="button" onClick={()=>setMode(m.k)} className={`px-2 py-1 rounded ${mode===m.k?'bg-midnight text-white':'bg-neutral-100 text-slate'}`}>{m.l}</button>
        ))}
      </div>
      {mode==='direct'&&(
        <input type="number" value={budget||''} onChange={e=>onChange({budget:parseFloat(e.target.value)||0,budget_tjm:null,budget_jours:null,budget_date_debut:null,budget_date_fin:null})} placeholder="10000" className={inputCls}/>
      )}
      {mode==='tjm'&&(
        <div className="grid grid-cols-2 gap-2">
          <input type="number" value={tjm||''} onChange={e=>onChange({budget_tjm:parseFloat(e.target.value)||0})} placeholder="TJM (€)" className={inputCls}/>
          <input type="number" value={jours||''} onChange={e=>onChange({budget_jours:parseInt(e.target.value)||0})} placeholder="Nb jours" className={inputCls}/>
        </div>
      )}
      {mode==='dates'&&(
        <div className="space-y-2">
          <input type="number" value={tjm||''} onChange={e=>onChange({budget_tjm:parseFloat(e.target.value)||0})} placeholder="TJM (€)" className={inputCls}/>
          <div className="grid grid-cols-2 gap-2">
            <input type="date" value={dateDebut||''} onChange={e=>onChange({budget_date_debut:e.target.value})} className={inputCls}/>
            <input type="date" value={dateFin||''} onChange={e=>onChange({budget_date_fin:e.target.value})} className={inputCls}/>
          </div>
          {calcJours>0&&<div className="text-xs text-slate">{calcJours} jours ouvrés → {fmtCurrency((tjm||0)*calcJours)}</div>}
        </div>
      )}
      {budget>0&&<div className="text-xs font-medium text-jade-100">Budget : {fmtCurrency(budget)}</div>}
    </div>
  );
}

// Sélecteur de candidat (cherche parmi contacts candidat/consultant/freelance/prestataire)
function CandidatSelector({ contacts, value, onChange }) {
  const [q,setQ]=useState('');
  const candidats=useMemo(()=>contacts.filter(c=>['Candidat','Consultant CDI','Freelance','Prestataire'].includes(c.statut)),[contacts]);
  const selected=candidats.find(c=>c.id===value);
  const filtered=useMemo(()=>{if(!q)return candidats.slice(0,20);const s=q.toLowerCase();return candidats.filter(c=>[c.prenom,c.nom,c.groupe].some(v=>(v||'').toLowerCase().includes(s))).slice(0,20);},[candidats,q]);
  if(selected) return (
    <div className="flex items-center gap-2">
      <span className="text-sm bg-azure-20 text-azure-100 px-2 py-1 rounded-lg">{selected.prenom} {selected.nom} <StatutBadge statut={selected.statut}/></span>
      <button type="button" onClick={()=>onChange(null)} className="text-neutral-300 hover:text-red-500 text-sm">×</button>
    </div>
  );
  return (
    <div className="relative">
      <input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Rechercher un candidat..." className={inputCls}/>
      {q&&filtered.length>0&&(
        <div className="absolute z-20 left-0 right-0 top-full mt-1 bg-white border rounded-lg border-2 border-neutral-200 max-h-48 overflow-y-auto">
          {filtered.map(c=>(
            <div key={c.id} onClick={()=>{onChange(c.id);setQ('');}} className="px-3 py-2 hover:bg-azure-20 cursor-pointer text-sm flex items-center gap-2">
              <span>{c.prenom} {c.nom}</span><StatutBadge statut={c.statut}/>{c.groupe&&<span className="text-xs text-neutral-300">{c.groupe}</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Liste multi-candidats d'un besoin
function BesoinCandidatsList({ besoinId, candidats, contacts, contactMap, profile, readOnly, legacyCandidatId, onClearLegacy, onRefresh, onNavToContact, onClose }) {
  const [q,setQ]=useState('');
  const [adding,setAdding]=useState(false);
  const pool=useMemo(()=>contacts.filter(c=>['Candidat','Consultant CDI','Freelance','Prestataire'].includes(c.statut)),[contacts]);
  // Le candidat legacy est-il déjà dans la liste multi ?
  const legacyAlreadyMigrated=legacyCandidatId&&candidats.some(bc=>bc.contact_id===legacyCandidatId);
  const legacyContact=legacyCandidatId&&!legacyAlreadyMigrated?contactMap[legacyCandidatId]:null;
  const allIds=new Set(candidats.map(bc=>bc.contact_id));
  if(legacyCandidatId) allIds.add(legacyCandidatId);
  const filtered=useMemo(()=>{if(!q)return[];const s=q.toLowerCase();return pool.filter(c=>!allIds.has(c.id)&&[c.prenom,c.nom,c.groupe].some(v=>(v||'').toLowerCase().includes(s))).slice(0,10);},[pool,q,allIds]);

  const addCandidat=async(contactId)=>{
    setAdding(true);
    const {error}=await sb.from('besoin_candidats').insert({besoin_id:besoinId,contact_id:contactId,statut:'en_attente',tjm_propose:null,created_by:profile.nom});
    if(error){toast('Erreur ajout candidat : '+error.message,'error');setAdding(false);return;}
    toast('Candidat ajouté');setQ('');setAdding(false);onRefresh();
  };
  const updateTjm=async(id,val)=>{
    const tjm=val===''?null:parseFloat(val)||0;
    const {error}=await sb.from('besoin_candidats').update({tjm_propose:tjm}).eq('id',id);
    if(error) toast('Erreur : '+error.message,'error');
    else onRefresh();
  };
  const migrateLegacy=async()=>{
    setAdding(true);
    const {error}=await sb.from('besoin_candidats').insert({besoin_id:besoinId,contact_id:legacyCandidatId,statut:'propose',created_by:profile.nom});
    if(error){toast('Erreur migration : '+error.message,'error');setAdding(false);return;}
    await sb.from('besoins').update({candidat_id:null}).eq('id',besoinId);
    toast('Candidat migré');setAdding(false);onRefresh();
  };
  const removeLegacy=async()=>{
    await sb.from('besoins').update({candidat_id:null}).eq('id',besoinId);
    toast('Candidat retiré');onRefresh();
  };
  const updateStatut=async(id,statut)=>{
    const {error}=await sb.from('besoin_candidats').update({statut}).eq('id',id);
    if(error){toast('Erreur : '+error.message,'error');return;}
    onRefresh();
  };
  const removeCandidat=async(id)=>{
    const {error}=await sb.from('besoin_candidats').delete().eq('id',id);
    if(error){toast('Erreur : '+error.message,'error');return;}
    toast('Candidat retiré');onRefresh();
  };

  const statutObj=(val)=>CANDIDAT_STATUTS.find(s=>s.value===val)||CANDIDAT_STATUTS[0];
  const totalCount=candidats.length+(legacyContact?1:0);

  return (
    <div>
      <div className="text-xs text-neutral-300 font-semibold mb-2 uppercase tracking-wide">Candidats ({totalCount})</div>
      {/* Candidat legacy non migré */}
      {legacyContact&&(
        <div className="flex items-center gap-2 bg-lemon-20 rounded-lg px-3 py-2 mb-2">
          <div className="w-2 h-2 rounded-full shrink-0 bg-coral-50"/>
          <div className="flex-1 min-w-0">
            {onNavToContact?<button onClick={()=>{onClose?.();onNavToContact(legacyContact.id);}} className="text-sm font-medium text-midnight underline decoration-2 decoration-lemon-100 underline-offset-2 hover:bg-lemon-20 truncate text-left cursor-pointer transition-colors">{legacyContact.prenom} {legacyContact.nom}</button>:<div className="text-sm font-medium text-midnight truncate">{legacyContact.prenom} {legacyContact.nom}</div>}
            {legacyContact.groupe&&<div className="text-xs text-neutral-300 truncate">{legacyContact.groupe}</div>}
          </div>
          {!readOnly&&(
            <>
              <button onClick={migrateLegacy} disabled={adding} className="text-xs px-2 py-1 bg-azure-20 text-azure-100 rounded-lg font-medium hover:bg-azure-20" title="Migrer vers la nouvelle liste">Migrer</button>
              <button onClick={removeLegacy} className="text-neutral-200 hover:text-red-500 text-sm shrink-0" title="Retirer">×</button>
            </>
          )}
          {readOnly&&<span className="text-xs px-2 py-1 rounded-lg font-medium bg-lemon-20 text-coral-50">Legacy</span>}
        </div>
      )}
      {candidats.length>0&&(
        <div className="space-y-2 mb-3">
          {candidats.map(bc=>{
            const c=contactMap[bc.contact_id];
            if(!c) return null;
            const st=statutObj(bc.statut);
            return (
              <div key={bc.id} className="flex items-center gap-2 bg-neutral-50 rounded-lg px-3 py-2 flex-wrap">
                <div className={`w-2 h-2 rounded-full shrink-0 ${st.dot}`}/>
                <div className="flex-1 min-w-0">
                  {onNavToContact?<button onClick={()=>{onClose?.();onNavToContact(c.id);}} className="text-sm font-medium text-midnight underline decoration-2 decoration-lemon-100 underline-offset-2 hover:bg-lemon-20 truncate text-left cursor-pointer transition-colors">{c.prenom} {c.nom}</button>:<div className="text-sm font-medium text-midnight truncate">{c.prenom} {c.nom}</div>}
                  {c.groupe&&<div className="text-xs text-neutral-300 truncate">{c.groupe}</div>}
                </div>
                {!readOnly?(
                  <input type="number" placeholder="TJM" defaultValue={bc.tjm_propose||''} onBlur={e=>updateTjm(bc.id,e.target.value)}
                    className="w-16 text-xs px-1.5 py-1 border rounded text-right" title="TJM proposé (€/j)"/>
                ):(
                  bc.tjm_propose>0&&<span className="text-xs text-jade-100 font-medium">{bc.tjm_propose}€/j</span>
                )}
                {!readOnly?(
                  <select value={bc.statut} onChange={e=>updateStatut(bc.id,e.target.value)}
                    className={`text-xs px-2 py-1 rounded-lg border-0 font-medium ${st.color}`}>
                    {CANDIDAT_STATUTS.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
                  </select>
                ):(
                  <span className={`text-xs px-2 py-1 rounded-lg font-medium ${st.color}`}>{st.label}</span>
                )}
                {!readOnly&&<button onClick={()=>removeCandidat(bc.id)} className="text-neutral-200 hover:text-red-500 text-sm shrink-0" title="Retirer">×</button>}
              </div>
            );
          })}
        </div>
      )}
      {!readOnly&&(
        <div className="relative">
          <input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Ajouter un candidat..." className={inputCls+' text-sm'} disabled={adding}/>
          {q&&filtered.length>0&&(
            <div className="absolute z-20 left-0 right-0 top-full mt-1 bg-white border rounded-lg border-2 border-neutral-200 max-h-48 overflow-y-auto">
              {filtered.map(c=>(
                <div key={c.id} onClick={()=>addCandidat(c.id)} className="px-3 py-2 hover:bg-azure-20 cursor-pointer text-sm flex items-center gap-2">
                  <span>{c.prenom} {c.nom}</span><StatutBadge statut={c.statut}/>{c.groupe&&<span className="text-xs text-neutral-300">{c.groupe}</span>}
                </div>
              ))}
            </div>
          )}
          {q&&filtered.length===0&&!adding&&<div className="absolute z-20 left-0 right-0 top-full mt-1 bg-white border rounded-lg border-2 border-neutral-200 px-3 py-2 text-sm text-neutral-300">Aucun candidat trouvé</div>}
        </div>
      )}
    </div>
  );
}

// Sélecteur de contact par recherche, filtré par statuts autorisés
function ContactSearchField({ contacts, value, onChange, statuts, placeholder }) {
  const [q,setQ]=useState('');
  const pool=useMemo(()=>contacts.filter(c=>statuts.includes(c.statut)),[contacts,statuts]);
  const selected=pool.find(c=>c.id===value);
  const filtered=useMemo(()=>{if(!q)return pool.slice(0,20);const s=q.toLowerCase();return pool.filter(c=>[c.prenom,c.nom,c.groupe].some(v=>(v||'').toLowerCase().includes(s))).slice(0,20);},[pool,q]);
  if(selected) return (
    <div className="flex items-center gap-2">
      <span className="text-sm bg-azure-20 text-azure-100 px-2 py-1 rounded-lg">{selected.prenom} {selected.nom} <StatutBadge statut={selected.statut}/>{selected.groupe?<span className="text-xs text-neutral-300 ml-1">{selected.groupe}</span>:null}</span>
      <button type="button" onClick={()=>onChange(null,'')} className="text-neutral-300 hover:text-red-500 text-sm">×</button>
    </div>
  );
  return (
    <div className="relative">
      <input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder={placeholder||'Rechercher...'} className={inputCls}/>
      {q&&filtered.length>0&&(
        <div className="absolute z-20 left-0 right-0 top-full mt-1 bg-white border rounded-lg border-2 border-neutral-200 max-h-48 overflow-y-auto">
          {filtered.map(c=>(
            <div key={c.id} onClick={()=>{onChange(c.id,`${c.prenom||''} ${c.nom||''}`.trim());setQ('');}} className="px-3 py-2 hover:bg-azure-20 cursor-pointer text-sm flex items-center gap-2">
              <span>{c.prenom} {c.nom}</span><StatutBadge statut={c.statut}/>{c.groupe&&<span className="text-xs text-neutral-300">{c.groupe}</span>}
            </div>
          ))}
        </div>
      )}
      {q&&filtered.length===0&&<div className="absolute z-20 left-0 right-0 top-full mt-1 bg-white border rounded-lg border-2 border-neutral-200 px-3 py-2 text-sm text-neutral-300">Aucun résultat</div>}
    </div>
  );
}

// Stepper visuel de statut
function BesoinStatusStepper({ value, onChange }) {
  return (
    <div className="flex flex-wrap gap-1">
      {BESOIN_STATUTS_ORDRE.map(s=>(
        <button key={s} type="button" onClick={()=>onChange(s)}
          className={`px-2 py-1 rounded-lg text-xs font-medium border transition-colors ${value===s?'bg-midnight text-white':'bg-white text-slate border-neutral-200 hover:border-neutral-400'}`}>
          {s}
        </button>
      ))}
    </div>
  );
}

// Modal création besoin
function AddBesoinModal({ contacts, profile, allProfiles, onClose, onSaved }) {
  const isAdmin=profile.role==='admin';
  const [f,setF]=useState({titre:'',statut:'Besoin ouvert',type:'regie',lien:'',compte:'',contact_id:null,description:'',budget:10000,budget_tjm:null,budget_jours:null,budget_date_debut:null,budget_date_fin:null,candidat_id:null,responsable:profile.nom});
  const [saving,setSaving]=useState(false);const [err,setErr]=useState('');
  const save=async()=>{
    if(!f.titre.trim()){setErr('Le titre est obligatoire.');return;}
    setSaving(true);
    const {data:inserted,error}=await sb.from('besoins').insert({
      titre:f.titre.trim(),statut:f.statut,type:f.type,lien:f.lien||null,compte:f.compte||null,
      contact_id:f.contact_id||null,description:f.description||null,budget:f.budget||10000,
      budget_tjm:f.budget_tjm,budget_jours:f.budget_jours,budget_date_debut:f.budget_date_debut,budget_date_fin:f.budget_date_fin,
      candidat_id:f.candidat_id||null,responsable:f.responsable,agence:profile.agence||'Lyon'
    }).select('id').single();
    if(error){setErr(error.message);setSaving(false);return;}
    // Auto-log push opportuniste
    if(f.statut==='Push opportuniste'&&f.contact_id&&f.candidat_id){
      const cand=contacts.find(c=>c.id===f.candidat_id);
      if(cand) await sb.from('historique_actions').insert({id_prospect:f.contact_id,date:getToday(),type_action:'Push opportuniste',details:`Push opportuniste — ${cand.prenom} ${cand.nom}`,responsable:f.responsable,besoin_id:inserted.id});
    }
    toast('Besoin créé');onSaved();
  };
  const myContacts=contacts;
  return (
    <Modal title="Nouveau besoin" onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-slate">Annuler</button><button onClick={save} disabled={saving} className="px-4 py-2 bg-midnight text-white text-sm font-medium disabled:opacity-50 btn-brutal">{saving?'...':'Créer'}</button></>}>
      <Field label="Titre *"><input type="text" value={f.titre} onChange={e=>setF(v=>({...v,titre:e.target.value}))} placeholder="Ex : Développeur Java Senior" className={inputCls}/></Field>
      <Field label="Statut initial">
        <select value={f.statut} onChange={e=>setF(v=>({...v,statut:e.target.value}))} className={inputCls}>
          {BESOIN_STATUTS_CREATION.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Compte (société)"><CompteSearchField contacts={myContacts} value={f.compte} onChange={compte=>setF(v=>({...v,compte}))}/></Field>
        <Field label="Lien externe"><input type="url" value={f.lien} onChange={e=>setF(v=>({...v,lien:e.target.value}))} placeholder="https://..." className={inputCls}/></Field>
      </div>
      <Field label="Contact lié">
        <ContactPicker contacts={myContacts} value={f.contact_id} filterCompte={f.compte||''} onChange={cid=>{
          const c=cid?myContacts.find(x=>String(x.id)===String(cid)):null;
          setF(v=>({...v,contact_id:cid,...(c&&c.groupe&&!v.compte?{compte:c.groupe}:{})}));
        }}/>
      </Field>
      {BESOIN_HAS_CANDIDAT.has(f.statut)&&(
        <Field label="Candidat"><CandidatSelector contacts={contacts} value={f.candidat_id} onChange={cid=>setF(v=>({...v,candidat_id:cid}))}/></Field>
      )}
      <Field label="Description"><textarea rows={2} value={f.description} onChange={e=>setF(v=>({...v,description:e.target.value}))} className={inputCls+' resize-none'}/></Field>
      <Field label="Budget">
        <BudgetInput budget={f.budget} tjm={f.budget_tjm} jours={f.budget_jours} dateDebut={f.budget_date_debut} dateFin={f.budget_date_fin}
          onChange={upd=>setF(v=>({...v,...upd}))}/>
      </Field>
      {isAdmin&&<Field label="Responsable"><select value={f.responsable} onChange={e=>setF(v=>({...v,responsable:e.target.value}))} className={inputCls}>{respOptions(allProfiles,f.responsable).map(p=><option key={p.nom} value={p.nom}>{p.nom}</option>)}</select></Field>}
      {err&&<div className="text-xs text-coral-100 bg-coral-20 rounded px-3 py-2">{err}</div>}
    </Modal>
  );
}

// Panneau détail besoin (SidePanel)
function BesoinDetail({ besoin, contacts, contactMap, besoinCandidats, historique, taches, missions, besoins, profile, allProfiles, onClose, onRefresh, onDataRefresh, onNavToContact, onNavToMission, onNavToTache }) {
  const isAdmin=profile.role==='admin';
  const isOwner=isAdmin||besoin.responsable===profile.nom;
  const [editing,setEditing]=useState(false);
  const [f,setF]=useState({...besoin});
  const [saving,setSaving]=useState(false);
  const [modal,setModal]=useState(null);
  const [deleting,setDeleting]=useState(false);
  const contact=contacts.find(c=>c.id===besoin.contact_id);
  const candidat=contacts.find(c=>c.id===besoin.candidat_id);
  const mesCandidats=(besoinCandidats||[]).filter(bc=>bc.besoin_id===besoin.id);
  const besoinHist=historique.filter(h=>h.besoin_id===besoin.id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const besoinTaches=taches.filter(t=>t.besoin_id===besoin.id&&t.statut!=='fait'&&t.statut!=='annule');
  // Indicateurs Besoin Gagné
  const nbJours=joursOuvres(f.date_demarrage,f.date_fin);
  const caProj=(f.tjm_vente||0)*nbJours;
  const coutProj=(f.cjm_achat||0)*nbJours;
  const margeProj=caProj-coutProj;
  const tauxMarge=caProj>0?(margeProj/caProj*100):0;

  const [gagneErrors,setGagneErrors]=useState({});
  const saveEdit=async()=>{
    // Validation Besoin Gagné : candidat + contact obligatoires
    if(f.statut==='Besoin Gagné'){
      const errs={};
      const hasCandidat=mesCandidats.length>0||f.candidat_id;
      if(!hasCandidat) errs.candidat='Merci d\'ajouter au moins un candidat avant de passer ce besoin à Gagné.';
      if(!f.contact_id) errs.contact='Merci de renseigner un contact lié avant de passer ce besoin à Gagné. Il deviendra le référent client sur la mission.';
      if(Object.keys(errs).length){setGagneErrors(errs);setSaving(false);return;}
    }
    setGagneErrors({});
    setSaving(true);
    const upd={statut:f.statut,titre:f.titre,lien:f.lien||null,compte:f.compte||null,contact_id:f.contact_id||null,
      description:f.description||null,budget:f.budget||0,budget_tjm:f.budget_tjm,budget_jours:f.budget_jours,
      budget_date_debut:f.budget_date_debut,budget_date_fin:f.budget_date_fin,candidat_id:f.candidat_id||null,
      consultant_id:f.consultant_id||null,
      date_entretien:f.date_entretien||null,compte_rendu:f.compte_rendu||null,
      date_demarrage:f.date_demarrage||null,date_fin:f.date_fin||null,tjm_vente:f.tjm_vente||null,cjm_achat:f.cjm_achat||null,
      motif_perte:f.motif_perte||null,motif_perte_precision:f.motif_perte_precision||null,
      responsable:f.responsable,updated_at:new Date().toISOString()};
    const {error}=await sb.from('besoins').update(upd).eq('id',besoin.id);
    if(!error){
      // Auto-log push opportuniste
      if(f.statut==='Push opportuniste'&&f.contact_id&&f.candidat_id&&(f.candidat_id!==besoin.candidat_id||f.statut!==besoin.statut)){
        const cand=contacts.find(c=>c.id===f.candidat_id);
        if(cand) await sb.from('historique_actions').insert({id_prospect:f.contact_id,date:getToday(),type_action:'Push opportuniste',details:`Push opportuniste — ${cand.prenom} ${cand.nom}`,responsable:f.responsable,besoin_id:besoin.id});
      }
      // Besoin Gagné → proposer création mission
      if(f.statut==='Besoin Gagné'&&besoin.statut!=='Besoin Gagné'){
        // Vérifier qu'aucune mission n'est déjà liée
        const {data:existing}=await sb.from('missions').select('id').eq('besoin_id',besoin.id).limit(1);
        if(!existing||existing.length===0){
          setModal('proposeMission');
          setEditing(false);setSaving(false);
          return;
        }
      }
      // Auto-création tâche entretien
      const shouldCreateEntretienTache=f.statut==='Entretien programmé'&&f.date_entretien&&(f.date_entretien!==besoin.date_entretien||besoin.statut!=='Entretien programmé');
      if(shouldCreateEntretienTache){
        const alreadyHasEntretienTache=taches.some(t=>t.besoin_id===besoin.id&&(t.titre||'').startsWith('Entretien —')&&t.statut!=='fait'&&t.statut!=='annule');
        if(alreadyHasEntretienTache){
          toast('📅 Entretien re-planifié — pense à mettre à jour la tâche existante');
        } else {
          const {error:tacheErr}=await sb.from('taches').insert({id:`tw_entretien_${besoin.id}_${Date.now()}`,titre:`Entretien — ${besoin.titre}`,statut:'en_cours',due_date:combineDT(f.date_entretien.slice(0,10),f.date_entretien.length>10?f.date_entretien.slice(11,16):null),contact_id:besoin.contact_id?parseInt(besoin.contact_id):null,besoin_id:besoin.id,mission_id:null,notes:null,responsable:f.responsable});
          if(!tacheErr) toast('📅 Tâche entretien créée');
          else toast('Entretien enregistré — tâche non créée','error');
        }
      }
      toast('Besoin modifié');setEditing(false);onRefresh();
    }
    setSaving(false);
  };
  const handleDelete=async()=>{setDeleting(true);await sb.from('besoins').delete().eq('id',besoin.id);toast('Besoin supprimé');onRefresh();onClose();};
  const logAction=async(action)=>{
    await sb.from('historique_actions').insert({id_prospect:besoin.contact_id,date:action.date,type_action:action.type_action,details:action.details||null,responsable:action.responsable,besoin_id:besoin.id});
    onRefresh();setModal(null);
  };

  const actions=isOwner&&(
    <>
      <button onClick={()=>setEditing(!editing)} className="px-3 py-1.5 text-xs bg-midnight text-white font-medium btn-brutal">{editing?'Annuler':<><Icon d={ICONS.edit} size={14}/> Modifier</>}</button>
      <button onClick={()=>setModal('hist')} className="px-3 py-1.5 text-xs bg-midnight text-white font-medium btn-brutal"><Icon d={ICONS.add} size={14}/> Action</button>
      <button onClick={()=>setModal('tache')} className="px-3 py-1.5 text-xs border-2 border-neutral-200 text-carbon font-medium hover:border-midnight"><Icon d={ICONS.check} size={14}/> Tâche</button>
      {modal!=='confirmDel'
        ?<button onClick={()=>setModal('confirmDel')} className="px-3 py-1.5 text-xs border-2 border-coral-100 text-coral-100 font-medium hover:bg-coral-100 hover:text-white transition-colors"><Icon d={ICONS.delete} size={14}/></button>
        :<div className="flex gap-2 items-center"><span className="text-xs text-red-700">Supprimer ?</span><button onClick={handleDelete} disabled={deleting} className="px-2 py-1 text-xs bg-coral-100 text-white rounded">{deleting?'...':'Oui'}</button><button onClick={()=>setModal(null)} className="text-xs text-slate">Non</button></div>
      }
    </>
  );

  return (
    <SidePanel title={editing?<input type="text" value={f.titre} onChange={e=>setF(v=>({...v,titre:e.target.value}))} className="font-bold text-lg border-b-2 border-midnight focus:outline-none focus:border-lemon-100 w-full bg-transparent transition-colors" style={{minWidth:0}}/>:besoin.titre}
      badge={<BesoinBadge statut={f.statut}/>} onClose={onClose} actions={actions}>

      {/* Stepper statut */}
      {editing&&<BesoinStatusStepper value={f.statut} onChange={s=>setF(v=>({...v,statut:s}))}/>}

      {/* Infos générales */}
      <div className="grid grid-cols-2 gap-3 text-sm">
        <div><span className="text-[11px] text-slate uppercase tracking-wide">Responsable</span><br/>{editing&&isAdmin?<select value={f.responsable} onChange={e=>setF(v=>({...v,responsable:e.target.value}))} className={inputCls}>{respOptions(allProfiles,f.responsable).map(p=><option key={p.nom} value={p.nom}>{p.nom}</option>)}</select>:<span className="text-carbon font-medium">{besoin.responsable}</span>}</div>
        <div><span className="text-[11px] text-slate uppercase tracking-wide">Compte</span><br/>{editing?<CompteSearchField contacts={contacts} value={f.compte||''} onChange={compte=>setF(v=>({...v,compte}))}/>:<span className="text-carbon font-medium">{besoin.compte||'—'}</span>}</div>
        {contact&&!editing&&<div className="col-span-2"><span className="text-[11px] text-slate uppercase tracking-wide">Contact</span><br/>{onNavToContact?<button onClick={()=>{onClose();onNavToContact(contact.id);}} className="text-midnight font-medium underline decoration-2 decoration-lemon-100 underline-offset-2 hover:decoration-lemon-100 hover:bg-lemon-20 cursor-pointer transition-colors">{contact.prenom} {contact.nom} — {contact.groupe}</button>:<span>{contact.prenom} {contact.nom} — {contact.groupe}</span>}</div>}
        {besoin.lien&&!editing&&<div className="col-span-2"><span className="text-[11px] text-slate uppercase tracking-wide">Lien</span><br/><a href={besoin.lien} target="_blank" className="text-azure-100 hover:underline text-xs">{besoin.lien}</a></div>}
        {editing&&<div className="col-span-2"><Field label="Lien"><input type="url" value={f.lien||''} onChange={e=>setF(v=>({...v,lien:e.target.value}))} className={inputCls}/></Field></div>}
      </div>

      {/* Description */}
      {editing?<Field label="Description"><textarea rows={2} value={f.description||''} onChange={e=>setF(v=>({...v,description:e.target.value}))} className={inputCls+' resize-none'}/></Field>
        :besoin.description&&<div><div className="text-[11px] font-bold text-slate uppercase tracking-[0.1em] mb-2">Description</div><div className="text-sm text-slate bg-neutral-50 rounded-lg p-3 whitespace-pre-wrap">{besoin.description}</div></div>}

      {/* Contact lié (edit) */}
      {editing&&<Field label="Contact lié"><ContactPicker contacts={contacts} value={f.contact_id} filterCompte={f.compte||''} onChange={cid=>{
        const c=cid?contacts.find(x=>String(x.id)===String(cid)):null;
        setF(v=>({...v,contact_id:cid,...(c&&c.groupe&&!v.compte?{compte:c.groupe}:{})}));
        setGagneErrors(e=>({...e,contact:undefined}));
      }}/>{gagneErrors.contact&&<div className="text-xs text-coral-100 mt-1">{gagneErrors.contact}</div>}</Field>}

      {/* Budget */}
      {editing?<Field label="Budget"><BudgetInput budget={f.budget} tjm={f.budget_tjm} jours={f.budget_jours} dateDebut={f.budget_date_debut} dateFin={f.budget_date_fin} onChange={upd=>setF(v=>({...v,...upd}))}/></Field>
        :besoin.budget>0&&<div className="text-sm"><span className="text-[11px] text-slate uppercase tracking-wide">Budget : </span><span className="font-medium text-jade-100">{fmtCurrency(besoin.budget)}</span></div>}

      {/* Candidats (multi + legacy) */}
      {BESOIN_HAS_CANDIDAT.has(f.statut)&&(
        <BesoinCandidatsList besoinId={besoin.id} candidats={mesCandidats} contacts={contacts} contactMap={contactMap} profile={profile} readOnly={!isOwner} legacyCandidatId={besoin.candidat_id} onRefresh={onDataRefresh||onRefresh} onNavToContact={onNavToContact} onClose={onClose}/>
      )}
      {gagneErrors.candidat&&<div className="text-xs text-coral-100">{gagneErrors.candidat}</div>}

      {/* Entretien */}
      {BESOIN_HAS_ENTRETIEN.has(f.statut)&&(editing
        ?<Field label="Date entretien"><input type="datetime-local" value={f.date_entretien?.slice(0,16)||''} onChange={e=>setF(v=>({...v,date_entretien:e.target.value}))} className={inputCls}/></Field>
        :besoin.date_entretien&&<div className="text-sm"><span className="text-[11px] text-slate uppercase tracking-wide">Entretien : </span>{new Date(besoin.date_entretien).toLocaleString('fr-FR',{timeZone:TZ})}</div>
      )}

      {/* Compte-rendu */}
      {BESOIN_HAS_CR.has(f.statut)&&(editing
        ?<Field label="Compte-rendu"><textarea rows={3} value={f.compte_rendu||''} onChange={e=>setF(v=>({...v,compte_rendu:e.target.value}))} className={inputCls+' resize-none'}/></Field>
        :besoin.compte_rendu&&<div><div className="text-[11px] font-bold text-slate uppercase tracking-[0.1em] mb-2">Compte-rendu</div><div className="text-sm text-slate bg-neutral-50 rounded-lg p-3 whitespace-pre-wrap">{besoin.compte_rendu}</div></div>
      )}

      {/* Besoin Gagné : champs mission */}
      {f.statut==='Besoin Gagné'&&(editing?(
        <div className="space-y-3 bg-jade-20 rounded-lg p-3">
          <div className="text-xs font-semibold text-jade-100 uppercase">Besoin Gagné — Mission</div>
          <Field label="Consultant"><ContactSearchField contacts={contacts||[]} value={f.consultant_id} onChange={(id,name)=>setF(v=>({...v,consultant_id:id,consultant_name:name||''}))} statuts={['Consultant CDI','Freelance','Prestataire']} placeholder="Rechercher consultant CDI/freelance/prestataire..."/></Field>
          <div className="grid grid-cols-2 gap-2">
            <Field label="Date démarrage"><input type="date" value={f.date_demarrage||''} onChange={e=>setF(v=>({...v,date_demarrage:e.target.value}))} className={inputCls}/></Field>
            <Field label="Date fin"><input type="date" value={f.date_fin||''} onChange={e=>setF(v=>({...v,date_fin:e.target.value}))} className={inputCls}/></Field>
            <Field label="TJM vente"><input type="number" value={f.tjm_vente||''} onChange={e=>setF(v=>({...v,tjm_vente:parseFloat(e.target.value)||0}))} className={inputCls}/></Field>
            <Field label="CJM achat"><input type="number" value={f.cjm_achat||''} onChange={e=>setF(v=>({...v,cjm_achat:parseFloat(e.target.value)||0}))} className={inputCls}/></Field>
          </div>
          {nbJours>0&&<div className="text-xs text-jade-100">{nbJours} jours ouvrés · CA {fmtCurrency(caProj)} · Marge {fmtCurrency(margeProj)} ({tauxMarge.toFixed(1)}%)</div>}
        </div>
      ):(besoin.tjm_vente&&(
        <div className="bg-jade-20 rounded-lg p-3">
          <div className="text-xs font-semibold text-jade-100 uppercase mb-2">Mission</div>
          <div className="grid grid-cols-2 gap-2 text-sm">
            <div><span className="text-slate">Période</span><br/>{fmtDateParis(besoin.date_demarrage)} → {fmtDateParis(besoin.date_fin)} ({nbJours}j)</div>
            <div><span className="text-slate">TJM / CJM</span><br/>{besoin.tjm_vente}€ / {besoin.cjm_achat}€</div>
            <div><span className="text-slate">CA projeté</span><br/><span className="font-semibold text-jade-100">{fmtCurrency(caProj)}</span></div>
            <div><span className="text-slate">Marge</span><br/><span className="font-semibold">{fmtCurrency(margeProj)} ({tauxMarge.toFixed(1)}%)</span></div>
          </div>
        </div>
      )))}

      {/* Besoin Perdu : motif */}
      {f.statut==='Besoin Perdu'&&(editing?(
        <div className="space-y-2 bg-coral-20 rounded-lg p-3">
          <Field label="Motif de perte">
            <select value={f.motif_perte||''} onChange={e=>setF(v=>({...v,motif_perte:e.target.value}))} className={inputCls}>
              <option value="">Choisir...</option>
              {BESOIN_MOTIFS_PERTE.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
            </select>
          </Field>
          {f.motif_perte==='autre'&&<Field label="Précision"><input type="text" value={f.motif_perte_precision||''} onChange={e=>setF(v=>({...v,motif_perte_precision:e.target.value}))} className={inputCls}/></Field>}
        </div>
      ):(besoin.motif_perte&&(
        <div className="bg-coral-20 rounded-lg p-3 text-sm">
          <span className="text-slate">Motif : </span>{BESOIN_MOTIFS_PERTE.find(m=>m.value===besoin.motif_perte)?.label||besoin.motif_perte}
          {besoin.motif_perte_precision&&<span className="text-slate"> — {besoin.motif_perte_precision}</span>}
        </div>
      )))}

      {/* Bouton sauvegarder */}
      {editing&&<button onClick={saveEdit} disabled={saving} className="w-full py-2.5 bg-midnight text-white text-sm font-medium disabled:opacity-50 btn-brutal">{saving?'Enregistrement...':'Sauvegarder'}</button>}

      {/* Mission liée */}
      {(()=>{const m=(missions||[]).find(x=>String(x.besoin_id)===String(besoin.id));return m?<div><div className="text-[11px] font-bold text-slate uppercase tracking-[0.1em] mb-2">Mission liée</div><button onClick={()=>{if(onNavToMission){onClose();onNavToMission(m.id);}}} className="px-2.5 py-1 bg-lemon-20 text-midnight text-xs font-semibold hover:bg-lemon-100 cursor-pointer transition-colors"><Icon d={ICONS.work} size={12}/> {m.consultant}{m.client?' · '+m.client:''}</button></div>:null;})()}

      {/* Tâches liées */}
      {besoinTaches.length>0&&(
        <div>
          <div className="text-[11px] font-bold text-slate uppercase tracking-[0.1em] mb-2">Tâches actives</div>
          <div className="space-y-2">{besoinTaches.map(t=>(
            <div key={t.id} onClick={()=>{if(onNavToTache){onClose();onNavToTache(t.id);}}} className={`flex items-start gap-2 bg-lemon-20 p-3 ${onNavToTache?'cursor-pointer hover:bg-lemon-100 transition-colors':''}`}>
              <span className="text-midnight mt-0.5">◆</span>
              <div><div className="text-sm font-medium text-midnight">{t.titre}</div>{t.due_date&&<div className="text-xs text-slate">Échéance : {fmtDT(t.due_date,DEFAULT_TASK_TIME)}</div>}</div>
            </div>
          ))}</div>
        </div>
      )}

      {/* Historique lié */}
      <div>
        <div className="text-[11px] font-bold text-slate uppercase tracking-[0.1em] mb-2">Historique ({besoinHist.length})</div>
        {besoinHist.length===0
          ?<div className="text-sm text-neutral-300 italic">Aucune action</div>
          :<div className="space-y-2">{besoinHist.map((h,i)=>(
            <div key={i} className="text-sm border-l-2 border-neutral-100 pl-3">
              <div className="flex items-baseline gap-2 flex-wrap">
                <span className="text-[11px] text-neutral-300 tabular-nums whitespace-nowrap">{fmtDateParis(h.date)}</span>
                <span className="font-medium text-carbon">{h.type_action}</span>
              </div>
              {h.details&&<div className="text-slate text-xs mt-0.5">{h.details}</div>}
            </div>
          ))}</div>
        }
      </div>

      {/* Modals actions/tâches */}
      {modal==='hist'&&<AddBesoinActionModal besoin={besoin} contact={contact} profile={profile} onClose={()=>setModal(null)} onSaved={()=>{onRefresh();setModal(null);}}/>}
      {modal==='tache'&&<AddTacheModal contacts={contact?[contact]:contacts} besoins={besoins||[]} missions={missions||[]} profile={profile} allProfiles={allProfiles} onClose={()=>setModal(null)} onSaved={()=>{onRefresh();setModal(null);}} defaultContactId={besoin.contact_id} defaultBesoinId={besoin.id}/>}
      {/* Besoin Gagné → proposer mission */}
      {modal==='proposeMission'&&(
        <Modal title="🏆 Besoin gagné !" onClose={()=>{setModal(null);onRefresh();}}>
          <div className="text-center py-4 space-y-4">
            <div className="text-4xl">🎉</div>
            <p className="text-carbon">Ce besoin est gagné. Veux-tu créer une mission associée ?</p>
            <div className="flex gap-3 justify-center">
              <button onClick={()=>{setModal(null);onRefresh();}} className="px-4 py-2 text-sm text-slate border rounded-lg hover:bg-neutral-50">Plus tard</button>
              <button onClick={()=>setModal('createMission')} className="px-4 py-2 bg-midnight text-white text-sm font-medium hover:bg-carbon btn-brutal">Créer la mission</button>
            </div>
          </div>
        </Modal>
      )}
      {modal==='createMission'&&(()=>{
        const consultantFromBesoin=besoin.consultant_id?contacts.find(c=>c.id===besoin.consultant_id):null;
        const retenu=mesCandidats.find(bc=>bc.statut==='retenu');
        const missionCandidat=consultantFromBesoin||(retenu?contacts.find(c=>c.id===retenu.contact_id):candidat);
        return <MissionFormModal
          mission={{
            consultant:missionCandidat?`${missionCandidat.prenom} ${missionCandidat.nom}`:'',
            contact_consultant_id:missionCandidat?.id||null,
            client:besoin.compte||contact?.groupe||'',
            projet:besoin.titre,
            tjm:besoin.tjm_vente||'',
            cjm:besoin.cjm_achat||'',
            statut:'New',
            type_contrat:'',
            responsable:besoin.responsable,
            agence:allProfiles.find(p=>p.nom===besoin.responsable)?.agence||profile.agence||'Lyon',
            num_commande:'',
            date_debut_mission:besoin.date_demarrage||'',
            date_fin_mission:besoin.date_fin||'',
            referent:contact?`${contact.prenom} ${contact.nom}`:'',
            contact_referent_id:besoin.contact_id||null,
            besoin_id:besoin.id
          }}
          profile={profile} allProfiles={allProfiles} contacts={contacts} besoins={besoins}
          onClose={()=>{setModal(null);onRefresh();}}
          onSaved={()=>{setModal(null);onRefresh();}}
          prefillBesoinId={besoin.id}
        />;
      })()}
    </SidePanel>
  );
}

// ── Kanban Besoins ──────────────────────────────────────────────────────────
function KanbanBesoins({ besoins, contacts, contactMap, besoinCandidats, onSelect, onStatutChange }) {
  const [dragId,setDragId]=useState(null);
  const [overCol,setOverCol]=useState(null);
  const [dragOverCardId,setDragOverCardId]=useState(null);
  const [colOrders,setColOrders]=useState(()=>{
    try { return JSON.parse(localStorage.getItem('besoins_kanban_order')||'{}'); }
    catch { return {}; }
  });

  const getOrderedItems = (statut, items) => {
    const saved = colOrders[statut];
    if (!saved || saved.length === 0) return items;
    const idSet = new Set(items.map(b => String(b.id)));
    const ordered = saved.filter(id => idSet.has(String(id))).map(id => items.find(b => String(b.id) === String(id))).filter(Boolean);
    const orderedIds = new Set(ordered.map(b => String(b.id)));
    const extras = items.filter(b => !orderedIds.has(String(b.id)));
    return [...ordered, ...extras];
  };

  const onDragStart=(e,besoin)=>{setDragId(besoin.id);e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',besoin.id);};
  const onDragEnd=()=>{setDragId(null);setOverCol(null);setDragOverCardId(null);};
  const onDragOver=(e,statut)=>{e.preventDefault();e.dataTransfer.dropEffect='move';setOverCol(statut);};
  const onDragLeave=(e,statut)=>{if(!e.currentTarget.contains(e.relatedTarget))setOverCol(null);};
  const onDrop=async(e,statut)=>{
    e.preventDefault();setOverCol(null);
    const id=e.dataTransfer.getData('text/plain');
    const besoin=besoins.find(b=>String(b.id)===String(id));
    if(!besoin) { setDragId(null); setDragOverCardId(null); return; }
    if(besoin.statut!==statut) {
      onStatutChange(besoin,statut);
    } else if(dragOverCardId && String(dragOverCardId)!==String(id)) {
      const items = getOrderedItems(statut, besoins.filter(b=>b.statut===statut));
      const oldIdx = items.findIndex(b=>String(b.id)===String(id));
      const newIdx = items.findIndex(b=>String(b.id)===String(dragOverCardId));
      if(oldIdx!==-1 && newIdx!==-1) {
        const reordered = [...items];
        const [moved] = reordered.splice(oldIdx,1);
        reordered.splice(newIdx,0,moved);
        const newOrder = reordered.map(b=>String(b.id));
        const updated = {...colOrders, [statut]: newOrder};
        setColOrders(updated);
        localStorage.setItem('besoins_kanban_order', JSON.stringify(updated));
      }
    }
    setDragId(null); setDragOverCardId(null);
  };

  const STATUT_SHORT={'Opportunité':'Opport.','Push opportuniste':'Push','Besoin ouvert':'Ouvert','Profil proposé':'Proposé','Entretien programmé':'Entr. prog.','Entretien passé':'Entr. passé','Besoin Gagné':'Gagné','Besoin Perdu':'Perdu'};
  const STATUT_ICON_PATHS={'Opportunité':ICONS.search,'Push opportuniste':null,'Besoin ouvert':null,'Profil proposé':null,'Entretien programmé':ICONS.calendar,'Entretien passé':ICONS.check,'Besoin Gagné':ICONS.star,'Besoin Perdu':ICONS.close};
  // Colonnes visibles : celles qui ont des items + toujours Gagné/Perdu pour pouvoir y déposer
  const visibleStatuts=BESOIN_STATUTS_ORDRE;

  return (
    <div className="kanban-board">
      {visibleStatuts.map(statut=>{
        const items=getOrderedItems(statut, besoins.filter(b=>b.statut===statut));
        return (
          <div key={statut}
            className={`kanban-col${overCol===statut?' drag-over':''}`}
            onDragOver={e=>onDragOver(e,statut)} onDragLeave={e=>onDragLeave(e,statut)} onDrop={e=>onDrop(e,statut)}>
            <div className="flex items-center gap-1 mb-2 px-1">
              {STATUT_ICON_PATHS[statut]&&<Icon d={STATUT_ICON_PATHS[statut]} size={12}/>}
              <span className="text-xs font-semibold text-carbon truncate">{STATUT_SHORT[statut]||statut}</span>
              <span className="text-xs bg-white text-slate px-1.5 rounded-full border ml-auto">{items.length}</span>
            </div>
            <div className="kanban-items" style={{minHeight:40}}>
              {items.map(b=>{
                const contact=contactMap[b.contact_id];
                const bCandidats=(besoinCandidats||[]).filter(bc=>bc.besoin_id===b.id);
                const candidatLegacy=contactMap[b.candidat_id];
                const nbJ=b.statut==='Besoin Gagné'?joursOuvres(b.date_demarrage,b.date_fin):0;
                const ca=nbJ*(b.tjm_vente||0);
                return (
                  <div key={b.id} draggable onDragStart={e=>onDragStart(e,b)} onDragEnd={onDragEnd}
                    onDragEnter={e=>{e.preventDefault();if(dragId&&dragId!==b.id)setDragOverCardId(b.id);}}
                    onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragOverCardId(v=>v===b.id?null:v);}}
                    onClick={()=>onSelect(b)} data-detail tabIndex="0"
                    className={`kanban-card${dragId===b.id?' dragging':''}${dragOverCardId===b.id&&dragId!==b.id?' border-t-2 border-t-lemon-100':''} focus:outline-none focus:border-midnight`}>
                    <div className="text-xs font-medium text-midnight truncate">{b.titre}</div>
                    {contact&&<div className="text-xs text-slate truncate">{contact.prenom} {contact.nom}</div>}
                    {bCandidats.length>0
                      ?<div className="text-xs text-azure-100 truncate"><Icon d={ICONS.person} size={12}/> {bCandidats.map(bc=>{const c=contactMap[bc.contact_id];return c?`${c.prenom} ${c.nom}`:''}).filter(Boolean).join(', ')}</div>
                      :candidatLegacy&&<div className="text-xs text-azure-100 truncate"><Icon d={ICONS.person} size={12}/> {candidatLegacy.prenom} {candidatLegacy.nom}</div>
                    }
                    {b.statut==='Besoin Gagné'&&ca>0&&<div className="text-xs text-jade-100 font-medium">{fmtCurrency(ca)}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Onglet Pipeline V2 ──────────────────────────────────────────────────────
function TabBesoins({ contacts, contactMap, besoins, besoinCandidats, historique, taches, missions, profile, allProfiles, commerciauxParAgence, onRefresh, navBesoinId, navBesoinKey, onNavToContact, onNavToMission, onNavToTache, prefs }) {
  const [search,setSearch]=useState(''); const [filterStatut,setFilterStatut]=useState('');
  const [filterResp,setFilterResp]=useState('');
  const [filterAgence,setFilterAgence]=useState(prefs?.besoins_filter_agence||(profile.role==='admin'?'':profile.agence));
  const [selected,setSelected]=useState(null);
  useEffect(()=>{ if(navBesoinId){ const b=besoins.find(x=>String(x.id)===String(navBesoinId)); if(b) setSelected(b); } },[navBesoinKey]);
  const [showAdd,setShowAdd]=useState(false);
  const [viewMode,setViewMode]=useState(prefs?.besoins_view||'list');
  const isAdmin=profile.role==='admin';

  const agences=useMemo(()=>[...new Set(allProfiles.map(p=>p.agence).filter(Boolean))].sort(),[allProfiles]);
  const responsablesVisibles=useMemo(()=>{
    if(isAdmin&&!filterAgence) return [...new Set(allProfiles.map(p=>p.nom).filter(Boolean))].sort();
    const ag=filterAgence||profile.agence;
    return commerciauxParAgence[ag]||[];
  },[isAdmin,filterAgence,profile.agence,allProfiles,commerciauxParAgence]);

  const sorted=useMemo(()=>{
    const q=search.toLowerCase();
    return [...besoins]
      .filter(b=>{
        if(filterStatut&&b.statut!==filterStatut) return false;
        if(filterResp&&b.responsable!==filterResp) return false;
        if(filterAgence&&b.agence!==filterAgence) return false;
        if(q){
          const c=contactMap[b.contact_id];
          const cand=contactMap[b.candidat_id];
          const bCands=(besoinCandidats||[]).filter(bc=>bc.besoin_id===b.id).map(bc=>contactMap[bc.contact_id]).filter(Boolean);
          const candNames=bCands.flatMap(c=>[c.prenom,c.nom]);
          if(![b.titre,b.compte,b.responsable,c?.prenom,c?.nom,c?.groupe,cand?.prenom,cand?.nom,...candNames].some(v=>(v||'').toLowerCase().includes(q))) return false;
        }
        return true;
      })
      .sort((a,b)=>BESOIN_STATUTS_ORDRE.indexOf(a.statut)-BESOIN_STATUTS_ORDRE.indexOf(b.statut));
  },[besoins,search,filterStatut,filterResp,filterAgence,contactMap]);

  const hasFilter=search||filterStatut||filterResp||(isAdmin?filterAgence!=='':filterAgence!==profile.agence);
  const resetAll=()=>{setSearch('');setFilterStatut('');setFilterResp('');setFilterAgence(isAdmin?'':profile.agence);};

  const STATUT_BTNS=[
    {label:'TOUS',value:''},
    {label:'OPPORTUNITÉ',value:'Opportunité'},
    {label:'PUSH',value:'Push opportuniste'},
    {label:'OUVERT',value:'Besoin ouvert'},
    {label:'PROFIL PROPOSÉ',value:'Profil proposé'},
    {label:'ENTRETIEN PROG.',value:'Entretien programmé'},
    {label:'ENTRETIEN PASSÉ',value:'Entretien passé'},
    {label:'GAGNÉ',value:'Besoin Gagné'},
    {label:'PERDU',value:'Besoin Perdu'},
  ];

  return (
    <div className="tab-content">
      <div className="flex items-center justify-between mb-3">
        <div/>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-midnight text-white text-sm font-medium hover:bg-carbon btn-brutal">+ Nouveau besoin</button>
      </div>
      <div className="flex gap-2 sm:gap-3 mb-3 flex-wrap items-center">
        <input type="text" placeholder="Rechercher..." value={search} onChange={e=>setSearch(e.target.value)} className="flex-1 min-w-[140px] sm:min-w-48 px-4 py-2 border rounded-lg text-sm focus:outline-none focus:border-midnight"/>
        {isAdmin&&agences.length>1&&(
          <select value={filterAgence} onChange={e=>{setFilterAgence(e.target.value);setFilterResp(e.target.value?'':profile.nom);}} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
            <option value="">Toutes agences</option>{agences.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        )}
        {!isAdmin&&(
          <span className="px-3 py-2 bg-neutral-50 border rounded-lg text-sm text-slate">{profile.agence}</span>
        )}
        <select value={filterResp} onChange={e=>setFilterResp(e.target.value)} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
          <option value="">Tous{!isAdmin?` (${profile.agence})`:filterAgence?` (${filterAgence})`:''}</option>
          {responsablesVisibles.map(r=><option key={r} value={r}>{r}{r===profile.nom?' (moi)':''}</option>)}
        </select>
        {hasFilter&&<button onClick={resetAll} className="px-3 py-2 text-sm text-slate hover:text-carbon">✕</button>}
        <div className="flex border rounded-lg overflow-hidden text-sm">
          <button onClick={()=>setViewMode('list')} className={`px-3 py-2 font-medium ${viewMode==='list'?'bg-midnight text-white':'bg-white text-slate hover:bg-neutral-50'}`}><Icon d={ICONS.list} size={14}/> Liste</button>
          <button onClick={()=>setViewMode('kanban')} className={`px-3 py-2 font-medium border-l ${viewMode==='kanban'?'bg-midnight text-white':'bg-white text-slate hover:bg-neutral-50'}`}>▥ Kanban</button>
        </div>
      </div>
      {viewMode==='list'&&(
        <>
          <div className="flex gap-1.5 flex-wrap mb-4">
            {STATUT_BTNS.map(btn=>{
              const active=filterStatut===btn.value;
              const bc=btn.value?BESOIN_BADGE_COLORS_GLOBAL[btn.value]:null;
              return <button key={btn.value} onClick={()=>setFilterStatut(btn.value)}
                style={active&&bc?{backgroundColor:bc.bg,color:bc.color}:active?{backgroundColor:'#1C1F35',color:'#fff'}:{}}
                className={`px-3 py-1.5 text-[11px] font-bold border-2 transition-colors whitespace-nowrap tracking-[0.04em]
                  ${active?'border-transparent':'bg-white text-slate border-neutral-200 hover:border-midnight hover:text-midnight'}`}>
                {btn.label}
              </button>;
            })}
          </div>
          <div className="text-xs text-neutral-300 mb-3">{sorted.length} besoin{sorted.length>1?'s':''}</div>
          <div className="space-y-6">
            {(filterStatut?[filterStatut]:BESOIN_STATUTS_ORDRE).map(statut=>{
              const items=sorted.filter(b=>b.statut===statut);
              if(items.length===0) return null;
              const bc=BESOIN_BADGE_COLORS_GLOBAL[statut]||{bg:'#E4E4E6',color:'#1C1F35'};
              return (
                <div key={statut}>
                  <div className="flex items-center gap-2 mb-2">
                    <span style={{backgroundColor:bc.bg,color:bc.color,padding:'2px 8px',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em',whiteSpace:'nowrap'}}>{statut}</span>
                    <span className="text-xs font-bold text-slate">{items.length}</span>
                  </div>
                  <div className="space-y-2">{items.map(b=>{
                    const contact=contactMap[b.contact_id];
                    const bCandidats=(besoinCandidats||[]).filter(bc=>bc.besoin_id===b.id);
                    const candidatLegacy=contactMap[b.candidat_id];
                    const nbJ=b.statut==='Besoin Gagné'?joursOuvres(b.date_demarrage,b.date_fin):0;
                    const ca=nbJ*(b.tjm_vente||0);
                    const marge=ca-nbJ*(b.cjm_achat||0);
                    return (
                      <div key={b.id} onClick={()=>setSelected(b)} data-detail tabIndex="0" className="bg-white border-2 border-neutral-200 p-3 sm:p-4 cursor-pointer hover:border-blue-200 focus:outline-none focus:border-midnight transition-colors">
                        <div className="flex items-start gap-3">
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 flex-wrap mb-1">
                              <span className="font-semibold text-midnight text-sm truncate">{b.titre}</span>
                            </div>
                            <div className="flex flex-wrap gap-2 text-xs text-slate">
                              {contact&&<span>{contact.prenom} {contact.nom}</span>}
                              {b.compte&&<span className="text-neutral-300">· {b.compte}</span>}
                              {bCandidats.length>0
                                ?bCandidats.map(bc=>{const c=contactMap[bc.contact_id];return c?<span key={bc.id} className="bg-azure-20 text-azure-100 px-2 py-0.5 rounded-full"><Icon d={ICONS.person} size={12}/> {c.prenom} {c.nom}</span>:null;})
                                :candidatLegacy&&<span className="bg-azure-20 text-azure-100 px-2 py-0.5 rounded-full"><Icon d={ICONS.person} size={12}/> {candidatLegacy.prenom} {candidatLegacy.nom}</span>
                              }
                            </div>
                            {b.budget>0&&b.statut!=='Besoin Gagné'&&<div className="text-xs text-jade-100 font-medium mt-1">{fmtCurrency(b.budget)}</div>}
                            {b.statut==='Besoin Gagné'&&ca>0&&(
                              <div className="text-xs mt-1 flex gap-3">
                                <span className="text-jade-100 font-medium">CA {fmtCurrency(ca)}</span>
                                <span className={marge>=0?'text-jade-100':'text-coral-100'}>Marge {fmtCurrency(marge)} ({ca>0?(marge/ca*100).toFixed(1):0}%)</span>
                                <span className="text-neutral-300">{nbJ}j</span>
                              </div>
                            )}
                            {b.date_entretien&&<div className="text-xs text-neutral-300 mt-1"><Icon d={ICONS.calendar} size={12}/> {new Date(b.date_entretien).toLocaleString('fr-FR',{timeZone:TZ})}</div>}
                          </div>
                          <div className="shrink-0 text-xs text-neutral-300">{b.responsable}</div>
                        </div>
                      </div>
                    );
                  })}</div>
                </div>
              );
            })}
            {sorted.length===0&&<div className="text-center py-16"><div className="font-bold text-midnight text-lg mb-1">Aucun besoin</div><div className="text-sm text-neutral-300">Les besoins actifs apparaîtront ici.</div></div>}
          </div>
        </>
      )}
      {viewMode==='kanban'&&(
        <KanbanBesoins besoins={sorted} contacts={contacts} contactMap={contactMap} besoinCandidats={besoinCandidats} onSelect={b=>setSelected(b)}
          onStatutChange={async(besoin,newStatut)=>{
            if(newStatut==='Besoin Gagné'){
              const errs=[];
              const hasCand=(besoinCandidats||[]).some(bc=>bc.besoin_id===besoin.id)||besoin.candidat_id;
              if(!hasCand) errs.push('Candidat manquant');
              if(!besoin.contact_id) errs.push('Contact lié manquant');
              if(errs.length){toast(`Impossible de passer à Gagné : ${errs.join(', ')}. Ouvre le besoin pour compléter.`,'error');return;}
            }
            await sb.from('besoins').update({statut:newStatut,updated_at:new Date().toISOString()}).eq('id',besoin.id);
            onRefresh();
          }}/>
      )}
      {selected&&<BesoinDetail besoin={besoins.find(b=>b.id===selected.id)||selected} contacts={contacts} contactMap={contactMap} besoinCandidats={besoinCandidats} historique={historique} taches={taches} missions={missions} besoins={besoins} profile={profile} allProfiles={allProfiles} onClose={()=>setSelected(null)} onRefresh={()=>{onRefresh();setSelected(null);}} onDataRefresh={onRefresh} onNavToContact={onNavToContact} onNavToMission={onNavToMission} onNavToTache={onNavToTache}/>}
      {showAdd&&<AddBesoinModal contacts={contacts} profile={profile} allProfiles={allProfiles} onClose={()=>setShowAdd(false)} onSaved={()=>{setShowAdd(false);onRefresh();}}/>}
    </div>
  );
}

// ── Onglet Historique ─────────────────────────────────────────────────────────
function TabHistorique({ historique, contacts, contactMap, taches, besoins, profile, allProfiles, onRefresh, onNavToContact, onNavToBesoin, onNavToTache }) {
  const [search,setSearch]=useState(''); const [filterResp,setFilterResp]=useState('');
  const [filterType,setFilterType]=useState('');
  const [selected,setSelected]=useState(null);
  const [visibleCount,setVisibleCount]=useState(100);
  const isAdmin=profile.role==='admin';
  const responsables=useMemo(()=>[...new Set(historique.map(h=>h.responsable).filter(Boolean))].sort(),[historique]);
  const typesAction=useMemo(()=>[...new Set(historique.map(h=>h.type_action).filter(Boolean))].sort(),[historique]);

  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    return historique.filter(h=>{
      if(filterResp&&h.responsable!==filterResp)return false;
      if(filterType&&h.type_action!==filterType)return false;
      if(!q)return true;
      const c=h.id_prospect?contactMap[h.id_prospect]:null;
      const nom=c?`${c.prenom||''} ${c.nom||''} ${c.groupe||''}`:'';
      return[h.type_action,h.details,h.responsable,h.date,nom].some(v=>(v||'').toLowerCase().includes(q));
    });
  },[historique,search,filterResp,filterType,contactMap]);

  const TYPE_COLORS={
    'Tel':          {bg:'#dbeafe',color:'#1d4ed8'},
    'Mail envoyé':  {bg:'#dcfce7',color:'#166534'},
    'Mail reçu':    {bg:'#dcfce7',color:'#15803d'},
    'RDV':          {bg:'#fef3c7',color:'#92400e'},
    'LinkedIn':     {bg:'#ede9fe',color:'#5b21b6'},
    'Note interne':    {bg:'#f3f4f6',color:'#4b5563'},
    'Entretien':       {bg:'#f3e8ff',color:'#7e22ce'},
    'Tâche accomplie': {bg:'#dcfce7',color:'#166534'},
    'Autre':           {bg:'#f3f4f6',color:'#4b5563'},
  };

  return (
    <div className="tab-content">
      <div className="flex gap-3 mb-4 flex-wrap">
        <input type="text" placeholder="Rechercher (nom, société, type, détails, date...)"
          value={search} onChange={e=>setSearch(e.target.value)}
          className="flex-1 min-w-64 px-4 py-2 border rounded-lg text-sm focus:outline-none focus:border-midnight"/>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
          <option value="">Tous les types</option>
          {typesAction.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        {isAdmin&&responsables.length>1&&(
          <select value={filterResp} onChange={e=>setFilterResp(e.target.value)} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
            <option value="">Tous les commerciaux</option>
            {responsables.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        )}
        {(search||filterResp||filterType)&&<button onClick={()=>{setSearch('');setFilterResp('');setFilterType('');}} className="px-3 py-2 text-sm text-slate hover:text-carbon">✕ Reset</button>}
      </div>
      <div className="text-xs text-neutral-300 mb-3">{filtered.length} action{filtered.length>1?'s':''}</div>

      <div className="bg-white border-2 border-neutral-200 overflow-hidden divide-y divide-gray-50">
        {filtered.length===0&&<div className="px-4 py-10 text-center"><div className="font-bold text-midnight mb-1">Aucune action trouvée</div><div className="text-sm text-neutral-300">Modifiez vos filtres pour voir plus de résultats.</div></div>}
        {filtered.slice(0,visibleCount).map((h,i)=>{
          const contact=h.id_prospect?contactMap[h.id_prospect]:null;
          const s=TYPE_COLORS[h.type_action]||TYPE_COLORS['Autre'];
          return (
            <div key={i} className="px-4 py-3 hover:bg-neutral-50 transition-colors">
              <div className="flex items-baseline gap-2 mb-1 flex-wrap">
                <span className="text-[11px] text-neutral-300 tabular-nums whitespace-nowrap">{fmtDateParis(h.date)}</span>
                <span style={{backgroundColor:s.bg,color:s.color,padding:'2px 8px',borderRadius:0,fontSize:11,fontWeight:700,whiteSpace:'nowrap',textTransform:'uppercase',letterSpacing:'0.04em'}}>{h.type_action}</span>
                {contact&&(
                  <button onClick={()=>{if(onNavToContact)onNavToContact(contact.id);else setSelected(contact);}} className="text-sm font-semibold text-midnight underline decoration-2 decoration-lemon-100 underline-offset-2 hover:bg-lemon-20 cursor-pointer transition-colors">
                    {contact.prenom} {contact.nom}
                    {contact.groupe&&<span className="ml-1 text-xs font-normal text-neutral-300">· {contact.groupe}</span>}
                  </button>
                )}
                {h.responsable&&<span className="text-xs bg-carbon text-white px-2 py-0.5 rounded-full font-medium whitespace-nowrap ml-auto">{h.responsable}</span>}
              </div>
              <div className="flex items-center gap-2 flex-wrap">
                {h.tache_id&&(()=>{const tache=(taches||[]).find(t=>t.id===h.tache_id);return tache?<button onClick={()=>onNavToTache&&onNavToTache(tache.id)} className="px-2.5 py-1 bg-lemon-20 text-midnight text-xs font-semibold hover:bg-lemon-100 cursor-pointer transition-colors"><Icon d={ICONS.check} size={12}/> {tache.titre}</button>:null;})()}
                {h.besoin_id&&(()=>{const b=(besoins||[]).find(x=>String(x.id)===String(h.besoin_id));return b?<button onClick={()=>onNavToBesoin&&onNavToBesoin(b.id)} className="px-2.5 py-1 bg-lemon-20 text-midnight text-xs font-semibold hover:bg-lemon-100 cursor-pointer transition-colors"><Icon d={ICONS.target} size={12}/> {b.titre||'Besoin'}</button>:null;})()}
              </div>
              {h.details&&<div className="text-sm text-slate line-clamp-2 mt-1" title={h.details}>{h.details}</div>}
            </div>
          );
        })}
      </div>
      {filtered.length>visibleCount&&(
        <button onClick={()=>setVisibleCount(v=>v+100)} className="w-full py-3 text-sm text-azure-100 hover:text-midnight font-medium hover:bg-azure-20 rounded-lg mt-2">
          Voir plus ({filtered.length-visibleCount} restantes)
        </button>
      )}
      {selected&&<ContactDetail contact={selected} historique={historique} taches={taches} profile={profile} allProfiles={allProfiles} onClose={()=>setSelected(null)} onRefresh={()=>{setSelected(null);onRefresh();}}/>}
    </div>
  );
}

// ── Onglet Pipe Commercial ────────────────────────────────────────────────────
const PIPE_PROBA={'Opportunité':0.10,'Besoin ouvert':0.20,'Push opportuniste':0.15,'Profil proposé':0.40,'Entretien programmé':0.60,'Entretien passé':0.75,'Besoin Gagné':1.00,'Besoin Perdu':0};
const PIPE_STATUTS_ORDRE=['Opportunité','Push opportuniste','Besoin ouvert','Profil proposé','Entretien programmé','Entretien passé','Besoin Gagné'];
function besoinValeurBrute(b,bCandidats){
  if(b.statut==='Besoin Gagné'&&b.tjm_vente&&(b.date_demarrage||b.date_fin)){
    const j=joursOuvres(b.date_demarrage,b.date_fin);
    if(j>0) return b.tjm_vente*j;
  }
  // TJM max des candidats × jours budget si disponible
  if(bCandidats&&bCandidats.length>0){
    const maxTjm=Math.max(...bCandidats.map(bc=>bc.tjm_propose||0));
    if(maxTjm>0&&b.budget_jours) return maxTjm*b.budget_jours;
    if(maxTjm>0&&b.budget_date_debut&&b.budget_date_fin){
      const j=joursOuvres(b.budget_date_debut,b.budget_date_fin);
      if(j>0) return maxTjm*j;
    }
  }
  if(b.budget&&b.budget>0) return b.budget;
  if(b.budget_tjm&&b.budget_jours) return b.budget_tjm*b.budget_jours;
  return 0;
}
function TabPipe({ besoins, contacts, contactMap, besoinCandidats, historique, taches, missions, profile, allProfiles, onRefresh, prefs }) {
  const isAdmin=profile.role==='admin';
  const [filterAgence,setFilterAgence]=useState('');
  const [filterResp,setFilterResp]=useState(isAdmin?'':profile.nom);
  const [ventilation,setVentilation]=useState(prefs?.pipe_ventilation||'agence');
  const [riskFilter,setRiskFilter]=useState(false);
  const [donutFilter,setDonutFilter]=useState('');
  const [sortCol,setSortCol]=useState('ponderee');
  const [sortDir,setSortDir]=useState(-1);
  const [selected,setSelected]=useState(null);

  const agences=useMemo(()=>[...new Set(allProfiles.map(p=>p.agence).filter(Boolean))].sort(),[allProfiles]);
  const responsablesVisibles=useMemo(()=>{
    const pool=filterAgence?allProfiles.filter(p=>p.agence===filterAgence):allProfiles;
    return [...new Set(pool.map(p=>p.nom).filter(Boolean))].sort();
  },[allProfiles,filterAgence]);

  // Dernière action par besoin
  const lastActionByBesoin=useMemo(()=>{
    const map={};
    // Actions explicitement liées au besoin
    (historique||[]).forEach(h=>{
      if(!h.besoin_id) return;
      if(!map[h.besoin_id]||h.date>map[h.besoin_id]) map[h.besoin_id]=h.date;
    });
    // Aussi : actions sur le contact lié (même sans besoin_id)
    const besoinByContact={};
    (besoins||[]).forEach(b=>{ if(b.contact_id){ if(!besoinByContact[b.contact_id]) besoinByContact[b.contact_id]=[]; besoinByContact[b.contact_id].push(b.id); } });
    (historique||[]).forEach(h=>{
      if(!h.id_prospect||h.besoin_id) return; // déjà compté si besoin_id
      const bids=besoinByContact[h.id_prospect];
      if(!bids) return;
      bids.forEach(bid=>{ if(!map[bid]||h.date>map[bid]) map[bid]=h.date; });
    });
    return map;
  },[historique,besoins]);

  // Index candidats par besoin
  const candsByBesoin=useMemo(()=>{
    const m={};(besoinCandidats||[]).forEach(bc=>(m[bc.besoin_id]=m[bc.besoin_id]||[]).push(bc));return m;
  },[besoinCandidats]);

  // Besoins enrichis (valeur + proba + risque)
  const enriched=useMemo(()=>besoins
    .filter(b=>b.statut!=='Besoin Perdu')
    .map(b=>{
      const brute=besoinValeurBrute(b,candsByBesoin[b.id]);
      const proba=PIPE_PROBA[b.statut]||0;
      const ponderee=brute*proba;
      const lastAction=lastActionByBesoin[b.id]||b.updated_at||b.created_at;
      const daysInactive=daysSince(lastAction);
      const atRisk=daysInactive>10&&b.statut!=='Besoin Gagné';
      const contact=b.contact_id?contactMap[b.contact_id]:null;
      return {...b,brute,proba,ponderee,lastAction,daysInactive,atRisk,contact};
    })
  ,[besoins,lastActionByBesoin,contactMap,candsByBesoin]);

  // Filtrage
  const filtered=useMemo(()=>enriched.filter(b=>{
    if(filterAgence&&b.agence!==filterAgence) return false;
    if(filterResp&&b.responsable!==filterResp) return false;
    if(riskFilter&&!b.atRisk) return false;
    if(donutFilter){
      if(ventilation==='agence'&&b.agence!==donutFilter) return false;
      if(ventilation==='responsable'&&b.responsable!==donutFilter) return false;
    }
    return true;
  }),[enriched,filterAgence,filterResp,riskFilter,donutFilter,ventilation]);

  // KPIs
  const pipeBrut=filtered.reduce((s,b)=>s+b.brute,0);
  const pipePondere=filtered.reduce((s,b)=>s+b.ponderee,0);
  const aRisqueVal=filtered.filter(b=>b.atRisk).reduce((s,b)=>s+b.brute,0);
  const aRisqueCount=filtered.filter(b=>b.atRisk).length;
  const gagneYTD=filtered.filter(b=>b.statut==='Besoin Gagné').reduce((s,b)=>s+b.brute,0);

  // Funnel par statut
  const funnel=useMemo(()=>{
    return PIPE_STATUTS_ORDRE.map(statut=>{
      const items=filtered.filter(b=>b.statut===statut);
      const totalBrut=items.reduce((s,b)=>s+b.brute,0);
      const totalPond=items.reduce((s,b)=>s+b.ponderee,0);
      return {statut,count:items.length,totalBrut,totalPond,proba:PIPE_PROBA[statut]};
    }).filter(f=>f.count>0);
  },[filtered]);
  const maxFunnel=Math.max(...funnel.map(f=>f.totalBrut),1);

  // Ventilation (donut data)
  const ventilData=useMemo(()=>{
    const map={};
    filtered.forEach(b=>{
      const key=ventilation==='agence'?(b.agence||'N/A'):(b.responsable||'N/A');
      map[key]=(map[key]||0)+b.ponderee;
    });
    return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
  },[filtered,ventilation]);
  const totalVentil=ventilData.reduce((s,d)=>s+d.value,0)||1;
  const DONUT_COLORS=['#4A7FE5','#00C218','#FFE500','#FF3D2E','#823DE8','#FF66FF','#1C1F35','#5090FE'];

  // Tri tableau
  const sorted=useMemo(()=>[...filtered].sort((a,b)=>{
    let va,vb;
    if(sortCol==='ponderee'){va=a.ponderee;vb=b.ponderee;}
    else if(sortCol==='brute'){va=a.brute;vb=b.brute;}
    else if(sortCol==='proba'){va=a.proba;vb=b.proba;}
    else if(sortCol==='contact'){va=(a.contact?.nom||'').toLowerCase();vb=(b.contact?.nom||'').toLowerCase();return sortDir*(va<vb?-1:va>vb?1:0);}
    else if(sortCol==='statut'){va=PIPE_STATUTS_ORDRE.indexOf(a.statut);vb=PIPE_STATUTS_ORDRE.indexOf(b.statut);}
    else{va=a.ponderee;vb=b.ponderee;}
    return sortDir*((va||0)-(vb||0));
  }),[filtered,sortCol,sortDir]);

  const toggleSort=(col)=>{if(sortCol===col)setSortDir(d=>-d);else{setSortCol(col);setSortDir(-1);}};
  const hasFilter=filterAgence||(isAdmin&&filterResp)||riskFilter||donutFilter;
  const resetAll=()=>{setFilterAgence('');setFilterResp(isAdmin?'':profile.nom);setRiskFilter(false);setDonutFilter('');};

  const thCls="px-3 py-2.5 text-left font-medium cursor-pointer select-none hover:text-azure-100 whitespace-nowrap text-xs";
  const sortIcon=(col)=>sortCol===col?(sortDir>0?' ↑':' ↓'):'';

  return (
    <div className="tab-content space-y-6">
      {/* Filtres */}
      <div className="flex gap-2 sm:gap-3 flex-wrap items-center">
        {isAdmin&&agences.length>1&&(
          <select value={filterAgence} onChange={e=>{setFilterAgence(e.target.value);setFilterResp(e.target.value?'':isAdmin?'':profile.nom);setDonutFilter('');}} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
            <option value="">Toutes agences</option>{agences.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        )}
        <select value={filterResp} onChange={e=>{setFilterResp(e.target.value);setDonutFilter('');}} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
          <option value="">Tous{!isAdmin?` (${profile.agence})`:filterAgence?` (${filterAgence})`:''}</option>
          {responsablesVisibles.map(r=><option key={r} value={r}>{r}{r===profile.nom?' (moi)':''}</option>)}
        </select>
        <div className="flex border rounded-lg overflow-hidden text-sm">
          <button onClick={()=>setVentilation('agence')} className={`px-3 py-2 font-medium ${ventilation==='agence'?'bg-midnight text-white':'bg-white text-slate hover:bg-neutral-50'}`}>Par agence</button>
          <button onClick={()=>setVentilation('responsable')} className={`px-3 py-2 font-medium border-l ${ventilation==='responsable'?'bg-midnight text-white':'bg-white text-slate hover:bg-neutral-50'}`}>Par responsable</button>
        </div>
        {hasFilter&&<button onClick={resetAll} className="px-3 py-2 text-sm text-slate hover:text-carbon">✕ Reset</button>}
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div className="bg-white border-2 border-neutral-200 p-4">
          <div className="text-xs text-neutral-300 font-medium mb-1 uppercase tracking-wide">Pipe brut</div>
          <div className="text-3xl font-bold text-azure-100">{fmtCurrency(pipeBrut)}</div>
          <div className="text-xs text-slate mt-1">{filtered.length} besoin{filtered.length>1?'s':''} actif{filtered.length>1?'s':''}</div>
        </div>
        <div className="bg-white border-2 border-neutral-200 p-4">
          <div className="text-xs text-neutral-300 font-medium mb-1 uppercase tracking-wide">Pipe pondéré</div>
          <div className="text-3xl font-bold text-jade-100">{fmtCurrency(pipePondere)}</div>
          <div className="text-xs text-slate mt-1">Valeur × probabilité</div>
        </div>
        <button onClick={()=>{setRiskFilter(!riskFilter);setDonutFilter('');}} className={`bg-white border-2 border-neutral-200 p-4 text-left transition-colors ${riskFilter?'border-orange-400 bg-lemon-20':'border-neutral-100 hover:border-orange-200'}`}>
          <div className="text-xs text-neutral-300 font-medium mb-1 uppercase tracking-wide">À risque</div>
          <div className={`text-3xl font-bold ${aRisqueCount>0?'text-coral-50':'text-neutral-200'}`}>{fmtCurrency(aRisqueVal)}</div>
          <div className="text-xs text-slate mt-1">{aRisqueCount} besoin{aRisqueCount>1?'s':''} sans action &gt;10j</div>
        </button>
        <div className="bg-white border-2 border-neutral-200 p-4">
          <div className="text-xs text-neutral-300 font-medium mb-1 uppercase tracking-wide">Gagné YTD</div>
          <div className="text-3xl font-bold text-jade-100">{fmtCurrency(gagneYTD)}</div>
          <div className="text-xs text-slate mt-1">Besoins gagnés</div>
        </div>
      </div>

      {/* Graphiques */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        {/* Funnel */}
        <div className="bg-white border-2 border-neutral-200 p-5">
          <div className="text-sm font-semibold text-carbon mb-4">Funnel par statut</div>
          <div className="space-y-3">
            {funnel.map(f=>(
              <div key={f.statut}>
                <div className="flex items-center justify-between mb-1">
                  <div className="flex items-center gap-2">
                    <BesoinBadge statut={f.statut}/>
                    <span className="text-xs text-neutral-300">{f.count}</span>
                  </div>
                  <div className="flex items-center gap-3 text-xs">
                    <span className="text-slate">{fmtCurrency(f.totalBrut)}</span>
                    <span className="bg-azure-20 text-azure-100 px-1.5 py-0.5 rounded font-medium">{Math.round(f.proba*100)}%</span>
                    <span className="font-semibold text-jade-100">{fmtCurrency(f.totalPond)}</span>
                  </div>
                </div>
                <div className="w-full bg-neutral-100 h-2.5">
                  <div className="h-2.5 transition-all" style={{width:`${Math.max((f.totalBrut/maxFunnel)*100,2)}%`,background:(BESOIN_BADGE_COLORS_GLOBAL[f.statut]||{bg:'#4A7FE5'}).bg}}/>
                </div>
              </div>
            ))}
            {funnel.length===0&&<div className="text-center py-8"><div className="font-bold text-midnight text-sm mb-1">Aucun besoin actif</div><div className="text-xs text-neutral-300">Le funnel sera alimenté par les besoins en cours.</div></div>}
          </div>
        </div>

        {/* Ventilation (barres verticales) */}
        <div className="bg-white border-2 border-neutral-200 p-5">
          <div className="text-sm font-semibold text-carbon mb-1">Pipe pondéré — {ventilation==='agence'?'par agence':'par responsable'}</div>
