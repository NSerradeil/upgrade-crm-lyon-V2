// Liste multi-candidats d'un besoin
function BesoinCandidatsList({ besoinId, candidats, contacts, profile, readOnly, legacyCandidatId, onClearLegacy, onRefresh }) {
  const [q,setQ]=useState('');
  const [adding,setAdding]=useState(false);
  const pool=useMemo(()=>contacts.filter(c=>['Candidat','Consultant CDI','Freelance','Prestataire'].includes(c.statut)),[contacts]);
  const contactMap=useMemo(()=>Object.fromEntries(contacts.map(c=>[c.id,c])),[contacts]);
  // Le candidat legacy est-il déjà dans la liste multi ?
  const legacyAlreadyMigrated=legacyCandidatId&&candidats.some(bc=>bc.contact_id===legacyCandidatId);
  const legacyContact=legacyCandidatId&&!legacyAlreadyMigrated?contactMap[legacyCandidatId]:null;
  const allIds=new Set(candidats.map(bc=>bc.contact_id));
  if(legacyCandidatId) allIds.add(legacyCandidatId);
  const filtered=useMemo(()=>{if(!q)return[];const s=q.toLowerCase();return pool.filter(c=>!allIds.has(c.id)&&[c.prenom,c.nom,c.groupe].some(v=>(v||'').toLowerCase().includes(s))).slice(0,10);},[pool,q,allIds]);

  const addCandidat=async(contactId)=>{
    setAdding(true);
    const {error}=await sb.from('besoin_candidats').insert({besoin_id:besoinId,contact_id:contactId,statut:'en_attente',tjm_propose:null,created_by:profile.nom});
    if(error){toast('Erreur ajout candidat : '+error.message,'error');setAdding(false);return;}
    toast('Candidat ajouté');setQ('');setAdding(false);onRefresh();
  };
  const updateTjm=async(id,val)=>{
    const tjm=val===''?null:parseFloat(val)||0;
    const {error}=await sb.from('besoin_candidats').update({tjm_propose:tjm}).eq('id',id);
    if(error) toast('Erreur : '+error.message,'error');
    else onRefresh();
  };
  const migrateLegacy=async()=>{
    setAdding(true);
    const {error}=await sb.from('besoin_candidats').insert({besoin_id:besoinId,contact_id:legacyCandidatId,statut:'propose',created_by:profile.nom});
    if(error){toast('Erreur migration : '+error.message,'error');setAdding(false);return;}
    await sb.from('besoins').update({candidat_id:null}).eq('id',besoinId);
    toast('Candidat migré');setAdding(false);onRefresh();
  };
  const removeLegacy=async()=>{
    await sb.from('besoins').update({candidat_id:null}).eq('id',besoinId);
    toast('Candidat retiré');onRefresh();
  };
  const updateStatut=async(id,statut)=>{
    const {error}=await sb.from('besoin_candidats').update({statut}).eq('id',id);
    if(error){toast('Erreur : '+error.message,'error');return;}
    onRefresh();
  };
  const removeCandidat=async(id)=>{
    const {error}=await sb.from('besoin_candidats').delete().eq('id',id);
    if(error){toast('Erreur : '+error.message,'error');return;}
    toast('Candidat retiré');onRefresh();
  };

  const statutObj=(val)=>CANDIDAT_STATUTS.find(s=>s.value===val)||CANDIDAT_STATUTS[0];
  const totalCount=candidats.length+(legacyContact?1:0);

  return (
    <div>
      <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Candidats ({totalCount})</div>
      {/* Candidat legacy non migré */}
      {legacyContact&&(
        <div className="flex items-center gap-2 bg-orange-50 rounded-lg px-3 py-2 mb-2">
          <div className="w-2 h-2 rounded-full shrink-0 bg-orange-400"/>
          <div className="flex-1 min-w-0">
            <div className="text-sm font-medium text-gray-900 truncate">{legacyContact.prenom} {legacyContact.nom}</div>
            {legacyContact.groupe&&<div className="text-xs text-gray-400 truncate">{legacyContact.groupe}</div>}
          </div>
          {!readOnly&&(
            <>
              <button onClick={migrateLegacy} disabled={adding} className="text-xs px-2 py-1 bg-blue-100 text-blue-700 rounded-lg font-medium hover:bg-blue-200" title="Migrer vers la nouvelle liste">Migrer</button>
              <button onClick={removeLegacy} className="text-gray-300 hover:text-red-500 text-sm shrink-0" title="Retirer">×</button>
            </>
          )}
          {readOnly&&<span className="text-xs px-2 py-1 rounded-lg font-medium bg-orange-100 text-orange-600">Legacy</span>}
        </div>
      )}
      {candidats.length>0&&(
        <div className="space-y-2 mb-3">
          {candidats.map(bc=>{
            const c=contactMap[bc.contact_id];
            if(!c) return null;
            const st=statutObj(bc.statut);
            return (
              <div key={bc.id} className="flex items-center gap-2 bg-gray-50 rounded-lg px-3 py-2 flex-wrap">
                <div className={`w-2 h-2 rounded-full shrink-0 ${st.dot}`}/>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-gray-900 truncate">{c.prenom} {c.nom}</div>
                  {c.groupe&&<div className="text-xs text-gray-400 truncate">{c.groupe}</div>}
                </div>
                {!readOnly?(
                  <input type="number" placeholder="TJM" defaultValue={bc.tjm_propose||''} onBlur={e=>updateTjm(bc.id,e.target.value)}
                    className="w-16 text-xs px-1.5 py-1 border rounded text-right" title="TJM proposé (€/j)"/>
                ):(
                  bc.tjm_propose>0&&<span className="text-xs text-green-700 font-medium">{bc.tjm_propose}€/j</span>
                )}
                {!readOnly?(
                  <select value={bc.statut} onChange={e=>updateStatut(bc.id,e.target.value)}
                    className={`text-xs px-2 py-1 rounded-lg border-0 font-medium ${st.color}`}>
                    {CANDIDAT_STATUTS.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
                  </select>
                ):(
                  <span className={`text-xs px-2 py-1 rounded-lg font-medium ${st.color}`}>{st.label}</span>
                )}
                {!readOnly&&<button onClick={()=>removeCandidat(bc.id)} className="text-gray-300 hover:text-red-500 text-sm shrink-0" title="Retirer">×</button>}
              </div>
            );
          })}
        </div>
      )}
      {!readOnly&&(
        <div className="relative">
          <input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Ajouter un candidat..." className={inputCls+' text-sm'} disabled={adding}/>
          {q&&filtered.length>0&&(
            <div className="absolute z-20 left-0 right-0 top-full mt-1 bg-white border rounded-lg shadow-lg max-h-48 overflow-y-auto">
              {filtered.map(c=>(
                <div key={c.id} onClick={()=>addCandidat(c.id)} className="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm flex items-center gap-2">
                  <span>{c.prenom} {c.nom}</span><StatutBadge statut={c.statut}/>{c.groupe&&<span className="text-xs text-gray-400">{c.groupe}</span>}
                </div>
              ))}
            </div>
          )}
          {q&&filtered.length===0&&!adding&&<div className="absolute z-20 left-0 right-0 top-full mt-1 bg-white border rounded-lg shadow-lg px-3 py-2 text-sm text-gray-400">Aucun candidat trouvé</div>}
        </div>
      )}
    </div>
  );
}

// Modal création besoin
function AddBesoinModal({ contacts, profile, allProfiles, onClose, onSaved }) {
  const isAdmin=profile.role==='admin';
  const [f,setF]=useState({titre:'',statut:'Besoin ouvert',type:'regie',lien:'',compte:'',contact_id:null,description:'',budget:10000,budget_tjm:null,budget_jours:null,budget_date_debut:null,budget_date_fin:null,candidat_id:null,responsable:profile.nom});
  const [saving,setSaving]=useState(false);const [err,setErr]=useState('');
  const save=async()=>{
    if(!f.titre.trim()){setErr('Le titre est obligatoire.');return;}
    setSaving(true);
    const {data:inserted,error}=await sb.from('besoins').insert({
      titre:f.titre.trim(),statut:f.statut,type:f.type,lien:f.lien||null,compte:f.compte||null,
      contact_id:f.contact_id||null,description:f.description||null,budget:f.budget||10000,
      budget_tjm:f.budget_tjm,budget_jours:f.budget_jours,budget_date_debut:f.budget_date_debut,budget_date_fin:f.budget_date_fin,
      candidat_id:f.candidat_id||null,responsable:f.responsable,agence:profile.agence||'Lyon'
    }).select('id').single();
    if(error){setErr(error.message);setSaving(false);return;}
    // Auto-log push opportuniste
    if(f.statut==='Push opportuniste'&&f.contact_id&&f.candidat_id){
      const cand=contacts.find(c=>c.id===f.candidat_id);
      if(cand) await sb.from('historique_actions').insert({id_prospect:f.contact_id,date:getToday(),type_action:'Push opportuniste',details:`Push opportuniste — ${cand.prenom} ${cand.nom}`,responsable:f.responsable,besoin_id:inserted.id});
    }
    toast('Besoin créé');onSaved();
  };
  const myContacts=contacts;
  return (
    <Modal title="Nouveau besoin" onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-gray-600">Annuler</button><button onClick={save} disabled={saving} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium disabled:opacity-50">{saving?'...':'Créer'}</button></>}>
      <Field label="Titre *"><input type="text" value={f.titre} onChange={e=>setF(v=>({...v,titre:e.target.value}))} placeholder="Ex : Développeur Java Senior" className={inputCls}/></Field>
      <Field label="Statut initial">
        <select value={f.statut} onChange={e=>setF(v=>({...v,statut:e.target.value}))} className={inputCls}>
          {BESOIN_STATUTS_CREATION.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Compte (société)"><CompteSearchField contacts={myContacts} value={f.compte} onChange={compte=>setF(v=>({...v,compte}))}/></Field>
        <Field label="Lien externe"><input type="url" value={f.lien} onChange={e=>setF(v=>({...v,lien:e.target.value}))} placeholder="https://..." className={inputCls}/></Field>
      </div>
      <Field label="Contact lié">
        <ContactPicker contacts={myContacts} value={f.contact_id} filterCompte={f.compte||''} onChange={cid=>{
          const c=cid?myContacts.find(x=>String(x.id)===String(cid)):null;
          setF(v=>({...v,contact_id:cid,...(c&&c.groupe&&!v.compte?{compte:c.groupe}:{})}));
        }}/>
      </Field>
      {BESOIN_HAS_CANDIDAT.has(f.statut)&&(
        <Field label="Candidat"><CandidatSelector contacts={contacts} value={f.candidat_id} onChange={cid=>setF(v=>({...v,candidat_id:cid}))}/></Field>
      )}
      <Field label="Description"><textarea rows={2} value={f.description} onChange={e=>setF(v=>({...v,description:e.target.value}))} className={inputCls+' resize-none'}/></Field>
      <Field label="Budget">
        <BudgetInput budget={f.budget} tjm={f.budget_tjm} jours={f.budget_jours} dateDebut={f.budget_date_debut} dateFin={f.budget_date_fin}
          onChange={upd=>setF(v=>({...v,...upd}))}/>
      </Field>
      {isAdmin&&<Field label="Responsable"><select value={f.responsable} onChange={e=>setF(v=>({...v,responsable:e.target.value}))} className={inputCls}>{respOptions(allProfiles,f.responsable).map(p=><option key={p.nom} value={p.nom}>{p.nom}</option>)}</select></Field>}
      {err&&<div className="text-xs text-red-600 bg-red-50 rounded px-3 py-2">{err}</div>}
    </Modal>
  );
}

// Panneau détail besoin (SidePanel)
function BesoinDetail({ besoin, contacts, besoinCandidats, historique, taches, missions, besoins, profile, allProfiles, onClose, onRefresh, onDataRefresh }) {
  const isAdmin=profile.role==='admin';
  const isOwner=isAdmin||besoin.responsable===profile.nom;
  const [editing,setEditing]=useState(false);
  const [f,setF]=useState({...besoin});
  const [saving,setSaving]=useState(false);
  const [modal,setModal]=useState(null);
  const [deleting,setDeleting]=useState(false);
  const contact=contacts.find(c=>c.id===besoin.contact_id);
  const candidat=contacts.find(c=>c.id===besoin.candidat_id);
  const mesCandidats=(besoinCandidats||[]).filter(bc=>bc.besoin_id===besoin.id);
  const besoinHist=historique.filter(h=>h.besoin_id===besoin.id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const besoinTaches=taches.filter(t=>t.besoin_id===besoin.id&&t.statut!=='fait'&&t.statut!=='annule');
  // Indicateurs Besoin Gagné
  const nbJours=joursOuvres(f.date_demarrage,f.date_fin);
  const caProj=(f.tjm_vente||0)*nbJours;
  const coutProj=(f.cjm_achat||0)*nbJours;
  const margeProj=caProj-coutProj;
  const tauxMarge=caProj>0?(margeProj/caProj*100):0;

  const [gagneErrors,setGagneErrors]=useState({});
  const saveEdit=async()=>{
    // Validation Besoin Gagné : candidat + contact obligatoires
    if(f.statut==='Besoin Gagné'){
      const errs={};
      const hasCandidat=mesCandidats.length>0||f.candidat_id;
      if(!hasCandidat) errs.candidat='Merci d\'ajouter au moins un candidat avant de passer ce besoin à Gagné.';
      if(!f.contact_id) errs.contact='Merci de renseigner un contact lié avant de passer ce besoin à Gagné. Il deviendra le référent client sur la mission.';
      if(Object.keys(errs).length){setGagneErrors(errs);setSaving(false);return;}
    }
    setGagneErrors({});
    setSaving(true);
    const upd={statut:f.statut,titre:f.titre,lien:f.lien||null,compte:f.compte||null,contact_id:f.contact_id||null,
      description:f.description||null,budget:f.budget||0,budget_tjm:f.budget_tjm,budget_jours:f.budget_jours,
      budget_date_debut:f.budget_date_debut,budget_date_fin:f.budget_date_fin,candidat_id:f.candidat_id||null,
      date_entretien:f.date_entretien||null,compte_rendu:f.compte_rendu||null,
      date_demarrage:f.date_demarrage||null,date_fin:f.date_fin||null,tjm_vente:f.tjm_vente||null,cjm_achat:f.cjm_achat||null,
      motif_perte:f.motif_perte||null,motif_perte_precision:f.motif_perte_precision||null,
      responsable:f.responsable,updated_at:new Date().toISOString()};
    const {error}=await sb.from('besoins').update(upd).eq('id',besoin.id);
    if(!error){
      // Auto-log push opportuniste
      if(f.statut==='Push opportuniste'&&f.contact_id&&f.candidat_id&&(f.candidat_id!==besoin.candidat_id||f.statut!==besoin.statut)){
        const cand=contacts.find(c=>c.id===f.candidat_id);
        if(cand) await sb.from('historique_actions').insert({id_prospect:f.contact_id,date:getToday(),type_action:'Push opportuniste',details:`Push opportuniste — ${cand.prenom} ${cand.nom}`,responsable:f.responsable,besoin_id:besoin.id});
      }
      // Besoin Gagné → proposer création mission
      if(f.statut==='Besoin Gagné'&&besoin.statut!=='Besoin Gagné'){
        // Vérifier qu'aucune mission n'est déjà liée
        const {data:existing}=await sb.from('missions').select('id').eq('besoin_id',besoin.id).limit(1);
        if(!existing||existing.length===0){
          setModal('proposeMission');
          setEditing(false);setSaving(false);
          return;
        }
      }
      toast('Besoin modifié');setEditing(false);onRefresh();
    }
    setSaving(false);
  };
  const handleDelete=async()=>{setDeleting(true);await sb.from('besoins').delete().eq('id',besoin.id);toast('Besoin supprimé');onRefresh();onClose();};
  const logAction=async(action)=>{
    await sb.from('historique_actions').insert({id_prospect:besoin.contact_id,date:action.date,type_action:action.type_action,details:action.details||null,responsable:action.responsable,besoin_id:besoin.id});
    onRefresh();setModal(null);
  };

  const actions=isOwner&&(
    <>
      <button onClick={()=>setEditing(!editing)} className="px-3 py-1.5 text-xs bg-blue-50 text-blue-700 rounded-lg font-medium hover:bg-blue-100">{editing?'Annuler':'✏️ Modifier'}</button>
      <button onClick={()=>setModal('hist')} className="px-3 py-1.5 text-xs bg-green-50 text-green-700 rounded-lg font-medium hover:bg-green-100">➕ Action</button>
      <button onClick={()=>setModal('tache')} className="px-3 py-1.5 text-xs bg-orange-50 text-orange-700 rounded-lg font-medium hover:bg-orange-100">✅ Tâche</button>
      {modal!=='confirmDel'
        ?<button onClick={()=>setModal('confirmDel')} className="px-3 py-1.5 text-xs bg-red-50 text-red-700 rounded-lg font-medium hover:bg-red-100">🗑️</button>
        :<div className="flex gap-2 items-center"><span className="text-xs text-red-700">Supprimer ?</span><button onClick={handleDelete} disabled={deleting} className="px-2 py-1 text-xs bg-red-600 text-white rounded">{deleting?'...':'Oui'}</button><button onClick={()=>setModal(null)} className="text-xs text-gray-500">Non</button></div>
      }
    </>
  );

  return (
    <SidePanel title={editing?<input type="text" value={f.titre} onChange={e=>setF(v=>({...v,titre:e.target.value}))} className="font-bold text-lg border-b border-blue-300 focus:outline-none w-full"/>:besoin.titre}
      badge={<BesoinBadge statut={f.statut}/>} onClose={onClose} actions={actions}>

      {/* Stepper statut */}
      {editing&&<BesoinStatusStepper value={f.statut} onChange={s=>setF(v=>({...v,statut:s}))}/>}

      {/* Infos générales */}
      <div className="grid grid-cols-2 gap-3 text-sm">
        <div><span className="text-gray-400">Responsable</span><br/>{editing&&isAdmin?<select value={f.responsable} onChange={e=>setF(v=>({...v,responsable:e.target.value}))} className={inputCls}>{respOptions(allProfiles,f.responsable).map(p=><option key={p.nom} value={p.nom}>{p.nom}</option>)}</select>:<span>{besoin.responsable}</span>}</div>
        <div><span className="text-gray-400">Compte</span><br/>{editing?<CompteSearchField contacts={contacts} value={f.compte||''} onChange={compte=>setF(v=>({...v,compte}))}/>:<span>{besoin.compte||'—'}</span>}</div>
        {contact&&<div className="col-span-2"><span className="text-gray-400">Contact</span><br/>{contact.prenom} {contact.nom} — {contact.groupe}</div>}
        {besoin.lien&&!editing&&<div className="col-span-2"><span className="text-gray-400">Lien</span><br/><a href={besoin.lien} target="_blank" className="text-blue-600 hover:underline text-xs">{besoin.lien}</a></div>}
        {editing&&<div className="col-span-2"><Field label="Lien"><input type="url" value={f.lien||''} onChange={e=>setF(v=>({...v,lien:e.target.value}))} className={inputCls}/></Field></div>}
      </div>

      {/* Description */}
      {editing?<Field label="Description"><textarea rows={2} value={f.description||''} onChange={e=>setF(v=>({...v,description:e.target.value}))} className={inputCls+' resize-none'}/></Field>
        :besoin.description&&<div><div className="text-xs text-gray-400 font-semibold mb-1 uppercase tracking-wide">Description</div><div className="text-sm text-gray-600 bg-gray-50 rounded-lg p-3 whitespace-pre-wrap">{besoin.description}</div></div>}

      {/* Contact lié (edit) */}
      {editing&&<Field label="Contact lié"><ContactPicker contacts={contacts} value={f.contact_id} filterCompte={f.compte||''} onChange={cid=>{
        const c=cid?contacts.find(x=>String(x.id)===String(cid)):null;
        setF(v=>({...v,contact_id:cid,...(c&&c.groupe&&!v.compte?{compte:c.groupe}:{})}));
        setGagneErrors(e=>({...e,contact:undefined}));
      }}/>{gagneErrors.contact&&<div className="text-xs text-red-600 mt-1">{gagneErrors.contact}</div>}</Field>}

      {/* Budget */}
      {editing?<Field label="Budget"><BudgetInput budget={f.budget} tjm={f.budget_tjm} jours={f.budget_jours} dateDebut={f.budget_date_debut} dateFin={f.budget_date_fin} onChange={upd=>setF(v=>({...v,...upd}))}/></Field>
        :besoin.budget>0&&<div className="text-sm"><span className="text-gray-400">Budget : </span><span className="font-medium text-green-700">{fmtCurrency(besoin.budget)}</span></div>}

      {/* Candidats (multi + legacy) */}
      {BESOIN_HAS_CANDIDAT.has(f.statut)&&(
        <BesoinCandidatsList besoinId={besoin.id} candidats={mesCandidats} contacts={contacts} profile={profile} readOnly={!isOwner} legacyCandidatId={besoin.candidat_id} onRefresh={onDataRefresh||onRefresh}/>

      {gagneErrors.candidat&&<div className="text-xs text-red-600">{gagneErrors.candidat}</div>}

      {/* Entretien */}
      {BESOIN_HAS_ENTRETIEN.has(f.statut)&&(editing
        ?<Field label="Date entretien"><input type="datetime-local" value={f.date_entretien?.slice(0,16)||''} onChange={e=>setF(v=>({...v,date_entretien:e.target.value}))} className={inputCls}/></Field>
        :besoin.date_entretien&&<div className="text-sm"><span className="text-gray-400">Entretien : </span>{new Date(besoin.date_entretien).toLocaleString('fr-FR')}</div>
      )}

      {/* Compte-rendu */}
      {BESOIN_HAS_CR.has(f.statut)&&(editing
        ?<Field label="Compte-rendu"><textarea rows={3} value={f.compte_rendu||''} onChange={e=>setF(v=>({...v,compte_rendu:e.target.value}))} className={inputCls+' resize-none'}/></Field>
        :besoin.compte_rendu&&<div><div className="text-xs text-gray-400 font-semibold mb-1 uppercase tracking-wide">Compte-rendu</div><div className="text-sm text-gray-600 bg-gray-50 rounded-lg p-3 whitespace-pre-wrap">{besoin.compte_rendu}</div></div>
      )}

      {/* Besoin Gagné : champs mission */}
      {f.statut==='Besoin Gagné'&&(editing?(
        <div className="space-y-3 bg-green-50 rounded-lg p-3">
          <div className="text-xs font-semibold text-green-800 uppercase">Besoin Gagné — Mission</div>
          <div className="grid grid-cols-2 gap-2">
            <Field label="Date démarrage"><input type="date" value={f.date_demarrage||''} onChange={e=>setF(v=>({...v,date_demarrage:e.target.value}))} className={inputCls}/></Field>
            <Field label="Date fin"><input type="date" value={f.date_fin||''} onChange={e=>setF(v=>({...v,date_fin:e.target.value}))} className={inputCls}/></Field>
            <Field label="TJM vente"><input type="number" value={f.tjm_vente||''} onChange={e=>setF(v=>({...v,tjm_vente:parseFloat(e.target.value)||0}))} className={inputCls}/></Field>
            <Field label="CJM achat"><input type="number" value={f.cjm_achat||''} onChange={e=>setF(v=>({...v,cjm_achat:parseFloat(e.target.value)||0}))} className={inputCls}/></Field>
          </div>
          {nbJours>0&&<div className="text-xs text-green-700">{nbJours} jours ouvrés · CA {fmtCurrency(caProj)} · Marge {fmtCurrency(margeProj)} ({tauxMarge.toFixed(1)}%)</div>}
        </div>
      ):(besoin.tjm_vente&&(
        <div className="bg-green-50 rounded-lg p-3">
          <div className="text-xs font-semibold text-green-800 uppercase mb-2">Mission</div>
          <div className="grid grid-cols-2 gap-2 text-sm">
            <div><span className="text-gray-500">Période</span><br/>{besoin.date_demarrage} → {besoin.date_fin} ({nbJours}j)</div>
            <div><span className="text-gray-500">TJM / CJM</span><br/>{besoin.tjm_vente}€ / {besoin.cjm_achat}€</div>
            <div><span className="text-gray-500">CA projeté</span><br/><span className="font-semibold text-green-700">{fmtCurrency(caProj)}</span></div>
            <div><span className="text-gray-500">Marge</span><br/><span className="font-semibold">{fmtCurrency(margeProj)} ({tauxMarge.toFixed(1)}%)</span></div>
          </div>
        </div>
      )))}

      {/* Besoin Perdu : motif */}
      {f.statut==='Besoin Perdu'&&(editing?(
        <div className="space-y-2 bg-red-50 rounded-lg p-3">
          <Field label="Motif de perte">
            <select value={f.motif_perte||''} onChange={e=>setF(v=>({...v,motif_perte:e.target.value}))} className={inputCls}>
              <option value="">Choisir...</option>
              {BESOIN_MOTIFS_PERTE.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
            </select>
          </Field>
          {f.motif_perte==='autre'&&<Field label="Précision"><input type="text" value={f.motif_perte_precision||''} onChange={e=>setF(v=>({...v,motif_perte_precision:e.target.value}))} className={inputCls}/></Field>}
        </div>
      ):(besoin.motif_perte&&(
        <div className="bg-red-50 rounded-lg p-3 text-sm">
          <span className="text-gray-500">Motif : </span>{BESOIN_MOTIFS_PERTE.find(m=>m.value===besoin.motif_perte)?.label||besoin.motif_perte}
          {besoin.motif_perte_precision&&<span className="text-gray-500"> — {besoin.motif_perte_precision}</span>}
        </div>
      )))}

      {/* Bouton sauvegarder */}
      {editing&&<button onClick={saveEdit} disabled={saving} className="w-full py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium disabled:opacity-50">{saving?'Enregistrement...':'Sauvegarder'}</button>}

      {/* Tâches liées */}
      {besoinTaches.length>0&&(
        <div>
          <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Tâches actives</div>
          <div className="space-y-2">{besoinTaches.map(t=>(
            <div key={t.id} className="flex items-start gap-2 bg-blue-50 rounded-lg p-3">
              <span className="text-blue-400 mt-0.5">◆</span>
              <div><div className="text-sm font-medium text-blue-900">{t.titre}</div>{t.due_date&&<div className="text-xs text-blue-600">Échéance : {fmtDT(t.due_date,DEFAULT_TASK_TIME)}</div>}</div>
            </div>
          ))}</div>
        </div>
      )}

      {/* Historique lié */}
      <div>
        <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Historique ({besoinHist.length})</div>
        {besoinHist.length===0
          ?<div className="text-sm text-gray-400 italic">Aucune action</div>
          :<div className="space-y-2">{besoinHist.map((h,i)=>(
            <div key={i} className="flex gap-3 text-sm border-l-2 border-gray-100 pl-3">
              <div className="text-gray-400 shrink-0 w-14">{h.date?.slice(0,10)||'—'}</div>
              <div><span className="font-medium text-gray-700">{h.type_action}</span>{h.details&&<div className="text-gray-500 text-xs mt-0.5">{h.details}</div>}</div>
            </div>
          ))}</div>
        }
      </div>

      {/* Modals actions/tâches */}
      {modal==='hist'&&<AddBesoinActionModal besoin={besoin} contact={contact} profile={profile} onClose={()=>setModal(null)} onSaved={()=>{onRefresh();setModal(null);}}/>}
      {modal==='tache'&&<AddTacheModal contacts={contact?[contact]:contacts} besoins={besoins||[]} missions={missions||[]} profile={profile} allProfiles={allProfiles} onClose={()=>setModal(null)} onSaved={()=>{onRefresh();setModal(null);}} defaultContactId={besoin.contact_id} defaultBesoinId={besoin.id}/>}
      {/* Besoin Gagné → proposer mission */}
      {modal==='proposeMission'&&(
        <Modal title="🏆 Besoin gagné !" onClose={()=>{setModal(null);onRefresh();}}>
          <div className="text-center py-4 space-y-4">
            <div className="text-4xl">🎉</div>
            <p className="text-gray-700">Ce besoin est gagné. Veux-tu créer une mission associée ?</p>
            <div className="flex gap-3 justify-center">
              <button onClick={()=>{setModal(null);onRefresh();}} className="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">Plus tard</button>
              <button onClick={()=>setModal('createMission')} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Créer la mission</button>
            </div>
          </div>
        </Modal>
      )}
      {modal==='createMission'&&(()=>{
        const retenu=mesCandidats.find(bc=>bc.statut==='retenu');
        const missionCandidat=retenu?contacts.find(c=>c.id===retenu.contact_id):candidat;
        return <MissionFormModal
          mission={{
            consultant:missionCandidat?`${missionCandidat.prenom} ${missionCandidat.nom}`:'',
            contact_consultant_id:missionCandidat?.id||null,
            client:besoin.compte||contact?.groupe||'',
            projet:besoin.titre,
            tjm:besoin.tjm_vente||'',
            cjm:besoin.cjm_achat||'',
            statut:'New',
            type_contrat:'',
            responsable:besoin.responsable,
            agence:allProfiles.find(p=>p.nom===besoin.responsable)?.agence||profile.agence||'Lyon',
            num_commande:'',
            date_debut_mission:besoin.date_demarrage||'',
            date_fin_mission:besoin.date_fin||'',
            referent:contact?`${contact.prenom} ${contact.nom}`:'',
            contact_referent_id:besoin.contact_id||null,
            besoin_id:besoin.id
          }}
          profile={profile} allProfiles={allProfiles} contacts={contacts}
          onClose={()=>{setModal(null);onRefresh();}}
          onSaved={()=>{setModal(null);onRefresh();}}
          prefillBesoinId={besoin.id}
        />;
      })()}
    </SidePanel>
  );
}

// ── Kanban Besoins ──────────────────────────────────────────────────────────
function KanbanBesoins({ besoins, contacts, besoinCandidats, onSelect, onStatutChange }) {
  const contactMap=useMemo(()=>Object.fromEntries(contacts.map(c=>[c.id,c])),[contacts]);
  const [dragId,setDragId]=useState(null);
  const [overCol,setOverCol]=useState(null);

  const onDragStart=(e,besoin)=>{setDragId(besoin.id);e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',besoin.id);};
  const onDragEnd=()=>{setDragId(null);setOverCol(null);};
  const onDragOver=(e,statut)=>{e.preventDefault();e.dataTransfer.dropEffect='move';setOverCol(statut);};
  const onDragLeave=(e,statut)=>{if(!e.currentTarget.contains(e.relatedTarget))setOverCol(null);};
  const onDrop=async(e,statut)=>{
    e.preventDefault();setOverCol(null);
    const id=e.dataTransfer.getData('text/plain');
    const besoin=besoins.find(b=>b.id===id);
    if(besoin&&besoin.statut!==statut) onStatutChange(besoin,statut);
    setDragId(null);
  };

  const STATUT_SHORT={'Opportunité':'Opport.','Push opportuniste':'Push','Besoin ouvert':'Ouvert','Profil proposé':'Proposé','Entretien programmé':'Entr. prog.','Entretien passé':'Entr. passé','Besoin Gagné':'Gagné','Besoin Perdu':'Perdu'};
  const STATUT_ICONS={'Opportunité':'🔍','Push opportuniste':'🟡','Besoin ouvert':'🟢','Profil proposé':'📄','Entretien programmé':'📅','Entretien passé':'✓','Besoin Gagné':'🏆','Besoin Perdu':'❌'};
  // Colonnes visibles : celles qui ont des items + toujours Gagné/Perdu pour pouvoir y déposer
  const visibleStatuts=BESOIN_STATUTS_ORDRE;

  return (
    <div className="kanban-board">
      {visibleStatuts.map(statut=>{
        const items=besoins.filter(b=>b.statut===statut);
        return (
          <div key={statut}
            className={`kanban-col${overCol===statut?' drag-over':''}`}
            onDragOver={e=>onDragOver(e,statut)} onDragLeave={e=>onDragLeave(e,statut)} onDrop={e=>onDrop(e,statut)}>
            <div className="flex items-center gap-1 mb-2 px-1">
              <span className="text-xs">{STATUT_ICONS[statut]||''}</span>
              <span className="text-xs font-semibold text-gray-700 truncate">{STATUT_SHORT[statut]||statut}</span>
              <span className="text-xs bg-white text-gray-500 px-1.5 rounded-full border ml-auto">{items.length}</span>
            </div>
            <div className="kanban-items" style={{minHeight:40}}>
              {items.map(b=>{
                const contact=contactMap[b.contact_id];
                const bCandidats=(besoinCandidats||[]).filter(bc=>bc.besoin_id===b.id);
                const candidatLegacy=contactMap[b.candidat_id];
                const nbJ=b.statut==='Besoin Gagné'?joursOuvres(b.date_demarrage,b.date_fin):0;
                const ca=nbJ*(b.tjm_vente||0);
                return (
                  <div key={b.id} draggable onDragStart={e=>onDragStart(e,b)} onDragEnd={onDragEnd}
                    onClick={()=>onSelect(b)} data-detail tabIndex="0"
                    className={`kanban-card${dragId===b.id?' dragging':''} focus:outline-none focus:ring-2 focus:ring-blue-300`}>
                    <div className="text-xs font-medium text-gray-900 truncate">{b.titre}</div>
                    {contact&&<div className="text-xs text-gray-500 truncate">{contact.prenom} {contact.nom}</div>}
                    {bCandidats.length>0
                      ?<div className="text-xs text-blue-600 truncate">👤 {bCandidats.map(bc=>{const c=contactMap[bc.contact_id];return c?`${c.prenom} ${c.nom}`:''}).filter(Boolean).join(', ')}</div>
                      :candidatLegacy&&<div className="text-xs text-blue-600 truncate">👤 {candidatLegacy.prenom} {candidatLegacy.nom}</div>
                    }
                    {b.statut==='Besoin Gagné'&&ca>0&&<div className="text-xs text-green-700 font-medium">{fmtCurrency(ca)}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Onglet Pipeline V2 ──────────────────────────────────────────────────────
function TabBesoins({ contacts, besoins, besoinCandidats, historique, taches, missions, profile, allProfiles, onRefresh }) {
  const [search,setSearch]=useState(''); const [filterStatut,setFilterStatut]=useState('');
  const [filterResp,setFilterResp]=useState('');
  const [filterAgence,setFilterAgence]=useState(profile.role==='admin'?'':profile.agence);
  const [selected,setSelected]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [viewMode,setViewMode]=useState('list');
  const isAdmin=profile.role==='admin';
  const contactMap=useMemo(()=>Object.fromEntries(contacts.map(c=>[c.id,c])),[contacts]);

  // Mapping agence → commerciaux depuis allProfiles (configurable via table profiles)
  const agences=useMemo(()=>[...new Set(allProfiles.map(p=>p.agence).filter(Boolean))].sort(),[allProfiles]);
  const commerciauxParAgence=useMemo(()=>{
    const map={};
    allProfiles.forEach(p=>{if(p.agence&&p.nom) {if(!map[p.agence])map[p.agence]=[];map[p.agence].push(p.nom);}});
    Object.values(map).forEach(arr=>arr.sort());
    return map;
  },[allProfiles]);
  // Liste des responsables visibles selon le filtre agence actif
  const responsablesVisibles=useMemo(()=>{
    if(isAdmin&&!filterAgence) return [...new Set(allProfiles.map(p=>p.nom).filter(Boolean))].sort();
    const ag=filterAgence||profile.agence;
    return commerciauxParAgence[ag]||[];
  },[isAdmin,filterAgence,profile.agence,allProfiles,commerciauxParAgence]);

  const sorted=useMemo(()=>{
    const q=search.toLowerCase();
    return [...besoins]
      .filter(b=>{
        if(filterStatut&&b.statut!==filterStatut) return false;
        if(filterResp&&b.responsable!==filterResp) return false;
        if(filterAgence&&b.agence!==filterAgence) return false;
        if(q){
          const c=contactMap[b.contact_id];
          const cand=contactMap[b.candidat_id];
          const bCands=(besoinCandidats||[]).filter(bc=>bc.besoin_id===b.id).map(bc=>contactMap[bc.contact_id]).filter(Boolean);
          const candNames=bCands.flatMap(c=>[c.prenom,c.nom]);
          if(![b.titre,b.compte,b.responsable,c?.prenom,c?.nom,c?.groupe,cand?.prenom,cand?.nom,...candNames].some(v=>(v||'').toLowerCase().includes(q))) return false;
        }
        return true;
      })
      .sort((a,b)=>BESOIN_STATUTS_ORDRE.indexOf(a.statut)-BESOIN_STATUTS_ORDRE.indexOf(b.statut));
  },[besoins,search,filterStatut,filterResp,filterAgence,contactMap]);

  const hasFilter=search||filterStatut||filterResp||(isAdmin?filterAgence!=='':filterAgence!==profile.agence);
  const resetAll=()=>{setSearch('');setFilterStatut('');setFilterResp('');setFilterAgence(isAdmin?'':profile.agence);};

  const STATUT_BTNS=[
    {label:'Tous',value:'',icon:''},
    {label:'Opportunité',value:'Opportunité',icon:'🔍'},
    {label:'Push',value:'Push opportuniste',icon:'🟡'},
    {label:'Besoin ouvert',value:'Besoin ouvert',icon:'🟢'},
    {label:'Profil proposé',value:'Profil proposé',icon:'📄'},
    {label:'Entretien prog.',value:'Entretien programmé',icon:'📅'},
    {label:'Entretien passé',value:'Entretien passé',icon:'✓'},
    {label:'Gagné',value:'Besoin Gagné',icon:'🏆'},
    {label:'Perdu',value:'Besoin Perdu',icon:'❌'},
  ];

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <div/>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">+ Nouveau besoin</button>
      </div>
      <div className="flex gap-2 sm:gap-3 mb-3 flex-wrap items-center">
        <input type="text" placeholder="Rechercher..." value={search} onChange={e=>setSearch(e.target.value)} className="flex-1 min-w-[140px] sm:min-w-48 px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
        {isAdmin&&agences.length>1&&(
          <select value={filterAgence} onChange={e=>{setFilterAgence(e.target.value);setFilterResp(e.target.value?'':profile.nom);}} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
            <option value="">Toutes agences</option>{agences.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        )}
        {!isAdmin&&(
          <span className="px-3 py-2 bg-gray-50 border rounded-lg text-sm text-gray-500">{profile.agence}</span>
        )}
        <select value={filterResp} onChange={e=>setFilterResp(e.target.value)} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
          <option value="">Tous{!isAdmin?` (${profile.agence})`:filterAgence?` (${filterAgence})`:''}</option>
          {responsablesVisibles.map(r=><option key={r} value={r}>{r}{r===profile.nom?' (moi)':''}</option>)}
        </select>

            {(filterStatut?[filterStatut]:BESOIN_STATUTS_ORDRE).map(statut=>{
              const items=sorted.filter(b=>b.statut===statut);

              const icon=STATUT_BTNS.find(x=>x.value===statut)?.icon||'';
              return (
                <div key={statut}>
                  <div className="flex items-center gap-2 mb-2">
                    {icon&&<span>{icon}</span>}

                    const contact=contactMap[b.contact_id];
                    const bCandidats=(besoinCandidats||[]).filter(bc=>bc.besoin_id===b.id);
                    const candidatLegacy=contactMap[b.candidat_id];
                    const nbJ=b.statut==='Besoin Gagné'?joursOuvres(b.date_demarrage,b.date_fin):0;
                    const ca=nbJ*(b.tjm_vente||0);
                    const marge=ca-nbJ*(b.cjm_achat||0);
                    return (
                      <div key={b.id} onClick={()=>setSelected(b)} data-detail tabIndex="0" className="bg-white rounded-xl border border-gray-100 p-3 sm:p-4 cursor-pointer hover:border-blue-200 focus:outline-none focus:ring-2 focus:ring-blue-300 transition-colors">
                        <div className="flex items-start gap-3">
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 flex-wrap mb-1">
                              <span className="font-semibold text-gray-900 text-sm truncate">{b.titre}</span>

                            <div className="flex flex-wrap gap-2 text-xs text-gray-500">
                              {contact&&<span>{contact.prenom} {contact.nom}</span>}
                              {b.compte&&<span className="text-gray-400">· {b.compte}</span>}
                              {bCandidats.length>0

                                :candidatLegacy&&<span className="bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full">👤 {candidatLegacy.prenom} {candidatLegacy.nom}</span>

                        </div>
                      </div>

              );

      )}
      {viewMode==='kanban'&&(
        <KanbanBesoins besoins={sorted} contacts={contacts} besoinCandidats={besoinCandidats} onSelect={b=>setSelected(b)}
          onStatutChange={async(besoin,newStatut)=>{
            if(newStatut==='Besoin Gagné'){
              const errs=[];
              const hasCand=(besoinCandidats||[]).some(bc=>bc.besoin_id===besoin.id)||besoin.candidat_id;
              if(!hasCand) errs.push('Candidat manquant');
              if(!besoin.contact_id) errs.push('Contact lié manquant');
              if(errs.length){toast(`Impossible de passer à Gagné : ${errs.join(', ')}. Ouvre le besoin pour compléter.`,'error');return;}
            }
            await sb.from('besoins').update({statut:newStatut,updated_at:new Date().toISOString()}).eq('id',besoin.id);
            onRefresh();
          }}/>
      )}
      {selected&&<BesoinDetail besoin={besoins.find(b=>b.id===selected.id)||selected} contacts={contacts} besoinCandidats={besoinCandidats} historique={historique} taches={taches} missions={missions} besoins={besoins} profile={profile} allProfiles={allProfiles} onClose={()=>setSelected(null)} onRefresh={()=>{onRefresh();setSelected(null);}} onDataRefresh={onRefresh}/>}
      {showAdd&&<AddBesoinModal contacts={contacts} profile={profile} allProfiles={allProfiles} onClose={()=>setShowAdd(false)} onSaved={()=>{setShowAdd(false);onRefresh();}}/>}
    </div>
  );
}

// ── Onglet Historique ─────────────────────────────────────────────────────────
function TabHistorique({ historique, contacts, taches, profile, allProfiles, onRefresh }) {
  const [search,setSearch]=useState(''); const [filterResp,setFilterResp]=useState('');
  const [filterType,setFilterType]=useState('');
  const [selected,setSelected]=useState(null);
  const [visibleCount,setVisibleCount]=useState(100);
  const isAdmin=profile.role==='admin';
  const contactMap=useMemo(()=>Object.fromEntries(contacts.map(c=>[c.id,c])),[contacts]);
  const responsables=useMemo(()=>[...new Set(historique.map(h=>h.responsable).filter(Boolean))].sort(),[historique]);
  const typesAction=useMemo(()=>[...new Set(historique.map(h=>h.type_action).filter(Boolean))].sort(),[historique]);

  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    return historique.filter(h=>{
      if(filterResp&&h.responsable!==filterResp)return false;
      if(filterType&&h.type_action!==filterType)return false;
      if(!q)return true;
      const c=h.id_prospect?contactMap[h.id_prospect]:null;
      const nom=c?`${c.prenom||''} ${c.nom||''} ${c.groupe||''}`:'';
      return[h.type_action,h.details,h.responsable,h.date,nom].some(v=>(v||'').toLowerCase().includes(q));
    });
  },[historique,search,filterResp,filterType,contactMap]);

  const TYPE_COLORS={
    'Tel':          {bg:'#dbeafe',color:'#1d4ed8'},
    'Mail envoyé':  {bg:'#dcfce7',color:'#166534'},
    'Mail reçu':    {bg:'#dcfce7',color:'#15803d'},
    'RDV':          {bg:'#fef3c7',color:'#92400e'},
    'LinkedIn':     {bg:'#ede9fe',color:'#5b21b6'},
    'Note interne':    {bg:'#f3f4f6',color:'#4b5563'},
    'Entretien':       {bg:'#f3e8ff',color:'#7e22ce'},
    'Tâche accomplie': {bg:'#dcfce7',color:'#166534'},
    'Autre':           {bg:'#f3f4f6',color:'#4b5563'},
  };

  return (
    <div>
      <div className="flex gap-3 mb-4 flex-wrap">
        <input type="text" placeholder="Rechercher (nom, société, type, détails, date...)"
          value={search} onChange={e=>setSearch(e.target.value)}
          className="flex-1 min-w-64 px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
          <option value="">Tous les types</option>
          {typesAction.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        {isAdmin&&responsables.length>1&&(
          <select value={filterResp} onChange={e=>setFilterResp(e.target.value)} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
            <option value="">Tous les commerciaux</option>
            {responsables.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        )}
        {(search||filterResp||filterType)&&<button onClick={()=>{setSearch('');setFilterResp('');setFilterType('');}} className="px-3 py-2 text-sm text-gray-500 hover:text-gray-700">✕ Reset</button>}
      </div>
      <div className="text-xs text-gray-400 mb-3">{filtered.length} action{filtered.length>1?'s':''}</div>

      <div className="bg-white rounded-xl border border-gray-100 overflow-hidden divide-y divide-gray-50">
        {filtered.length===0&&<div className="px-4 py-10 text-center text-sm text-gray-400 italic">Aucune action trouvée</div>}
        {filtered.slice(0,visibleCount).map((h,i)=>{
          const contact=h.id_prospect?contactMap[h.id_prospect]:null;
          const s=TYPE_COLORS[h.type_action]||TYPE_COLORS['Autre'];
          return (
            <div key={i} className="px-4 py-3 hover:bg-gray-50 transition-colors">
              <div className="flex gap-3 items-start">
                <div className="shrink-0 w-20 text-xs text-gray-400 pt-1 tabular-nums">{h.date?.slice(0,10)||'—'}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-0.5">
                    <span style={{backgroundColor:s.bg,color:s.color,padding:'2px 8px',borderRadius:9999,fontSize:11,fontWeight:600,whiteSpace:'nowrap'}}>{h.type_action}</span>
                    {contact&&(
                      <button onClick={()=>setSelected(contact)} className="text-sm font-semibold text-blue-700 hover:underline">
                        {contact.prenom} {contact.nom}
                        {contact.groupe&&<span className="ml-1 text-xs font-normal text-gray-400">· {contact.groupe}</span>}
                      </button>
                    )}
                    {h.tache_id&&(()=>{const tache=(taches||[]).find(t=>t.id===h.tache_id);return tache?<span className="text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full font-medium">✅ {tache.titre}</span>:null;})()}
                  </div>
                  {h.details&&<div className="text-sm text-gray-600 line-clamp-2" title={h.details}>{h.details}</div>}
                </div>
                {h.responsable&&<span className="shrink-0 text-xs bg-gray-800 text-white px-2 py-0.5 rounded-full font-medium whitespace-nowrap">{h.responsable}</span>}
              </div>
            </div>
          );
        })}
      </div>
      {filtered.length>visibleCount&&(
        <button onClick={()=>setVisibleCount(v=>v+100)} className="w-full py-3 text-sm text-blue-600 hover:text-blue-800 font-medium hover:bg-blue-50 rounded-lg mt-2">
          Voir plus ({filtered.length-visibleCount} restantes)
        </button>
      )}
      {selected&&<ContactDetail contact={selected} historique={historique} taches={taches} profile={profile} allProfiles={allProfiles} onClose={()=>setSelected(null)} onRefresh={()=>{setSelected(null);onRefresh();}}/>}
    </div>
  );
}

// ── Onglet Pipe Commercial ────────────────────────────────────────────────────
const PIPE_PROBA={'Opportunité':0.10,'Besoin ouvert':0.20,'Push opportuniste':0.15,'Profil proposé':0.40,'Entretien programmé':0.60,'Entretien passé':0.75,'Besoin Gagné':1.00,'Besoin Perdu':0};
const PIPE_STATUTS_ORDRE=['Opportunité','Push opportuniste','Besoin ouvert','Profil proposé','Entretien programmé','Entretien passé','Besoin Gagné'];
function besoinValeurBrute(b,bCandidats){
  if(b.statut==='Besoin Gagné'&&b.tjm_vente&&(b.date_demarrage||b.date_fin)){
    const j=joursOuvres(b.date_demarrage,b.date_fin);
    if(j>0) return b.tjm_vente*j;
  }
  // TJM max des candidats × jours budget si disponible
  if(bCandidats&&bCandidats.length>0){
    const maxTjm=Math.max(...bCandidats.map(bc=>bc.tjm_propose||0));
    if(maxTjm>0&&b.budget_jours) return maxTjm*b.budget_jours;
    if(maxTjm>0&&b.budget_date_debut&&b.budget_date_fin){
      const j=joursOuvres(b.budget_date_debut,b.budget_date_fin);
      if(j>0) return maxTjm*j;
    }
  }
  if(b.budget&&b.budget>0) return b.budget;
  if(b.budget_tjm&&b.budget_jours) return b.budget_tjm*b.budget_jours;
  return 0;
}
function TabPipe({ besoins, contacts, besoinCandidats, historique, taches, missions, profile, allProfiles, onRefresh }) {
  const isAdmin=profile.role==='admin';
  const [filterAgence,setFilterAgence]=useState('');
  const [filterResp,setFilterResp]=useState(isAdmin?'':profile.nom);
  const [ventilation,setVentilation]=useState('agence');
  const [riskFilter,setRiskFilter]=useState(false);
  const [donutFilter,setDonutFilter]=useState('');
  const [sortCol,setSortCol]=useState('ponderee');
  const [sortDir,setSortDir]=useState(-1);
  const [selected,setSelected]=useState(null);

  const contactMap=useMemo(()=>Object.fromEntries(contacts.map(c=>[c.id,c])),[contacts]);
  const agences=useMemo(()=>[...new Set(allProfiles.map(p=>p.agence).filter(Boolean))].sort(),[allProfiles]);
  const responsablesVisibles=useMemo(()=>{
    const pool=filterAgence?allProfiles.filter(p=>p.agence===filterAgence):allProfiles;
    return [...new Set(pool.map(p=>p.nom).filter(Boolean))].sort();
  },[allProfiles,filterAgence]);

  // Dernière action par besoin
  const lastActionByBesoin=useMemo(()=>{
    const map={};
    (historique||[]).forEach(h=>{
      if(!h.besoin_id) return;
      if(!map[h.besoin_id]||h.date>map[h.besoin_id]) map[h.besoin_id]=h.date;
    });
    return map;
  },[historique]);

  // Index candidats par besoin
  const candsByBesoin=useMemo(()=>{
    const m={};(besoinCandidats||[]).forEach(bc=>(m[bc.besoin_id]=m[bc.besoin_id]||[]).push(bc));return m;
  },[besoinCandidats]);

  // Besoins enrichis (valeur + proba + risque)
  const enriched=useMemo(()=>besoins
    .filter(b=>b.statut!=='Besoin Perdu')
    .map(b=>{
      const brute=besoinValeurBrute(b,candsByBesoin[b.id]);
      const proba=PIPE_PROBA[b.statut]||0;
      const ponderee=brute*proba;
      const lastAction=lastActionByBesoin[b.id]||b.updated_at||b.created_at;
      const daysInactive=daysSince(lastAction);
      const atRisk=daysInactive>10;
      const contact=b.contact_id?contactMap[b.contact_id]:null;
      return {...b,brute,proba,ponderee,lastAction,daysInactive,atRisk,contact};
    })
  ,[besoins,lastActionByBesoin,contactMap,candsByBesoin]);

  // Filtrage
  const filtered=useMemo(()=>enriched.filter(b=>{
    if(filterAgence&&b.agence!==filterAgence) return false;
    if(filterResp&&b.responsable!==filterResp) return false;
    if(riskFilter&&!b.atRisk) return false;
    if(donutFilter){
      if(ventilation==='agence'&&b.agence!==donutFilter) return false;
      if(ventilation==='responsable'&&b.responsable!==donutFilter) return false;
    }
    return true;
  }),[enriched,filterAgence,filterResp,riskFilter,donutFilter,ventilation]);

  // KPIs
  const pipeBrut=filtered.reduce((s,b)=>s+b.brute,0);
  const pipePondere=filtered.reduce((s,b)=>s+b.ponderee,0);
  const aRisqueVal=filtered.filter(b=>b.atRisk).reduce((s,b)=>s+b.brute,0);
  const aRisqueCount=filtered.filter(b=>b.atRisk).length;
  const gagneYTD=filtered.filter(b=>b.statut==='Besoin Gagné').reduce((s,b)=>s+b.brute,0);

  // Funnel par statut
  const funnel=useMemo(()=>{
    return PIPE_STATUTS_ORDRE.map(statut=>{
      const items=filtered.filter(b=>b.statut===statut);
      const totalBrut=items.reduce((s,b)=>s+b.brute,0);
      const totalPond=items.reduce((s,b)=>s+b.ponderee,0);
      return {statut,count:items.length,totalBrut,totalPond,proba:PIPE_PROBA[statut]};
    }).filter(f=>f.count>0);
  },[filtered]);
  const maxFunnel=Math.max(...funnel.map(f=>f.totalBrut),1);

  // Ventilation (donut data)
  const ventilData=useMemo(()=>{
    const map={};
    filtered.forEach(b=>{
      const key=ventilation==='agence'?(b.agence||'N/A'):(b.responsable||'N/A');
      map[key]=(map[key]||0)+b.ponderee;
    });
    return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
  },[filtered,ventilation]);
  const totalVentil=ventilData.reduce((s,d)=>s+d.value,0)||1;
  const DONUT_COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16'];

  // Tri tableau
  const sorted=useMemo(()=>[...filtered].sort((a,b)=>{
    let va,vb;
    if(sortCol==='ponderee'){va=a.ponderee;vb=b.ponderee;}
    else if(sortCol==='brute'){va=a.brute;vb=b.brute;}
    else if(sortCol==='proba'){va=a.proba;vb=b.proba;}
    else if(sortCol==='contact'){va=(a.contact?.nom||'').toLowerCase();vb=(b.contact?.nom||'').toLowerCase();return sortDir*(va<vb?-1:va>vb?1:0);}
    else if(sortCol==='statut'){va=PIPE_STATUTS_ORDRE.indexOf(a.statut);vb=PIPE_STATUTS_ORDRE.indexOf(b.statut);}
    else{va=a.ponderee;vb=b.ponderee;}
    return sortDir*((va||0)-(vb||0));
  }),[filtered,sortCol,sortDir]);

  const toggleSort=(col)=>{if(sortCol===col)setSortDir(d=>-d);else{setSortCol(col);setSortDir(-1);}};
  const hasFilter=filterAgence||(isAdmin&&filterResp)||riskFilter||donutFilter;
  const resetAll=()=>{setFilterAgence('');setFilterResp(isAdmin?'':profile.nom);setRiskFilter(false);setDonutFilter('');};

  const thCls="px-3 py-2.5 text-left font-medium cursor-pointer select-none hover:text-blue-600 whitespace-nowrap text-xs";
  const sortIcon=(col)=>sortCol===col?(sortDir>0?' ↑':' ↓'):'';

  return (
    <div className="space-y-6">
      {/* Filtres */}
      <div className="flex gap-2 sm:gap-3 flex-wrap items-center">
        {isAdmin&&agences.length>1&&(
          <select value={filterAgence} onChange={e=>{setFilterAgence(e.target.value);setFilterResp(e.target.value?'':isAdmin?'':profile.nom);setDonutFilter('');}} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
            <option value="">Toutes agences</option>{agences.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        )}
        <select value={filterResp} onChange={e=>{setFilterResp(e.target.value);setDonutFilter('');}} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
          <option value="">Tous{!isAdmin?` (${profile.agence})`:filterAgence?` (${filterAgence})`:''}</option>
          {responsablesVisibles.map(r=><option key={r} value={r}>{r}{r===profile.nom?' (moi)':''}</option>)}
        </select>
        <div className="flex border rounded-lg overflow-hidden text-sm">
          <button onClick={()=>setVentilation('agence')} className={`px-3 py-2 font-medium ${ventilation==='agence'?'bg-blue-600 text-white':'bg-white text-gray-600 hover:bg-gray-50'}`}>Par agence</button>
          <button onClick={()=>setVentilation('responsable')} className={`px-3 py-2 font-medium border-l ${ventilation==='responsable'?'bg-blue-600 text-white':'bg-white text-gray-600 hover:bg-gray-50'}`}>Par responsable</button>
        </div>
        {hasFilter&&<button onClick={resetAll} className="px-3 py-2 text-sm text-gray-500 hover:text-gray-700">✕ Reset</button>}
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div className="bg-white rounded-xl border border-gray-100 p-4">
          <div className="text-xs text-gray-400 font-medium mb-1 uppercase tracking-wide">Pipe brut</div>
          <div className="text-3xl font-bold text-blue-700">{fmtCurrency(pipeBrut)}</div>
          <div className="text-xs text-gray-500 mt-1">{filtered.length} besoin{filtered.length>1?'s':''} actif{filtered.length>1?'s':''}</div>
        </div>
        <div className="bg-white rounded-xl border border-gray-100 p-4">
          <div className="text-xs text-gray-400 font-medium mb-1 uppercase tracking-wide">Pipe pondéré</div>
          <div className="text-3xl font-bold text-green-700">{fmtCurrency(pipePondere)}</div>
          <div className="text-xs text-gray-500 mt-1">Valeur × probabilité</div>
        </div>
        <button onClick={()=>{setRiskFilter(!riskFilter);setDonutFilter('');}} className={`bg-white rounded-xl border p-4 text-left transition-colors ${riskFilter?'border-orange-400 bg-orange-50':'border-gray-100 hover:border-orange-200'}`}>
          <div className="text-xs text-gray-400 font-medium mb-1 uppercase tracking-wide">À risque</div>
          <div className={`text-3xl font-bold ${aRisqueCount>0?'text-orange-600':'text-gray-300'}`}>{fmtCurrency(aRisqueVal)}</div>
          <div className="text-xs text-gray-500 mt-1">{aRisqueCount} besoin{aRisqueCount>1?'s':''} sans action &gt;10j</div>
        </button>
        <div className="bg-white rounded-xl border border-gray-100 p-4">
          <div className="text-xs text-gray-400 font-medium mb-1 uppercase tracking-wide">Gagné YTD</div>
          <div className="text-3xl font-bold text-emerald-700">{fmtCurrency(gagneYTD)}</div>
          <div className="text-xs text-gray-500 mt-1">Besoins gagnés</div>
        </div>
      </div>

      {/* Graphiques */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        {/* Funnel */}

// ── Cellule éditable jours + statut livraison ────────────────────────────────
const LIVRAISON_STATUTS=[
  {value:null,label:'Réalisé',color:'text-gray-600',dot:'bg-gray-400',bg:''},
  {value:'Livré',label:'Livré',color:'text-blue-600',dot:'bg-blue-500',bg:'bg-blue-50'},
  {value:'Réceptionné',label:'Réceptionné',color:'text-green-600',dot:'bg-green-500',bg:'bg-green-50'},
];

function EditableJoursCell({ mission, moisKey, moisIdx, curMonthIdx, isDebut, isFin, finSoon, onUpdate }) {
  const [editing,setEditing]=useState(false);
  const [editVal,setEditVal]=useState('');
  const [saving,setSaving]=useState(false);
  const [showStatut,setShowStatut]=useState(false);
  const inputRef=useRef(null);
  const dropRef=useRef(null);

  const j=parseFloat(mission[`jours_${moisKey}`])||0;
  const rec=mission[`statut_${moisKey}`]||null;
  const statutObj=LIVRAISON_STATUTS.find(s=>s.value===rec)||LIVRAISON_STATUTS[0];

  // Close dropdown on outside click
  useEffect(()=>{
    if(!showStatut) return;
    const h=e=>{if(dropRef.current&&!dropRef.current.contains(e.target))setShowStatut(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[showStatut]);

  const startEdit=(e)=>{
    e.stopPropagation();
    setEditVal(j>0?(j%1===0?j.toFixed(0):j.toFixed(1)):'');
    setEditing(true);
    setTimeout(()=>inputRef.current?.select(),0);
  };

  const saveJours=async()=>{
    const newVal=parseFloat(editVal);
    if(isNaN(newVal)||newVal<0){setEditing(false);return;}
    const rounded=Math.round(newVal*10)/10;
    if(rounded===j){setEditing(false);return;}
    setEditing(false);setSaving(true);
    try{
      const patch={[`jours_${moisKey}`]:rounded};
      const{error}=await sb.from('missions').update(patch).eq('id',mission.id);
      if(error) throw error;
      mission[`jours_${moisKey}`]=rounded; // optimistic
      onUpdate();
    }catch(e){toast('Erreur sauvegarde : '+e.message,'error');}
    finally{setSaving(false);}
  };

  const changeStatut=async(newStatut)=>{
    setShowStatut(false);
    if(newStatut===rec) return;
    // Warning si passage direct à Réceptionné sans Livré
    if(newStatut==='Réceptionné'&&rec!=='Livré'){
      if(!confirm('Ce mois n\'a pas encore de BL émis (Livré). Continuer quand même ?')) return;
    }
    setSaving(true);
    const oldStatut=rec;
    mission[`statut_${moisKey}`]=newStatut; // optimistic
    onUpdate();
    try{
      const patch={[`statut_${moisKey}`]:newStatut};
      const{error}=await sb.from('missions').update(patch).eq('id',mission.id);
      if(error) throw error;
      toast(`${MOIS_LABELS[moisIdx]} → ${newStatut||'Réalisé'}`);
    }catch(e){
      mission[`statut_${moisKey}`]=oldStatut; // rollback
      onUpdate();
      toast('Erreur : '+e.message,'error');
    }finally{setSaving(false);}
  };

  const onKeyDown=(e)=>{
    if(e.key==='Enter'){e.preventDefault();saveJours();}
    if(e.key==='Escape'){e.preventDefault();setEditing(false);}
    if(e.key==='Tab'){saveJours();}
  };

  // Colors
  const cellCls=j>0?(rec==='Réceptionné'?'text-green-600 font-semibold':rec==='Livré'?'text-blue-600':'text-gray-600'):'text-gray-300';
  let cellBg=moisIdx===curMonthIdx?'bg-blue-50':'';
  let cellStyle={};
  if(isDebut&&isFin) cellStyle={background:'linear-gradient(90deg, rgba(34,197,94,0.15) 50%, rgba(239,68,68,'+(finSoon?'0.30':'0.15')+') 50%)'};
  else if(isDebut) cellStyle={background:'rgba(34,197,94,0.15)'};
  else if(isFin) cellStyle={background:'rgba(239,68,68,'+(finSoon?'0.30':'0.15')+')'};
  if(isDebut||isFin) cellBg='';

  return (
    <td className={`relative text-right text-xs font-mono ${cellBg} ${saving?'opacity-50':''}`} style={{...cellStyle,padding:'4px 6px',minWidth:'48px'}}
      title={rec||(isDebut?'Début mission':'')+(isFin?' Fin mission':'')}>
      <div className="flex items-center justify-end gap-0.5">
        {/* Pastille statut — cliquable */}
        {j>0&&(
          <div className="relative" ref={dropRef}>
            <button onClick={e=>{e.stopPropagation();setShowStatut(!showStatut);}}
              className={`w-2 h-2 rounded-full ${statutObj.dot} hover:ring-2 hover:ring-offset-1 hover:ring-gray-300 transition-all shrink-0`}
              title={`Statut : ${statutObj.label} — Cliquer pour changer`}/>
            {showStatut&&(
              <div className="absolute top-4 right-0 z-50 bg-white border border-gray-200 rounded-lg shadow-lg py-1 w-36" style={{fontSize:'12px'}}>
                {LIVRAISON_STATUTS.map(s=>(
                  <button key={s.label} onClick={e=>{e.stopPropagation();changeStatut(s.value);}}
                    className={`w-full text-left px-3 py-1.5 flex items-center gap-2 hover:bg-gray-50 ${s.value===rec?'font-semibold bg-gray-50':''}`}>
                    <span className={`w-2.5 h-2.5 rounded-full ${s.dot}`}/>
                    <span className={s.color}>{s.label}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
        )}
        {/* Jours — clic pour éditer */}
        {editing?(
          <input ref={inputRef} type="number" step="0.5" min="0"
            value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={saveJours} onKeyDown={onKeyDown}
            onClick={e=>e.stopPropagation()}
            className="w-10 text-right text-xs font-mono border border-blue-300 rounded px-0.5 py-0 focus:outline-none focus:ring-1 focus:ring-blue-400 bg-white"
            style={{fontSize:'12px'}} inputMode="decimal"/>
        ):(
          <span onClick={startEdit}
            className={`${cellCls} cursor-text hover:bg-yellow-50 hover:rounded px-0.5 transition-colors`}
            title="Cliquer pour modifier">
            {j>0?(j%1===0?j.toFixed(0):j.toFixed(1)):'—'}
          </span>
        )}
      </div>
    </td>
  );
}

// ── Onglet TDB Missions ───────────────────────────────────────────────────────
function TabTDB({ missions, histMissions, contacts, taches, besoins, profile, allProfiles, onRefresh }) {
  const [selected,setSelected] = useState(null); const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch] = useState(''); const [filterStatut,setFilterStatut] = useState('');
  const [filterAgence,setFilterAgence] = useState(profile.role==='admin'?'':profile.agence);
  const [filterResp,setFilterResp] = useState('');
  const [tick,setTick] = useState(0); // force re-render on optimistic update
  const forceUpdate=useCallback(()=>setTick(t=>t+1),[]);
  const isAdmin = profile.role==='admin';
  const curMonthIdx = new Date().getMonth();

  // Agences depuis allProfiles (pas hardcodé)
  const agences=useMemo(()=>[...new Set(allProfiles.map(p=>p.agence).filter(Boolean))].sort(),[allProfiles]);
  const commerciauxParAgence=useMemo(()=>{
    const map={};
    allProfiles.forEach(p=>{if(p.agence&&p.nom){if(!map[p.agence])map[p.agence]=[];map[p.agence].push(p.nom);}});
    Object.values(map).forEach(arr=>arr.sort());
    return map;
  },[allProfiles]);
  const responsablesVisibles=useMemo(()=>{
    if(isAdmin&&!filterAgence) return [...new Set(allProfiles.map(p=>p.nom).filter(Boolean))].sort();
    const ag=filterAgence||profile.agence;
    return commerciauxParAgence[ag]||[];
  },[isAdmin,filterAgence,profile.agence,allProfiles,commerciauxParAgence]);

  const missionsFiltrees=useMemo(()=>{
    const q=search.toLowerCase();
    return missions.filter(m=>{
      if(filterStatut&&m.statut!==filterStatut) return false;
      if(filterAgence&&m.agence!==filterAgence) return false;
      if(filterResp&&m.responsable!==filterResp) return false;
      if(q&&![(m.consultant||''),(m.client||'')].some(v=>v.toLowerCase().includes(q))) return false;
      return true;
    });
  },[missions,search,filterStatut,filterAgence,filterResp]);
  const hasFilter=search||filterStatut||filterResp||(isAdmin?filterAgence!=='':filterAgence!==profile.agence);
  const resetAll=()=>{setSearch('');setFilterStatut('');setFilterResp('');setFilterAgence(isAdmin?'':profile.agence);};

  const enMission    = missionsFiltrees.filter(m=>m.statut==='En cours'||m.statut==='New');
  const intercontrat = missionsFiltrees.filter(m=>m.statut==='Intercontrat');
  const caYTD = missionsFiltrees.reduce((sum,m)=>{ const tjm=parseFloat(m.tjm)||0; return sum+MOIS_KEYS.reduce((s,k)=>s+(parseFloat(m[`jours_${k}`])||0)*tjm,0); },0);
  const margeYTD = missionsFiltrees.reduce((sum,m)=>{ const mg=(parseFloat(m.tjm)||0)-(parseFloat(m.cjm)||0); return sum+MOIS_KEYS.reduce((s,k)=>s+(parseFloat(m[`jours_${k}`])||0)*mg,0); },0);
  const tauxMarge = caYTD>0?(margeYTD/caYTD*100):0;

  const caMensuel = MOIS_KEYS.map(k=>missionsFiltrees.reduce((sum,m)=>(parseFloat(m[`jours_${k}`])||0)*(parseFloat(m.tjm)||0)+sum,0));
  const maxCA = Math.max(...caMensuel,1);

  const ORDRE_STATUT={'En cours':0,'New':1,'Intercontrat':2,'Terminée':3};
  const missionsTri=[...missionsFiltrees].sort((a,b)=>{const d=(ORDRE_STATUT[a.statut]??9)-(ORDRE_STATUT[b.statut]??9);return d!==0?d:(a.consultant||'').localeCompare(b.consultant||'');});

  if(missions.length===0) return (
    <div className="flex flex-col items-center justify-center py-20 text-gray-400">

                      </div>
                      <div className="flex items-center gap-1 mt-0.5">
                        {m.type_contrat&&<span className="text-xs text-gray-400">{m.type_contrat}</span>}

                      </div>
                    </td>
                    <td className="px-3 py-2.5 text-gray-600 whitespace-nowrap">{m.client||'—'}</td>
                    <td className="px-3 py-2.5 text-gray-500 hidden lg:table-cell text-xs max-w-xs">
                      <span title={m.projet||''}>{m.projet?(m.projet.length>45?m.projet.substring(0,45)+'…':m.projet):'—'}</span>
                    </td>
                    <td className="px-3 py-2.5 text-right font-mono text-xs text-gray-700 whitespace-nowrap">{m.tjm>0?`${m.tjm}€`:'—'}</td>
                    <td className="px-3 py-2.5 whitespace-nowrap"><MissionStatutBadge statut={m.statut}/></td>
                    {MOIS_KEYS.map((k,i)=>(
                      <EditableJoursCell key={k} mission={m} moisKey={k} moisIdx={i} curMonthIdx={curMonthIdx}
                        isDebut={debutM===i} isFin={finM===i} finSoon={finSoon} onUpdate={forceUpdate}/>
                    ))}
                    <td className="px-3 py-2.5 text-right font-semibold text-gray-700 whitespace-nowrap">{caTotal>0?fmtCurrency(caTotal):'—'}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr className="border-t-2 border-gray-200 bg-gray-50 text-xs font-semibold text-gray-700">
                <td className="px-3 py-2.5 uppercase tracking-wide" colSpan={2}>TOTAL</td>
                <td className="hidden lg:table-cell"></td><td></td><td></td>
                {MOIS_KEYS.map((k,i)=>{
                  const totJ=missionsFiltrees.reduce((s,m)=>s+(parseFloat(m[`jours_${k}`])||0),0);
                  const totCA=missionsFiltrees.reduce((s,m)=>s+(parseFloat(m[`jours_${k}`])||0)*(parseFloat(m.tjm)||0),0);
                  return <td key={k} className={`px-2 py-2.5 text-right font-mono ${i===curMonthIdx?'bg-blue-100':''}`}>{totJ>0?<><div>{totJ%1===0?totJ.toFixed(0):totJ.toFixed(1)}j</div><div className="text-green-700">{fmtCurrency(totCA)}</div></>:<span className="text-gray-300">—</span>}</td>;
                })}
                <td className="px-3 py-2.5 text-right"><div className="text-green-700">{fmtCurrency(caYTD)}</div><div className="text-purple-600 text-xs font-normal">Marge {tauxMarge.toFixed(1)}%</div></td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div className="hidden md:flex px-4 py-2 border-t border-gray-50 gap-4 text-xs text-gray-400 flex-wrap">
          <span>Cliquer sur les jours pour modifier · Pastille pour le statut livraison</span>
          <span className="ml-auto"><span className="inline-block w-2 h-2 rounded-full bg-gray-400 mr-1 align-middle"/>Réalisé</span>
          <span><span className="inline-block w-2 h-2 rounded-full bg-blue-500 mr-1 align-middle"/>Livré</span>
          <span><span className="inline-block w-2 h-2 rounded-full bg-green-500 mr-1 align-middle"/>Réceptionné</span>
          <span><span className="inline-block w-3 h-3 rounded mr-1 align-middle" style={{background:'rgba(34,197,94,0.3)'}}></span>Début</span>
          <span><span className="inline-block w-3 h-3 rounded mr-1 align-middle" style={{background:'rgba(239,68,68,0.3)'}}></span>Fin</span>
        </div>
      </div>

      {selected&&<MissionDetail mission={selected} histMissions={histMissions} contacts={contacts||[]} taches={taches||[]} missions={missions||[]} besoins={besoins||[]} profile={profile} allProfiles={allProfiles} onClose={()=>setSelected(null)} onRefresh={()=>{setSelected(null);onRefresh();}}/>}
      {showAdd&&<MissionFormModal profile={profile} allProfiles={allProfiles} contacts={contacts||[]} onClose={()=>setShowAdd(false)} onSaved={()=>{setShowAdd(false);onRefresh();}}/>}
    </div>
  );
}

// ── Modal : Changer mot de passe ──────────────────────────────────────────────
function ChangePasswordModal({ onClose }) {
  const [pwd,setPwd]=useState(''); const [pwd2,setPwd2]=useState('');
  const [saving,setSaving]=useState(false); const [err,setErr]=useState(''); const [ok,setOk]=useState(false);
  const save = async () => {
    if (pwd.length < 6)          { setErr('Le mot de passe doit faire au moins 6 caractères.'); return; }
    if (pwd !== pwd2)             { setErr('Les mots de passe ne correspondent pas.'); return; }
    setSaving(true); setErr('');
    const { error } = await sb.auth.updateUser({ password: pwd });
    if (error) { setErr(error.message); setSaving(false); }
    else       { setOk(true); }
  };
  return (
    <Modal title="🔑 Changer mon mot de passe" onClose={onClose}
      footer={ok ? <button onClick={onClose} className="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium">Fermer</button>
                 : <><button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Annuler</button><button onClick={save} disabled={saving||!pwd||!pwd2} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">{saving?'Enregistrement...':'Enregistrer'}</button></>}>
      {ok
        ? <div className="text-center py-4"><div className="text-3xl mb-2">✅</div><div className="text-sm text-green-700 font-medium">Mot de passe mis à jour avec succès !</div></div>
        : <>
            <Field label="Nouveau mot de passe"><input type="password" autoFocus value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Min. 6 caractères" className={inputCls}/></Field>
            <Field label="Confirmer le mot de passe"><input type="password" value={pwd2} onChange={e=>setPwd2(e.target.value)} placeholder="Répéter le mot de passe" className={inputCls}/></Field>
            {err && <div className="text-xs text-red-600 bg-red-50 rounded px-3 py-2">{err}</div>}
          </>
      }
    </Modal>
  );
}

function App() {
  const [user,setUser]=useState(undefined); const [profile,setProfile]=useState(null);
  const [data,setData]=useState(null); const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null); const [tab,setTab]=useState(()=>localStorage.getItem('crm_tab')||'taches');
  useEffect(()=>{localStorage.setItem('crm_tab',tab);},[tab]);
  const [lastRefresh,setLastRefresh]=useState(null);
  const [viewAs,setViewAs]=useState(null); const [allProfiles,setAllProfiles]=useState([]);
  const [tachesNavKey,setTachesNavKey]=useState(0); const [tachesNavEcheance,setTachesNavEcheance]=useState('');
  const navToTaches = echeance => { setTab('taches'); setTachesNavEcheance(echeance); setTachesNavKey(k=>k+1); };

  useEffect(()=>{
    sb.auth.getUser().then(({data:{user}})=>setUser(user||null));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
      if(!session){setProfile(null);setData(null);}
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const fetchAll = useCallback(async ()=>{
    setLoading(true); setError(null);
    try {
      const [
        {data:contacts,  error:e1},{data:historique,error:e2},
        {data:taches,    error:e3},{data:besoins,   error:e4},
        {data:missions,  error:e5},{data:histMiss,  error:e6},
        {data:besoinCandidats,error:e7},
      ] = await Promise.all([
        sb.from('contacts').select('*').order('id'),
        sb.from('historique_actions').select('*').order('date',{ascending:false}).limit(2000),
        sb.from('taches').select('*').order('due_date',{ascending:true,nullsFirst:false}),
        sb.from('besoins').select('*').order('created_at',{ascending:false}),
        sb.from('missions').select('*').order('consultant'),
        sb.from('historique_missions').select('*').order('date',{ascending:false}),
        sb.from('besoin_candidats').select('*').order('created_at',{ascending:true}),
      ]);
      const err=e1||e2||e3||e4;
      if(err) throw new Error(err.message);
      // e5/e6/e7 peuvent échouer si tables pas encore créées — on ignore silencieusement
      const mList=missions||[];
      // Auto-status missions : New→En cours si démarrée, En cours→Terminée si date fin dépassée
      const today=new Date().toISOString().slice(0,10);
      const autoUpdates=mList.filter(m=>{
        if(m.statut==='New'&&m.date_debut_mission&&m.date_debut_mission.slice(0,10)<=today) return true;
        if(m.statut==='En cours'&&m.date_fin_mission&&m.date_fin_mission.slice(0,10)<today) return true;
        return false;
      });
      if(autoUpdates.length>0){
        await Promise.all(autoUpdates.map(m=>{
          const newStatut=m.statut==='New'?'En cours':'Terminée';
          m.statut=newStatut;
          return sb.from('missions').update({statut:newStatut}).eq('id',m.id);
        }));
      }
      setData({contacts,historique,taches,besoins,missions:mList,histMissions:histMiss||[],besoinCandidats:besoinCandidats||[]});
      setLastRefresh(new Date().toLocaleTimeString('fr-FR'));
    } catch(err){ setError(err.message); } finally{ setLoading(false); }
  },[]);

  useEffect(()=>{
    if(!user) return;
    sb.from('profiles').select('*').eq('id',user.id).single().then(({data:p})=>setProfile(p));
    sb.from('profiles').select('*').order('nom').then(({data:ps})=>setAllProfiles(ps||[]));
    fetchAll();
  },[user]);

  const [showPwd,setShowPwd]=useState(false);
  const [showMenu,setShowMenu]=useState(false);
  const [showShortcuts,setShowShortcuts]=useState(false);
  const tabsRef=React.useRef(null);
  const logout = async ()=>await sb.auth.signOut();
  // Auto-scroll active tab into view on mobile
  useEffect(()=>{
    if(!tabsRef.current)return;
    const active=tabsRef.current.querySelector('[data-active="true"]');
    if(active)active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },[tab]);
  // Keyboard shortcuts
  useEffect(()=>{
    const h=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'||e.target.isContentEditable)return;
      if(e.key==='1'){e.preventDefault();setTab('taches');}
      if(e.key==='2'){e.preventDefault();setTab('prospects');}
      if(e.key==='3'){e.preventDefault();setTab('besoins');}
      if(e.key==='4'){e.preventDefault();setTab('pipe');}
      if(e.key==='5'){e.preventDefault();setTab('tdb');}
      if(e.key==='6'){e.preventDefault();setTab('historique');}
      if(e.key==='r'&&!e.metaKey&&!e.ctrlKey){e.preventDefault();fetchAll();}
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[fetchAll]);
  // Enter on hover → open detail
  useEffect(()=>{
    const h=e=>{
      if(e.key!=='Enter'||e.defaultPrevented) return;
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'||e.target.tagName==='BUTTON'||e.target.isContentEditable) return;
      const el=document.querySelector('[data-detail]:hover')||document.activeElement?.closest?.('[data-detail]');
      if(el){e.preventDefault();el.click();}
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);

  if(user===undefined) return <Loader label="Vérification de la session..."/>;
  if(!user) return <LoginScreen/>;
  if(!data||!profile) return <Loader label="Chargement depuis Supabase..."/>;
  if(error) return <div className="flex items-center justify-center min-h-screen"><div className="bg-red-50 border border-red-200 rounded-xl p-6 max-w-md text-center"><div className="text-3xl mb-3">❌</div><div className="font-semibold text-red-800">Erreur Supabase</div><div className="text-sm text-red-600 mt-2 font-mono">{error}</div><button onClick={fetchAll} className="mt-4 px-4 py-2 bg-red-600 text-white rounded-lg text-sm">Réessayer</button></div></div>;

  const {contacts,historique,taches,besoins,missions,histMissions,besoinCandidats}=data;
  const isAdmin=profile.role==='admin';

  // ── Mode "Voir comme" ──────────────────────────────────
  const activeProfile = viewAs || profile;
  const activeIsAdmin = activeProfile.role==='admin';
  const contactAgenceMap = Object.fromEntries(contacts.map(c=>[String(c.id),c.agence]));
  const vContacts   = contacts; // tous voient tous les contacts
  const vHistorique = activeIsAdmin ? historique : historique.filter(h=>h.responsable===activeProfile.nom);
  const vTaches     = activeIsAdmin ? taches     : taches.filter(t=>t.responsable===activeProfile.nom);
  const vMissions   = activeIsAdmin ? missions   : missions.filter(m=>m.responsable===activeProfile.nom);
  const vBesoins    = activeIsAdmin ? besoins    : besoins.filter(b=>contactAgenceMap[String(b.contact_id)]===activeProfile.agence||b.agence===activeProfile.agence);
  const vHistMiss   = histMissions; // filtré par missions déjà

  const tachesActives=vTaches.filter(t=>t.statut!=='fait'&&t.statut!=='annule');
  const tachesRetard=tachesActives.filter(t=>t.due_date&&extractDate(t.due_date)<TODAY);
  const besoinsPipeActifs=vBesoins.filter(b=>b.statut!=='Besoin Perdu');
  const TABS=[
    {id:'taches',     label:`✅ Tâches (${tachesActives.length})${tachesRetard.length>0?' 🔴':''}`},
    {id:'prospects',  label:`📋 Contacts (${vContacts.length})`},
    {id:'besoins',    label:`🎯 Besoins (${vBesoins.length})`},
    {id:'pipe',       label:`📊 Pipe (${besoinsPipeActifs.length})`},
    {id:'tdb',        label:`💼 Missions (${vMissions.length})`},
    {id:'historique', label:`📖 Historique (${vHistorique.length})`},
  ];

  return (
    <div className="min-h-screen bg-gray-50">
      <div className="bg-white border-b sticky top-0 z-40 shadow-sm">
        <div className="max-w-7xl mx-auto px-2 sm:px-4 py-2 sm:py-3 flex items-center justify-between gap-2">
          <div className="flex items-center gap-2 sm:gap-3 min-w-0 shrink-0">
