// ── Helpers datetime ─────────────────────────────────────────────────────────
// Extrait la partie date (YYYY-MM-DD) d'un datetime ISO ou date simple
function extractDate(dt) { return dt ? String(dt).slice(0,10) : ''; }
// Extrait l'heure (HH:MM) d'un datetime ISO ; retourne '' si date simple ou minuit
function extractTime(dt) {
  if(!dt) return '';
  const s=String(dt);
  if(s.length<=10) return ''; // date simple, pas d'heure
  const m=s.match(/T(\d{2}:\d{2})/);
  if(!m) return '';
  return m[1]==='00:00'?'':m[1]; // minuit = pas d'heure explicite
}
// Combine date YYYY-MM-DD + time HH:MM → ISO string ; si pas de time, renvoie la date seule
function combineDT(date, time) {
  if(!date) return null;
  if(!time) return date;
  return `${date}T${time}:00`;
}
// Affiche une date/datetime de manière lisible, avec heure si != defaultTime
function fmtDT(dt, defaultTime) {
  if(!dt) return '—';
  const d=extractDate(dt);
  const t=extractTime(dt);
  const [y,m,dd]=(d||'').split('-');
  const dateFmt=dd&&m&&y?`${dd}/${m}/${y}`:(d||'—');
  if(!t || t===defaultTime) return dateFmt;
  return `${dateFmt} · ${t}`;
}
// Vérifie si un datetime a une heure non-default
function hasCustomTime(dt, defaultTime) {
  const t=extractTime(dt);
  return t && t!==defaultTime;
}

// ── Jours ouvrés (lun-ven hors fériés FR) ───────────────────────────────────
const FERIES_FR = (() => {
  const s = new Set();
  // Dates fixes 2025-2027
  [2025,2026,2027].forEach(y => {
    [`${y}-01-01`,`${y}-05-01`,`${y}-05-08`,`${y}-07-14`,`${y}-08-15`,`${y}-11-01`,`${y}-11-11`,`${y}-12-25`].forEach(d=>s.add(d));
    // Pâques (algo Meeus) → lundi de Pâques + Ascension + lundi Pentecôte
    const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
    const easter=new Date(y,month-1,day);
    const addDays=(dt,n)=>{const r=new Date(dt);r.setDate(r.getDate()+n);return r.toISOString().slice(0,10);};
    s.add(addDays(easter,1)); s.add(addDays(easter,39)); s.add(addDays(easter,50));
  });
  return s;
})();
function joursOuvres(debut, fin) {
  if(!debut||!fin) return 0;
  let count=0, d=new Date(debut);
  const end=new Date(fin);
  while(d<=end){ const dow=d.getDay(); const iso=d.toISOString().slice(0,10); if(dow!==0&&dow!==6&&!FERIES_FR.has(iso))count++; d.setDate(d.getDate()+1); }
  return count;
}

function ToastContainer(){
  const [items,setItems]=useState([]);
  useEffect(()=>{
    const h=e=>{const{msg,type}=e.detail;const id=Date.now();setItems(t=>[...t,{id,msg,type}]);setTimeout(()=>setItems(t=>t.filter(x=>x.id!==id)),3000);};
    window.addEventListener('crm-toast',h);return()=>window.removeEventListener('crm-toast',h);
  },[]);
  if(!items.length)return null;
  return(<div className="fixed bottom-4 right-4 z-[100] space-y-2">{items.map(t=>(
    <div key={t.id} className={`toast-in px-4 py-3 rounded-xl shadow-lg text-sm font-medium ${t.type==='error'?'bg-red-600 text-white':'bg-gray-800 text-white'}`}>

}

const TACHE_TYPES_CANDIDAT  = ['Appel','Entretien','Envoi CV','Suivi','Relance','Autre'];
const TACHE_TYPES_PROSPECT  = ['Appel','RDV','Email','Proposition commerciale','Relance','Autre'];
const TACHE_TYPES_LIBRE     = ['Appel','RDV','Email','Entretien','Relance','Autre'];
function tacheTypesFor(contact) {
  if (!contact) return TACHE_TYPES_LIBRE;
  if (isEntretienStatut(contact.statut)) return TACHE_TYPES_CANDIDAT;
  return TACHE_TYPES_PROSPECT;
}

function CompteSearchField({ contacts, value, onChange, placeholder }) {
  const [query,setQuery] = useState('');
  const [open,setOpen] = useState(false);
  const comptes = useMemo(()=>[...new Set(contacts.map(c=>c.groupe).filter(Boolean))].sort(),[contacts]);

    const q=query.trim().toLowerCase();
    if(!q) return comptes.slice(0,15);

  },[query,comptes]);
  if(value) return (
    <div className="flex items-center gap-2 px-3 py-2 border border-blue-200 rounded-lg bg-blue-50">

function AddTacheModal({ contacts, besoins, missions, profile, allProfiles, onClose, onSaved, defaultContactId, defaultMissionId, defaultBesoinId }) {
  const isAdmin = profile.role==='admin';
  const [f,setF] = useState({ type:'', titre:'', due_date:'', due_time:DEFAULT_TASK_TIME, contact_id:defaultContactId?String(defaultContactId):'', notes:'', responsable:profile.nom, mission_id:defaultMissionId||'', besoin_id:defaultBesoinId||'' });
  const [saving,setSaving]=useState(false);
  const myContacts = useMemo(()=>contacts.filter(c=>isAdmin||c.responsable===profile.nom).sort((a,b)=>(a.nom||'').localeCompare(b.nom||'')),[contacts,profile,isAdmin]);
  const contactMap = useMemo(()=>Object.fromEntries(myContacts.map(c=>[String(c.id),c])),[myContacts]);
  const selContact = f.contact_id ? contactMap[f.contact_id] : null;
  const types = useMemo(()=>tacheTypesFor(selContact),[selContact]);

  const selectType = (t) => {
    const contactPart = selContact ? ` — ${[selContact.prenom,selContact.nom].filter(Boolean).join(' ')}` : '';
    setF(v=>({...v, type:t, titre: t + contactPart}));
  };
  const handleContactChange = (cid) => {
    setF(v => {
      const c = cid ? contactMap[cid] : null;
      const newTitre = v.type ? v.type + (c ? ` — ${[c.prenom,c.nom].filter(Boolean).join(' ')}` : '') : v.titre;
      return {...v, contact_id:cid, titre:newTitre};
    });
  };

  const save = async () => {
    if (!f.titre.trim()) return; setSaving(true);
    const { error } = await sb.from('taches').insert({ id:`tw_${Date.now()}`, titre:f.titre.trim(), statut:f.due_date?'en_cours':'a_faire', due_date:combineDT(f.due_date,f.due_time)||null, contact_id:f.contact_id?parseInt(f.contact_id):null, mission_id:f.mission_id||null, besoin_id:f.besoin_id||null, notes:f.notes||null, responsable:f.responsable });
    if (!error) {toast('Tâche créée');onSaved();} else setSaving(false);
  };

  return (
    <Modal title="✅ Nouvelle tâche" onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Annuler</button><button onClick={save} disabled={saving||!f.titre.trim()} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">{saving?'Enregistrement...':'+ Créer'}</button></>}>
      <Field label="Contact lié">
        <ContactPicker contacts={myContacts} value={f.contact_id} onChange={handleContactChange}/>
      </Field>
      <Field label="Type">
        <div className="flex gap-1.5 flex-wrap mt-1">
          {types.map(t=>(
            <button key={t} type="button" onClick={()=>selectType(t)}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors whitespace-nowrap
                ${f.type===t
                  ? t==='Entretien' ? 'bg-purple-600 text-white border-purple-600'
                                    : 'bg-blue-600 text-white border-blue-600'
                  : 'bg-white text-gray-600 border-gray-200 hover:border-blue-300 hover:text-blue-600'}`}>
              {t==='Entretien'?'📅 Entretien':t}
            </button>
          ))}
        </div>
      </Field>
      <Field label="Titre *"><input type="text" value={f.titre} onChange={e=>setF(v=>({...v,titre:e.target.value}))} placeholder="Sélectionne un type ou saisis directement" className={inputCls}/></Field>
      <Field label="Échéance">
        <div className="flex gap-2">
          <input type="date" value={f.due_date} min={TODAY} onChange={e=>setF(v=>({...v,due_date:e.target.value}))} className={inputCls+' flex-1'}/>
          {f.due_date && <input type="time" value={f.due_time} onChange={e=>setF(v=>({...v,due_time:e.target.value}))} className={inputCls+' w-28'}/>}
        </div>
      </Field>
      <Field label="Mission liée">
        {defaultMissionId
          ? <MissionPicker missions={missions||[]} value={f.mission_id} onChange={()=>{}}/>
          : <MissionPicker missions={missions||[]} value={f.mission_id} onChange={mid=>setF(v=>({...v,mission_id:mid}))}/>
        }
      </Field>
      <Field label="Besoin lié">
        {defaultBesoinId
          ? <BesoinPicker besoins={besoins||[]} value={f.besoin_id} onChange={()=>{}} contactId={f.contact_id}/>
          : <BesoinPicker besoins={besoins||[]} value={f.besoin_id} onChange={bid=>setF(v=>({...v,besoin_id:bid}))} contactId={f.contact_id}/>

      </Field>
      <Field label="Notes"><textarea rows={2} value={f.notes} onChange={e=>setF(v=>({...v,notes:e.target.value}))} className={inputCls+' resize-none'}/></Field>
      <Field label="Responsable">
        {isAdmin
          ? <select value={f.responsable} onChange={e=>setF(v=>({...v,responsable:e.target.value}))} className={inputCls}>
              {respOptions(allProfiles,f.responsable).map(p=><option key={p.nom} value={p.nom}>{p.nom}</option>)}
            </select>
          : <div className="px-3 py-2 border rounded-lg text-sm bg-gray-50 text-gray-600">{profile.nom}</div>
        }

    </Modal>
  );
}

      {['Candidat','Consultant CDI','Freelance','Prestataire'].includes(f.statut)&&<Field label="ATS (lien candidat)"><input type="url" value={f.ats} onChange={s('ats')} className={inputCls} placeholder="Lien Recruitee"/></Field>}

function ContactDetail({ contact, historique, taches, missions, besoins, profile, allProfiles, onClose, onRefresh }) {
  const [modal,setModal] = useState(null);
  const [deleting,setDeleting] = useState(false);
  const isOwner = profile.role==='admin' || contact.responsable===profile.nom;
  const hist = historique.filter(h=>h.id_prospect===contact.id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const tachesContact = taches.filter(t=>t.contact_id===contact.id&&t.statut!=='fait'&&t.statut!=='annule');
  const saved = () => { setModal(null); onRefresh(); };
  const handleDelete = async () => {
    setDeleting(true);
    await sb.from('historique_actions').insert({ id_prospect:contact.id, date:getToday(), type_action:'Note interne', details:`Contact supprimé par ${profile.nom}`, responsable:profile.nom });
    await sb.from('contacts').delete().eq('id',contact.id);
    toast('Contact supprimé');onRefresh(); onClose();
  };
  const actions = isOwner && (
    <>
      <button onClick={()=>setModal('edit')} className="px-3 py-1.5 text-xs bg-blue-50 text-blue-700 rounded-lg font-medium hover:bg-blue-100">✏️ Modifier</button>
      <button onClick={()=>setModal('hist')} className="px-3 py-1.5 text-xs bg-green-50 text-green-700 rounded-lg font-medium hover:bg-green-100">➕ Action</button>
      <button onClick={()=>setModal('tache')} className="px-3 py-1.5 text-xs bg-orange-50 text-orange-700 rounded-lg font-medium hover:bg-orange-100">✅ Tâche</button>
      {modal!=='confirmDel'
        ? <button onClick={()=>setModal('confirmDel')} className="px-3 py-1.5 text-xs bg-red-50 text-red-700 rounded-lg font-medium hover:bg-red-100">🗑️</button>
        : <div className="flex gap-2 items-center"><span className="text-xs text-red-700">Supprimer ?</span><button onClick={handleDelete} disabled={deleting} className="px-2 py-1 text-xs bg-red-600 text-white rounded">{deleting?'...':'Oui'}</button><button onClick={()=>setModal(null)} className="text-xs text-gray-500">Non</button></div>
      }
    </>
  );
  return (
    <SidePanel title={`${contact.prenom} ${contact.nom}`}
      badge={<><div className="text-sm text-gray-500">{contact.groupe} · {contact.role}</div><div className="mt-1"><StatutBadge statut={contact.statut}/></div></>}
      onClose={onClose} actions={actions}>
      <div className="grid grid-cols-2 gap-3 text-sm">
        <div><span className="text-gray-400">Ville</span><br/>{contact.ville||'—'}</div>
        <div><span className="text-gray-400">Responsable</span><br/>{contact.responsable||'—'}</div>
        {contact.email&&<div className="col-span-2"><span className="text-gray-400">Email</span><br/><a href={`mailto:${contact.email}`} className="text-blue-600 hover:underline">{contact.email}</a></div>}
        {contact.telephone&&<div><span className="text-gray-400">Tel</span><br/><a href={`tel:${contact.telephone}`} className="text-green-600 font-mono">{contact.telephone}</a></div>}
        {contact.linkedin&&<div><span className="text-gray-400">LinkedIn</span><br/><a href={contact.linkedin} target="_blank" className="text-blue-500 hover:underline text-xs">→ Profil LinkedIn</a></div>}
        {contact.ats&&<div><span className="text-gray-400">ATS</span><br/><a href={contact.ats} target="_blank" className="text-purple-500 hover:underline text-xs">→ Fiche ATS</a></div>}
      </div>
      {contact.commentaires&&<div><div className="text-xs text-gray-400 font-semibold mb-1 uppercase tracking-wide">Commentaires</div><div className="text-sm text-gray-600 bg-gray-50 rounded-lg p-3 whitespace-pre-wrap">{contact.commentaires}</div></div>}
      {tachesContact.length>0&&(
        <div>
          <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Tâches actives</div>
          <div className="space-y-2">{tachesContact.map(t=>(
            <div key={t.id} className="flex items-start gap-2 bg-blue-50 rounded-lg p-3">
              <span className="text-blue-400 mt-0.5">◆</span>
              <div><div className="text-sm font-medium text-blue-900">{t.titre}</div>{t.due_date&&<div className="text-xs text-blue-600">Échéance : {fmtDT(t.due_date,DEFAULT_TASK_TIME)}</div>}</div>

          ))}</div>
        </div>
      )}
      <div>
        <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Historique ({hist.length} actions)</div>
        {hist.length===0
          ? <div className="text-sm text-gray-400 italic">Aucune action enregistrée</div>
          : <div className="space-y-2">{hist.map((h,i)=>(
              <div key={i} className="flex gap-3 text-sm border-l-2 border-gray-100 pl-3">
                <div className="text-gray-400 shrink-0 w-14">{h.date?.slice(0,10)||'—'}</div>
                <div>
                  <span className="font-medium text-gray-700">{h.type_action}</span>
                  {h.responsable&&h.responsable!==contact.responsable&&<span className="ml-1 text-xs text-gray-400">({h.responsable})</span>}
                  {h.details&&<div className="text-gray-500 text-xs mt-0.5">{h.details}</div>}
                </div>
              </div>
            ))}</div>
        }
      </div>
      {modal==='edit'  && <ContactEditModal   contact={contact} profile={profile} allProfiles={allProfiles} onClose={()=>setModal(null)} onSaved={saved} />}
      {modal==='hist'  && <AddHistoriqueModal contact={contact} profile={profile} onClose={()=>setModal(null)} onSaved={saved}/>}
      {modal==='tache' && <AddTacheModal contacts={[contact]} besoins={besoins||[]} missions={missions||[]} profile={profile} allProfiles={allProfiles} onClose={()=>setModal(null)} onSaved={saved} defaultContactId={contact.id}/>}
    </SidePanel>
  );
}

// ── Modal : Créer / Modifier mission ─────────────────────────────────────────
const MISSION_STATUTS=['En cours','New','Intercontrat','Terminée'];
const MISSION_CONTRATS=['CDI','Freelance','Prestataire','CDD','Alternance'];

function MissionFormModal({ mission, profile, allProfiles, contacts, onClose, onSaved, prefillBesoinId }) {
  const isEdit=!!mission&&!!mission.id;
  const isAdmin=profile.role==='admin';
  const init=mission||{consultant:'',client:'',projet:'',tjm:'',cjm:'',statut:'En cours',type_contrat:'CDI',responsable:profile.nom,agence:profile.agence||'Lyon',num_commande:'',date_debut_mission:'',date_fin_mission:'',referent:'',contact_consultant_id:null,contact_referent_id:null};
  const [f,setF]=useState({...init, date_debut_mission:extractDate(init.date_debut_mission), date_fin_mission:extractDate(init.date_fin_mission), debut_time:extractTime(init.date_debut_mission)||DEFAULT_MISSION_START_TIME, fin_time:extractTime(init.date_fin_mission)||DEFAULT_MISSION_END_TIME});
  const [jours,setJours]=useState(()=>{
    const j={};MOIS_KEYS.forEach(k=>{j[k]=mission?mission[`jours_${k}`]||'':'';});return j;
  });
  const [saving,setSaving]=useState(false);
  const s=key=>e=>setF(v=>({...v,[key]:e.target.value}));

  const save=async()=>{
    if(!f.contact_consultant_id){toast('Merci de sélectionner un consultant dans la liste.','error');return;}
    setSaving(true);
    const row={consultant:f.consultant.trim(),client:f.client||null,projet:f.projet||null,
      tjm:parseFloat(f.tjm)||0,cjm:parseFloat(f.cjm)||0,statut:f.statut,type_contrat:f.type_contrat||null,
      responsable:f.responsable,agence:f.agence||profile.agence||'Lyon',
      num_commande:f.num_commande||null,date_debut_mission:combineDT(f.date_debut_mission,f.debut_time)||null,date_fin_mission:combineDT(f.date_fin_mission,f.fin_time)||null,
      referent:f.referent||null};
    if(f.contact_consultant_id) row.contact_consultant_id=f.contact_consultant_id;
    if(f.contact_referent_id) row.contact_referent_id=f.contact_referent_id;
    if(prefillBesoinId) row.besoin_id=prefillBesoinId;
    MOIS_KEYS.forEach(k=>{row[`jours_${k}`]=parseFloat(jours[k])||0;});
    if(isEdit){
      const {error}=await sb.from('missions').update(row).eq('id',mission.id);
      if(error){toast('Erreur : '+error.message,'error');setSaving(false);return;}
    } else {
      const {error}=await sb.from('missions').insert(row);
      if(error){toast('Erreur : '+error.message,'error');setSaving(false);return;}
    }
    toast(isEdit?'Mission modifiée':'Mission créée');onSaved();
  };
  return (
    <Modal title={isEdit?`✏️ Modifier — ${mission.consultant}`:'➕ Nouvelle mission'} onClose={onClose}

      <div className="space-y-3">
        <div className="grid grid-cols-2 gap-3">
          <Field label="Consultant *"><ContactSearchField contacts={contacts||[]} value={f.contact_consultant_id} onChange={(id,name)=>setF(v=>({...v,contact_consultant_id:id,consultant:name||v.consultant}))} statuts={['Consultant CDI','Freelance','Prestataire']} placeholder="Rechercher consultant CDI/freelance/prestataire..."/></Field>
          <Field label="Client"><CompteSearchField contacts={contacts||[]} value={f.client||''} onChange={client=>setF(v=>({...v,client}))}/></Field>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Projet"><input value={f.projet||''} onChange={s('projet')} className={inputCls} placeholder="Intitulé du projet"/></Field>
          <Field label="Référent client"><ContactSearchField contacts={contacts||[]} value={f.contact_referent_id} onChange={(id,name)=>setF(v=>({...v,contact_referent_id:id,referent:name||v.referent}))} statuts={['Client','Prospect','Decision Maker']} placeholder="Rechercher contact client..."/></Field>
        </div>
        <div className="grid grid-cols-3 gap-3">
          <Field label="N° commande"><input value={f.num_commande||''} onChange={s('num_commande')} className={inputCls} placeholder="5090-4210617888"/></Field>
          <Field label="Début mission">
            <div className="flex gap-1">
              <input type="date" value={f.date_debut_mission||''} onChange={s('date_debut_mission')} className={inputCls+' flex-1'}/>
              {f.date_debut_mission && <input type="time" value={f.debut_time} onChange={e=>setF(v=>({...v,debut_time:e.target.value}))} className={inputCls+' w-24 text-xs'}/>}
            </div>
          </Field>
          <Field label="Fin mission">
            <div className="flex gap-1">
              <input type="date" value={f.date_fin_mission||''} onChange={s('date_fin_mission')} className={inputCls+' flex-1'}/>
              {f.date_fin_mission && <input type="time" value={f.fin_time} onChange={e=>setF(v=>({...v,fin_time:e.target.value}))} className={inputCls+' w-24 text-xs'}/>}
            </div>
          </Field>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="TJM vente (€)"><input type="number" value={f.tjm} onChange={s('tjm')} className={inputCls}/></Field>
          <Field label="CJM achat (€)"><input type="number" value={f.cjm} onChange={s('cjm')} className={inputCls}/></Field>
        </div>
        <div className="grid grid-cols-3 gap-3">
          <Field label="Statut"><select value={f.statut} onChange={s('statut')} className={inputCls}>{MISSION_STATUTS.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
          <Field label="Contrat"><select value={f.type_contrat||''} onChange={s('type_contrat')} className={inputCls}><option value="">—</option>{MISSION_CONTRATS.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
          {isAdmin?<Field label="Responsable"><select value={f.responsable} onChange={e=>{const nom=e.target.value;const p=allProfiles.find(x=>x.nom===nom);setF(v=>({...v,responsable:nom,agence:p?p.agence:v.agence}));}} className={inputCls}>{respOptions(allProfiles,f.responsable).map(p=><option key={p.nom} value={p.nom}>{p.nom}</option>)}</select></Field>
            :<Field label="Responsable"><span className="text-sm text-gray-700">{f.responsable}</span></Field>}
        </div>
        {isAdmin&&<Field label="Agence"><select value={f.agence} onChange={s('agence')} className={inputCls}>{[...new Set(allProfiles.map(p=>p.agence).filter(Boolean))].sort().map(a=><option key={a} value={a}>{a}</option>)}</select></Field>}
        <div>
          <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Jours par mois</div>
          <div className="grid grid-cols-6 gap-1">
            {MOIS_KEYS.map((k,i)=>(
              <div key={k} className="text-center">
                <div className="text-xs text-gray-400 mb-0.5">{MOIS_LABELS[i]}</div>
                <input type="number" step="0.5" min="0" value={jours[k]} onChange={e=>setJours(v=>({...v,[k]:e.target.value}))} className="w-full text-center text-sm border rounded-lg px-1 py-1 focus:outline-none focus:ring-1 focus:ring-blue-300"/>
              </div>
            ))}
          </div>
        </div>
      </div>
    </Modal>
  );
}

      <div className="space-y-4">

// ── Panel : Détail mission ────────────────────────────────────────────────────
function MissionDetail({ mission, histMissions, contacts, taches, missions, besoins, profile, allProfiles, onClose, onRefresh }) {
  const [showAdd,setShowAdd] = useState(false);
  const [modal,setModal]=useState(null);
  const [viewContact,setViewContact]=useState(null);
  const [tick,setTick]=useState(0);
  const isAdmin=profile.role==='admin';
  const canEdit = isAdmin || mission.responsable===profile.nom;
  const hist = (histMissions||[]).filter(h=>h.mission_id===mission.id)
    .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  // Matcher consultant et référent aux contacts
  const allContacts=contacts||[];
  const matchContact=(name)=>{
    if(!name) return null;
    const n=name.trim().toUpperCase().replace(/\s+/g,' ');
    return allContacts.find(c=>{
      const full=`${(c.prenom||'')} ${(c.nom||'')}`.trim().toUpperCase().replace(/\s+/g,' ');
      return full===n || c.nom?.toUpperCase()===n;
    })||null;
  };
  const consultantContact=matchContact(mission.consultant);
  const referentContact=matchContact(mission.referent);

  const joursTotal = MOIS_KEYS.reduce((s,k)=>s+(parseFloat(mission[`jours_${k}`])||0),0);
  const caTotal    = joursTotal*(parseFloat(mission.tjm)||0);
  const margeTotal = joursTotal*((parseFloat(mission.tjm)||0)-(parseFloat(mission.cjm)||0));
  const tauxMarge  = caTotal>0?(margeTotal/caTotal*100):0;

  const saved = () => { setShowAdd(false); setModal(null); onRefresh(); };

  const missionTaches = (taches||[]).filter(t=>t.mission_id===mission.id&&t.statut!=='fait'&&t.statut!=='annule');
  const actions = canEdit ? (<div className="flex gap-2 flex-wrap">
    <button onClick={()=>setModal('edit')} className="px-3 py-1.5 text-xs bg-blue-50 text-blue-700 rounded-lg font-medium hover:bg-blue-100">✏️ Modifier</button>
    <button onClick={()=>setShowAdd(true)} className="px-3 py-1.5 text-xs bg-green-50 text-green-700 rounded-lg font-medium hover:bg-green-100">➕ Action</button>
    <button onClick={()=>setModal('tache')} className="px-3 py-1.5 text-xs bg-orange-50 text-orange-700 rounded-lg font-medium hover:bg-orange-100">✅ Tâche</button>
    <button onClick={()=>setModal('confirmDel')} className="px-3 py-1.5 text-xs bg-red-50 text-red-700 rounded-lg font-medium hover:bg-red-100">🗑️</button>
  </div>) : null;

  return (
    <SidePanel title={consultantContact?<span className="cursor-pointer text-blue-700 hover:underline" onClick={()=>setViewContact(consultantContact)}>{mission.consultant}</span>:mission.consultant} badge={<div className="flex gap-2 flex-wrap"><MissionStatutBadge statut={mission.statut}/>{mission.agence&&<span className="text-xs bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full font-medium">{mission.agence}</span>}{mission.type_contrat&&<span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">{mission.type_contrat}</span>}</div>} onClose={onClose} actions={actions}>
      <div className="space-y-6">
        <div className="text-sm text-gray-500">{mission.client}{mission.projet?` · ${mission.projet.substring(0,60)}`:''}</div>

        {/* KPI mini */}
        <div className="grid grid-cols-3 gap-3">
          <div className="bg-gray-50 rounded-xl p-3 text-center">
            <div className="text-xs text-gray-400 mb-0.5">Jours YTD</div>
            <div className="text-xl font-bold text-gray-800">{joursTotal%1===0?joursTotal.toFixed(0):joursTotal.toFixed(1)}</div>
          </div>
          <div className="bg-gray-50 rounded-xl p-3 text-center">
            <div className="text-xs text-gray-400 mb-0.5">CA YTD</div>
            <div className="text-xl font-bold text-green-700">{fmtCurrency(caTotal)}</div>
          </div>
          <div className="bg-gray-50 rounded-xl p-3 text-center">
            <div className="text-xs text-gray-400 mb-0.5">Taux marge</div>
            <div className={`text-xl font-bold ${tauxMarge>=30?'text-green-700':tauxMarge>=20?'text-orange-600':'text-red-600'}`}>{tauxMarge.toFixed(1)}%</div>
          </div>
        </div>

        {/* Infos mission */}
        <div className="grid grid-cols-2 gap-3 text-sm">
          <div><span className="text-gray-400 text-xs">TJM vente</span><br/><span className="font-mono font-semibold text-gray-800">{mission.tjm>0?`${mission.tjm}€`:'—'}</span></div>
          <div><span className="text-gray-400 text-xs">TJM achat</span><br/><span className="font-mono text-gray-600">{mission.cjm>0?`${mission.cjm}€`:'—'}</span></div>
          <div><span className="text-gray-400 text-xs">Responsable</span><br/><span className="text-gray-700">{mission.responsable||'—'}</span></div>
          <div><span className="text-gray-400 text-xs">Référent client</span><br/>{mission.referent?(referentContact?<span className="text-blue-700 cursor-pointer hover:underline" onClick={()=>setViewContact(referentContact)}>{mission.referent}</span>:<span className="text-gray-700">{mission.referent}</span>):<span className="text-gray-300">—</span>}</div>
          <div><span className="text-gray-400 text-xs">Marge</span><br/><span className="text-purple-700 font-medium">{fmtCurrency(margeTotal)} ({tauxMarge.toFixed(1)}%)</span></div>
          {mission.num_commande&&<div><span className="text-gray-400 text-xs">N° commande</span><br/><span className="text-gray-700 font-mono text-xs">{mission.num_commande}</span></div>}
          {(mission.date_debut_mission||mission.date_fin_mission)&&<div><span className="text-gray-400 text-xs">Période mission</span><br/><span className="text-gray-700">{fmtDT(mission.date_debut_mission,DEFAULT_MISSION_START_TIME)||'?'} → {fmtDT(mission.date_fin_mission,DEFAULT_MISSION_END_TIME)||'?'}</span></div>}
        </div>

        {/* Jours par mois — éditable */}
        {canEdit
          ? <EditableJoursGrid mission={mission} onUpdate={()=>setTick(t=>t+1)}/>
          : <div>
              <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Jours facturés 2026</div>
              <div className="grid grid-cols-6 gap-1">
                {MOIS_KEYS.map((k,i)=>{
                  const j=parseFloat(mission[`jours_${k}`])||0;
                  const rec=mission[`statut_${k}`];
                  const color=rec==='Réceptionné'?'text-green-700 bg-green-50':rec==='Livré'?'text-blue-700 bg-blue-50':j>0?'text-gray-700 bg-gray-50':'text-gray-300 bg-gray-50';
                  return (
                    <div key={k} className={`rounded-lg p-2 text-center ${color}`} title={rec||''}>
                      <div className="text-xs text-gray-400">{MOIS_LABELS[i]}</div>
                      <div className="text-sm font-bold">{j>0?(j%1===0?j.toFixed(0):j.toFixed(1)):'—'}</div>
                    </div>
                  );
                })}
              </div>
            </div>
        }

        {/* Tâches actives liées */}
        {missionTaches.length>0&&(
          <div>
            <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Tâches actives ({missionTaches.length})</div>
            <div className="space-y-2">{missionTaches.map(t=>(
              <div key={t.id} className="flex items-start gap-2 bg-orange-50 rounded-lg p-3">
                <span className="text-orange-400 mt-0.5">◆</span>
                <div><div className="text-sm font-medium text-orange-900">{t.titre}</div>{t.due_date&&<div className="text-xs text-orange-600">Échéance : {fmtDT(t.due_date,DEFAULT_TASK_TIME)}</div>}</div>
              </div>
            ))}</div>
          </div>
        )}

        {/* Historique */}
        <div>
          <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">
            Historique ({hist.length} action{hist.length>1?'s':''})
          </div>
          {hist.length===0
            ? <div className="text-sm text-gray-400 italic">Aucune action enregistrée.</div>
            : <div className="space-y-2">
                {hist.map((h,i)=>(
                  <div key={i} className="flex gap-3 text-sm border-l-2 border-gray-100 pl-3">
                    <div className="text-gray-400 shrink-0 w-14">{h.date||'—'}</div>
                    <div>
                      <span className="font-medium text-gray-700">{h.type_action}</span>
                      {h.responsable&&<span className="ml-1 text-xs text-gray-400">({h.responsable})</span>}
                      {h.details&&<div className="text-gray-500 text-xs mt-0.5">{h.details}</div>}
                    </div>
                  </div>
                ))}
              </div>
          }
        </div>
      </div>
      {showAdd&&<AddHistMissionModal mission={mission} profile={profile} onClose={()=>setShowAdd(false)} onSaved={saved}/>}
      {modal==='edit'&&<MissionFormModal mission={mission} profile={profile} allProfiles={allProfiles} contacts={contacts} onClose={()=>setModal(null)} onSaved={saved}/>}
      {modal==='tache'&&<AddTacheModal contacts={contacts} besoins={besoins||[]} missions={missions||[]} profile={profile} allProfiles={allProfiles} onClose={()=>setModal(null)} onSaved={saved} defaultMissionId={mission.id}/>}
      {modal==='confirmDel'&&<DeleteMissionModal mission={mission} onClose={()=>setModal(null)} onDeleted={()=>{onClose();onRefresh();}}/>}
      {viewContact&&<ContactDetail contact={viewContact} historique={[]} taches={[]} profile={profile} allProfiles={allProfiles} onClose={()=>setViewContact(null)} onRefresh={()=>{setViewContact(null);onRefresh();}}/>}
    </SidePanel>
  );
}

// ── Onglet Prospects ──────────────────────────────────────────────────────────
function TabProspects({ contacts, historique, taches, missions, besoins, profile, allProfiles, onRefresh }) {
  const [search,setSearch]=useState(''); const [filterStatut,setFilterStatut]=useState('');
  const [filterPeriode,setFilterPeriode]=useState(''); const [filterResp,setFilterResp]=useState(profile.nom);
  const [filterAgence,setFilterAgence]=useState(profile.role==='admin'?'':profile.agence);
  const [sortCol,setSortCol]=useState('date_dernier'); const [sortDir,setSortDir]=useState('desc');
  const [selected,setSelected]=useState(null); const [showAdd,setShowAdd]=useState(false);
  const isAdmin=profile.role==='admin';
  const statuts=useMemo(()=>[...new Set(contacts.map(c=>c.statut).filter(Boolean))].sort(),[contacts]);
  const agences=useMemo(()=>[...new Set(allProfiles.map(p=>p.agence).filter(Boolean))].sort(),[allProfiles]);
  const commerciauxParAgence=useMemo(()=>{
    const map={};allProfiles.forEach(p=>{if(p.agence&&p.nom){if(!map[p.agence])map[p.agence]=[];map[p.agence].push(p.nom);}});
    Object.values(map).forEach(arr=>arr.sort());return map;
  },[allProfiles]);
  const responsablesVisibles=useMemo(()=>{
    if(isAdmin&&!filterAgence) return [...new Set(allProfiles.map(p=>p.nom).filter(Boolean))].sort();
    const ag=filterAgence||profile.agence;return commerciauxParAgence[ag]||[];
  },[isAdmin,filterAgence,profile.agence,allProfiles,commerciauxParAgence]);

  const toggleSort = col => {
    if(sortCol===col) setSortDir(d=>d==='asc'?'desc':'asc');
    else { setSortCol(col); setSortDir(col==='date_dernier'?'desc':'asc'); }
  };
  const SortIcon = ({col}) => {
    if(sortCol!==col) return <span className="ml-1 text-gray-300">↕</span>;
    return <span className="ml-1 text-blue-500">{sortDir==='asc'?'↑':'↓'}</span>;
  };

  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    const rows=contacts
      .map(c=>({...c,jours:daysSince(c.date_dernier)}))
      .filter(c=>{
        if(filterStatut&&c.statut!==filterStatut) return false;
        if(filterAgence&&c.agence!==filterAgence) return false;
        if(filterResp&&c.responsable!==filterResp) return false;
        if(filterPeriode==='7j'&&c.jours>7) return false;
        if(filterPeriode==='30j'&&c.jours>30) return false;
        if(q&&![c.prenom,c.nom,c.groupe,c.ville,c.role,c.besoins].some(v=>(v||'').toLowerCase().includes(q))) return false;
        return true;
      });
    rows.sort((a,b)=>{
      let va,vb;
      if(sortCol==='nom')               { va=(a.nom||'').toLowerCase();   vb=(b.nom||'').toLowerCase(); }
      else if(sortCol==='groupe')       { va=(a.groupe||'').toLowerCase(); vb=(b.groupe||'').toLowerCase(); }
      else if(sortCol==='ville')        { va=(a.ville||'').toLowerCase();  vb=(b.ville||'').toLowerCase(); }
      else if(sortCol==='statut')       { va=(a.statut||'').toLowerCase(); vb=(b.statut||'').toLowerCase(); }
      else if(sortCol==='responsable')  { va=(a.responsable||'').toLowerCase(); vb=(b.responsable||'').toLowerCase(); }
      else if(sortCol==='date_dernier') { va=a.date_dernier||'0000-00-00'; vb=b.date_dernier||'0000-00-00'; }
      else                              { va=a.date_dernier||'0000-00-00'; vb=b.date_dernier||'0000-00-00'; }
      if(va<vb) return sortDir==='asc'?-1:1;
      if(va>vb) return sortDir==='asc'?1:-1;
      return 0;
    });
    return rows;
  },[contacts,search,filterStatut,filterPeriode,filterResp,filterAgence,sortCol,sortDir]);

  const hasFilter=search||filterStatut||filterPeriode||filterResp!==profile.nom||(isAdmin?filterAgence!=='':filterAgence!==profile.agence);
  const resetAll=()=>{setSearch('');setFilterStatut('');setFilterPeriode('');setFilterResp(profile.nom);setFilterAgence(isAdmin?'':profile.agence);};
  const thCls="px-4 py-3 text-left font-medium cursor-pointer select-none hover:text-blue-600 whitespace-nowrap";
  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <div/>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">+ Nouveau contact</button>
      </div>
      <div className="flex gap-2 sm:gap-3 mb-4 flex-wrap">
        <input type="text" placeholder="Rechercher..." value={search} onChange={e=>setSearch(e.target.value)} className="flex-1 min-w-[140px] sm:min-w-64 px-3 sm:px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
        <select value={filterStatut} onChange={e=>setFilterStatut(e.target.value)} className="px-2 sm:px-3 py-2 border rounded-lg text-sm focus:outline-none">
          <option value="">Tous statuts</option>{statuts.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select value={filterPeriode} onChange={e=>setFilterPeriode(e.target.value)} className="px-2 sm:px-3 py-2 border rounded-lg text-sm focus:outline-none hidden sm:block">
          <option value="">Toute période</option>
          <option value="7j">Contactés 7 derniers jours</option>
          <option value="30j">Contactés 30 derniers jours</option>
        </select>
        {isAdmin&&agences.length>1&&(
          <select value={filterAgence} onChange={e=>{setFilterAgence(e.target.value);setFilterResp(e.target.value?'':profile.nom);}} className="px-2 sm:px-3 py-2 border rounded-lg text-sm focus:outline-none">
            <option value="">Toutes agences</option>{agences.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        )}
        {!isAdmin&&<span className="px-2 sm:px-3 py-2 bg-gray-50 border rounded-lg text-sm text-gray-500 hidden sm:block">{profile.agence}</span>}
        <select value={filterResp} onChange={e=>setFilterResp(e.target.value)} className="px-2 sm:px-3 py-2 border rounded-lg text-sm focus:outline-none hidden sm:block">
          <option value="">Tous{!isAdmin?` (${profile.agence})`:filterAgence?` (${filterAgence})`:''}</option>
          {responsablesVisibles.map(r=><option key={r} value={r}>{r}{r===profile.nom?' (moi)':''}</option>)}
        </select>
        {hasFilter&&<button onClick={resetAll} className="px-2 sm:px-3 py-2 text-sm text-gray-500 hover:text-gray-700">✕</button>}
      </div>
      <div className="text-xs text-gray-400 mb-2">{filtered.length} contact{filtered.length>1?'s':''}</div>
      {/* Vue cartes mobile */}
      <div className="md:hidden space-y-2">
        {filtered.map(c=>(
          <div key={c.id} onClick={()=>setSelected(c)} data-detail tabIndex="0" className="bg-white rounded-xl border border-gray-100 p-3 cursor-pointer active:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-300 transition-colors">
            <div className="flex items-start justify-between gap-2">
              <div className="min-w-0">
                <div className="font-semibold text-gray-900 text-sm">{c.prenom} {c.nom}</div>
                {c.groupe&&<div className="text-xs text-gray-600 mt-0.5">{c.groupe}</div>}
                {c.role&&<div className="text-xs text-gray-400">{c.role}</div>}
              </div>
              <StatutBadge statut={c.statut}/>
            </div>
            <div className="flex items-center gap-3 mt-2 text-xs text-gray-400">
              {c.ville&&<span>{c.ville}</span>}
              {c.jours<999&&<span className={c.jours>90?'text-orange-500 font-medium':''}>Dernier contact : {c.jours}j</span>}
            </div>
          </div>
        ))}
      </div>
      {/* Vue tableau desktop */}
      <div className="hidden md:block bg-white rounded-xl border border-gray-100 overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr className="bg-gray-50 text-gray-500 text-xs uppercase">
            <th className={thCls} onClick={()=>toggleSort('nom')}>Contact<SortIcon col="nom"/></th>
            <th className={thCls} onClick={()=>toggleSort('groupe')}>Société<SortIcon col="groupe"/></th>
            <th className={thCls+" hidden lg:table-cell"} onClick={()=>toggleSort('ville')}>Ville<SortIcon col="ville"/></th>
            <th className={thCls} onClick={()=>toggleSort('statut')}>Statut<SortIcon col="statut"/></th>
            <th className={thCls+" hidden lg:table-cell"} onClick={()=>toggleSort('responsable')}>Responsable<SortIcon col="responsable"/></th>
            <th className={thCls+" hidden lg:table-cell"} onClick={()=>toggleSort('date_dernier')}>Dernier contact<SortIcon col="date_dernier"/></th>
          </tr></thead>
          <tbody>{filtered.map(c=>(
            <tr key={c.id} onClick={()=>setSelected(c)} data-detail tabIndex="0" className="border-t border-gray-50 hover:bg-blue-50 focus:bg-blue-50 focus:outline-none cursor-pointer transition-colors">
              <td className="px-4 py-3"><div className="font-medium text-gray-900">{c.prenom} {c.nom}</div>{c.role&&<div className="text-xs text-gray-400">{c.role}</div>}</td>
              <td className="px-4 py-3 text-gray-600">{c.groupe}</td>
              <td className="px-4 py-3 text-gray-500 hidden lg:table-cell">{c.ville}</td>
              <td className="px-4 py-3"><StatutBadge statut={c.statut}/></td>
              <td className="px-4 py-3 text-gray-500 text-xs hidden lg:table-cell">{c.responsable||'—'}</td>
              <td className="px-4 py-3 hidden lg:table-cell">{c.jours<999?<span className={c.jours>90?'text-orange-500 font-medium':'text-gray-500'}>{c.jours}j</span>:<span className="text-gray-300">—</span>}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      {selected&&<ContactDetail contact={selected} historique={historique} taches={taches} missions={missions} besoins={besoins} profile={profile} allProfiles={allProfiles} onRefresh={()=>{onRefresh();setSelected(null);}} onClose={()=>setSelected(null)}/>}
      {showAdd&&<AddContactModal profile={profile} allProfiles={allProfiles} onClose={()=>setShowAdd(false)} onSaved={()=>{setShowAdd(false);onRefresh();}}/>}
    </div>
  );
}

// ── Modal : Compléter une tâche ───────────────────────────────────────────────
function CompleteTaskModal({ task, contact, profile, onClose, onSaved }) {
  const [note,setNote]=useState('');
  const [createRelance,setCreateRelance]=useState(false);
  const [preset,setPreset]=useState('');
  const [customDate,setCustomDate]=useState('');
  const [relanceNote,setRelanceNote]=useState('');
  const [relanceTime,setRelanceTime]=useState(DEFAULT_TASK_TIME);
  const [saving,setSaving]=useState(false);

  const addDays=n=>{ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
  const relanceDate = preset==='1j'?addDays(1) : preset==='3j'?addDays(3) : preset==='7j'?addDays(7) : customDate;

  const PRESETS=[
    {key:'1j', label:'Demain',    date:()=>addDays(1)},
    {key:'3j', label:'3 jours',   date:()=>addDays(3)},
    {key:'7j', label:'1 semaine', date:()=>addDays(7)},
    {key:'custom', label:'📅 Choisir'},
  ];

  const save=async()=>{
    if(createRelance&&!relanceDate) return;
    setSaving(true);
    await sb.from('taches').update({statut:'fait',date_completion:getToday()}).eq('id',task.id);
    if(task.contact_id){
      const details=note?`✅ ${task.titre} — ${note}`:`✅ ${task.titre}`;
      await sb.from('historique_actions').insert({id_prospect:task.contact_id,date:getToday(),type_action:'Tâche accomplie',details,responsable:profile.nom,tache_id:task.id,besoin_id:task.besoin_id||null});
    }
    if(task.mission_id){
      const details=note?`✅ ${task.titre} — ${note}`:`✅ ${task.titre}`;
      await sb.from('historique_missions').insert({mission_id:task.mission_id,date:getToday(),type_action:'Tâche accomplie',details,responsable:profile.nom});
    }
    if(createRelance&&relanceDate){
      await sb.from('taches').insert({
        id:`tw_${Date.now()}`,
        titre:`Relance — ${task.titre}`,
        statut:'a_faire',
        due_date:combineDT(relanceDate,relanceTime),
        contact_id:task.contact_id||null,
        mission_id:task.mission_id||null,
        besoin_id:task.besoin_id||null,
        notes:relanceNote||null,
        responsable:task.responsable||profile.nom,
      });
    }
    toast('Tâche terminée');onSaved();
  };

  return (
    <Modal title={`✅ Terminer — ${task.titre}`} onClose={onClose}
      footer={<>
        <button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Annuler</button>
        <button onClick={save} disabled={saving||(createRelance&&!relanceDate)}
          className="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 disabled:opacity-50">
          {saving?'Enregistrement...':'✓ Marquer comme fait'}
        </button>
      </>}>
      {contact&&<div className="text-xs text-gray-400 bg-gray-50 rounded-lg px-3 py-2">👤 {contact.prenom} {contact.nom} · {contact.groupe}</div>}
      <Field label="Note de complétion (optionnel)">
        <textarea rows={2} value={note} onChange={e=>setNote(e.target.value)}
          placeholder="Ce qui a été fait, résultat de l'échange..."
          className={inputCls+' resize-none'} autoFocus/>
      </Field>
      <div className="border-t pt-3">
        <label className="flex items-center gap-2 cursor-pointer select-none">
          <input type="checkbox" checked={createRelance} onChange={e=>setCreateRelance(e.target.checked)} className="w-4 h-4 accent-blue-600"/>
          <span className="text-sm font-medium text-gray-700">Créer une tâche de relance</span>
        </label>
      </div>
      {createRelance&&(
        <div className="space-y-3 bg-blue-50 rounded-xl p-4 border border-blue-100">
          <div>
            <div className="text-xs font-medium text-gray-500 mb-2">Échéance</div>
            <div className="flex gap-2 flex-wrap">
              {PRESETS.map(p=>(
                <button key={p.key} onClick={()=>setPreset(p.key)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors whitespace-nowrap
                    ${preset===p.key?'bg-blue-600 text-white border-blue-600':'bg-white text-gray-600 border-gray-200 hover:border-blue-300'}`}>
                  {p.label}{p.date&&<span className="ml-1 opacity-60">({p.date()})</span>}
                </button>
              ))}
            </div>
            {preset==='custom'&&(
              <div className="flex gap-2 mt-2">
                <input type="date" value={customDate} min={addDays(1)}
                  onChange={e=>setCustomDate(e.target.value)} className={inputCls+' flex-1'}/>
                <input type="time" value={relanceTime} onChange={e=>setRelanceTime(e.target.value)} className={inputCls+' w-28'}/>
              </div>
            )}
          </div>
          <Field label="Note pour la relance (optionnel)">
            <textarea rows={2} value={relanceNote} onChange={e=>setRelanceNote(e.target.value)}
              placeholder="Contexte pour la prochaine relance..."
              className={inputCls+' resize-none'}/>
          </Field>
        </div>
      )}
    </Modal>
  );
}

// ── Modal : Édition tâche ─────────────────────────────────────────────────────
function EditTacheModal({ task, contacts, besoins, missions, profile, allProfiles, onClose, onSaved }) {
  const [f,setF]=useState({ titre:task.titre||'', due_date:extractDate(task.due_date), due_time:extractTime(task.due_date)||DEFAULT_TASK_TIME, statut:task.statut||'a_faire', notes:task.notes||'', responsable:task.responsable||profile.nom, contact_id:task.contact_id?String(task.contact_id):'', mission_id:task.mission_id||'', besoin_id:task.besoin_id||'' });
  const [saving,setSaving]=useState(false);
  const isAdmin=profile.role==='admin';
  const save=async()=>{
    if(!f.titre.trim())return;
    setSaving(true);
    const{error}=await sb.from('taches').update({ titre:f.titre.trim(), due_date:combineDT(f.due_date,f.due_time)||null, statut:f.due_date?'en_cours':'a_faire', notes:f.notes||null, responsable:f.responsable, contact_id:f.contact_id?parseInt(f.contact_id):null, mission_id:f.mission_id||null, besoin_id:f.besoin_id||null }).eq('id',task.id);

      <Field label="Titre *"><input type="text" value={f.titre} autoFocus onChange={e=>setF(v=>({...v,titre:e.target.value}))} className={inputCls}/></Field>
      <Field label="Échéance">
        <div className="flex gap-2">
          <input type="date" value={f.due_date} min={TODAY} onChange={e=>setF(v=>({...v,due_date:e.target.value}))} className={inputCls+' flex-1'}/>
          {f.due_date && <input type="time" value={f.due_time} onChange={e=>setF(v=>({...v,due_time:e.target.value}))} className={inputCls+' w-28'}/>}
        </div>
      </Field>
      {isAdmin&&<Field label="Responsable"><select value={f.responsable} onChange={e=>setF(v=>({...v,responsable:e.target.value}))} className={inputCls}>{respOptions(allProfiles,f.responsable).map(p=><option key={p.nom} value={p.nom}>{p.nom}</option>)}</select></Field>}
      <Field label="Contact lié">
        <ContactPicker contacts={contacts} value={f.contact_id} onChange={cid=>setF(v=>({...v,contact_id:cid}))}/>
      </Field>
      <Field label="Mission liée">
        <MissionPicker missions={missions||[]} value={f.mission_id} onChange={mid=>setF(v=>({...v,mission_id:mid}))}/>
      </Field>
      <Field label="Besoin lié">
        <BesoinPicker besoins={besoins||[]} value={f.besoin_id} onChange={bid=>setF(v=>({...v,besoin_id:bid}))} contactId={f.contact_id}/>
      </Field>
      <Field label="Notes"><textarea rows={2} value={f.notes} onChange={e=>setF(v=>({...v,notes:e.target.value}))} className={inputCls+' resize-none'}/></Field>
    </Modal>
  );
}

// ── Calendrier tâches ─────────────────────────────────────────────────────────
const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const JOURS_COURT=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
function CalendarTaches({ taches, contactMap, profile, isAdmin, onComplete }) {
  const todayD=new Date(TODAY);
  const [calYear,setCalYear]=useState(todayD.getFullYear());
  const [calMonth,setCalMonth]=useState(todayD.getMonth());
  const prevMonth=()=>{ if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1); };
  const nextMonth=()=>{ if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1); };
  const tasksByDate=useMemo(()=>{
    const map={};
    taches.forEach(t=>{ const d=extractDate(t.due_date); if(d){ if(!map[d])map[d]=[]; map[d].push(t); } });
    return map;
  },[taches]);
  const firstDow=(new Date(calYear,calMonth,1).getDay()+6)%7; // 0=Lun
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const slots=[];
  for(let i=0;i<firstDow;i++)slots.push(null);
  for(let d=1;d<=daysInMonth;d++)slots.push(d);
  while(slots.length%7!==0)slots.push(null);
  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-lg text-gray-600 font-medium">← Préc.</button>
        <div className="flex items-center gap-3">
          <h2 className="text-base font-semibold text-gray-800">{MOIS[calMonth]} {calYear}</h2>
          <button onClick={()=>{setCalYear(todayD.getFullYear());setCalMonth(todayD.getMonth());}} className="text-xs px-2 py-1 bg-blue-50 text-blue-700 rounded-lg hover:bg-blue-100 font-medium">Aujourd'hui</button>
        </div>
        <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-lg text-gray-600 font-medium">Suiv. →</button>
      </div>
      <div className="grid grid-cols-7 gap-px bg-gray-200 rounded-xl overflow-hidden border border-gray-200">
        {JOURS_COURT.map(j=>(
          <div key={j} className="bg-gray-50 text-center text-xs font-semibold text-gray-500 py-2">{j}</div>
        ))}
        {slots.map((day,i)=>{
          if(!day) return <div key={i} className="bg-gray-50 min-h-28"/>;
          const mm=String(calMonth+1).padStart(2,'0'), dd=String(day).padStart(2,'0');
          const dateStr=`${calYear}-${mm}-${dd}`;
          const dayTasks=tasksByDate[dateStr]||[];
          const isToday=dateStr===TODAY;
          const isPast=dateStr<TODAY;
          const hasOver=isPast&&dayTasks.length>0;
          return (
            <div key={i} className={`min-h-28 p-1.5 ${isToday?'bg-blue-50':'bg-white'} ${hasOver?'bg-red-50':''}`} style={isToday?{outline:'2px solid #3b82f6',outlineOffset:'-2px'}:{}}>
              <div className={`text-xs font-medium mb-1 w-6 h-6 flex items-center justify-center rounded-full ${isToday?'bg-blue-600 text-white':'text-gray-500'}`}>{day}</div>
              <div className="space-y-0.5">
                {dayTasks.slice(0,3).map(t=>{
                  const canEdit=isAdmin||t.responsable===profile.nom;
                  const isEntretien=(t.titre||'').toLowerCase().startsWith('entretien');
                  const cls=t.overdue?'bg-red-100 text-red-700 hover:bg-red-200':isEntretien?'bg-purple-100 text-purple-700 hover:bg-purple-200':'bg-blue-50 text-blue-700 hover:bg-blue-100';
                  return (
                    <div key={t.id} title={`${t.titre}${t.notes?' — '+t.notes:''}`}
                      onClick={()=>canEdit&&onComplete(t)}
                      className={`text-xs px-1.5 py-0.5 rounded truncate ${cls} ${canEdit?'cursor-pointer':''}`}>
                      {t.titre}
                    </div>
                  );
                })}
                {dayTasks.length>3&&<div className="text-xs text-gray-400 pl-1">+{dayTasks.length-3}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Modal : Ajouter action depuis tâche ──────────────────────────────────────
function AddActionFromTaskModal({ task, contact, profile, onClose, onSaved }) {
  const types = contact ? typesForContact(contact) : TYPES_ACTION;
  const [f,setF] = useState({ date:getToday(), type_action:'Note interne', details:'', responsable:profile.nom });
  const [saving,setSaving]=useState(false);
  const save = async () => {
    setSaving(true);
    const ins = { date:f.date, type_action:f.type_action, details:f.details||null, responsable:f.responsable, tache_id:task.id };
    if(task.contact_id) ins.id_prospect = task.contact_id;
    if(task.besoin_id) ins.besoin_id = task.besoin_id;
    const { error } = await sb.from('historique_actions').insert(ins);
    if (!error) { toast('Action enregistrée'); onSaved(); } else setSaving(false);
  };
  return (
    <Modal title={`➕ Action — ${task.titre}`} onClose={onClose}
      footer={<><button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Annuler</button><button onClick={save} disabled={saving} className="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 disabled:opacity-50">{saving?'Enregistrement...':'+ Ajouter'}</button></>}>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Date"><input type="date" value={f.date} max={TODAY} onChange={e=>setF(v=>({...v,date:e.target.value}))} className={inputCls}/></Field>
        <Field label="Type">
          <select value={f.type_action} onChange={e=>setF(v=>({...v,type_action:e.target.value}))} className={inputCls}>
            {types.map(x=><option key={x} value={x}>{x}</option>)}
          </select>
        </Field>
      </div>
      <Field label="Détails"><textarea rows={3} value={f.details} onChange={e=>setF(v=>({...v,details:e.target.value}))} placeholder="Notes sur l'échange..." className={inputCls+' resize-none'}/></Field>
    </Modal>
  );
}

function TacheDetailPanel({ task, contact, besoinLabel, mission, besoin, historique, profile, onClose, onEdit, onComplete, onDelete, onAddAction, canEdit, onViewContact, onViewMission, onViewBesoin }) {
  const [showAddAction,setShowAddAction]=useState(false);
  const statusColor = task.statut==='fait'?'bg-green-100 text-green-700':task.overdue?'bg-red-100 text-red-700':'bg-blue-100 text-blue-700';
  const statusLabel = task.statut==='fait'?'Fait':task.overdue?'En retard':task.statut==='en_cours'?'En cours':'À faire';
  const taskHist = (historique||[]).filter(h=>h.tache_id===task.id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const actions = canEdit ? (<div className="flex gap-2 flex-wrap">
    <button onClick={onEdit} className="px-3 py-1.5 text-xs bg-blue-50 text-blue-700 rounded-lg font-medium hover:bg-blue-100">✏️ Modifier</button>
    <button onClick={()=>setShowAddAction(true)} className="px-3 py-1.5 text-xs bg-green-50 text-green-700 rounded-lg font-medium hover:bg-green-100">➕ Action</button>
    <button onClick={onComplete} className="px-3 py-1.5 text-xs bg-green-50 text-green-700 rounded-lg font-medium hover:bg-green-100">✅ Marquer fait</button>
    <button onClick={onDelete} className="px-3 py-1.5 text-xs bg-red-50 text-red-700 rounded-lg font-medium hover:bg-red-100">🗑️</button>
  </div>) : null;
  return (
    <SidePanel title={task.titre} badge={<span className={`text-xs px-2 py-0.5 rounded-full font-medium ${statusColor}`}>{statusLabel}</span>} onClose={onClose} actions={actions}>
      <div className="space-y-4">
        {task.due_date&&<div className="flex items-center gap-2 text-sm"><span className="text-gray-400 w-28 shrink-0">Échéance</span><span className={task.overdue?'text-red-600 font-medium':extractDate(task.due_date)===TODAY?'text-orange-600 font-medium':'text-gray-700'}>{fmtDT(task.due_date,DEFAULT_TASK_TIME)}{task.overdue?' — En retard':extractDate(task.due_date)===TODAY?' — Aujourd\'hui':''}</span></div>}
        <div className="flex items-center gap-2 text-sm"><span className="text-gray-400 w-28 shrink-0">Responsable</span><span className="text-gray-700">{task.responsable}</span></div>
        {task.notes&&<div className="pt-3 border-t border-gray-100"><div className="text-xs text-gray-400 mb-1 uppercase tracking-wide font-medium">Notes</div><div className="text-sm text-gray-700 whitespace-pre-wrap bg-gray-50 rounded-lg p-3">{task.notes}</div></div>}
      </div>

      {/* Objets liés */}
      {(contact||mission||besoin)&&(
        <div>
          <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Objets liés</div>
          <div className="space-y-2">
            {contact&&<div>
              <button onClick={()=>onViewContact&&onViewContact(contact)} className="px-3 py-1.5 bg-blue-50 text-blue-700 rounded-lg text-xs font-medium hover:bg-blue-100 cursor-pointer">👤 {contact.prenom} {contact.nom}{contact.groupe?` · ${contact.groupe}`:''}</button>
              {(contact.telephone||contact.email)&&<div className="ml-3 mt-1 space-y-0.5">
                {contact.telephone&&<div><a href={`tel:${contact.telephone}`} className="text-xs text-gray-500 hover:text-blue-600" onClick={e=>e.stopPropagation()}>📞 {contact.telephone}</a></div>}
                {contact.email&&<div><a href={`mailto:${contact.email}`} className="text-xs text-gray-500 hover:text-blue-600" onClick={e=>e.stopPropagation()}>✉️ {contact.email}</a></div>}
              </div>}
            </div>}
            <div className="flex flex-wrap gap-2">
              {mission&&<button onClick={()=>onViewMission&&onViewMission(mission)} className="px-3 py-1.5 bg-purple-50 text-purple-700 rounded-lg text-xs font-medium hover:bg-purple-100 cursor-pointer">💼 {mission.consultant}{mission.client?` · ${mission.client}`:''}</button>}
              {besoin&&<button onClick={()=>onViewBesoin&&onViewBesoin(besoin)} className="px-3 py-1.5 bg-orange-50 text-orange-700 rounded-lg text-xs font-medium hover:bg-orange-100 cursor-pointer">🎯 {besoin.titre||besoinLabel}</button>}
            </div>
          </div>
        </div>
      )}

      {/* Timeline actions */}
      <div>
        <div className="text-xs text-gray-400 font-semibold mb-2 uppercase tracking-wide">Actions ({taskHist.length})</div>
        {taskHist.length===0
          ? <div className="text-sm text-gray-400 italic">Aucune action enregistrée sur cette tâche</div>
          : <div className="space-y-2">{taskHist.map((h,i)=>(
              <div key={i} className="flex gap-3 text-sm border-l-2 border-gray-100 pl-3">
                <div className="text-gray-400 shrink-0 w-14">{h.date?.slice(0,10)||'—'}</div>
                <div>
                  <span className="font-medium text-gray-700">{h.type_action}</span>
                  {h.responsable&&<span className="ml-1 text-xs text-gray-400">({h.responsable})</span>}
                  {h.details&&<div className="text-gray-500 text-xs mt-0.5">{h.details}</div>}
                </div>
              </div>
            ))}</div>
        }
      </div>
      {showAddAction&&<AddActionFromTaskModal task={task} contact={contact} profile={profile} onClose={()=>setShowAddAction(false)} onSaved={()=>{setShowAddAction(false);onAddAction&&onAddAction();}}/>}
    </SidePanel>
  );
}

function DeleteTacheModal({ task, onClose, onDeleted }) {
  const [loading,setLoading]=useState(false);
  const del=async()=>{
    setLoading(true);
    await sb.from('taches').delete().eq('id',task.id);
    toast('Tâche supprimée');onDeleted();
  };
  return (
    <Modal title="Supprimer la tâche" onClose={onClose}>
      <div className="space-y-4">
        <p className="text-gray-700">Supprimer définitivement <span className="font-semibold">"{task.titre}"</span> ?</p>
        <div className="flex gap-2 justify-end">
          <button onClick={onClose} className="px-4 py-2 rounded-lg border text-sm text-gray-600 hover:bg-gray-50">Annuler</button>
          <button onClick={del} disabled={loading} className="px-4 py-2 rounded-lg bg-red-600 text-white text-sm font-medium hover:bg-red-700 disabled:opacity-50">{loading?'Suppression...':'Supprimer'}</button>
        </div>
      </div>
    </Modal>
  );
}

// ── Onglet Tâches ─────────────────────────────────────────────────────────────
function TacheCard({ t, contact, besoinLabel, missionLabel, canEdit, onDetail, onComplete, onDelete, onEdit }) {
  return (
    <div onClick={()=>onDetail(t)} data-detail tabIndex="0"
      className={`rounded-xl border p-3 cursor-pointer hover:shadow-sm focus:shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300 transition-shadow flex flex-col gap-2 ${t.overdue?'bg-red-50 border-red-200':'bg-white border-gray-100'}`}>
      {/* Titre + actions */}
      <div className="flex items-start justify-between gap-2">
        <div className="font-medium text-gray-900 text-sm leading-snug flex-1">{t.titre}</div>
        {canEdit&&(
          <div className="flex gap-1 shrink-0" onClick={e=>e.stopPropagation()}>
            <button onClick={()=>onComplete(t)} title="Marquer fait"
              className="w-7 h-7 flex items-center justify-center rounded-lg bg-green-100 hover:bg-green-200 text-green-700 text-base font-bold leading-none">✓</button>
            <button onClick={()=>onDelete(t)} title="Supprimer"
              className="w-7 h-7 flex items-center justify-center rounded-lg bg-red-50 hover:bg-red-100 text-red-500 text-base font-bold leading-none">✕</button>
          </div>
        )}
      </div>
      {/* Contact / Besoin / Mission */}
      {contact&&<div className="text-xs text-gray-400 truncate">👤 {contact.prenom} {contact.nom}{contact.groupe?` · ${contact.groupe}`:''}</div>}
      {!contact&&besoinLabel&&<div className="text-xs text-blue-500 truncate">🎯 {besoinLabel}</div>}
      {missionLabel&&<div className="text-xs text-purple-500 truncate">💼 {missionLabel}</div>}
      {/* Notes excerpt */}
      {t.notes&&<div className="text-xs text-gray-500 italic line-clamp-2">{t.notes}</div>}
      {/* Footer : date + responsable */}
      <div className="flex items-center justify-between mt-auto pt-1">
        {t.due_date
          ? <span className={`text-xs font-medium ${t.overdue?'text-red-600':t._date===TODAY?'text-orange-600':'text-gray-400'}`}>{fmtDT(t.due_date,DEFAULT_TASK_TIME)}</span>
          : <span/>}
        <span className="text-xs text-gray-400 truncate ml-2">{t.responsable}</span>
      </div>
    </div>
  );
}

function TacheSection({ label, taches, contactMap, besoinMap, missionMap, profile, isAdmin, onDetail, onComplete, onDelete, onEdit }) {
  if(!taches.length) return null;
  return (
    <div className="space-y-2">
      <div className="flex items-center gap-2">
        <span className="text-sm font-semibold text-gray-700">{label}</span>
        <span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-medium">{taches.length}</span>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        {taches.map(t=>{
          const contact = t.contact_id ? contactMap[t.contact_id] : null;
          const besoinLabel = t.besoin_id ? besoinMap[t.besoin_id] : null;
          const m = t.mission_id ? (missionMap||{})[t.mission_id] : null;
          const missionLabel = m ? `${m.consultant}${m.client?' · '+m.client:''}` : null;
          const canEdit = isAdmin || t.responsable===profile.nom;
          return <TacheCard key={t.id} t={t} contact={contact} besoinLabel={besoinLabel} missionLabel={missionLabel} canEdit={canEdit}
            onDetail={onDetail} onComplete={onComplete} onDelete={onDelete} onEdit={onEdit}/>;
        })}
      </div>
    </div>
  );
}

function TabTaches({ taches, contacts, besoins, missions, historique, profile, allProfiles, onRefresh, navKey, navEcheance }) {
  const [search,setSearch]=useState(''); const [showAdd,setShowAdd]=useState(false);
  const [filterResp,setFilterResp]=useState(profile.nom);
  const [filterEcheance,setFilterEcheance]=useState('');
  const [viewMode,setViewMode]=useState('list');
  const [detailTask,setDetailTask]=useState(null);
  useEffect(()=>{ if(navEcheance) setFilterEcheance(navEcheance); },[navKey]);
  const [completingModal,setCompletingModal]=useState(null);
  const [editingTask,setEditingTask]=useState(null);
  const [deletingTask,setDeletingTask]=useState(null);
  const contactMap=useMemo(()=>Object.fromEntries(contacts.map(c=>[c.id,c])),[contacts]);
  const besoinMap=useMemo(()=>{
    const m={};
    (besoins||[]).forEach(b=>{ if(b.titre) m[b.id]=b.titre; });
    return m;
  },[besoins]);
  const missionMap=useMemo(()=>Object.fromEntries((missions||[]).map(m=>[String(m.id),m])),[missions]);
  const besoinObjMap=useMemo(()=>Object.fromEntries((besoins||[]).map(b=>[String(b.id),b])),[besoins]);
  const isAdmin=profile.role==='admin';
  const responsables=useMemo(()=>[...new Set(taches.map(t=>t.responsable).filter(Boolean))].sort(),[taches]);
  const endOfWeek=useMemo(()=>{
    const d=new Date(TODAY); const dow=d.getDay(); const diff=dow===0?0:7-dow;
    d.setDate(d.getDate()+diff); return d.toISOString().slice(0,10);
  },[]);
  // Badge counts : filtrés par responsable uniquement (toujours visibles)
  const allActives=useMemo(()=>taches
    .filter(t=>t.statut!=='fait'&&t.statut!=='annule')
    .map(t=>({...t,_date:extractDate(t.due_date),overdue:!!(t.due_date&&extractDate(t.due_date)<TODAY)}))
    .filter(t=>!filterResp||t.responsable===filterResp)
  ,[taches,filterResp]);
  const overdue=useMemo(()=>allActives.filter(t=>t.overdue).length,[allActives]);
  const today_t=useMemo(()=>allActives.filter(t=>!t.overdue&&t._date===TODAY).length,[allActives]);
  const thisWeek_t=useMemo(()=>allActives.filter(t=>t._date&&t._date>=TODAY&&t._date<=endOfWeek).length,[allActives,endOfWeek]);

  // Liste affichée : filtrée par écheance + recherche
  const actives=useMemo(()=>allActives.filter(t=>{
    if(filterEcheance==='retard'&&!t.overdue) return false;
    if(filterEcheance==='today'&&t._date!==TODAY) return false;
    if(filterEcheance==='semaine'&&!(t._date&&t._date>=TODAY&&t._date<=endOfWeek)) return false;
    if(search&&!(t.titre||'').toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }),[allActives,search,filterEcheance,endOfWeek]);

  // Sections
  const enRetard  = actives.filter(t=>t.overdue);
  const aujourdhui= actives.filter(t=>!t.overdue&&t._date===TODAY);
  const aVenir    = actives.filter(t=>t._date&&!t.overdue&&t._date!==TODAY);
  const enCours   = actives.filter(t=>!t.due_date&&t.statut==='en_cours');
  const aFaire    = actives.filter(t=>!t.due_date&&t.statut!=='en_cours');
  // Pour les commerciaux : filterResp est toujours leur nom, non réinitialisable à vide
  const hasFilter=search||(isAdmin&&filterResp)||filterEcheance;
  const resetAll=()=>{setSearch('');setFilterResp(isAdmin?'':profile.nom);setFilterEcheance('');};

  const openDetail=(t)=>setDetailTask(t);
  const handleComplete=(t)=>{ setDetailTask(null); setCompletingModal(t); };
  const handleDelete=(t)=>{ setDetailTask(null); setDeletingTask(t); };
  const handleEdit=(t)=>{ setDetailTask(null); setEditingTask(t); };

  const sectionProps={contactMap,besoinMap,missionMap,profile,isAdmin,onDetail:openDetail,onComplete:handleComplete,onDelete:handleDelete,onEdit:handleEdit};

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <div/>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">+ Nouvelle tâche</button>
      </div>
      <div className="flex gap-3 mb-4 flex-wrap">
        <input type="text" placeholder="Rechercher une tâche..." value={search} onChange={e=>setSearch(e.target.value)} className="flex-1 min-w-48 px-4 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
        {isAdmin&&responsables.length>1&&(
          <select value={filterResp} onChange={e=>setFilterResp(e.target.value)} className="px-3 py-2 border rounded-lg text-sm focus:outline-none">
            <option value="">Tous les responsables</option>{responsables.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        )}
        {hasFilter&&<button onClick={resetAll} className="px-3 py-2 text-sm text-gray-500 hover:text-gray-700">✕ Reset</button>}
        <div className="text-sm text-gray-500 self-center flex items-center gap-2 flex-wrap">
          <span>{actives.length} tâche{actives.length>1?'s':''}</span>
          {overdue>0&&<button onClick={()=>setFilterEcheance(filterEcheance==='retard'?'':'retard')} className={`text-xs px-2 py-0.5 rounded-full font-medium ${filterEcheance==='retard'?'bg-red-600 text-white':'bg-red-100 text-red-600 hover:bg-red-200'}`}>⚠️ {overdue} en retard</button>}
          {today_t>0&&<button onClick={()=>setFilterEcheance(filterEcheance==='today'?'':'today')} className={`text-xs px-2 py-0.5 rounded-full font-medium ${filterEcheance==='today'?'bg-orange-500 text-white':'bg-orange-100 text-orange-600 hover:bg-orange-200'}`}>📍 {today_t} aujourd'hui</button>}
          {thisWeek_t>0&&<button onClick={()=>setFilterEcheance(filterEcheance==='semaine'?'':'semaine')} className={`text-xs px-2 py-0.5 rounded-full font-medium ${filterEcheance==='semaine'?'bg-blue-600 text-white':'bg-blue-100 text-blue-600 hover:bg-blue-200'}`}>📆 {thisWeek_t} cette semaine</button>}
        </div>
        <div className="flex border rounded-lg overflow-hidden text-sm">
          <button onClick={()=>setViewMode('list')} className={`px-3 py-2 font-medium ${viewMode==='list'?'bg-blue-600 text-white':'bg-white text-gray-600 hover:bg-gray-50'}`}>☰ Liste</button>
          <button onClick={()=>setViewMode('calendar')} className={`px-3 py-2 font-medium border-l ${viewMode==='calendar'?'bg-blue-600 text-white':'bg-white text-gray-600 hover:bg-gray-50'}`}>📅 Calendrier</button>
        </div>
      </div>
      {viewMode==='list'?(
        <div className="space-y-6">
          <TacheSection label="🔴 En retard"  taches={enRetard}   {...sectionProps}/>
          <TacheSection label="📅 Aujourd'hui" taches={aujourdhui} {...sectionProps}/>
          <TacheSection label="🗓 À venir"     taches={aVenir}    {...sectionProps}/>
          <TacheSection label="🔄 En cours"    taches={enCours}   {...sectionProps}/>
          <TacheSection label="📋 À faire"     taches={aFaire}    {...sectionProps}/>
          {actives.length===0&&<div className="text-center py-16 text-gray-400"><div className="text-4xl mb-3">✅</div><div className="font-medium">Aucune tâche</div></div>}
        </div>
      ):(
        <CalendarTaches taches={actives} contactMap={contactMap} profile={profile} isAdmin={isAdmin} onComplete={setCompletingModal}/>
      )}
      {showAdd&&<AddTacheModal contacts={contacts} besoins={besoins} missions={missions} profile={profile} allProfiles={allProfiles} onClose={()=>setShowAdd(false)} onSaved={()=>{setShowAdd(false);onRefresh();}}/>}
      {detailTask&&(()=>{const t=detailTask;const contact=t.contact_id?contactMap[t.contact_id]:null;const besoinLabel=t.besoin_id?besoinMap[t.besoin_id]:null;const mission=t.mission_id?missionMap[t.mission_id]:null;const besoin=t.besoin_id?besoinObjMap[t.besoin_id]:null;const canEdit=isAdmin||t.responsable===profile.nom;return<TacheDetailPanel task={t} contact={contact} besoinLabel={besoinLabel} mission={mission} besoin={besoin} historique={historique} profile={profile} canEdit={canEdit} onClose={()=>setDetailTask(null)} onEdit={()=>handleEdit(t)} onComplete={()=>handleComplete(t)} onDelete={()=>handleDelete(t)} onAddAction={()=>{setDetailTask(null);onRefresh();}}/>;})()}
      {completingModal&&<CompleteTaskModal task={completingModal} contact={contactMap[completingModal.contact_id]||null} profile={profile} onClose={()=>setCompletingModal(null)} onSaved={()=>{setCompletingModal(null);onRefresh();}}/>}
      {editingTask&&<EditTacheModal task={editingTask} contacts={contacts} besoins={besoins} missions={missions} profile={profile} allProfiles={allProfiles} onClose={()=>setEditingTask(null)} onSaved={()=>{setEditingTask(null);onRefresh();}}/>}
      {deletingTask&&<DeleteTacheModal task={deletingTask} onClose={()=>setDeletingTask(null)} onDeleted={()=>{setDeletingTask(null);onRefresh();}}/>}
    </div>
  );
}

// ── Besoins V2 — Composants ──────────────────────────────────────────────────

// Budget : 3 modes de saisie
function BudgetInput({ budget, tjm, jours, dateDebut, dateFin, onChange }) {
  const [mode,setMode]=useState(dateDebut&&dateFin?'dates':tjm?'tjm':'direct');
  const calcJours=useMemo(()=>joursOuvres(dateDebut,dateFin),[dateDebut,dateFin]);
  useEffect(()=>{
    if(mode==='tjm'&&tjm&&jours) onChange({budget:tjm*jours,budget_tjm:tjm,budget_jours:jours,budget_date_debut:null,budget_date_fin:null});
    if(mode==='dates'&&tjm&&dateDebut&&dateFin){ const j=joursOuvres(dateDebut,dateFin); onChange({budget:tjm*j,budget_tjm:tjm,budget_jours:j,budget_date_debut:dateDebut,budget_date_fin:dateFin}); }
  },[mode,tjm,jours,dateDebut,dateFin]);
  return (
    <div className="space-y-2">
      <div className="flex gap-1 text-xs">
        {[{k:'direct',l:'Montant'},{k:'tjm',l:'TJM × Jours'},{k:'dates',l:'TJM × Dates'}].map(m=>(
          <button key={m.k} type="button" onClick={()=>setMode(m.k)} className={`px-2 py-1 rounded ${mode===m.k?'bg-blue-600 text-white':'bg-gray-100 text-gray-600'}`}>{m.l}</button>
        ))}
      </div>
      {mode==='direct'&&(
        <input type="number" value={budget||''} onChange={e=>onChange({budget:parseFloat(e.target.value)||0,budget_tjm:null,budget_jours:null,budget_date_debut:null,budget_date_fin:null})} placeholder="10000" className={inputCls}/>
      )}
      {mode==='tjm'&&(
        <div className="grid grid-cols-2 gap-2">
          <input type="number" value={tjm||''} onChange={e=>onChange({budget_tjm:parseFloat(e.target.value)||0})} placeholder="TJM (€)" className={inputCls}/>
          <input type="number" value={jours||''} onChange={e=>onChange({budget_jours:parseInt(e.target.value)||0})} placeholder="Nb jours" className={inputCls}/>
        </div>
      )}
      {mode==='dates'&&(
        <div className="space-y-2">
          <input type="number" value={tjm||''} onChange={e=>onChange({budget_tjm:parseFloat(e.target.value)||0})} placeholder="TJM (€)" className={inputCls}/>
          <div className="grid grid-cols-2 gap-2">
            <input type="date" value={dateDebut||''} onChange={e=>onChange({budget_date_debut:e.target.value})} className={inputCls}/>
            <input type="date" value={dateFin||''} onChange={e=>onChange({budget_date_fin:e.target.value})} className={inputCls}/>
          </div>
          {calcJours>0&&<div className="text-xs text-gray-500">{calcJours} jours ouvrés → {fmtCurrency((tjm||0)*calcJours)}</div>}
        </div>
      )}
      {budget>0&&<div className="text-xs font-medium text-green-700">Budget : {fmtCurrency(budget)}</div>}
    </div>
  );
}

// Sélecteur de candidat (cherche parmi contacts candidat/consultant/freelance/prestataire)
